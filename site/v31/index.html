<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Soleia Expérience — La pause créative qui fait du BIEN</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..600&family=Space+Grotesk:wght@300..700&family=Pinyon+Script&display=swap" rel="stylesheet" />
<style>
  :root {
    /* ===== PALETTE DE MARQUE — EXACTE ===== */
    --rose: #fb6ba6;        /* ROSE */
    --orange: #f8742f;      /* ORANGE */
    --rose-clair: #f8e6e6;  /* ROSE CLAIR */
    --ink: #3a2a2e;         /* texte sombre chaleureux */
    --creme: #fffaf6;       /* crème / blanc cassé */
    /* dérivés transparents (mêmes teintes, simples opacités) */
    --glass: rgba(255, 250, 246, 0.62);
    --glass-strong: rgba(255, 250, 246, 0.82);
    --ink-soft: rgba(58, 42, 46, 0.62);
    --fine: 0.06em;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }

  body {
    font-family: "Space Grotesk", system-ui, sans-serif;
    color: var(--ink);
    background: var(--creme);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  /* ============ FOND : gradient vivant réactif (signature v30) ============ */
  .living {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    background:
      radial-gradient(130% 120% at 50% 0%, var(--creme) 0%, var(--rose-clair) 60%, #f8dcd6 100%);
  }

  /* Fallback CSS animé (sans JS / sans WebGL) : aurora + blobs rose↔orange */
  .living__css {
    position: absolute;
    inset: -20%;
    background:
      radial-gradient(44% 52% at 30% 38%, rgba(251, 107, 166, 0.60), transparent 70%),
      radial-gradient(46% 52% at 72% 34%, rgba(248, 116, 47, 0.52), transparent 72%),
      radial-gradient(50% 54% at 54% 74%, rgba(248, 230, 230, 0.65), transparent 74%),
      conic-gradient(from 200deg at 50% 50%, rgba(251,107,166,0.30), rgba(248,116,47,0.28), rgba(248,230,230,0.34), rgba(251,107,166,0.28), rgba(248,116,47,0.30));
    filter: blur(46px) saturate(1.05);
    opacity: 0.92;
    transition: opacity 1s ease;
    animation: auroraDrift 30s ease-in-out infinite alternate;
  }
  @keyframes auroraDrift {
    0%   { transform: translate3d(-2%, -1%, 0) rotate(0deg) scale(1.04); }
    50%  { transform: translate3d(3%, 2%, 0) rotate(8deg) scale(1.12); }
    100% { transform: translate3d(-1%, 3%, 0) rotate(-6deg) scale(1.06); }
  }

  /* Canvas WebGL au-dessus du fallback une fois prêt */
  #gl {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 1.3s ease;
  }
  .gl-ready #gl { opacity: 1; }
  .gl-ready .living__css { opacity: 0; }

  /* Voile crème + grain fin : texte net, ambiance studio solaire */
  .living__veil {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(125% 96% at 50% 3%, transparent 32%, rgba(255, 250, 246, 0.54) 100%),
      radial-gradient(82% 70% at 50% 48%, rgba(255, 250, 246, 0.40), transparent 64%),
      linear-gradient(180deg, rgba(255, 250, 246, 0.30) 0%, transparent 26%, transparent 72%, rgba(255, 250, 246, 0.40) 100%);
    pointer-events: none;
  }
  .living__grain {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.045;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* ============ SHELL ============ */
  .shell {
    position: relative;
    z-index: 2;
    height: 100svh;
    min-height: 600px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: clamp(0.9rem, 2.2vw, 1.7rem) clamp(1.2rem, 5vw, 4.5rem) clamp(1rem, 2.2vh, 1.6rem);
  }

  /* ============ NAV — 3 colonnes, logo centré ============ */
  .nav {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: clamp(0.8rem, 2vw, 2rem);
  }
  .nav__col {
    display: flex;
    align-items: center;
    gap: clamp(1.1rem, 2.4vw, 2.3rem);
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .nav__col--left { justify-self: start; }
  .nav__col--right {
    justify-self: end;
    gap: clamp(1.1rem, 2.2vw, 2.1rem);
  }
  /* RETOUR 5 : liens du menu en GRAS (700) */
  .nav__col a.nav__link {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: clamp(0.88rem, 1.02vw, 0.98rem);
    letter-spacing: 0.012em;
    color: var(--ink);
    text-decoration: none;
    position: relative;
    padding: 0.35rem 0.1rem;
    transition: color 0.25s ease;
    white-space: nowrap;
  }
  .nav__col a.nav__link::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: 0.05rem;
    height: 2px;
    background: linear-gradient(90deg, var(--rose), var(--orange));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .nav__col a.nav__link:hover::after,
  .nav__col a.nav__link:focus-visible::after { transform: scaleX(1); }
  .nav__col a.nav__link:hover { color: var(--orange); }

  /* RETOUR 1 : LOGO OFFICIEL centré (plus de texte « soleia ») */
  .brand {
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    justify-self: center;
    line-height: 0;
  }
  .brand__logo {
    display: block;
    height: clamp(40px, 5.4vh, 60px);
    width: auto;
  }

  /* icône compte discrète tolérée à l'extrême droite */
  .icon-btn {
    display: grid;
    place-items: center;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1.5px solid rgba(58, 42, 46, 0.16);
    background: var(--glass-strong);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--ink);
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.25s ease, color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
  }
  .icon-btn:hover {
    transform: translateY(-2px);
    color: var(--orange);
    border-color: var(--rose);
    box-shadow: 0 8px 20px rgba(251, 107, 166, 0.28);
  }
  .icon-btn svg { width: 18px; height: 18px; }
  .account { color: var(--ink); }

  .nav__burger {
    display: none;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1.5px solid rgba(58, 42, 46, 0.16);
    background: var(--glass-strong);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--ink);
    cursor: pointer;
    align-items: center;
    justify-content: center;
  }
  .nav__burger svg { width: 20px; height: 20px; }

  /* ============ RETOUR 4 : RAIL RÉSEAUX SOCIAUX — bord GAUCHE ============ */
  .social-rail {
    position: fixed;
    left: clamp(0.7rem, 1.8vw, 1.7rem);
    top: 50%;
    transform: translateY(-50%);
    z-index: 6;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.85rem;
  }
  .social-rail__label {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    transform: rotate(180deg);
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: 0.66rem;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 0.35rem;
    user-select: none;
  }
  .social-rail__line {
    width: 1.5px;
    height: clamp(26px, 4vh, 40px);
    background: linear-gradient(180deg, var(--rose), var(--orange));
    border-radius: 2px;
    opacity: 0.7;
  }
  .social-rail .icon-btn {
    width: 42px; height: 42px;
    background: var(--glass-strong);
  }
  .social-rail .icon-btn svg { width: 19px; height: 19px; }

  /* ============ HERO ============ */
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
    padding: clamp(0.6rem, 2vh, 1.6rem) 0;
  }

  .title {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 360;
    font-size: clamp(3rem, 10.4vw, 10.6rem);
    line-height: 0.95;
    letter-spacing: -0.025em;
    margin: 0 0 clamp(1.6rem, 4vh, 2.8rem);
    color: var(--ink);
    max-width: 14ch;
    font-variation-settings: "opsz" 144;
    cursor: default;
  }
  .title .line { display: block; }
  .title em {
    font-style: italic;
    font-weight: 340;
    font-variation-settings: "opsz" 144;
  }
  /* lettres animables (onde au survol) */
  .title .ch {
    display: inline-block;
    will-change: transform;
    transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .title .sp { display: inline-block; width: 0.28em; }

  /* ============ RETOUR 2 : « BIEN » — ORANGE VIF PLEIN #f8742f + léger halo ============ */
  .bien {
    position: relative;
    display: inline-block;
    font-style: normal;
    font-weight: 600;
    letter-spacing: -0.01em;
    padding-right: 0.06em;
  }
  .bien .ch {
    color: var(--orange);
    -webkit-text-fill-color: var(--orange);
  }
  /* léger halo orange pulsant derrière « BIEN. » */
  .bien::after {
    content: "BIEN.";
    position: absolute;
    inset: 0;
    z-index: -1;
    color: var(--orange);
    -webkit-text-fill-color: var(--orange);
    filter: blur(16px);
    opacity: 0.5;
    animation: glow 4.5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes glow {
    0%, 100% { opacity: 0.36; filter: blur(14px); }
    50%      { opacity: 0.62; filter: blur(22px); }
  }

  /* ============ BOUTONS ============ */
  .actions {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: clamp(0.7rem, 1.4vw, 1rem);
  }
  .pill {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: clamp(1.02rem, 1.35vw, 1.16rem);
    letter-spacing: 0.005em;
    padding: clamp(1rem, 1.7vh, 1.25rem) clamp(1.7rem, 2.6vw, 2.4rem);
    border-radius: 999px;
    border: 1.5px solid rgba(58, 42, 46, 0.2);
    background: var(--glass-strong);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: var(--ink);
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 0.28s ease, border-color 0.28s ease, color 0.28s ease;
    white-space: nowrap;
  }
  .pill:hover {
    transform: translateY(-2px);
    border-color: var(--rose);
    color: var(--orange);
    box-shadow: 0 10px 26px rgba(251, 107, 166, 0.24);
  }
  .pill--primary {
    border: none;
    color: var(--creme);
    background: linear-gradient(96deg, var(--rose) 0%, var(--orange) 100%);
    box-shadow: 0 12px 32px rgba(248, 116, 47, 0.34);
    position: relative;
    overflow: hidden;
  }
  .pill--primary::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(96deg, var(--orange) 0%, var(--rose) 100%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .pill--primary span { position: relative; z-index: 1; }
  .pill--primary:hover {
    transform: translateY(-2px);
    color: var(--creme);
    box-shadow: 0 16px 40px rgba(248, 116, 47, 0.46);
  }
  .pill--primary:hover::before { opacity: 1; }

  /* ============ RETOUR 6 : CITATION CENTRÉE + signature centrée dessous ============ */
  .foot {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-top: clamp(0.6rem, 1.4vh, 1.1rem);
  }
  .quote {
    margin: 0;
    max-width: min(92vw, 70ch);
    text-align: center;
  }
  .quote p {
    font-family: "Fraunces", Georgia, serif;
    font-style: italic;
    font-weight: 330;
    font-size: clamp(0.98rem, 1.7vw, 1.32rem);
    line-height: 1.4;
    color: var(--ink);
    margin: 0 0 0.35rem;
  }
  .quote cite {
    display: block;
    font-style: normal;
    font-family: "Pinyon Script", "Fraunces", cursive;
    font-weight: 400;
    font-size: clamp(1.6rem, 2.6vw, 2.2rem);
    line-height: 1;
    letter-spacing: 0.01em;
    color: var(--orange);
  }

  /* ============ FOCUS / A11Y ============ */
  a:focus-visible, button:focus-visible {
    outline: 2.5px solid var(--orange);
    outline-offset: 3px;
    border-radius: 999px;
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 900px) {
    .quote p { white-space: normal; }
  }
  @media (max-width: 760px) {
    .nav { grid-template-columns: auto auto; }
    .nav__col--left { display: none; }
    .nav__col--right .nav__link { display: none; }
    .brand { justify-self: start; }
    .nav__burger { display: inline-flex; }
    .social-rail { display: none; }
    .title { font-size: clamp(2.8rem, 14vw, 5.2rem); max-width: 11ch; }
    .actions .pill { font-size: 1rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
    }
    #gl { display: none; }
    .living__css { opacity: 0.92 !important; animation: none !important; }
    .title .ch { transition: none !important; }
  }
</style>
</head>
<body>
  <!-- ===================== FOND : GRADIENT VIVANT RÉACTIF ===================== -->
  <div class="living" aria-hidden="true">

    <canvas id="gl"></canvas>
    <div class="living__veil"></div>
    <div class="living__grain"></div>
  </div>

  <!-- ===================== RAIL RÉSEAUX SOCIAUX (bord gauche) ===================== -->
  <div class="social-rail" role="group" aria-label="Suivre Soleia sur les réseaux sociaux">

  </div>

  <div class="shell">
    <!-- ===================== NAV (haut désencombré) ===================== -->
    <nav class="nav" aria-label="Navigation principale">
      <ul class="nav__col nav__col--left">
        <li><a class="nav__link" href="#ateliers">Ateliers</a></li>
        <li><a class="nav__link" href="#boutique">Boutique</a></li>
      </ul>

      <a class="brand" href="#" aria-label="Soleia Expérience, accueil">
        <img class="brand__logo" src="/logo.svg" alt="Soleia Expérience" />
      </a>

      <div class="nav__col nav__col--right">
        <a class="nav__link" href="#histoire">Histoire</a>
        <a class="nav__link" href="#galerie">Galerie</a>

        <button class="icon-btn account" aria-label="Mon compte">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
            <circle cx="12" cy="8" r="3.4"/>
            <path d="M5 20c0-3.6 3.1-6 7-6s7 2.4 7 6" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="nav__burger" aria-label="Ouvrir le menu">

      </div>
    </nav>

    <!-- ===================== HERO ===================== -->
    <main class="hero">
      <h1 class="title" id="title">
        <span class="line" data-wave>La pause créative</span>
        <span class="line" data-wave>qui fait <em>du</em> <span class="bien" data-wave-bien>BIEN.</span></span>

      <div class="actions">
        <a class="pill pill--primary" href="#ateliers"><span>Les prochains ateliers</span></a>

    <!-- ===================== CITATION (centrée) ===================== -->

        <cite>Gwennaëlle</cite>
      </figure>
    </footer>
  </div>

  <!-- ===================== ONDE / DISTORSION DU TITRE AU SURVOL ===================== -->
  <script>
  (function () {
    var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    var coarse = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;

    // Découpe le texte en lettres animables (préserve <em> et .bien)
    function splitNode(node) {
      var out = [];
      Array.prototype.slice.call(node.childNodes).forEach(function (n) {
        if (n.nodeType === 3) { // texte
          var frag = document.createDocumentFragment();
          n.nodeValue.split("").forEach(function (c) {
            var s = document.createElement("span");
            if (c === " ") { s.className = "sp"; s.setAttribute("aria-hidden", "true"); }
            else { s.className = "ch"; s.textContent = c; out.push(s); }
            frag.appendChild(s);
          });
          node.replaceChild(frag, n);
        } else if (n.nodeType === 1) {
          out = out.concat(splitNode(n));
        }
      });
      return out;
    }

    var lines = document.querySelectorAll("[data-wave]");
    var allCh = [];
    lines.forEach(function (line) {
      allCh = allCh.concat(splitNode(line));
    });
    // accessibilité : libellé propre sur le titre, lettres masquées au lecteur
    var titleEl = document.getElementById("title");
    if (titleEl) {
      titleEl.setAttribute("aria-label", "La pause créative qui fait du BIEN.");
      allCh.forEach(function (c) { c.setAttribute("aria-hidden", "true"); });
    }

    if (reduce || coarse || allCh.length === 0) return;

    var raf = null;
    var t0 = 0;
    var amp = 0;
    var targetAmp = 0;

    function frame(now) {
      if (!t0) t0 = now;
      var t = (now - t0) * 0.004;
      amp += (targetAmp - amp) * 0.08;
      if (amp > 0.002 || targetAmp > 0) {
        for (var i = 0; i < allCh.length; i++) {
          var ph = i * 0.45;
          var y = Math.sin(t + ph) * 9 * amp;
          var rot = Math.cos(t * 0.9 + ph) * 3 * amp;
          var sc = 1 + Math.sin(t * 1.2 + ph) * 0.04 * amp;
          allCh[i].style.transform = "translateY(" + y.toFixed(2) + "px) rotate(" + rot.toFixed(2) + "deg) scale(" + sc.toFixed(3) + ")";
        }
        raf = requestAnimationFrame(frame);
      } else {
        for (var j = 0; j < allCh.length; j++) allCh[j].style.transform = "";
        raf = null;
      }
    }

    function start() { targetAmp = 1; if (!raf) { raf = requestAnimationFrame(frame); } }
    function stop()  { targetAmp = 0; if (!raf) { raf = requestAnimationFrame(frame); } }

    if (titleEl) {
      titleEl.addEventListener("pointerenter", start);
      titleEl.addEventListener("pointerleave", stop);
    }
  })();
  </script>

  <!-- ===================== WebGL — GRADIENT VIVANT QUI SE COURBE VERS LE CURSEUR ===================== -->
  <script>
  (function () {
    var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) return;

    var canvas = document.getElementById("gl");
    if (!canvas) return;

    var gl = canvas.getContext("webgl", { antialias: true, alpha: false, premultipliedAlpha: false })
          || canvas.getContext("experimental-webgl");
    if (!gl) return; // fallback CSS reste visible

    var vertSrc =
      "attribute vec2 p;" +
      "void main(){ gl_Position = vec4(p, 0.0, 1.0); }";

    // Mesh-gradient / aurora : domain warp FBM attiré (courbé) vers le curseur,
    // + lumière chaude qui suit la souris. Palette Soleia EXACTE : rose ↔ orange sur crème.
    var fragSrc = [
      "precision highp float;",
      "uniform vec2  u_res;",
      "uniform float u_time;",
      "uniform vec2  u_mouse;",   // 0..1, y déjà retourné
      "uniform float u_pull;",    // intensité d'attraction (0 repos -> 1 survol)",
      "",
      "vec3 ROSE   = vec3(0.984, 0.420, 0.651);", // #fb6ba6
      "vec3 ORANGE = vec3(0.973, 0.455, 0.184);", // #f8742f
      "vec3 ROSEL  = vec3(0.973, 0.902, 0.902);", // #f8e6e6
      "vec3 CREAM  = vec3(1.000, 0.980, 0.965);", // #fffaf6
      "",
      "float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123); }",
      "float noise(vec2 p){",
      "  vec2 i = floor(p); vec2 f = fract(p);",
      "  vec2 u = f*f*(3.0-2.0*f);",
      "  float a = hash(i);",
      "  float b = hash(i + vec2(1.0, 0.0));",
      "  float c = hash(i + vec2(0.0, 1.0));",
      "  float d = hash(i + vec2(1.0, 1.0));",
      "  return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);",
      "}",
      "float fbm(vec2 p){",
      "  float v = 0.0; float a = 0.55;",
      "  mat2 m = mat2(1.6, 1.2, -1.2, 1.6);",
      "  for(int i=0;i<5;i++){ v += a*noise(p); p = m*p; a *= 0.5; }",
      "  return v;",
      "}",
      "",
      "void main(){",
      "  vec2 uv = gl_FragCoord.xy / u_res.xy;",
      "  float asp = u_res.x / u_res.y;",
      "  vec2 p = vec2((uv.x - 0.5) * asp, uv.y - 0.5);",
      "  vec2 m = vec2((u_mouse.x - 0.5) * asp, u_mouse.y - 0.5);",
      "  float t = u_time * 0.06;",
      "",
      "  // --- COURBURE vers le curseur : lentille douce qui attire le champ ---",
      "  vec2 toM = m - p;",
      "  float dM = length(toM);",
      "  float lens = (0.16 + 0.20 * u_pull) / (dM * dM + 0.10);",
      "  vec2 curved = p + toM * lens * 0.45;",
      "",
      "  // --- domain warp (aurora) sur le champ courbé ---",
      "  vec2 q = vec2(fbm(curved*1.5 + vec2(0.0, t)), fbm(curved*1.5 + vec2(5.2, -t*0.8)));",
      "  vec2 r = vec2(fbm(curved*1.5 + 3.2*q + vec2(1.7, 9.2) + t*0.5),",
      "                fbm(curved*1.5 + 3.2*q + vec2(8.3, 2.8) - t*0.4));",
      "  float n = fbm(curved*1.6 + 2.4*r + t*0.3);",
      "",
      "  // --- iridescence : tissage rose ↔ orange (équilibré) sur base crème/rose clair ---",
      "  vec3 col = CREAM;",
      "  col = mix(col, ROSEL,  smoothstep(0.28, 0.92, n) * 0.85);",
      "  col = mix(col, ROSE,   smoothstep(0.34, 0.86, r.x));",
      "  col = mix(col, ORANGE, smoothstep(0.40, 0.96, q.y) * 0.92);",
      "  col = mix(col, ORANGE, smoothstep(0.55, 1.05, r.y) * 0.55);",
      "  col = mix(col, ROSE,   smoothstep(0.58, 1.10, n * r.x) * 0.50);",
      "",
      "  // léger reflet nacré (bandes iridescentes mobiles)",
      "  float sheen = 0.5 + 0.5 * sin((q.x + r.y) * 6.2832 + u_time * 0.25);",
      "  col += sheen * 0.045 * vec3(1.0, 0.95, 0.90);",
      "",
      "  // --- LUMIÈRE CHAUDE qui suit la souris (mélange rose↔orange) ---",
      "  float glowR = 0.55;",
      "  float warm = exp(-dM*dM / (glowR*glowR)) * (0.18 + 0.42 * u_pull);",
      "  vec3 warmCol = mix(ROSE, ORANGE, 0.5);",
      "  col += warm * warmCol * 0.55;",
      "  // petit cœur plus intense (orange chaud)",
      "  col += exp(-dM*dM / 0.02) * (0.10 + 0.25 * u_pull) * ORANGE;",
      "",
      "  // --- crème dominante pour lisibilité parfaite du texte ---",
      "  col = mix(col, CREAM, smoothstep(0.55, 1.0, uv.y) * 0.50);",  // haut (nav/titre)
      "  col = mix(col, CREAM, 0.12);",
      "  float vig = distance(uv, vec2(0.5, 0.5));",
      "  col = mix(col, CREAM, smoothstep(0.50, 1.05, vig) * 0.30);",
      "  col = clamp(col, 0.0, 1.0);",
      "",
      "  gl_FragColor = vec4(col, 1.0);",
      "}"
    ].join("\n");

    function compile(type, src) {
      var s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) { gl.deleteShader(s); return null; }
      return s;
    }

    var vs = compile(gl.VERTEX_SHADER, vertSrc);
    var fs = compile(gl.FRAGMENT_SHADER, fragSrc);
    if (!vs || !fs) return;

    var prog = gl.createProgram();
    gl.attachShader(prog, vs);
    gl.attachShader(prog, fs);
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) return;
    gl.useProgram(prog);

    var buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
    var loc = gl.getAttribLocation(prog, "p");
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

    var uRes   = gl.getUniformLocation(prog, "u_res");
    var uTime  = gl.getUniformLocation(prog, "u_time");
    var uMouse = gl.getUniformLocation(prog, "u_mouse");
    var uPull  = gl.getUniformLocation(prog, "u_pull");

    var dpr = Math.min(window.devicePixelRatio || 1, 1.5);
    function resize() {
      var w = Math.floor(canvas.clientWidth * dpr);
      var h = Math.floor(canvas.clientHeight * dpr);
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w; canvas.height = h;
        gl.viewport(0, 0, w, h);
      }
    }
    window.addEventListener("resize", resize);
    resize();

    // --- état souris : cible + valeur lissée (inertie) ---
    var mx = 0.5, my = 0.5;
    var smx = 0.5, smy = 0.5;
    var pull = 0.0, pullTarget = 0.0;
    var idleAngle = Math.random() * 6.28;

    function setFromEvent(cx, cy) {
      var rect = canvas.getBoundingClientRect();
      mx = (cx - rect.left) / rect.width;
      my = 1.0 - (cy - rect.top) / rect.height;
      pullTarget = 1.0;
    }
    window.addEventListener("pointermove", function (e) {
      setFromEvent(e.clientX, e.clientY);
    }, { passive: true });
    window.addEventListener("pointerdown", function (e) {
      setFromEvent(e.clientX, e.clientY);
      pullTarget = 1.0;
    }, { passive: true });
    window.addEventListener("pointerleave", function () { pullTarget = 0.0; });
    document.addEventListener("mouseleave", function () { pullTarget = 0.0; });

    document.querySelector(".living").classList.add("gl-ready");
    document.body.classList.add("gl-ready");

    var start = performance.now();
    var running = true;
    var elapsed = 0;
    document.addEventListener("visibilitychange", function () {
      running = !document.hidden;
      if (running) { start = performance.now() - elapsed; requestAnimationFrame(loop); }
    });

    function loop(now) {
      if (!running) return;
      resize();
      elapsed = now - start;
      var ts = elapsed * 0.001;

      // au repos, la lumière dérive doucement pour rester vivante
      pull += (pullTarget - pull) * 0.05;
      if (pullTarget < 0.5) {
        idleAngle += 0.0035;
        var rx = 0.5 + Math.cos(idleAngle) * 0.18;
        var ry = 0.5 + Math.sin(idleAngle * 0.8) * 0.14;
        mx += (rx - mx) * 0.02;
        my += (ry - my) * 0.02;
      }
      // inertie de la lumière (suit la souris en douceur)
      smx += (mx - smx) * 0.06;
      smy += (my - smy) * 0.06;

      gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.uniform1f(uTime, ts);
      gl.uniform2f(uMouse, smx, smy);
      gl.uniform1f(uPull, pull);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  })();
  </script>
</body>
