<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Soleia Expérience — La pause créative qui fait du BIEN</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..600&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet" />
<style>
  :root {
    --rose: #fb6ba6;
    --orange: #f8742f;
    --rose-clair: #f8e6e6;
    --creme: #fdf6f0;
    --ink: #3a2a2e;
    --ink-soft: #6d5358;
    --glass: rgba(253, 246, 240, 0.55);
    --fine: 0.06em;
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body { margin: 0; padding: 0; }

  body {
    font-family: "Space Grotesk", system-ui, sans-serif;
    color: var(--ink);
    background: var(--creme);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  /* ============ AURORA BACKGROUND ============ */
  .aurora {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    background: var(--creme);
  }

  /* CSS fallback: animated conic + radial mesh (works with no JS / no WebGL) */
  .aurora__css {
    position: absolute;
    inset: -20%;
    filter: blur(60px) saturate(1.05);
    opacity: 0.9;
    transition: opacity 0.8s ease;
  }
  .aurora__css::before,
  .aurora__css::after {
    content: "";
    position: absolute;
    inset: 0;
    background-repeat: no-repeat;
  }
  .aurora__css::before {
    background:
      radial-gradient(40% 50% at 22% 30%, rgba(251, 107, 166, 0.85), transparent 70%),
      radial-gradient(45% 55% at 78% 38%, rgba(248, 116, 47, 0.8), transparent 72%),
      radial-gradient(50% 60% at 50% 82%, rgba(248, 230, 230, 0.95), transparent 75%);
    animation: drift1 22s ease-in-out infinite alternate;
  }
  .aurora__css::after {
    background:
      radial-gradient(38% 48% at 65% 22%, rgba(251, 107, 166, 0.6), transparent 70%),
      radial-gradient(42% 52% at 18% 70%, rgba(248, 116, 47, 0.55), transparent 72%),
      radial-gradient(55% 55% at 88% 80%, rgba(253, 246, 240, 0.9), transparent 74%);
    animation: drift2 28s ease-in-out infinite alternate;
    mix-blend-mode: screen;
  }
  @keyframes drift1 {
    0%   { transform: translate(0, 0) scale(1) rotate(0deg); }
    100% { transform: translate(4%, -3%) scale(1.12) rotate(8deg); }
  }
  @keyframes drift2 {
    0%   { transform: translate(0, 0) scale(1.05) rotate(0deg); }
    100% { transform: translate(-5%, 4%) scale(1) rotate(-10deg); }
  }

  /* WebGL canvas sits on top of the CSS fallback once it's ready */
  #gl {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 1.2s ease;
  }
  .gl-ready #gl { opacity: 1; }
  .gl-ready .aurora__css { opacity: 0; }

  /* Fine grain + cream veil to keep text crisp and "studio" not "blurry blob" */
  .aurora__veil {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(120% 90% at 50% 8%, transparent 40%, rgba(253, 246, 240, 0.35) 100%),
      radial-gradient(80% 70% at 50% 50%, rgba(253, 246, 240, 0.32), transparent 62%);
    pointer-events: none;
  }
  .aurora__grain {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.05;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* ============ SHELL ============ */
  .shell {
    position: relative;
    z-index: 2;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    padding: clamp(1.1rem, 2.4vw, 2rem) clamp(1.2rem, 5vw, 4.5rem);
  }

  /* ============ NAV ============ */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1.5rem;
  }
  .brand {
    display: flex;
    flex-direction: column;
    line-height: 0.9;
    text-decoration: none;
    color: var(--ink);
  }
  .brand__name {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 400;
    font-size: clamp(1.5rem, 2.6vw, 2.05rem);
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .brand__name b { font-weight: 600; }
  .brand__sub {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 300;
    font-size: 0.62rem;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 0.42rem;
    margin-left: 0.12rem;
  }

  .nav__links {
    display: flex;
    align-items: center;
    gap: clamp(1rem, 2.2vw, 2.1rem);
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .nav__links a {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 400;
    font-size: 0.92rem;
    letter-spacing: 0.01em;
    color: var(--ink);
    text-decoration: none;
    position: relative;
    padding: 0.35rem 0.1rem;
    transition: color 0.25s ease;
  }
  .nav__links a::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: 0.05rem;
    height: 1.5px;
    background: linear-gradient(90deg, var(--rose), var(--orange));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .nav__links a:hover::after,
  .nav__links a:focus-visible::after { transform: scaleX(1); }
  .nav__links a:hover { color: var(--orange); }

  .nav__right { display: flex; align-items: center; gap: 1rem; }
  .account {
    display: grid;
    place-items: center;
    width: 42px; height: 42px;
    border-radius: 50%;
    border: 1.5px solid rgba(58, 42, 46, 0.18);
    background: var(--glass);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--ink);
    cursor: pointer;
    transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
  }
  .account:hover {
    transform: translateY(-1px);
    border-color: var(--rose);
    box-shadow: 0 6px 18px rgba(251, 107, 166, 0.25);
  }
  .account svg { width: 19px; height: 19px; }

  .nav__burger {
    display: none;
    width: 42px; height: 42px;
    border-radius: 50%;
    border: 1.5px solid rgba(58, 42, 46, 0.18);
    background: var(--glass);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--ink);
    cursor: pointer;
    align-items: center;
    justify-content: center;
  }
  .nav__burger svg { width: 20px; height: 20px; }

  /* ============ HERO ============ */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: clamp(2rem, 5vh, 4.5rem) 0 1.5rem;
    position: relative;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    font-family: "Space Grotesk", sans-serif;
    font-weight: 400;
    font-size: 0.72rem;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    color: var(--ink-soft);
    padding: 0.5rem 1.1rem;
    border-radius: 999px;
    border: 1px solid rgba(58, 42, 46, 0.14);
    background: var(--glass);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    margin-bottom: clamp(1.4rem, 3.2vh, 2.4rem);
  }
  .eyebrow .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, var(--orange), var(--rose));
    box-shadow: 0 0 0 0 rgba(251, 107, 166, 0.5);
    animation: pulse 2.6s ease-out infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(251, 107, 166, 0.5); }
    70%  { box-shadow: 0 0 0 9px rgba(251, 107, 166, 0); }
    100% { box-shadow: 0 0 0 0 rgba(251, 107, 166, 0); }
  }

  .title {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 360;
    font-size: clamp(3.4rem, 11.2vw, 11.5rem);
    line-height: 0.93;
    letter-spacing: -0.025em;
    margin: 0;
    color: var(--ink);
    max-width: 14ch;
    font-variation-settings: "opsz" 144;
  }
  .title .line { display: block; }
  .title em {
    font-style: italic;
    font-weight: 340;
    font-variation-settings: "opsz" 144;
  }

  /* "BIEN" — gradient text + soft glow */
  .bien {
    position: relative;
    display: inline-block;
    font-style: normal;
    font-weight: 600;
    letter-spacing: -0.01em;
    background: linear-gradient(96deg, var(--rose) 0%, #ff7d56 52%, var(--orange) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    padding-right: 0.06em;
  }
  .bien::after {
    content: "BIEN.";
    position: absolute;
    inset: 0;
    z-index: -1;
    background: linear-gradient(96deg, var(--rose) 0%, var(--orange) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    filter: blur(18px);
    opacity: 0.65;
    animation: glow 4.5s ease-in-out infinite;
  }
  @keyframes glow {
    0%, 100% { opacity: 0.45; filter: blur(16px); }
    50%      { opacity: 0.8;  filter: blur(24px); }
  }

  .lede {
    font-family: "Fraunces", Georgia, serif;
    font-style: italic;
    font-weight: 340;
    font-size: clamp(1.1rem, 2.4vw, 1.55rem);
    color: var(--ink-soft);
    margin: clamp(1.5rem, 3.6vh, 2.6rem) 0 clamp(1.6rem, 3.6vh, 2.4rem);
    letter-spacing: 0.005em;
  }

  /* ============ PILL BUTTONS ============ */
  .actions {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
  }
  .pill {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 500;
    font-size: 0.97rem;
    letter-spacing: 0.005em;
    padding: 0.85rem 1.7rem;
    border-radius: 999px;
    border: 1.5px solid rgba(58, 42, 46, 0.2);
    background: var(--glass);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: var(--ink);
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 0.28s ease, border-color 0.28s ease, color 0.28s ease;
    white-space: nowrap;
  }
  .pill:hover {
    transform: translateY(-2px);
    border-color: var(--rose);
    color: var(--orange);
    box-shadow: 0 10px 26px rgba(251, 107, 166, 0.2);
  }
  .pill--primary {
    border: none;
    color: var(--creme);
    background: linear-gradient(96deg, var(--rose) 0%, var(--orange) 100%);
    box-shadow: 0 10px 30px rgba(248, 116, 47, 0.32);
    position: relative;
    overflow: hidden;
  }
  .pill--primary::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(96deg, var(--orange) 0%, var(--rose) 100%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .pill--primary span { position: relative; z-index: 1; }
  .pill--primary:hover {
    transform: translateY(-2px);
    color: var(--creme);
    box-shadow: 0 14px 38px rgba(248, 116, 47, 0.42);
  }
  .pill--primary:hover::before { opacity: 1; }

  /* ============ QUOTE ============ */
  .quote {
    margin: clamp(2.2rem, 5vh, 3.6rem) auto 0;
    max-width: 40ch;
    text-align: center;
  }
  .quote p {
    font-family: "Fraunces", Georgia, serif;
    font-style: italic;
    font-weight: 320;
    font-size: clamp(1rem, 1.9vw, 1.22rem);
    line-height: 1.5;
    color: var(--ink);
    margin: 0 0 0.7rem;
  }
  .quote cite {
    font-family: "Space Grotesk", sans-serif;
    font-style: normal;
    font-weight: 500;
    font-size: 0.82rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--orange);
  }

  /* ============ FOOTER ============ */
  .foot {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    padding: 1.4rem 0 0.4rem;
  }
  .social {
    display: grid;
    place-items: center;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1.5px solid rgba(58, 42, 46, 0.18);
    background: var(--glass);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--ink);
    text-decoration: none;
    transition: transform 0.25s ease, color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
  }
  .social:hover {
    transform: translateY(-2px);
    color: var(--orange);
    border-color: var(--rose);
    box-shadow: 0 8px 20px rgba(251, 107, 166, 0.22);
  }
  .social svg { width: 18px; height: 18px; }

  /* ============ FOCUS / A11Y ============ */
  a:focus-visible, button:focus-visible {
    outline: 2.5px solid var(--orange);
    outline-offset: 3px;
    border-radius: 999px;
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 760px) {
    .nav__links { display: none; }
    .nav__burger { display: inline-flex; }
    .title { font-size: clamp(3rem, 15vw, 5.5rem); max-width: 11ch; }
    .quote { max-width: 32ch; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
    }
    #gl { display: none; }
    .aurora__css { opacity: 0.9 !important; }
  }
</style>
</head>
<body>
  <!-- ===================== AURORA BACKGROUND ===================== -->

  </div>

  <!-- ===================== WebGL AURORA SHADER (progressive enhancement) ===================== -->
  <script>
  (function () {
    // Respect reduced motion: keep the calm CSS fallback, skip the shader entirely.
    var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) return;

    var canvas = document.getElementById("gl");
    if (!canvas) return;

    var gl = canvas.getContext("webgl", { antialias: true, alpha: false, premultipliedAlpha: false })
          || canvas.getContext("experimental-webgl");
    if (!gl) return; // CSS fallback stays visible — graceful degradation.

    var vertSrc =
      "attribute vec2 p;" +
      "void main(){ gl_Position = vec4(p, 0.0, 1.0); }";

    // Domain-warped fbm "aurora / mesh" in rose -> orange -> cream.
    var fragSrc = [
      "precision highp float;",
      "uniform vec2 u_res;",
      "uniform float u_time;",
      "",
      "vec3 ROSE   = vec3(0.984, 0.420, 0.651);", // #fb6ba6
      "vec3 ORANGE = vec3(0.973, 0.455, 0.184);", // #f8742f
      "vec3 CREAM  = vec3(0.992, 0.965, 0.941);", // #fdf6f0
      "vec3 ROSEL  = vec3(0.973, 0.902, 0.902);", // #f8e6e6
      "",
      "float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }",
      "float noise(vec2 p){",
      "  vec2 i = floor(p); vec2 f = fract(p);",
      "  vec2 u = f*f*(3.0-2.0*f);",
      "  return mix(mix(hash(i+vec2(0.0,0.0)), hash(i+vec2(1.0,0.0)), u.x),",
      "             mix(hash(i+vec2(0.0,1.0)), hash(i+vec2(1.0,1.0)), u.x), u.y);",
      "}",
      "float fbm(vec2 p){",
      "  float v = 0.0; float a = 0.5;",
      "  for(int i=0;i<5;i++){ v += a*noise(p); p *= 2.0; a *= 0.5; }",
      "  return v;",
      "}",
      "",
      "void main(){",
      "  vec2 uv = gl_FragCoord.xy / u_res.xy;",
      "  vec2 p = uv;",
      "  p.x *= u_res.x / u_res.y;",
      "  float t = u_time * 0.045;",
      "  // domain warp for that flowing aurora feel",
      "  vec2 q = vec2(fbm(p + vec2(0.0, t)), fbm(p + vec2(5.2, -t)));",
      "  vec2 r = vec2(fbm(p + 3.0*q + vec2(1.7, 9.2) + 0.15*t),",
      "                fbm(p + 3.0*q + vec2(8.3, 2.8) - 0.12*t));",
      "  float f = fbm(p + 2.4*r);",
      "  // build the palette ramp",
      "  vec3 col = mix(CREAM, ROSEL, smoothstep(0.0, 0.6, f));",
      "  col = mix(col, ROSE, smoothstep(0.35, 0.95, f + 0.25*r.x));",
      "  col = mix(col, ORANGE, smoothstep(0.55, 1.05, length(r) ));",
      "  // lift toward cream near the top so the title stays readable",
      "  col = mix(col, CREAM, smoothstep(0.55, 1.0, 1.0 - uv.y) * 0.45);",
      "  // gentle vignette of cream",
      "  float d = distance(uv, vec2(0.5, 0.52));",
      "  col = mix(col, CREAM, smoothstep(0.45, 0.95, d) * 0.35);",
      "  gl_FragColor = vec4(col, 1.0);",
      "}"
    ].join("\n");

    function compile(type, src) {
      var s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
        gl.deleteShader(s);
        return null;
      }
      return s;
    }

    var vs = compile(gl.VERTEX_SHADER, vertSrc);
    var fs = compile(gl.FRAGMENT_SHADER, fragSrc);
    if (!vs || !fs) return; // fallback stays

    var prog = gl.createProgram();
    gl.attachShader(prog, vs);
    gl.attachShader(prog, fs);
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) return;
    gl.useProgram(prog);

    var buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
    var loc = gl.getAttribLocation(prog, "p");
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

    var uRes = gl.getUniformLocation(prog, "u_res");
    var uTime = gl.getUniformLocation(prog, "u_time");

    var dpr = Math.min(window.devicePixelRatio || 1, 1.5);
    function resize() {
      var w = Math.floor(canvas.clientWidth * dpr);
      var h = Math.floor(canvas.clientHeight * dpr);
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w; canvas.height = h;
        gl.viewport(0, 0, w, h);
      }
    }
    window.addEventListener("resize", resize);
    resize();

    document.querySelector(".aurora").classList.add("gl-ready");
    document.body.classList.add("gl-ready");

    var start = performance.now();
    var running = true;
    document.addEventListener("visibilitychange", function () {
      running = !document.hidden;
      if (running) { start = performance.now() - elapsed; requestAnimationFrame(loop); }
    });
    var elapsed = 0;

    function loop(now) {
      if (!running) return;
      resize();
      elapsed = now - start;
      gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.uniform1f(uTime, elapsed * 0.001);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
