<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Soleia Expérience — La pause créative qui fait du BIEN</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..600&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet" />
<style>
  :root {
    --rose: #f98bb6;
    --rose-deep: #f56c9f;
    --framboise: #f4548b;
    --corail: #fa7e58;
    --orange: #f7995a;
    --orange-deep: #f4823c;
    --peche: #ffb992;
    --creme: #fdf7f1;
    --creme-2: #fef9f4;
    --creme-chaude: #fdeede;
    --ink: #3a2a2e;
    --ink-soft: #71565b;
    --glass: rgba(254, 249, 244, 0.6);
    --glass-strong: rgba(254, 249, 244, 0.78);
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }

  body {
    font-family: "Space Grotesk", system-ui, sans-serif;
    color: var(--ink);
    background: var(--creme);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  /* ============ FOND : PARTICULES SOLAIRES ============ */
  .stage {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    background:
      radial-gradient(130% 120% at 64% 34%, var(--creme-2) 0%, var(--creme) 40%, var(--creme-chaude) 78%, #fbe4d8 100%);
  }

  /* Fallback CSS (sans JS / sans WebGL) : soleil rayonnant + halos crémeux */
  .stage__fallback {
    position: absolute;
    inset: 0;
    transition: opacity 1s ease;
  }
  .fallback-sun {
    position: absolute;
    top: 30%; left: 64%;
    width: 46vmin; height: 46vmin;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background:
      radial-gradient(circle at 50% 50%, var(--framboise) 0%, var(--corail) 34%, var(--orange) 58%, var(--peche) 74%, transparent 80%);
    filter: blur(2px) saturate(1.05);
    opacity: 0.92;
    animation: sun-pulse 7s ease-in-out infinite;
  }
  .fallback-sun::before {
    content: "";
    position: absolute;
    inset: -34%;
    border-radius: 50%;
    background:
      repeating-conic-gradient(from 0deg,
        rgba(250, 126, 88, 0.28) 0deg 4deg,
        transparent 4deg 11deg);
    -webkit-mask: radial-gradient(circle, transparent 46%, #000 50%, #000 78%, transparent 84%);
    mask: radial-gradient(circle, transparent 46%, #000 50%, #000 78%, transparent 84%);
    animation: sun-spin 60s linear infinite;
  }
  .fallback-sun::after {
    content: "";
    position: absolute;
    inset: -55%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(248, 116, 47, 0.22) 0%, transparent 62%);
  }
  .fallback-mote {
    position: absolute;
    border-radius: 50%;
    filter: blur(0.5px);
    opacity: 0.6;
    animation: mote-float 14s ease-in-out infinite;
  }
  @keyframes sun-pulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.9; }
    50% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
  }
  @keyframes sun-spin { to { transform: rotate(360deg); } }
  @keyframes mote-float {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(8px, -14px); }
  }

  /* Canvas WebGL au-dessus du fallback une fois prêt */
  #gl {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 1.4s ease;
  }
  .gl-ready #gl { opacity: 1; }
  .gl-ready .stage__fallback { opacity: 0; }

  /* Voile crème + grain : texte net, ambiance studio */
  .stage__veil {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(120% 90% at 50% 2%, transparent 30%, rgba(254, 249, 244, 0.5) 100%),
      radial-gradient(78% 60% at 30% 64%, rgba(254, 249, 244, 0.5), transparent 60%),
      linear-gradient(180deg, rgba(254, 249, 244, 0.34) 0%, transparent 22%, transparent 72%, rgba(253, 247, 241, 0.4) 100%);
    pointer-events: none;
  }
  .stage__grain {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.045;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* ============ SHELL ============ */
  .shell {
    position: relative;
    z-index: 2;
    height: 100svh;
    min-height: 600px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: clamp(0.9rem, 2.2vw, 1.7rem) clamp(1.2rem, 5vw, 4.5rem) clamp(1rem, 2.2vh, 1.6rem);
  }

  /* ============ NAV ============ */
  .nav {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: clamp(0.8rem, 2vw, 2rem);
  }
  .nav__col {
    display: flex;
    align-items: center;
    gap: clamp(1rem, 2.2vw, 2.1rem);
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .nav__col--left { justify-self: start; }
  .nav__col--right { justify-self: end; gap: clamp(1rem, 1.9vw, 1.8rem); }
  .nav__col a.nav__link {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 400;
    font-size: clamp(0.86rem, 1vw, 0.94rem);
    letter-spacing: 0.01em;
    color: var(--ink);
    text-decoration: none;
    position: relative;
    padding: 0.35rem 0.1rem;
    transition: color 0.25s ease;
    white-space: nowrap;
  }
  .nav__col a.nav__link::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: 0.05rem;
    height: 1.5px;
    background: linear-gradient(90deg, var(--rose-deep), var(--orange-deep));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .nav__col a.nav__link:hover::after,
  .nav__col a.nav__link:focus-visible::after { transform: scaleX(1); }
  .nav__col a.nav__link:hover { color: var(--orange-deep); }

  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 0.9;
    text-decoration: none;
    color: var(--ink);
    justify-self: center;
  }
  .brand__name {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 500;
    font-size: clamp(1.45rem, 2.4vw, 1.95rem);
    letter-spacing: -0.015em;
    color: var(--ink);
  }
  .brand__sub {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 300;
    font-size: 0.6rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 0.36rem;
    margin-left: 0.22em;
  }

  .nav__socials {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding-left: 0.4rem;
    margin-left: 0.2rem;
    border-left: 1px solid rgba(58, 42, 46, 0.14);
  }
  .icon-btn {
    display: grid;
    place-items: center;
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1.5px solid rgba(58, 42, 46, 0.16);
    background: var(--glass-strong);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--ink);
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.25s ease, color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
  }
  .icon-btn:hover {
    transform: translateY(-2px);
    color: var(--orange-deep);
    border-color: var(--rose-deep);
    box-shadow: 0 8px 20px rgba(249, 139, 182, 0.28);
  }
  .icon-btn svg { width: 18px; height: 18px; }
  .account { color: var(--ink); }
  .account svg { width: 18px; height: 18px; }

  .nav__burger {
    display: none;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1.5px solid rgba(58, 42, 46, 0.16);
    background: var(--glass-strong);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--ink);
    cursor: pointer;
    align-items: center;
    justify-content: center;
  }
  .nav__burger svg { width: 20px; height: 20px; }

  /* ============ HERO ============ */
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
    padding: clamp(0.6rem, 2vh, 1.6rem) 0;
  }

  .title {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 360;
    font-size: clamp(3rem, 10.4vw, 10.6rem);
    line-height: 0.95;
    letter-spacing: -0.025em;
    margin: 0 0 clamp(1.6rem, 4vh, 2.8rem);
    color: var(--ink);
    max-width: 14ch;
    font-variation-settings: "opsz" 144;
  }
  .title .line { display: block; }
  .title em {
    font-style: italic;
    font-weight: 340;
    font-variation-settings: "opsz" 144;
  }

  .bien {
    position: relative;
    display: inline-block;
    font-style: normal;
    font-weight: 600;
    letter-spacing: -0.01em;
    background: linear-gradient(96deg, var(--framboise) 0%, var(--corail) 52%, var(--orange-deep) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    padding-right: 0.06em;
  }
  .bien::after {
    content: "BIEN.";
    position: absolute;
    inset: 0;
    z-index: -1;
    background: linear-gradient(96deg, var(--framboise) 0%, var(--orange-deep) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    filter: blur(18px);
    opacity: 0.6;
    animation: glow 4.5s ease-in-out infinite;
  }
  @keyframes glow {
    0%, 100% { opacity: 0.42; filter: blur(16px); }
    50%      { opacity: 0.72; filter: blur(24px); }
  }

  /* ============ BOUTONS ============ */
  .actions {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: clamp(0.7rem, 1.4vw, 1rem);
  }
  .pill {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: clamp(1.02rem, 1.35vw, 1.16rem);
    letter-spacing: 0.005em;
    padding: clamp(1rem, 1.7vh, 1.25rem) clamp(1.7rem, 2.6vw, 2.4rem);
    border-radius: 999px;
    border: 1.5px solid rgba(58, 42, 46, 0.2);
    background: var(--glass-strong);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: var(--ink);
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 0.28s ease, border-color 0.28s ease, color 0.28s ease;
    white-space: nowrap;
  }
  .pill:hover {
    transform: translateY(-2px);
    border-color: var(--rose-deep);
    color: var(--orange-deep);
    box-shadow: 0 10px 26px rgba(249, 139, 182, 0.24);
  }
  .pill--primary {
    border: none;
    color: var(--creme);
    background: linear-gradient(96deg, var(--framboise) 0%, var(--orange-deep) 100%);
    box-shadow: 0 12px 32px rgba(244, 130, 60, 0.34);
    position: relative;
    overflow: hidden;
  }
  .pill--primary::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(96deg, var(--orange-deep) 0%, var(--framboise) 100%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .pill--primary span { position: relative; z-index: 1; }
  .pill--primary:hover {
    transform: translateY(-2px);
    color: var(--creme);
    box-shadow: 0 16px 40px rgba(244, 130, 60, 0.46);
  }
  .pill--primary:hover::before { opacity: 1; }

  /* ============ CITATION ============ */
  .quote {
    margin: 0;
    max-width: min(92vw, 70ch);
    text-align: left;
    justify-self: start;
  }
  .quote p {
    font-family: "Fraunces", Georgia, serif;
    font-style: italic;
    font-weight: 330;
    font-size: clamp(0.98rem, 1.7vw, 1.32rem);
    line-height: 1.4;
    color: var(--ink);
    margin: 0 0 0.5rem;
    white-space: nowrap;
  }
  .quote cite {
    display: block;
    font-family: "Space Grotesk", sans-serif;
    font-style: normal;
    font-weight: 600;
    font-size: 0.82rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--orange-deep);
  }

  /* ============ FOOTER ============ */
  .foot {
    display: flex;
    align-items: flex-end;
    justify-content: flex-start;
    padding-top: clamp(0.6rem, 1.4vh, 1.1rem);
  }

  /* Indice discret « caresse les particules » */
  .play-hint {
    position: absolute;
    z-index: 4;
    bottom: 9%;
    right: 9%;
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    font-family: "Space Grotesk", sans-serif;
    font-weight: 400;
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
    background: var(--glass);
    border: 1px solid rgba(58, 42, 46, 0.12);
    border-radius: 999px;
    padding: 0.34rem 0.74rem;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    pointer-events: none;
    opacity: 0.72;
    transition: opacity 0.6s ease;
  }
  .play-hint svg { width: 13px; height: 13px; }

  /* ============ FOCUS / A11Y ============ */
  a:focus-visible, button:focus-visible {
    outline: 2.5px solid var(--orange-deep);
    outline-offset: 3px;
    border-radius: 999px;
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 900px) {
    .quote p { white-space: normal; }
  }
  @media (max-width: 760px) {
    .nav { grid-template-columns: auto auto; }
    .nav__col--left { display: none; }
    .nav__col--right .nav__link { display: none; }
    .brand { justify-self: start; align-items: flex-start; }
    .nav__burger { display: inline-flex; }
    .title { font-size: clamp(2.8rem, 14vw, 5.2rem); max-width: 11ch; }
    .actions .pill { font-size: 1rem; }
    .play-hint { display: none; }
    .fallback-sun { top: 24%; left: 50%; width: 60vmin; height: 60vmin; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
    }
    .play-hint { display: none; }
  }
</style>

  <!-- ===================== PARTICULES SOLAIRES — WebGL GPU (amélioration progressive) ===================== -->
  <script>
  (function () {
    var reduceMQ = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)");
    var reduce = reduceMQ && reduceMQ.matches;

    var canvas = document.getElementById("gl");
    if (!canvas) return;

    var gl = canvas.getContext("webgl", { antialias: true, alpha: true, premultipliedAlpha: false })
          || canvas.getContext("experimental-webgl");
    if (!gl) return; // le fallback CSS reste visible

    /* ---------------------------------------------------------------
       Système de particules « solaires ».
       Chaque particule porte :
         - a_target  : position cible (forme du SOLEIL : disque + couronne + halo)
         - a_seed    : graines aléatoires (scintillement, phase de dérive, taille)
       Toute l'animation (dérive nuageuse -> rassemblement, scintillement,
       déflexion par le curseur) est calculée dans le VERTEX SHADER.
       La boucle JS ne pousse que : temps, formation (0->1), souris.
    --------------------------------------------------------------- */

    var DPR = Math.min(window.devicePixelRatio || 1, 1.75);

    // Densité adaptée à la surface (perf raisonnable mobile/desktop)
    var area = window.innerWidth * window.innerHeight;
    var COUNT = Math.round(Math.min(15000, Math.max(5000, area / 95)));

    // Centre du soleil : décalé en haut-droite pour ne pas écraser le titre.
    // Coordonnées en espace « monde » normalisé (-1..1 corrigé de l'aspect dans le shader).
    var SUN = { x: 0.34, y: 0.30 };

    var targets = new Float32Array(COUNT * 2);
    var seeds   = new Float32Array(COUNT * 4);

    function rand(a, b) { return a + Math.random() * (b - a); }

    for (var i = 0; i < COUNT; i++) {
      var r = Math.random();
      var ang = Math.random() * Math.PI * 2;
      var radius, ring;

      if (r < 0.46) {
        // Cœur : disque plein (densité plus forte au centre)
        radius = Math.pow(Math.random(), 0.62) * 0.30;
        ring = 0.0;
      } else if (r < 0.82) {
        // Couronne / anneau lumineux
        radius = 0.30 + Math.pow(Math.random(), 1.5) * 0.10;
        ring = 1.0;
      } else {
        // Rayons : pics fins répartis autour (12 branches)
        var branch = Math.floor(Math.random() * 12);
        var baseAng = (branch / 12) * Math.PI * 2;
        ang = baseAng + rand(-0.05, 0.05);
        radius = 0.40 + Math.pow(Math.random(), 1.8) * 0.30;
        ring = 2.0;
      }

      var tx = SUN.x + Math.cos(ang) * radius;
      var ty = SUN.y + Math.sin(ang) * radius;

      targets[i * 2]     = tx;
      targets[i * 2 + 1] = ty;

      seeds[i * 4]     = Math.random();        // scintillement
      seeds[i * 4 + 1] = Math.random() * 6.28; // phase de dérive
      seeds[i * 4 + 2] = rand(0.4, 1.0);       // taille relative
      seeds[i * 4 + 3] = radius;               // distance au centre (pour la couleur)
    }

    var vertSrc = [
      "attribute vec2 a_target;",
      "attribute vec4 a_seed;",
      "uniform vec2 u_res;",
      "uniform float u_time;",
      "uniform float u_form;",   // 0 = nuage dispersé, 1 = soleil formé
      "uniform vec2 u_mouse;",   // monde
      "uniform float u_mouseOn;",
      "uniform float u_dpr;",
      "varying float v_twinkle;",
      "varying float v_radius;",
      "varying float v_seed;",
      "",
      "float hash(float n){ return fract(sin(n) * 43758.5453123); }",
      "",
      "void main(){",
      "  float asp = u_res.x / u_res.y;",
      "  float t = u_time;",
      "  float ph = a_seed.y;",
      "",
      "  // Position « nuage » de départ : dérive douce répartie sur l'écran",
      "  vec2 cloud = vec2(",
      "     (hash(ph) - 0.5) * 2.2,",
      "     (hash(ph + 7.3) - 0.5) * 1.7);",
      "  cloud += 0.12 * vec2(sin(t*0.5 + ph), cos(t*0.4 + ph*1.3));",
      "",
      "  // Cible « soleil » + respiration + lente rotation autour du centre",
      "  vec2 c = vec2(0.34, 0.30);",
      "  vec2 rel = a_target - c;",
      "  float rot = t * 0.05 + a_seed.0 * 0.0;",
      "  float ca = cos(t*0.04), sa = sin(t*0.04);",
      "  rel = mat2(ca, -sa, sa, ca) * rel;",
      "  float breathe = 1.0 + 0.03 * sin(t*0.8 + a_seed.w*6.0);",
      "  vec2 sun = c + rel * breathe;",
      "  // micro-scintillement positionnel (turbulence locale)",
      "  sun += 0.012 * vec2(sin(t*1.6 + ph*3.0), cos(t*1.5 + ph*2.0));",
      "",
      "  // Interpolation nuage -> soleil avec léger décalage par particule (formation en vague)",
      "  float delay = a_seed.x * 0.5;",
      "  float f = clamp((u_form - delay) / (1.0 - delay + 0.0001), 0.0, 1.0);",
      "  f = f*f*(3.0 - 2.0*f);",
      "  vec2 pos = mix(cloud, sun, f);",
      "",
      "  // Déflexion par le curseur : champ radial doux (écarte puis revient)",
      "  if (u_mouseOn > 0.5) {",
      "    vec2 d = pos - u_mouse;",
      "    d.x *= asp;",
      "    float dist = length(d);",
      "    float force = smoothstep(0.42, 0.0, dist);",
      "    vec2 dir = dist > 0.0001 ? d / dist : vec2(0.0, 1.0);",
      "    dir.x /= asp;",
      "    pos += dir * force * 0.20;",
      "  }",
      "",
      "  // Aspect : conserve un cercle (pas d'ovale) en corrigeant x",
      "  vec2 clip = vec2(pos.x, pos.y);",
      "  clip.x /= asp;",
      "  gl_Position = vec4(clip, 0.0, 1.0);",
      "",
      "  // Taille du point : cœur plus dense/petit, rayons plus fins, scintillement",
      "  float tw = 0.55 + 0.45 * sin(t*2.4 + a_seed.x*30.0);",
      "  float size = a_seed.z * (3.6 - a_seed.w*1.4);",
      "  size *= (0.7 + 0.5 * f);",
      "  size *= (0.85 + 0.4 * tw);",
      "  gl_PointSize = size * u_dpr;",
      "",
      "  v_twinkle = tw;",
      "  v_radius = a_seed.w;",
      "  v_seed = a_seed.x;",
      "}"
    ].join("\n");

    // Note : a_seed.0 n'existe pas en GLSL — corrigé via a_seed.x ci-dessous.
    vertSrc = vertSrc.replace("a_seed.0", "a_seed.x");

    var fragSrc = [
      "precision highp float;",
      "varying float v_twinkle;",
      "varying float v_radius;",
      "varying float v_seed;",
      "",
      "vec3 ROSE   = vec3(0.976, 0.545, 0.714);",
      "vec3 FRAMB  = vec3(0.957, 0.329, 0.545);",
      "vec3 CORAL  = vec3(0.980, 0.494, 0.345);",
      "vec3 ORANGE = vec3(0.957, 0.510, 0.235);",
      "vec3 PEACH  = vec3(1.000, 0.725, 0.573);",
      "vec3 GOLD   = vec3(1.000, 0.835, 0.560);",
      "",
      "void main(){",
      "  vec2 uv = gl_PointCoord - 0.5;",
      "  float d = length(uv);",
      "  // disque doux avec halo : noyau brillant + chute douce",
      "  float core = smoothstep(0.5, 0.0, d);",
      "  float glow = smoothstep(0.5, 0.12, d);",
      "  float alpha = glow * (0.55 + 0.45 * v_twinkle);",
      "  if (alpha < 0.01) discard;",
      "",
      "  // Couleur selon distance au centre du soleil : cœur framboise/or -> couronne corail -> bords pêche/rose",
      "  float rr = clamp(v_radius / 0.7, 0.0, 1.0);",
      "  vec3 col = mix(GOLD, FRAMB, smoothstep(0.0, 0.28, rr));",
      "  col = mix(col, CORAL, smoothstep(0.25, 0.55, rr));",
      "  col = mix(col, ORANGE, smoothstep(0.5, 0.72, rr));",
      "  col = mix(col, mix(PEACH, ROSE, v_seed), smoothstep(0.7, 1.0, rr));",
      "  // pointe chaude au coeur du point",
      "  col += core * 0.25 * vec3(1.0, 0.92, 0.78);",
      "",
      "  gl_FragColor = vec4(col, alpha);",
      "}"
    ].join("\n");

    function compile(type, src) {
      var s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) { gl.deleteShader(s); return null; }
      return s;
    }

    var vs = compile(gl.VERTEX_SHADER, vertSrc);
    var fs = compile(gl.FRAGMENT_SHADER, fragSrc);
    if (!vs || !fs) return;

    var prog = gl.createProgram();
    gl.attachShader(prog, vs);
    gl.attachShader(prog, fs);
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) return;
    gl.useProgram(prog);

    var tBuf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, tBuf);
    gl.bufferData(gl.ARRAY_BUFFER, targets, gl.STATIC_DRAW);
    var aTarget = gl.getAttribLocation(prog, "a_target");
    gl.enableVertexAttribArray(aTarget);
    gl.vertexAttribPointer(aTarget, 2, gl.FLOAT, false, 0, 0);

    var sBuf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, sBuf);
    gl.bufferData(gl.ARRAY_BUFFER, seeds, gl.STATIC_DRAW);
    var aSeed = gl.getAttribLocation(prog, "a_seed");
    gl.enableVertexAttribArray(aSeed);
    gl.vertexAttribPointer(aSeed, 4, gl.FLOAT, false, 0, 0);

    var uRes = gl.getUniformLocation(prog, "u_res");
    var uTime = gl.getUniformLocation(prog, "u_time");
    var uForm = gl.getUniformLocation(prog, "u_form");
    var uMouse = gl.getUniformLocation(prog, "u_mouse");
    var uMouseOn = gl.getUniformLocation(prog, "u_mouseOn");
    var uDpr = gl.getUniformLocation(prog, "u_dpr");

    // Rendu additif doux -> effet « bloom » lumineux, magique
    gl.disable(gl.DEPTH_TEST);
    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE);

    function resize() {
      var w = Math.floor(canvas.clientWidth * DPR);
      var h = Math.floor(canvas.clientHeight * DPR);
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w; canvas.height = h;
        gl.viewport(0, 0, w, h);
      }
    }
    window.addEventListener("resize", resize);
    resize();

    // Souris / tactile -> coordonnées monde (-1..1, y vers le haut)
    var mouse = { x: 0, y: 0, on: 0, target: 0 };
    function setMouse(cx, cy) {
      var rect = canvas.getBoundingClientRect();
      mouse.x = ((cx - rect.left) / rect.width) * 2 - 1;
      mouse.y = (1 - (cy - rect.top) / rect.height) * 2 - 1;
      mouse.target = 1;
    }
    window.addEventListener("pointermove", function (e) { setMouse(e.clientX, e.clientY); }, { passive: true });
    window.addEventListener("pointerdown", function (e) { setMouse(e.clientX, e.clientY); }, { passive: true });
    window.addEventListener("pointerleave", function () { mouse.target = 0; });
    window.addEventListener("blur", function () { mouse.target = 0; });

    document.querySelector(".stage").classList.add("gl-ready");
    document.body.classList.add("gl-ready");

    var start = performance.now();
    var running = true;
    var elapsed = 0;
    var form = 0;

    // Reduced motion : forme statique du soleil, pas de boucle d'animation.
    if (reduce) {
      resize();
      var tStatic = 0.0;
      gl.clearColor(0, 0, 0, 0);
      gl.clear(gl.COLOR_BUFFER_BIT);
      gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.uniform1f(uTime, tStatic);
      gl.uniform1f(uForm, 1.0);
      gl.uniform2f(uMouse, 0, 0);
      gl.uniform1f(uMouseOn, 0.0);
      gl.uniform1f(uDpr, DPR);
      gl.drawArrays(gl.POINTS, 0, COUNT);
      return;
    }

    document.addEventListener("visibilitychange", function () {
      running = !document.hidden;
      if (running) { start = performance.now() - elapsed; requestAnimationFrame(loop); }
    });

    function loop(now) {
      if (!running) return;
      resize();
      elapsed = now - start;
      var t = elapsed * 0.001;

      // Formation progressive : le nuage se rassemble en soleil sur ~2.6 s
      form += (1 - form) * 0.012;
      if (form > 0.9995) form = 1;

      // Lissage souris on/off
      mouse.on += (mouse.target - mouse.on) * 0.08;

      gl.clearColor(0, 0, 0, 0);
      gl.clear(gl.COLOR_BUFFER_BIT);

      gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.uniform1f(uTime, t);
      gl.uniform1f(uForm, form);
      gl.uniform2f(uMouse, mouse.x, mouse.y);
      gl.uniform1f(uMouseOn, mouse.on);
      gl.uniform1f(uDpr, DPR);

      gl.drawArrays(gl.POINTS, 0, COUNT);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
