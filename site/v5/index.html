<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Soleia Expérience — La pause créative qui fait du BIEN</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..700&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Sunset bold palette — warm, saturated */
    --braise: #ff6a00;   /* ember orange */
    --corail: #ff5a5f;   /* coral */
    --rose: #f43b7e;     /* hot rose */
    --magenta: #c81e6a;  /* deep rose / magenta */
    --or: #ffc04d;       /* warm gold */
    --creme: #fff4ea;    /* warm cream */
    --ink: #2a0f1c;      /* deep plum ink */
    --ink-soft: #6b2b3f;
    --paper: #fff7ef;
    --glass: rgba(255, 244, 234, 0.55);
    --glass-strong: rgba(255, 244, 234, 0.72);
    --line: rgba(42, 15, 28, 0.18);
    --fine: 0.06em;
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body { margin: 0; padding: 0; }

  body {
    font-family: "Space Grotesk", system-ui, sans-serif;
    color: var(--ink);
    background: #2a0f1c;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  /* ============ SUNSET BACKGROUND ============ */
  .aurora {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    background: #2a0f1c;
  }

  /* CSS fallback: animated warm sunset mesh (no JS / no WebGL) */
  .aurora__css {
    position: absolute;
    inset: -20%;
    filter: blur(64px) saturate(1.25);
    opacity: 0.96;
    transition: opacity 0.8s ease;
  }
  .aurora__css::before,
  .aurora__css::after {
    content: "";
    position: absolute;
    inset: 0;
    background-repeat: no-repeat;
  }
  .aurora__css::before {
    background:
      radial-gradient(60% 60% at 50% 100%, rgba(255, 176, 64, 0.95), transparent 70%),
      radial-gradient(46% 52% at 22% 64%, rgba(255, 106, 0, 0.92), transparent 72%),
      radial-gradient(50% 56% at 80% 58%, rgba(244, 59, 126, 0.9), transparent 72%),
      radial-gradient(70% 60% at 50% 6%, rgba(200, 30, 106, 0.9), transparent 78%);
    animation: drift1 22s ease-in-out infinite alternate;
  }
  .aurora__css::after {
    background:
      radial-gradient(40% 46% at 68% 30%, rgba(255, 90, 95, 0.75), transparent 70%),
      radial-gradient(44% 50% at 14% 36%, rgba(255, 106, 0, 0.6), transparent 72%),
      radial-gradient(60% 50% at 50% 92%, rgba(255, 192, 77, 0.85), transparent 74%);
    animation: drift2 28s ease-in-out infinite alternate;
    mix-blend-mode: screen;
  }
  @keyframes drift1 {
    0%   { transform: translate(0, 0) scale(1) rotate(0deg); }
    100% { transform: translate(3%, -2%) scale(1.12) rotate(6deg); }
  }
  @keyframes drift2 {
    0%   { transform: translate(0, 0) scale(1.05) rotate(0deg); }
    100% { transform: translate(-4%, 3%) scale(1) rotate(-8deg); }
  }

  /* WebGL canvas sits on top of the CSS fallback once it's ready */
  #gl {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 1.2s ease;
  }
  .gl-ready #gl { opacity: 1; }
  .gl-ready .aurora__css { opacity: 0; }

  /* Veil to keep text crisp + soft top darkening for contrast on the bright sunset */
  .aurora__veil {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(130% 80% at 50% 4%, rgba(42, 15, 28, 0.42) 0%, transparent 46%),
      radial-gradient(90% 60% at 50% 46%, rgba(255, 247, 239, 0.18), transparent 64%);
    pointer-events: none;
  }
  .aurora__grain {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.06;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* ============ SHELL ============ */
  .shell {
    position: relative;
    z-index: 2;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    padding: clamp(0.9rem, 2vw, 1.7rem) clamp(1.1rem, 4.5vw, 4rem) clamp(0.9rem, 2vh, 1.6rem);
  }

  /* ============ NAV (3 columns) ============ */
  .nav {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 1rem;
  }
  .nav__group {
    display: flex;
    align-items: center;
    list-style: none;
    margin: 0;
    padding: 0;
    gap: clamp(1.1rem, 2.4vw, 2.3rem);
  }
  .nav__group--left  { justify-content: flex-start; }
  .nav__group--right { justify-content: flex-end; }

  .nav__group a {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 500;
    font-size: 0.95rem;
    letter-spacing: 0.01em;
    color: var(--creme);
    text-decoration: none;
    position: relative;
    padding: 0.35rem 0.1rem;
    transition: color 0.25s ease, -webkit-text-stroke 0.25s ease;
    text-shadow: 0 1px 10px rgba(42, 15, 28, 0.35);
  }
  .nav__group a::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 2px;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--or), var(--corail));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .nav__group a:hover::after,
  .nav__group a:focus-visible::after { transform: scaleX(1); }
  .nav__group a:hover { color: var(--or); }

  /* Centered brand */
  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 0.88;
    text-decoration: none;
    color: var(--creme);
  }
  .brand__name {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 600;
    font-size: clamp(1.6rem, 2.8vw, 2.2rem);
    letter-spacing: -0.01em;
    color: var(--creme);
    text-shadow: 0 2px 18px rgba(42, 15, 28, 0.4);
  }
  .brand__sub {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 400;
    font-size: 0.6rem;
    letter-spacing: 0.46em;
    text-transform: uppercase;
    color: rgba(255, 244, 234, 0.82);
    margin-top: 0.4rem;
    margin-left: 0.18rem;
  }

  /* Account icon — discreet, far right within right group */
  .account {
    display: grid;
    place-items: center;
    width: 40px; height: 40px;
    margin-left: 0.4rem;
    border-radius: 50%;
    border: 1.5px solid rgba(255, 244, 234, 0.45);
    background: rgba(255, 244, 234, 0.14);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--creme);
    cursor: pointer;
    transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    flex: 0 0 auto;
  }
  .account:hover {
    transform: translateY(-1px);
    border-color: var(--or);
    background: rgba(255, 244, 234, 0.22);
    box-shadow: 0 6px 18px rgba(255, 106, 0, 0.4);
  }
  .account svg { width: 18px; height: 18px; }

  .nav__burger {
    display: none;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1.5px solid rgba(255, 244, 234, 0.45);
    background: rgba(255, 244, 234, 0.14);
    color: var(--creme);
    cursor: pointer;
    align-items: center;
    justify-content: center;
  }
  .nav__burger svg { width: 20px; height: 20px; }

  /* ============ SOCIAL ROW (above the fold, marked) ============ */
  .socialbar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.55rem;
    margin: clamp(0.9rem, 2.2vh, 1.6rem) auto 0;
    flex-wrap: wrap;
  }
  .socialbar__label {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 600;
    font-size: 0.66rem;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: rgba(255, 244, 234, 0.9);
    margin-right: 0.3rem;
  }
  .social {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 0.95rem 0.5rem 0.5rem;
    border-radius: 999px;
    border: 1.5px solid rgba(255, 244, 234, 0.4);
    background: rgba(255, 244, 234, 0.16);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: var(--creme);
    text-decoration: none;
    font-family: "Space Grotesk", sans-serif;
    font-weight: 600;
    font-size: 0.82rem;
    letter-spacing: 0.01em;
    transition: transform 0.25s ease, color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
  }
  .social__ico {
    display: grid;
    place-items: center;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--or), var(--corail));
    color: #2a0f1c;
    flex: 0 0 auto;
  }
  .social__ico svg { width: 16px; height: 16px; }
  .social:hover {
    transform: translateY(-2px);
    border-color: var(--or);
    background: rgba(255, 244, 234, 0.26);
    box-shadow: 0 10px 24px rgba(255, 106, 0, 0.4);
  }

  /* ============ HERO ============ */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: clamp(1rem, 2.5vh, 2.4rem) 0 0.6rem;
    position: relative;
  }

  .title {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 600;
    font-size: clamp(3.3rem, 11.5vw, 12rem);
    line-height: 0.9;
    letter-spacing: -0.028em;
    margin: 0;
    color: var(--creme);
    max-width: 15ch;
    font-variation-settings: "opsz" 144;
    text-shadow: 0 4px 40px rgba(42, 15, 28, 0.45);
    position: relative;
    z-index: 4;
  }
  .title .line { display: block; }
  .title em {
    font-style: italic;
    font-weight: 500;
    font-variation-settings: "opsz" 144;
  }

  /* "BIEN" — bright coral→gold gradient + glow */
  .bien {
    position: relative;
    display: inline-block;
    font-style: normal;
    font-weight: 800;
    letter-spacing: -0.012em;
    background: linear-gradient(96deg, var(--or) 0%, #ff8a3d 40%, var(--corail) 72%, var(--rose) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    padding-right: 0.06em;
  }
  .bien::after {
    content: "BIEN.";
    position: absolute;
    inset: 0;
    z-index: -1;
    background: linear-gradient(96deg, var(--or) 0%, var(--corail) 60%, var(--rose) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    filter: blur(20px);
    opacity: 0.85;
    animation: glow 4.5s ease-in-out infinite;
  }
  @keyframes glow {
    0%, 100% { opacity: 0.6; filter: blur(18px); }
    50%      { opacity: 1;   filter: blur(28px); }
  }

  /* ============ XL PILL BUTTONS (bold) ============ */
  .actions {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 0.85rem;
    margin-top: clamp(1.6rem, 4vh, 2.8rem);
    position: relative;
    z-index: 4;
  }
  .pill {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: clamp(1rem, 1.35vw, 1.18rem);
    letter-spacing: 0.005em;
    padding: 1.1rem 2.3rem;
    border-radius: 999px;
    border: 2px solid rgba(255, 244, 234, 0.55);
    background: rgba(255, 244, 234, 0.16);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: var(--creme);
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 0.28s ease, border-color 0.28s ease, color 0.28s ease, background 0.28s ease;
    white-space: nowrap;
  }
  .pill:hover {
    transform: translateY(-3px);
    border-color: var(--or);
    color: #fff;
    background: rgba(255, 244, 234, 0.26);
    box-shadow: 0 14px 32px rgba(255, 106, 0, 0.4);
  }
  .pill--primary {
    border: none;
    color: #2a0f1c;
    background: linear-gradient(96deg, var(--or) 0%, var(--braise) 52%, var(--corail) 100%);
    box-shadow: 0 14px 38px rgba(255, 106, 0, 0.55);
    position: relative;
    overflow: hidden;
    padding: 1.1rem 2.6rem;
  }
  .pill--primary::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(96deg, var(--corail) 0%, var(--rose) 60%, var(--magenta) 100%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .pill--primary span { position: relative; z-index: 1; }
  .pill--primary:hover {
    transform: translateY(-3px);
    color: #fff;
    box-shadow: 0 18px 46px rgba(244, 59, 126, 0.55);
  }
  .pill--primary:hover::before { opacity: 1; }

  /* ============ QUOTE (one line, left-aligned, sig below) ============ */
  .quote {
    margin: clamp(1.6rem, 4vh, 3rem) 0 0;
    max-width: 100%;
    text-align: left;
    align-self: center;
    position: relative;
    z-index: 4;
  }
  .quote p {
    font-family: "Fraunces", Georgia, serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(0.98rem, 1.7vw, 1.32rem);
    line-height: 1.35;
    color: var(--creme);
    margin: 0 0 0.55rem;
    text-shadow: 0 2px 16px rgba(42, 15, 28, 0.4);
    white-space: nowrap;
  }
  .quote cite {
    display: block;
    font-family: "Space Grotesk", sans-serif;
    font-style: normal;
    font-weight: 700;
    font-size: 0.82rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--or);
    text-align: left;
  }

  /* ============ DRAGGABLE SOLAR STICKERS ============ */
  .stickers {
    position: absolute;
    inset: 0;
    z-index: 3;            /* below the centered text (z-index 4), above background */
    pointer-events: none; /* only the stickers themselves catch events */
  }
  .sticker {
    position: absolute;
    pointer-events: auto;
    cursor: grab;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    filter: drop-shadow(0 8px 22px rgba(42, 15, 28, 0.35));
    transition: transform 0.18s cubic-bezier(0.22, 1, 0.36, 1);
    will-change: transform;
  }
  .sticker:active { cursor: grabbing; }
  .sticker.is-dragging { transition: none; }
  .sticker:hover { transform: scale(1.06); }
  .sticker:focus-visible {
    outline: 2.5px solid var(--or);
    outline-offset: 4px;
    border-radius: 12px;
  }
  .sticker svg { display: block; width: 100%; height: 100%; }

  .sticker--sun1   { width: clamp(58px, 8vw, 96px);  height: clamp(58px, 8vw, 96px);  top: 16%; left: 8%; animation: floaty 7s ease-in-out infinite; }
  .sticker--sun2   { width: clamp(44px, 6vw, 72px);  height: clamp(44px, 6vw, 72px);  top: 60%; left: 12%; animation: floaty 9s ease-in-out infinite reverse; }
  .sticker--ray    { width: clamp(64px, 9vw, 108px); height: clamp(64px, 9vw, 108px); top: 18%; left: 84%; animation: floaty 8s ease-in-out infinite; }
  .sticker--star1  { width: clamp(34px, 4.6vw, 56px); height: clamp(34px, 4.6vw, 56px); top: 66%; left: 86%; animation: floaty 6s ease-in-out infinite reverse; }
  .sticker--star2  { width: clamp(26px, 3.6vw, 42px); height: clamp(26px, 3.6vw, 42px); top: 9%; left: 56%; animation: floaty 10s ease-in-out infinite; }

  /* Word-sticker rendered as outline text (text-stroke exploration) */
  .sticker--word {
    top: 78%; left: 70%;
    font-family: "Fraunces", Georgia, serif;
    font-style: italic;
    font-weight: 700;
    font-size: clamp(1.6rem, 4vw, 3rem);
    line-height: 1;
    color: transparent;
    -webkit-text-stroke: 1.6px var(--creme);
    text-stroke: 1.6px var(--creme);
    text-shadow: 0 2px 18px rgba(42, 15, 28, 0.4);
    filter: none;
    animation: floaty 8.5s ease-in-out infinite reverse;
  }

  @keyframes floaty {
    0%, 100% { translate: 0 0; }
    50%      { translate: 0 -10px; }
  }

  /* "déplace-moi" hint */
  .drag-hint {
    position: absolute;
    z-index: 5;
    left: 50%;
    bottom: clamp(0.4rem, 1.4vh, 1rem);
    transform: translateX(-50%);
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    font-family: "Space Grotesk", sans-serif;
    font-weight: 500;
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255, 244, 234, 0.78);
    pointer-events: none;
  }
  .drag-hint svg { width: 15px; height: 15px; opacity: 0.85; }

  /* ============ FOCUS / A11Y ============ */
  a:focus-visible, button:focus-visible {
    outline: 2.5px solid var(--or);
    outline-offset: 3px;
    border-radius: 999px;
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 860px) {
    .nav__group--left,
    .nav__group--right .link { display: none; }
    .nav__group--right { justify-content: flex-end; }
    .nav { grid-template-columns: 1fr auto 1fr; }
    .nav__burger { display: inline-flex; }
    .title { font-size: clamp(2.9rem, 14vw, 5.4rem); max-width: 12ch; }
    .quote p { white-space: normal; font-size: clamp(1rem, 4.6vw, 1.2rem); }
    .quote { max-width: 34ch; }
    .socialbar__label { display: none; }
    .social { font-size: 0; padding: 0.5rem; gap: 0; }
    .social__ico { width: 34px; height: 34px; }
    .sticker--word, .sticker--sun2, .sticker--star1 { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
    }
    #gl { display: none; }
    .aurora__css { opacity: 0.96 !important; }
    .sticker { cursor: default; }
    .drag-hint { display: none; }
  }
</style>
</head>
<body>
  <!-- ===================== SUNSET BACKGROUND ===================== -->
  <div class="aurora" aria-hidden="true">
    <div class="aurora__css"></div>
    <canvas id="gl"></canvas>
    <div class="aurora__veil"></div>
    <div class="aurora__grain"></div>
  </div>

  <div class="shell">
    <!-- ===================== NAV (3 columns) ===================== -->
    <nav class="nav" aria-label="Navigation principale">
      <ul class="nav__group nav__group--left">
        <li><a href="#ateliers">Ateliers</a></li>
        <li><a href="#boutique">Boutique</a></li>
      </ul>

      <a class="brand" href="#" aria-label="Soleia Expérience, accueil">
        <span class="brand__name">soleia</span>
        <span class="brand__sub">expérience</span>
      </a>

      <div class="nav__group nav__group--right">
        <a class="link" href="#histoire">Histoire</a>
        <a class="link" href="#galerie">Galerie</a>
        <button class="account" aria-label="Mon compte">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
            <circle cx="12" cy="8" r="3.4"/>
            <path d="M5 20c0-3.6 3.1-6 7-6s7 2.4 7 6" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="nav__burger" aria-label="Ouvrir le menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <path d="M4 7h16M4 12h16M4 17h16" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </nav>

    <!-- ===================== SOCIAL ROW (above the fold) ===================== -->
    <div class="socialbar" aria-label="Réseaux sociaux">
      <span class="socialbar__label">Suis&#8209;nous</span>
      <a class="social" href="#" aria-label="Instagram de Soleia">
        <span class="social__ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3.5" y="3.5" width="17" height="17" rx="5"/>
            <circle cx="12" cy="12" r="4"/>
            <circle cx="17.2" cy="6.8" r="1.1" fill="currentColor" stroke="none"/>
          </svg>
        </span>
        <span>Instagram</span>
      </a>
      <a class="social" href="#" aria-label="Pinterest de Soleia">

  <!-- ===================== WebGL SUNSET SHADER (progressive enhancement) ===================== -->
  <script>
  (function () {
    var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) return;

    var canvas = document.getElementById("gl");
    if (!canvas) return;

    var gl = canvas.getContext("webgl", { antialias: true, alpha: false, premultipliedAlpha: false })
          || canvas.getContext("experimental-webgl");
    if (!gl) return; // CSS fallback stays visible.

    var vertSrc =
      "attribute vec2 p;" +
      "void main(){ gl_Position = vec4(p, 0.0, 1.0); }";

    // Warm, saturated sunset: ember orange -> coral -> deep rose, glowing low sun.
    var fragSrc = [
      "precision highp float;",
      "uniform vec2 u_res;",
      "uniform float u_time;",
      "",
      "vec3 GOLD    = vec3(1.000, 0.752, 0.302);", // #ffc04d
      "vec3 BRAISE  = vec3(1.000, 0.416, 0.000);", // #ff6a00
      "vec3 CORAL   = vec3(1.000, 0.353, 0.373);", // #ff5a5f
      "vec3 ROSE    = vec3(0.956, 0.231, 0.494);", // #f43b7e
      "vec3 MAGENTA = vec3(0.784, 0.118, 0.416);", // #c81e6a
      "",
      "float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }",
      "float noise(vec2 p){",
      "  vec2 i = floor(p); vec2 f = fract(p);",
      "  vec2 u = f*f*(3.0-2.0*f);",
      "  return mix(mix(hash(i+vec2(0.0,0.0)), hash(i+vec2(1.0,0.0)), u.x),",
      "             mix(hash(i+vec2(0.0,1.0)), hash(i+vec2(1.0,1.0)), u.x), u.y);",
      "}",
      "float fbm(vec2 p){",
      "  float v = 0.0; float a = 0.5;",
      "  for(int i=0;i<5;i++){ v += a*noise(p); p *= 2.0; a *= 0.5; }",
      "  return v;",
      "}",
      "",
      "void main(){",
      "  vec2 uv = gl_FragCoord.xy / u_res.xy;",
      "  vec2 p = uv;",
      "  p.x *= u_res.x / u_res.y;",
      "  float t = u_time * 0.05;",
      "  // domain warp for flowing sunset clouds",
      "  vec2 q = vec2(fbm(p + vec2(0.0, t)), fbm(p + vec2(5.2, -t)));",
      "  vec2 r = vec2(fbm(p + 3.0*q + vec2(1.7, 9.2) + 0.18*t),",
      "                fbm(p + 3.0*q + vec2(8.3, 2.8) - 0.14*t));",
      "  float f = fbm(p + 2.4*r);",
      "  // vertical sky ramp: magenta high -> rose -> coral -> ember low",
      "  float sky = clamp(uv.y, 0.0, 1.0);",
      "  vec3 col = mix(BRAISE, CORAL, smoothstep(0.0, 0.45, sky));",
      "  col = mix(col, ROSE, smoothstep(0.4, 0.78, sky));",
      "  col = mix(col, MAGENTA, smoothstep(0.72, 1.05, sky));",
      "  // cloud modulation breaks up the bands",
      "  col = mix(col, CORAL, smoothstep(0.45, 0.95, f) * 0.5);",
      "  col = mix(col, ROSE,  smoothstep(0.55, 1.05, length(r)) * 0.45);",
      "  // glowing low sun, bottom-center",
      "  vec2 sunPos = vec2(0.5, 0.04);",
      "  float sd = distance(vec2(uv.x, uv.y*0.92), sunPos);",
      "  float sun = smoothstep(0.62, 0.0, sd);",
      "  col = mix(col, GOLD, sun * 0.85);",
      "  col += BRAISE * smoothstep(0.34, 0.0, sd) * 0.5;",
      "  // subtle darkening near the very top for title contrast",
      "  col = mix(col, MAGENTA*0.55, smoothstep(0.78, 1.0, sky) * 0.4);",
      "  gl_FragColor = vec4(col, 1.0);",
      "}"
    ].join("\n");

    function compile(type, src) {
      var s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) { gl.deleteShader(s); return null; }
      return s;
    }

    var vs = compile(gl.VERTEX_SHADER, vertSrc);
    var fs = compile(gl.FRAGMENT_SHADER, fragSrc);
    if (!vs || !fs) return;

    var prog = gl.createProgram();
    gl.attachShader(prog, vs);
    gl.attachShader(prog, fs);
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) return;
    gl.useProgram(prog);

    var buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
    var loc = gl.getAttribLocation(prog, "p");
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

    var uRes = gl.getUniformLocation(prog, "u_res");
    var uTime = gl.getUniformLocation(prog, "u_time");

    var dpr = Math.min(window.devicePixelRatio || 1, 1.5);
    function resize() {
      var w = Math.floor(canvas.clientWidth * dpr);
      var h = Math.floor(canvas.clientHeight * dpr);
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w; canvas.height = h;
        gl.viewport(0, 0, w, h);
      }
    }
    window.addEventListener("resize", resize);
    resize();

    document.querySelector(".aurora").classList.add("gl-ready");
    document.body.classList.add("gl-ready");

    var start = performance.now();
    var running = true;
    var elapsed = 0;
    document.addEventListener("visibilitychange", function () {
      running = !document.hidden;
      if (running) { start = performance.now() - elapsed; requestAnimationFrame(loop); }
    });

    function loop(now) {
      if (!running) return;
      resize();
      elapsed = now - start;
      gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.uniform1f(uTime, elapsed * 0.001);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  })();
  </script>

  <!-- ===================== DRAGGABLE STICKERS (progressive enhancement) ===================== -->
  <script>
  (function () {
    var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) return; // no drag in reduced-motion

    var items = document.querySelectorAll("[data-drag]");
    var z = 10;

    items.forEach(function (el) {
      var dx = 0, dy = 0;          // committed offset
      var startX = 0, startY = 0;  // pointer start
      var baseX = 0, baseY = 0;    // offset at drag start
      var dragging = false;

      function apply() { el.style.transform = "translate(" + dx + "px, " + dy + "px)"; }

      function down(e) {
        dragging = true;
        el.classList.add("is-dragging");
        el.style.zIndex = (++z);
        el.style.animation = "none"; // stop floaty while held
        startX = e.clientX; startY = e.clientY;
        baseX = dx; baseY = dy;
        try { el.setPointerCapture(e.pointerId); } catch (err) {}
        e.preventDefault();
      }
      function move(e) {
        if (!dragging) return;
        dx = baseX + (e.clientX - startX);
        dy = baseY + (e.clientY - startY);
        apply();
      }
      function up(e) {
        if (!dragging) return;
        dragging = false;
        el.classList.remove("is-dragging");
        try { el.releasePointerCapture(e.pointerId); } catch (err) {}
      }

      el.addEventListener("pointerdown", down);
      el.addEventListener("pointermove", move);
      el.addEventListener("pointerup", up);
      el.addEventListener("pointercancel", up);
    });
  })();
  </script>
