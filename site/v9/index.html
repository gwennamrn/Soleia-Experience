<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Soleia Expérience — La pause créative qui fait du BIEN</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..600&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet" />
<style>
  :root {
    /* New "dawn" colorway: apricot / coral / peach / cream */
    --coral:   #f76b53;
    --apricot: #ffa25c;
    --peach:   #ffd0b0;
    --blush:   #fbe3d6;
    --creme:   #fdf7f1;
    --ink:     #36272b;
    --ink-soft:#705257;
    --line:    rgba(54, 39, 43, 0.16);
    --line-2:  rgba(54, 39, 43, 0.10);
    --glass:   rgba(253, 247, 241, 0.6);
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    font-family: "Space Grotesk", system-ui, sans-serif;
    color: var(--ink);
    background: var(--creme);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
  }

  /* ============ DAWN SILK BACKGROUND ============ */
  .aurora {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    background: var(--creme);
  }

  /* CSS fallback: animated peach/coral silk mesh (no JS / no WebGL) */
  .aurora__css {
    position: absolute;
    inset: -22%;
    filter: blur(58px) saturate(1.04);
    opacity: 0.92;
    transition: opacity 0.8s ease;
  }
  .aurora__css::before,
  .aurora__css::after {
    content: "";
    position: absolute;
    inset: 0;
    background-repeat: no-repeat;
  }
  .aurora__css::before {
    background:
      radial-gradient(46% 40% at 18% 24%, rgba(255, 162, 92, 0.92), transparent 70%),
      radial-gradient(50% 44% at 82% 30%, rgba(247, 107, 83, 0.82), transparent 72%),
      radial-gradient(60% 58% at 50% 90%, rgba(255, 208, 176, 0.95), transparent 76%);
    animation: drift1 24s ease-in-out infinite alternate;
  }
  .aurora__css::after {
    background:
      radial-gradient(42% 40% at 70% 16%, rgba(255, 162, 92, 0.6), transparent 70%),
      radial-gradient(46% 46% at 14% 76%, rgba(247, 107, 83, 0.5), transparent 72%),
      radial-gradient(58% 52% at 90% 84%, rgba(253, 247, 241, 0.92), transparent 74%);
    animation: drift2 30s ease-in-out infinite alternate;
    mix-blend-mode: screen;
  }
  @keyframes drift1 {
    0%   { transform: translate(0, 0) scale(1) rotate(0deg); }
    100% { transform: translate(3%, -3%) scale(1.1) rotate(7deg); }
  }
  @keyframes drift2 {
    0%   { transform: translate(0, 0) scale(1.05) rotate(0deg); }
    100% { transform: translate(-4%, 3%) scale(1) rotate(-9deg); }
  }

  #gl {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 1.2s ease;
  }
  .gl-ready #gl { opacity: 1; }
  .gl-ready .aurora__css { opacity: 0; }

  /* Cream veil + fine grain keep text studio-crisp, not "blob" */
  .aurora__veil {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(130% 80% at 30% 4%, transparent 38%, rgba(253, 247, 241, 0.42) 100%),
      linear-gradient(180deg, rgba(253, 247, 241, 0.36) 0%, transparent 30%, transparent 72%, rgba(253, 247, 241, 0.4) 100%);
    pointer-events: none;
  }
  .aurora__grain {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.05;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* ============ SHELL — editorial keyline frame ============ */
  .shell {
    position: relative;
    z-index: 2;
    height: 100svh;
    display: flex;
    flex-direction: column;
    padding: clamp(0.9rem, 2vw, 1.7rem) clamp(1.1rem, 4.4vw, 4rem);
  }
  /* thin magazine keyline framing the whole page */
  .shell::before {
    content: "";
    position: absolute;
    inset: clamp(0.7rem, 1.6vw, 1.3rem);
    border: 1px solid var(--line);
    border-radius: 14px;
    pointer-events: none;
    z-index: 0;
  }

  /* ============ NAV — 3 columns, centered logo ============ */
  .nav {
    position: relative;
    z-index: 3;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: clamp(0.8rem, 2vw, 1.8rem);
    padding-bottom: clamp(0.4rem, 1.2vh, 0.9rem);
  }
  .nav__group {
    display: flex;
    align-items: center;
    gap: clamp(1rem, 2.4vw, 2.3rem);
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .nav__group--left { justify-self: start; }
  .nav__group--right { justify-self: end; }
  .nav__group a {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 400;
    font-size: clamp(0.82rem, 1vw, 0.95rem);
    letter-spacing: 0.01em;
    color: var(--ink);
    text-decoration: none;
    position: relative;
    padding: 0.35rem 0.1rem;
    transition: color 0.25s ease;
    white-space: nowrap;
  }
  .nav__group a::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: 0.02rem;
    height: 1.5px;
    background: linear-gradient(90deg, var(--coral), var(--apricot));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .nav__group a:hover::after,
  .nav__group a:focus-visible::after { transform: scaleX(1); }
  .nav__group a:hover { color: var(--coral); }

  .brand {
    justify-self: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 0.86;
    text-decoration: none;
    color: var(--ink);
  }
  .brand__name {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 420;
    font-size: clamp(1.45rem, 2.4vw, 1.95rem);
    letter-spacing: -0.012em;
    font-variation-settings: "opsz" 96;
    color: var(--ink);
  }
  .brand__sub {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 300;
    font-size: 0.58rem;
    letter-spacing: 0.46em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 0.34rem;
    margin-left: 0.46em;
  }

  /* account icon — discreet, far right within the right group */
  .account {
    display: grid;
    place-items: center;
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1.5px solid var(--line);
    background: var(--glass);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--ink);
    cursor: pointer;
    transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    flex: none;
  }
  .account:hover {
    transform: translateY(-1px);
    border-color: var(--coral);
    box-shadow: 0 6px 16px rgba(247, 107, 83, 0.22);
  }
  .account svg { width: 18px; height: 18px; }

  .nav__burger {
    display: none;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1.5px solid var(--line);
    background: var(--glass);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--ink);
    cursor: pointer;
    align-items: center;
    justify-content: center;
    flex: none;
  }
  .nav__burger svg { width: 19px; height: 19px; }

  /* ============ HERO — editorial, asymmetric ============ */
  .hero {
    position: relative;
    z-index: 2;
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-columns: minmax(0, 1fr);
    align-content: center;
    padding: clamp(0.4rem, 1.6vh, 1.4rem) clamp(0.2rem, 2vw, 2.6rem) 0;
  }

  /* small index label row above the title (magazine "rubrique") */
  .index-line {
    display: flex;
    align-items: center;
    gap: 0.9rem;
    margin-bottom: clamp(0.6rem, 1.8vh, 1.3rem);
    color: var(--ink-soft);
  }
  .index-line .num {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 500;
    font-size: 0.72rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--coral);
  }
  .index-line .rule {
    height: 1px;
    width: clamp(2.5rem, 9vw, 7rem);
    background: var(--line);
  }
  .index-line .label {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 400;
    font-size: 0.7rem;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  .title {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 360;
    font-size: clamp(3rem, 10.4vw, 10rem);
    line-height: 0.9;
    letter-spacing: -0.026em;
    margin: 0;
    color: var(--ink);
    text-align: left;
    max-width: 16ch;
    font-variation-settings: "opsz" 144;
  }
  .title .line { display: block; }
  .title em {
    font-style: italic;
    font-weight: 340;
    font-variation-settings: "opsz" 144;
  }

  /* one word in OUTLINE — "créative" */
  .stroke {
    font-style: italic;
    font-weight: 360;
    color: transparent;
    -webkit-text-fill-color: transparent;
    -webkit-text-stroke: 1.3px var(--ink);
    text-stroke: 1.3px var(--ink);
    padding-right: 0.04em;
  }

  /* "BIEN" — keeps the signature gradient + glow */
  .bien {
    position: relative;
    display: inline-block;
    font-style: normal;
    font-weight: 600;
    letter-spacing: -0.01em;
    background: linear-gradient(96deg, var(--coral) 0%, #ff8a4e 52%, var(--apricot) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    padding-right: 0.05em;
  }
  .bien::after {
    content: "BIEN.";
    position: absolute;
    inset: 0;
    z-index: -1;
    background: linear-gradient(96deg, var(--coral) 0%, var(--apricot) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    filter: blur(18px);
    opacity: 0.6;
    animation: glow 4.5s ease-in-out infinite;
  }
  @keyframes glow {
    0%, 100% { opacity: 0.42; filter: blur(16px); }
    50%      { opacity: 0.74; filter: blur(24px); }
  }

  /* ============ PILL BUTTONS — bigger, bold ============ */
  .actions {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: flex-start;
    gap: clamp(0.6rem, 1.2vw, 0.95rem);
    margin-top: clamp(1.4rem, 4vh, 2.8rem);
  }
  .pill {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: clamp(1rem, 1.25vw, 1.12rem);
    letter-spacing: 0.005em;
    padding: clamp(1rem, 1.7vh, 1.25rem) clamp(1.7rem, 2.6vw, 2.4rem);
    border-radius: 999px;
    border: 1.6px solid var(--line);
    background: var(--glass);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: var(--ink);
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 0.28s ease, border-color 0.28s ease, color 0.28s ease;
    white-space: nowrap;
  }
  .pill:hover {
    transform: translateY(-2px);
    border-color: var(--coral);
    color: var(--coral);
    box-shadow: 0 12px 28px rgba(247, 107, 83, 0.2);
  }
  .pill--primary {
    border: none;
    color: var(--creme);
    background: linear-gradient(96deg, var(--coral) 0%, var(--apricot) 100%);
    box-shadow: 0 12px 32px rgba(255, 162, 92, 0.36);
    position: relative;
    overflow: hidden;
  }
  .pill--primary::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(96deg, var(--apricot) 0%, var(--coral) 100%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .pill--primary span { position: relative; z-index: 1; }
  .pill--primary:hover {
    transform: translateY(-2px);
    color: var(--creme);
    box-shadow: 0 16px 40px rgba(247, 107, 83, 0.44);
  }
  .pill--primary:hover::before { opacity: 1; }

  /* ============ QUOTE — one line, left-aligned, sig below ============ */
  .quote {
    margin: clamp(1.6rem, 4vh, 2.8rem) 0 0;
    max-width: none;
    text-align: left;
  }
  .quote p {
    font-family: "Fraunces", Georgia, serif;
    font-style: italic;
    font-weight: 320;
    font-size: clamp(0.98rem, 1.7vw, 1.32rem);
    line-height: 1.4;
    color: var(--ink);
    margin: 0 0 0.55rem;
    white-space: nowrap;
  }
  .quote cite {
    display: block;
    font-family: "Space Grotesk", sans-serif;
    font-style: normal;
    font-weight: 600;
    font-size: 0.8rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--coral);
  }

  /* ============ SOCIAL — fixed corner, above the fold ============ */
  .social-rail {
    position: fixed;
    top: clamp(5.2rem, 13vh, 8rem);
    right: clamp(1.5rem, 3.4vw, 3.2rem);
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.7rem;
  }
  .social-rail .rail-label {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    font-family: "Space Grotesk", sans-serif;
    font-weight: 500;
    font-size: 0.62rem;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 0.2rem;
  }
  .social {
    display: grid;
    place-items: center;
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 1.6px solid var(--line);
    background: var(--glass);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--ink);
    text-decoration: none;
    transition: transform 0.25s ease, color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
  }
  .social:hover {
    transform: translateY(-2px) scale(1.04);
    color: var(--creme);
    border-color: transparent;
    background: linear-gradient(135deg, var(--coral), var(--apricot));
    box-shadow: 0 10px 24px rgba(247, 107, 83, 0.34);
  }
  .social svg { width: 20px; height: 20px; }

  /* ============ FOOTER — pagination / index line ============ */
  .foot {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    padding-top: clamp(0.4rem, 1.2vh, 0.9rem);
  }
  .foot .meta {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 400;
    font-size: 0.68rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .foot .meta b { color: var(--coral); font-weight: 600; }

  /* ============ DRAGGABLE STICKERS ============ */
  .stickers {
    position: fixed;
    inset: 0;
    z-index: 4;
    pointer-events: none;
  }
  .sticker {
    position: absolute;
    pointer-events: auto;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    will-change: transform;
    filter: drop-shadow(0 8px 18px rgba(54, 39, 43, 0.16));
    transition: filter 0.25s ease;
  }
  .sticker:active { cursor: grabbing; }
  .sticker:hover { filter: drop-shadow(0 12px 26px rgba(247, 107, 83, 0.32)); }
  .sticker svg, .sticker .word { display: block; }
  .sticker.dragging { transition: none; }
  .sticker--word .word {
    font-family: "Fraunces", Georgia, serif;
    font-style: italic;
    font-weight: 500;
    font-size: 1.45rem;
    letter-spacing: 0.01em;
    color: var(--creme);
    background: linear-gradient(120deg, var(--coral), var(--apricot));
    padding: 0.42rem 1.05rem;
    border-radius: 999px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18);
  }
  /* spin idle anim for some stickers */
  .sticker--spin svg { animation: spin 26s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* drag hint */
  .drag-hint {
    position: fixed;
    z-index: 5;
    left: clamp(1.5rem, 4.4vw, 4rem);
    bottom: clamp(3.4rem, 9vh, 5.4rem);
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-family: "Space Grotesk", sans-serif;
    font-weight: 400;
    font-size: 0.7rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
    opacity: 0.85;
    pointer-events: none;
  }
  .drag-hint svg { width: 15px; height: 15px; opacity: 0.85; }
  .drag-hint .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, var(--apricot), var(--coral));
    animation: hintpulse 2.6s ease-out infinite;
  }
  @keyframes hintpulse {
    0%   { box-shadow: 0 0 0 0 rgba(247, 107, 83, 0.5); }
    70%  { box-shadow: 0 0 0 8px rgba(247, 107, 83, 0); }
    100% { box-shadow: 0 0 0 0 rgba(247, 107, 83, 0); }
  }

  /* ============ FOCUS / A11Y ============ */
  a:focus-visible, button:focus-visible {
    outline: 2.5px solid var(--coral);
    outline-offset: 3px;
    border-radius: 999px;
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 900px) {
    .index-line .rule { width: clamp(1.6rem, 6vw, 4rem); }
  }
  @media (max-width: 760px) {
    .nav { grid-template-columns: auto 1fr auto; }
    .nav__group--left, .nav__group--right { display: none; }
    .brand { justify-self: start; align-items: flex-start; }
    .nav__burger { display: inline-flex; }
    .nav__right-mobile { justify-self: end; display: flex; align-items: center; gap: 0.6rem; }
    .title { font-size: clamp(2.7rem, 13.5vw, 5rem); max-width: 12ch; }
    .quote p { white-space: normal; }
    .quote { max-width: 34ch; }
    .social-rail { top: auto; bottom: clamp(1rem, 4vh, 2rem); right: clamp(1rem, 4vw, 2rem); flex-direction: row; gap: 0.5rem; }
    .social-rail .rail-label { writing-mode: horizontal-tb; margin: 0 0.2rem 0 0; }
    .social { width: 42px; height: 42px; }
    .drag-hint { display: none; }
  }
  @media (max-width: 760px) {
    .nav__right-desktop { display: none; }
  }
  @media (min-width: 761px) {
    .nav__right-mobile { display: none; }
    .nav__burger { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
    }
    #gl { display: none; }
    .aurora__css { opacity: 0.92 !important; }
    .sticker { cursor: default; }
  }
</style>
</head>
<body>
  <!-- ===================== DAWN SILK BACKGROUND ===================== -->
  <div class="aurora" aria-hidden="true">
    <div class="aurora__css"></div>
    <canvas id="gl"></canvas>
    <div class="aurora__veil"></div>
    <div class="aurora__grain"></div>
  </div>

  <div class="shell">
    <!-- ===================== NAV — 3 columns, centered logo ===================== -->
    <nav class="nav" aria-label="Navigation principale">
      <ul class="nav__group nav__group--left">
        <li><a href="#ateliers">Ateliers</a></li>
        <li><a href="#boutique">Boutique</a></li>
      </ul>

      <a class="brand" href="#" aria-label="Soleia Expérience, accueil">
        <span class="brand__name">soleia</span>
        <span class="brand__sub">expérience</span>
      </a>

      <div class="nav__group nav__group--right nav__right-desktop">
        <a href="#histoire">Histoire</a>
        <a href="#galerie">Galerie</a>
        <button class="account" aria-label="Mon compte">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
            <circle cx="12" cy="8" r="3.4"/>
            <path d="M5 20c0-3.6 3.1-6 7-6s7 2.4 7 6" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="nav__right-mobile">
        <button class="account" aria-label="Mon compte">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
            <circle cx="12" cy="8" r="3.4"/>
            <path d="M5 20c0-3.6 3.1-6 7-6s7 2.4 7 6" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="nav__burger" aria-label="Ouvrir le menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <path d="M4 7h16M4 12h16M4 17h16" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </nav>

    <!-- ===================== HERO — editorial / asymmetric ===================== -->
    <main class="hero">
      <p class="index-line">

  <!-- ===================== DRAG INTERACTION ===================== -->
  <script>
  (function () {
    var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) return;

    var stickers = document.querySelectorAll("[data-sticker]");
    stickers.forEach(function (el) {
      // Convert top/right/left/bottom anchors to transform-based positioning once measured.
      var startX = 0, startY = 0, baseX = 0, baseY = 0, tx = 0, ty = 0, dragging = false, pid = null;

      function onDown(e) {
        dragging = true;
        el.classList.add("dragging");
        el.setPointerCapture && el.setPointerCapture(e.pointerId);
        pid = e.pointerId;
        startX = e.clientX;
        startY = e.clientY;
        baseX = tx;
        baseY = ty;
        // lift it above siblings
        el.style.zIndex = 6;
        e.preventDefault();
      }
      function onMove(e) {
        if (!dragging || (pid !== null && e.pointerId !== pid)) return;
        tx = baseX + (e.clientX - startX);
        ty = baseY + (e.clientY - startY);
        el.style.transform = "translate(" + tx + "px," + ty + "px)";
      }
      function onUp(e) {
        if (!dragging) return;
        dragging = false;
        el.classList.remove("dragging");
        try { el.releasePointerCapture && el.releasePointerCapture(pid); } catch (err) {}
        pid = null;
      }

      el.addEventListener("pointerdown", onDown);
      el.addEventListener("pointermove", onMove);
      el.addEventListener("pointerup", onUp);
      el.addEventListener("pointercancel", onUp);
    });
  })();
  </script>

  <!-- ===================== WebGL "DAWN SILK" SHADER (progressive enhancement) ===================== -->
  <script>
  (function () {
    var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) return;

    var canvas = document.getElementById("gl");
    if (!canvas) return;

    var gl = canvas.getContext("webgl", { antialias: true, alpha: false, premultipliedAlpha: false })
          || canvas.getContext("experimental-webgl");
    if (!gl) return; // CSS fallback stays — graceful degradation.

    var vertSrc =
      "attribute vec2 p;" +
      "void main(){ gl_Position = vec4(p, 0.0, 1.0); }";

    /* "Dawn silk" — layered sine ribbons + light fbm shimmer, in apricot/coral/peach/cream.
       Different technique & colorway from the 08 domain-warp aurora and the v1-v5. */
    var fragSrc = [
      "precision highp float;",
      "uniform vec2 u_res;",
      "uniform float u_time;",
      "",
      "vec3 CORAL  = vec3(0.969, 0.420, 0.325);", // #f76b53
      "vec3 APRICOT= vec3(1.000, 0.635, 0.361);", // #ffa25c
      "vec3 PEACH  = vec3(1.000, 0.816, 0.690);", // #ffd0b0
      "vec3 CREAM  = vec3(0.992, 0.969, 0.945);", // #fdf7f1
      "",
      "float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }",
      "float noise(vec2 p){",
      "  vec2 i = floor(p); vec2 f = fract(p);",
      "  vec2 u = f*f*(3.0-2.0*f);",
      "  return mix(mix(hash(i+vec2(0.0,0.0)), hash(i+vec2(1.0,0.0)), u.x),",
      "             mix(hash(i+vec2(0.0,1.0)), hash(i+vec2(1.0,1.0)), u.x), u.y);",
      "}",
      "float fbm(vec2 p){",
      "  float v = 0.0; float a = 0.5;",
      "  for(int i=0;i<4;i++){ v += a*noise(p); p *= 2.0; a *= 0.5; }",
      "  return v;",
      "}",
      "",
      "// one flowing silk ribbon: returns soft band intensity around a moving sine path",
      "float ribbon(vec2 uv, float t, float yc, float amp, float freq, float ph, float w){",
      "  float wob = fbm(vec2(uv.x*1.6 + t*0.3, ph)) * 0.12;",
      "  float y = yc + amp*sin(uv.x*freq + t + ph) + amp*0.4*sin(uv.x*freq*2.1 - t*0.7 + ph) + wob;",
      "  float d = abs(uv.y - y);",
      "  return smoothstep(w, 0.0, d);",
      "}",
      "",
      "void main(){",
      "  vec2 uv = gl_FragCoord.xy / u_res.xy;",
      "  vec2 p = uv;",
      "  p.x *= u_res.x / u_res.y;",
      "  float t = u_time * 0.16;",
      "",
      "  // base vertical wash: cream up top -> peach -> apricot lower",
      "  vec3 col = mix(PEACH, CREAM, smoothstep(0.35, 1.0, uv.y));",
      "  col = mix(APRICOT, col, smoothstep(0.0, 0.55, uv.y));",
      "",
      "  // layered silk ribbons of warm colour",
      "  float r1 = ribbon(p, t,        0.62, 0.10, 3.1, 0.0, 0.22);",
      "  float r2 = ribbon(p, t*0.85,   0.44, 0.13, 2.3, 2.1, 0.26);",
      "  float r3 = ribbon(p, t*1.2,    0.28, 0.09, 3.8, 4.4, 0.18);",
      "  float r4 = ribbon(p, t*0.7,    0.78, 0.08, 2.0, 1.2, 0.20);",
      "",
      "  col = mix(col, APRICOT, r1*0.72);",
      "  col = mix(col, CORAL,   r2*0.55);",
      "  col = mix(col, PEACH,   r3*0.6);",
      "  col = mix(col, mix(CORAL,APRICOT,0.5), r4*0.45);",
      "",
      "  // soft shimmer to break up banding",
      "  float sh = fbm(p*2.4 + vec2(t*0.4, -t*0.3));",
      "  col += (sh - 0.5) * 0.05;",
      "",
      "  // lift toward cream near the top-left so the editorial title stays readable",
      "  float topLeft = smoothstep(0.45, 1.0, uv.y) * smoothstep(0.7, 0.0, uv.x);",
      "  col = mix(col, CREAM, topLeft * 0.5);",
      "  // gentle cream vignette",
      "  float d = distance(uv, vec2(0.42, 0.55));",
      "  col = mix(col, CREAM, smoothstep(0.5, 1.0, d) * 0.3);",
      "",
      "  gl_FragColor = vec4(col, 1.0);",
      "}"
    ].join("\n");

    function compile(type, src) {
      var s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
        gl.deleteShader(s);
        return null;
      }
      return s;
    }

    var vs = compile(gl.VERTEX_SHADER, vertSrc);
    var fs = compile(gl.FRAGMENT_SHADER, fragSrc);
    if (!vs || !fs) return;

    var prog = gl.createProgram();
    gl.attachShader(prog, vs);
    gl.attachShader(prog, fs);
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) return;
    gl.useProgram(prog);

    var buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
    var loc = gl.getAttribLocation(prog, "p");
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

    var uRes = gl.getUniformLocation(prog, "u_res");
    var uTime = gl.getUniformLocation(prog, "u_time");

    var dpr = Math.min(window.devicePixelRatio || 1, 1.5);
    function resize() {
      var w = Math.floor(canvas.clientWidth * dpr);
      var h = Math.floor(canvas.clientHeight * dpr);
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w; canvas.height = h;
        gl.viewport(0, 0, w, h);
      }
    }
    window.addEventListener("resize", resize);
    resize();

    document.querySelector(".aurora").classList.add("gl-ready");
    document.body.classList.add("gl-ready");

    var start = performance.now();
    var elapsed = 0;
    var running = true;
    document.addEventListener("visibilitychange", function () {
      running = !document.hidden;
      if (running) { start = performance.now() - elapsed; requestAnimationFrame(loop); }
    });

    function loop(now) {
      if (!running) return;
      resize();
      elapsed = now - start;
      gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.uniform1f(uTime, elapsed * 0.001);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  })();
  </script>
