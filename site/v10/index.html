<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Soleia Expérience — La pause créative qui fait du BIEN</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..600&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet" />
<style>
  :root {
    --gold:   #f6b03c;
    --honey:  #f59331;
    --terra:  #ec6a3e;
    --rosegold: #f5859b;
    --rose:   #f5859b;
    --orange: #ec6a3e;
    --creme:  #fef7ee;
    --creme-2:#fbeada;
    --ink:    #3a2a24;
    --ink-soft:#705347;
    --glass:  rgba(254, 247, 238, 0.6);
    --glass-2:rgba(254, 247, 238, 0.4);
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    font-family: "Space Grotesk", system-ui, sans-serif;
    color: var(--ink);
    background: var(--creme);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  /* ============ AURORA BACKGROUND (honey sunrise colorway) ============ */
  .aurora {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    background: var(--creme);
  }
  .aurora__css {
    position: absolute;
    inset: -20%;
    filter: blur(64px) saturate(1.06);
    opacity: 0.92;
    transition: opacity 0.8s ease;
  }
  .aurora__css::before,
  .aurora__css::after {
    content: "";
    position: absolute;
    inset: 0;
    background-repeat: no-repeat;
  }
  .aurora__css::before {
    background:
      radial-gradient(42% 52% at 20% 32%, rgba(246, 176, 60, 0.88), transparent 70%),
      radial-gradient(46% 56% at 80% 40%, rgba(236, 106, 62, 0.78), transparent 72%),
      radial-gradient(52% 60% at 50% 84%, rgba(245, 133, 155, 0.55), transparent 76%);
    animation: drift1 24s ease-in-out infinite alternate;
  }
  .aurora__css::after {
    background:
      radial-gradient(40% 50% at 66% 20%, rgba(245, 147, 49, 0.6), transparent 70%),
      radial-gradient(44% 54% at 16% 72%, rgba(246, 176, 60, 0.5), transparent 72%),
      radial-gradient(56% 56% at 90% 82%, rgba(251, 234, 218, 0.92), transparent 74%);
    animation: drift2 30s ease-in-out infinite alternate;
    mix-blend-mode: screen;
  }
  @keyframes drift1 {
    0%   { transform: translate(0, 0) scale(1) rotate(0deg); }
    100% { transform: translate(4%, -3%) scale(1.12) rotate(8deg); }
  }
  @keyframes drift2 {
    0%   { transform: translate(0, 0) scale(1.05) rotate(0deg); }
    100% { transform: translate(-5%, 4%) scale(1) rotate(-10deg); }
  }

  #gl {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 1.2s ease;
  }
  .gl-ready #gl { opacity: 1; }
  .gl-ready .aurora__css { opacity: 0; }

  /* Ambient solar particles canvas — sits above the aurora, below the veil */
  #motes {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .aurora__veil {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(120% 92% at 50% 6%, transparent 38%, rgba(254, 247, 238, 0.4) 100%),
      radial-gradient(82% 72% at 50% 50%, rgba(254, 247, 238, 0.34), transparent 62%);
    pointer-events: none;
  }
  .aurora__grain {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.05;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* ============ SHELL ============ */
  .shell {
    position: relative;
    z-index: 2;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    padding: clamp(1.05rem, 2.2vw, 1.8rem) clamp(1.2rem, 5vw, 4.5rem) clamp(1.2rem, 2.6vh, 2rem);
  }

  /* ============ NAV — 3 columns: left links | centered logo | right links ============ */
  .nav {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: clamp(0.8rem, 2vw, 2rem);
  }
  .nav__col { display: flex; align-items: center; }
  .nav__col--left  { justify-content: flex-end; }
  .nav__col--right { justify-content: flex-start; gap: clamp(1rem, 2.2vw, 2.1rem); }

  .nav__links {
    display: flex;
    align-items: center;
    gap: clamp(1rem, 2.2vw, 2.1rem);
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .nav__links a {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 500;
    font-size: 0.94rem;
    letter-spacing: 0.01em;
    color: var(--ink);
    text-decoration: none;
    position: relative;
    padding: 0.35rem 0.1rem;
    transition: color 0.25s ease;
  }
  .nav__links a::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: 0.05rem;
    height: 1.5px;
    background: linear-gradient(90deg, var(--gold), var(--terra));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .nav__links a:hover::after,
  .nav__links a:focus-visible::after { transform: scaleX(1); }
  .nav__links a:hover { color: var(--terra); }

  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 0.9;
    text-decoration: none;
    color: var(--ink);
  }
  .brand__name {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 500;
    font-size: clamp(1.5rem, 2.6vw, 2.05rem);
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .brand__sub {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 300;
    font-size: 0.6rem;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 0.4rem;
    margin-left: 0.42em;
  }

  .nav__end { display: flex; align-items: center; gap: 0.7rem; margin-left: auto; }
  .account, .nav__burger {
    display: grid;
    place-items: center;
    width: 42px; height: 42px;
    border-radius: 50%;
    border: 1.5px solid rgba(58, 42, 36, 0.18);
    background: var(--glass);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--ink);
    cursor: pointer;
    transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
  }
  .account:hover {
    transform: translateY(-1px);
    border-color: var(--gold);
    box-shadow: 0 6px 18px rgba(246, 176, 60, 0.3);
  }
  .account svg { width: 19px; height: 19px; }
  .nav__burger { display: none; }
  .nav__burger svg { width: 20px; height: 20px; }

  /* ============ HERO ============ */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: clamp(1rem, 3vh, 2.4rem) 0 0.5rem;
    position: relative;
    min-height: 0;
  }

  .title {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 360;
    font-size: clamp(3.2rem, 10.6vw, 11rem);
    line-height: 0.93;
    letter-spacing: -0.025em;
    margin: 0;
    color: var(--ink);
    max-width: 14ch;
    font-variation-settings: "opsz" 144;
  }
  .title .line { display: block; }
  .title em {
    font-style: italic;
    font-weight: 340;
    font-variation-settings: "opsz" 144;
  }

  /* "BIEN" — warm gradient text + soft glow (title stays FILLED, V10) */
  .bien {
    position: relative;
    display: inline-block;
    font-style: normal;
    font-weight: 600;
    letter-spacing: -0.01em;
    background: linear-gradient(96deg, var(--gold) 0%, var(--honey) 48%, var(--terra) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    padding-right: 0.06em;
  }
  .bien::after {
    content: "BIEN.";
    position: absolute;
    inset: 0;
    z-index: -1;
    background: linear-gradient(96deg, var(--gold) 0%, var(--terra) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    filter: blur(18px);
    opacity: 0.6;
    animation: glow 4.5s ease-in-out infinite;
  }
  @keyframes glow {
    0%, 100% { opacity: 0.42; filter: blur(16px); }
    50%      { opacity: 0.78; filter: blur(24px); }
  }

  /* ============ PILL BUTTONS — bigger, bold ============ */
  .actions {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 0.8rem;
    margin-top: clamp(1.6rem, 4vh, 2.8rem);
  }
  .pill {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: clamp(0.98rem, 1.25vw, 1.08rem);
    letter-spacing: 0.005em;
    padding: clamp(0.95rem, 1.5vh, 1.2rem) clamp(1.6rem, 2.4vw, 2.3rem);
    border-radius: 999px;
    border: 1.8px solid rgba(58, 42, 36, 0.22);
    background: var(--glass);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: var(--ink);
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 0.28s ease, border-color 0.28s ease, color 0.28s ease;
    white-space: nowrap;
  }
  .pill:hover {
    transform: translateY(-2px);
    border-color: var(--gold);
    color: var(--terra);
    box-shadow: 0 10px 26px rgba(246, 176, 60, 0.26);
  }
  .pill--primary {
    border: none;
    color: var(--creme);
    background: linear-gradient(96deg, var(--gold) 0%, var(--terra) 100%);
    box-shadow: 0 10px 30px rgba(236, 106, 62, 0.34);
    position: relative;
    overflow: hidden;
  }
  .pill--primary::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(96deg, var(--terra) 0%, var(--gold) 100%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .pill--primary span { position: relative; z-index: 1; }
  .pill--primary:hover {
    transform: translateY(-2px);
    color: var(--creme);
    box-shadow: 0 14px 38px rgba(236, 106, 62, 0.44);
  }
  .pill--primary:hover::before { opacity: 1; }

  /* ============ QUOTE — single line, LEFT aligned, signature below ============ */
  .quote {
    margin: clamp(1.8rem, 4.4vh, 3rem) 0 0;
    max-width: min(92vw, 62ch);
    text-align: left;
    align-self: center;
  }
  .quote p {
    font-family: "Fraunces", Georgia, serif;
    font-style: italic;
    font-weight: 330;
    font-size: clamp(0.98rem, 1.7vw, 1.28rem);
    line-height: 1.4;
    color: var(--ink);
    margin: 0 0 0.5rem;
    white-space: nowrap;
  }
  .quote cite {
    display: block;
    font-family: "Space Grotesk", sans-serif;
    font-style: normal;
    font-weight: 600;
    font-size: 0.82rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--terra);
    text-align: left;
  }

  /* ============ SOCIALS — visible in hero, above the fold ============ */
  .socials {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.7rem;
    margin-top: clamp(1.6rem, 4vh, 2.6rem);
  }
  .socials__label {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 500;
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-right: 0.5rem;
  }
  .social {
    display: grid;
    place-items: center;
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 1.8px solid rgba(58, 42, 36, 0.2);
    background: var(--glass);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--ink);
    text-decoration: none;
    position: relative;
    overflow: hidden;
    transition: transform 0.25s ease, color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
  }
  .social::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--gold), var(--terra));
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .social svg { position: relative; z-index: 1; width: 20px; height: 20px; }
  .social:hover {
    transform: translateY(-3px) scale(1.04);
    color: var(--creme);
    border-color: transparent;
    box-shadow: 0 10px 24px rgba(236, 106, 62, 0.34);
  }
  .social:hover::before { opacity: 1; }

  /* ============ DRAGGABLE DECOR STICKERS ============ */
  .decor-layer {
    position: fixed;
    inset: 0;
    z-index: 3;
    pointer-events: none;
  }
  .sticker {
    position: absolute;
    pointer-events: auto;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    border: none;
    background: none;
    padding: 0;
    will-change: transform;
    transition: filter 0.25s ease;
    filter: drop-shadow(0 6px 14px rgba(120, 60, 30, 0.18));
  }
  .sticker:hover { filter: drop-shadow(0 10px 20px rgba(120, 60, 30, 0.28)); }
  .sticker.dragging { cursor: grabbing; }
  .sticker svg { display: block; width: 100%; height: 100%; }

  .sticker--sun     { width: clamp(56px, 7vw, 92px); height: clamp(56px, 7vw, 92px); animation: spin 38s linear infinite; }
  .sticker--minisun { width: clamp(38px, 4.4vw, 58px); height: clamp(38px, 4.4vw, 58px); animation: spin 30s linear infinite reverse; }
  .sticker--daisy   { width: clamp(52px, 6vw, 80px); height: clamp(52px, 6vw, 80px); animation: bob 6s ease-in-out infinite; }
  .sticker--star    { width: clamp(34px, 4vw, 54px); height: clamp(34px, 4vw, 54px); animation: twinkle 4.5s ease-in-out infinite; }
  .sticker.dragging { animation: none !important; }

  @keyframes spin    { to { transform: rotate(360deg); } }
  @keyframes bob     { 0%,100% { transform: translateY(0) rotate(-4deg); } 50% { transform: translateY(-7px) rotate(4deg); } }
  @keyframes twinkle { 0%,100% { transform: scale(1) rotate(0deg); opacity: 0.92; } 50% { transform: scale(1.14) rotate(12deg); opacity: 1; } }

  /* Word stickers */
  .sticker--word {
    font-family: "Fraunces", Georgia, serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(0.95rem, 1.5vw, 1.25rem);
    color: var(--ink);
    background: var(--glass);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding: 0.4rem 0.95rem;
    border-radius: 999px;
    border: 1.5px solid rgba(58, 42, 36, 0.16);
    white-space: nowrap;
    animation: bob 7.5s ease-in-out infinite;
  }
  .sticker--word.solaire {
    color: var(--creme);
    background: linear-gradient(96deg, var(--gold), var(--terra));
    border-color: transparent;
  }

  .drag-hint {
    position: fixed;
    left: 50%;
    bottom: clamp(0.7rem, 2vh, 1.4rem);
    transform: translateX(-50%);
    z-index: 4;
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    font-family: "Space Grotesk", sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    opacity: 0.7;
    pointer-events: none;
  }
  .drag-hint .spark { color: var(--gold); animation: twinkle 3.2s ease-in-out infinite; }

  /* ============ FOCUS / A11Y ============ */
  a:focus-visible, button:focus-visible {
    outline: 2.5px solid var(--terra);
    outline-offset: 3px;
    border-radius: 999px;
  }
  .sticker:focus-visible { outline: 2.5px solid var(--terra); outline-offset: 4px; }
  .sr-only {
    position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0;
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 860px) {
    .nav__links { display: none; }
    .nav__burger { display: grid; }
    .nav { grid-template-columns: 1fr auto 1fr; }
    .nav__col--left { justify-content: flex-start; }
    .quote p { white-space: normal; }
    .quote { text-align: left; max-width: 36ch; }
  }
  @media (max-width: 600px) {
    .title { font-size: clamp(2.8rem, 14vw, 5.2rem); max-width: 11ch; }
    .socials__label { display: none; }
    .sticker--word { display: none; }
  }
  @media (max-height: 720px) {
    .title { font-size: clamp(3rem, 8vw, 6.6rem); }
    .actions { margin-top: clamp(1.1rem, 2.6vh, 1.8rem); }
    .socials { margin-top: clamp(1rem, 2.4vh, 1.6rem); }
    .quote { margin-top: clamp(1.1rem, 2.6vh, 1.8rem); }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
    }
    #gl, #motes { display: none; }
    .aurora__css { opacity: 0.92 !important; }
    .drag-hint { display: none; }
    .sticker { cursor: default; }
  }
</style>
</head>
<body>
  <!-- ===================== AURORA BACKGROUND ===================== -->
  <div class="aurora" aria-hidden="true">
    <div class="aurora__css"></div>
    <canvas id="gl"></canvas>
    <canvas id="motes"></canvas>
    <div class="aurora__veil"></div>
    <div class="aurora__grain"></div>
  </div>

  <div class="shell">
    <!-- ===================== NAV (3 columns) ===================== -->
    <nav class="nav" aria-label="Navigation principale">
      <div class="nav__col nav__col--left">
        <ul class="nav__links">
          <li><a href="#ateliers">Ateliers</a></li>
          <li><a href="#boutique">Boutique</a></li>
        </ul>
      </div>

      <a class="brand" href="#" aria-label="Soleia Expérience, accueil">
        <span class="brand__name">soleia</span>
        <span class="brand__sub">expérience</span>
      </a>

      <div class="nav__col nav__col--right">
        <ul class="nav__links">
          <li><a href="#histoire">Histoire</a></li>
          <li><a href="#galerie">Galerie</a></li>
        </ul>
        <div class="nav__end">
          <button class="account" aria-label="Mon compte">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
              <circle cx="12" cy="8" r="3.4"/>
              <path d="M5 20c0-3.6 3.1-6 7-6s7 2.4 7 6" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="nav__burger" aria-label="Ouvrir le menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path d="M4 7h16M4 12h16M4 17h16" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>
    </nav>

    <!-- ===================== HERO ===================== -->
    <main class="hero">
      <h1 class="title">
        <span class="line">La pause créative</span>
        <span class="line">qui fait <em>du</em> <span class="bien">BIEN.</span></span>
      </h1>

      <div class="actions">
        <a class="pill pill--primary" href="#ateliers"><span>Les prochains ateliers</span></a>
        <a class="pill" href="#boutique">La boutique</a>
        <a class="pill" href="#histoire">Notre histoire</a>
        <a class="pill" href="#faq">F.A.Q</a>
      </div>

      <div class="socials">
        <span class="socials__label">Suivez-nous</span>
        <a class="social" href="#" aria-label="Instagram de Soleia">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
            <rect x="3.5" y="3.5" width="17" height="17" rx="5"/>
            <circle cx="12" cy="12" r="4"/>
            <circle cx="17.2" cy="6.8" r="1.1" fill="currentColor" stroke="none"/>
          </svg>
        </a>

  <!-- ===================== WebGL AURORA SHADER (progressive enhancement) ===================== -->
  <script>
  (function () {
    var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) return;

    var canvas = document.getElementById("gl");
    if (!canvas) return;

    var gl = canvas.getContext("webgl", { antialias: true, alpha: false, premultipliedAlpha: false })
          || canvas.getContext("experimental-webgl");
    if (!gl) return;

    var vertSrc =
      "attribute vec2 p;" +
      "void main(){ gl_Position = vec4(p, 0.0, 1.0); }";

    // Honey-sunrise domain-warped fbm: gold -> honey -> terracotta -> rose-gold -> cream.
    var fragSrc = [
      "precision highp float;",
      "uniform vec2 u_res;",
      "uniform float u_time;",
      "",
      "vec3 GOLD   = vec3(0.965, 0.690, 0.235);", // #f6b03c
      "vec3 HONEY  = vec3(0.961, 0.576, 0.192);", // #f59331
      "vec3 TERRA  = vec3(0.925, 0.416, 0.243);", // #ec6a3e
      "vec3 ROSEG  = vec3(0.961, 0.522, 0.608);", // #f5859b
      "vec3 CREAM  = vec3(0.996, 0.969, 0.933);", // #fef7ee
      "",
      "float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }",
      "float noise(vec2 p){",
      "  vec2 i = floor(p); vec2 f = fract(p);",
      "  vec2 u = f*f*(3.0-2.0*f);",
      "  return mix(mix(hash(i+vec2(0.0,0.0)), hash(i+vec2(1.0,0.0)), u.x),",
      "             mix(hash(i+vec2(0.0,1.0)), hash(i+vec2(1.0,1.0)), u.x), u.y);",
      "}",
      "float fbm(vec2 p){",
      "  float v = 0.0; float a = 0.5;",
      "  for(int i=0;i<5;i++){ v += a*noise(p); p *= 2.0; a *= 0.5; }",
      "  return v;",
      "}",
      "",
      "void main(){",
      "  vec2 uv = gl_FragCoord.xy / u_res.xy;",
      "  vec2 p = uv;",
      "  p.x *= u_res.x / u_res.y;",
      "  float t = u_time * 0.042;",
      "  vec2 q = vec2(fbm(p + vec2(0.0, t)), fbm(p + vec2(5.2, -t)));",
      "  vec2 r = vec2(fbm(p + 3.0*q + vec2(1.7, 9.2) + 0.15*t),",
      "                fbm(p + 3.0*q + vec2(8.3, 2.8) - 0.12*t));",
      "  float f = fbm(p + 2.4*r);",
      "  vec3 col = mix(CREAM, GOLD, smoothstep(0.0, 0.6, f));",
      "  col = mix(col, HONEY, smoothstep(0.35, 0.95, f + 0.25*r.x));",
      "  col = mix(col, TERRA, smoothstep(0.55, 1.05, length(r)));",
      "  col = mix(col, ROSEG, smoothstep(0.5, 1.0, f*r.y + 0.3) * 0.5);",
      "  // lift toward cream near the top so the title stays readable",
      "  col = mix(col, CREAM, smoothstep(0.5, 1.0, 1.0 - uv.y) * 0.5);",
      "  float d = distance(uv, vec2(0.5, 0.52));",
      "  col = mix(col, CREAM, smoothstep(0.45, 0.95, d) * 0.34);",
      "  gl_FragColor = vec4(col, 1.0);",
      "}"
    ].join("\n");

    function compile(type, src) {
      var s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) { gl.deleteShader(s); return null; }
      return s;
    }

    var vs = compile(gl.VERTEX_SHADER, vertSrc);
    var fs = compile(gl.FRAGMENT_SHADER, fragSrc);
    if (!vs || !fs) return;

    var prog = gl.createProgram();
    gl.attachShader(prog, vs);
    gl.attachShader(prog, fs);
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) return;
    gl.useProgram(prog);

    var buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
    var loc = gl.getAttribLocation(prog, "p");
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

    var uRes = gl.getUniformLocation(prog, "u_res");
    var uTime = gl.getUniformLocation(prog, "u_time");

    var dpr = Math.min(window.devicePixelRatio || 1, 1.5);
    function resize() {
      var w = Math.floor(canvas.clientWidth * dpr);
      var h = Math.floor(canvas.clientHeight * dpr);
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w; canvas.height = h;
        gl.viewport(0, 0, w, h);
      }
    }
    window.addEventListener("resize", resize);
    resize();

    document.querySelector(".aurora").classList.add("gl-ready");
    document.body.classList.add("gl-ready");

    var start = performance.now();
    var running = true;
    var elapsed = 0;
    document.addEventListener("visibilitychange", function () {
      running = !document.hidden;
      if (running) { start = performance.now() - elapsed; requestAnimationFrame(loop); }
    });

    function loop(now) {
      if (!running) return;
      resize();
      elapsed = now - start;
      gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.uniform1f(uTime, elapsed * 0.001);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  })();
  </script>

  <!-- ===================== AMBIENT SOLAR PARTICLES (canvas 2D) ===================== -->
  <script>
  (function () {
    var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) return;

    var canvas = document.getElementById("motes");
    if (!canvas || !canvas.getContext) return;
    var ctx = canvas.getContext("2d");
    var dpr = Math.min(window.devicePixelRatio || 1, 2);

    var W = 0, H = 0, particles = [];
    var palette = ["255, 211, 122", "246, 176, 60", "236, 106, 62", "245, 133, 155", "254, 247, 238"];
    var mx = 0.5, my = 0.5;

    function rand(a, b) { return a + Math.random() * (b - a); }

    function build() {
      W = canvas.clientWidth; H = canvas.clientHeight;
      canvas.width = Math.floor(W * dpr);
      canvas.height = Math.floor(H * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      var count = Math.round(Math.min(110, Math.max(46, (W * H) / 17000)));
      particles = [];
      for (var i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: rand(0.6, 2.6),
          spark: Math.random() < 0.16,
          vx: rand(-0.12, 0.12),
          vy: rand(-0.42, -0.1),
          baseA: rand(0.18, 0.6),
          tw: rand(0, Math.PI * 2),
          twSpeed: rand(0.6, 1.8),
          depth: rand(0.2, 1),
          col: palette[(Math.random() * palette.length) | 0]
        });
      }
    }

    window.addEventListener("mousemove", function (e) {
      mx = e.clientX / window.innerWidth;
      my = e.clientY / window.innerHeight;
    });

    var running = true;
    document.addEventListener("visibilitychange", function () {
      running = !document.hidden;
      if (running) requestAnimationFrame(frame);
    });
    window.addEventListener("resize", build);

    var last = performance.now();
    function frame(now) {
      if (!running) return;
      var dt = Math.min(2.5, (now - last) / 16.67); last = now;
      ctx.clearRect(0, 0, W, H);
      var px = (mx - 0.5) * 22, py = (my - 0.5) * 22;

      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.tw += 0.04 * p.twSpeed * dt;

        if (p.y < -8) { p.y = H + 8; p.x = Math.random() * W; }
        if (p.x < -8) p.x = W + 8;
        if (p.x > W + 8) p.x = -8;

        var twinkle = p.spark ? (0.45 + 0.55 * Math.abs(Math.sin(p.tw))) : (0.7 + 0.3 * Math.sin(p.tw));
        var a = p.baseA * twinkle;
        var dx = p.x + px * p.depth;
        var dy = p.y + py * p.depth;
        var rr = p.r * (p.spark ? (1 + 0.5 * Math.abs(Math.sin(p.tw))) : 1);

        var g = ctx.createRadialGradient(dx, dy, 0, dx, dy, rr * 4);
        g.addColorStop(0, "rgba(" + p.col + "," + a + ")");
        g.addColorStop(1, "rgba(" + p.col + ",0)");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(dx, dy, rr * 4, 0, Math.PI * 2);
        ctx.fill();

        if (p.spark) {
          ctx.fillStyle = "rgba(255,247,238," + (a * 0.9) + ")";
          ctx.beginPath();
          ctx.arc(dx, dy, rr * 0.7, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      requestAnimationFrame(frame);
    }

    build();
    requestAnimationFrame(frame);
  })();
  </script>

  <!-- ===================== DRAGGABLE STICKERS ===================== -->
  <script>
  (function () {
    var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) return;

    var stickers = document.querySelectorAll(".sticker");
    var z = 10;

    stickers.forEach(function (el) {
      // Convert percentage placement to fixed px so dragging is absolute & stable.
      var rect = el.getBoundingClientRect();
      el.style.left = rect.left + "px";
      el.style.top = rect.top + "px";
      el.style.right = "auto";
      el.style.bottom = "auto";

      var dragging = false, sx = 0, sy = 0, ox = 0, oy = 0, moved = false;

      function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

      function down(e) {
        dragging = true; moved = false;
        el.classList.add("dragging");
        el.style.zIndex = ++z;
        var pt = e.touches ? e.touches[0] : e;
        sx = pt.clientX; sy = pt.clientY;
        ox = parseFloat(el.style.left) || 0;
        oy = parseFloat(el.style.top) || 0;
        if (el.setPointerCapture && e.pointerId != null) {
          try { el.setPointerCapture(e.pointerId); } catch (err) {}
        }
      }
      function move(e) {
        if (!dragging) return;
        var pt = e.touches ? e.touches[0] : e;
        var nx = ox + (pt.clientX - sx);
        var ny = oy + (pt.clientY - sy);
        var w = el.offsetWidth, h = el.offsetHeight;
        el.style.left = clamp(nx, -w * 0.3, window.innerWidth - w * 0.7) + "px";
        el.style.top = clamp(ny, 4, window.innerHeight - h * 0.7) + "px";
        moved = true;
        if (e.cancelable) e.preventDefault();
      }
      function up() {
        if (!dragging) return;
        dragging = false;
        el.classList.remove("dragging");
      }

      el.addEventListener("pointerdown", down);
      window.addEventListener("pointermove", move, { passive: false });
      window.addEventListener("pointerup", up);

      // Prevent the button "click" jump after a drag.
      el.addEventListener("click", function (e) { if (moved) e.preventDefault(); });

      // Keyboard nudge for accessibility once focused.
      el.addEventListener("keydown", function (e) {
        var step = e.shiftKey ? 24 : 8;
        var x = parseFloat(el.style.left) || 0;
        var y = parseFloat(el.style.top) || 0;
        var handled = true;
        switch (e.key) {
          case "ArrowLeft":  x -= step; break;
          case "ArrowRight": x += step; break;
          case "ArrowUp":    y -= step; break;
          case "ArrowDown":  y += step; break;
          default: handled = false;
        }
        if (handled) {
          el.style.zIndex = ++z;
          el.style.left = clamp(x, 0, window.innerWidth - el.offsetWidth) + "px";
          el.style.top = clamp(y, 0, window.innerHeight - el.offsetHeight) + "px";
          e.preventDefault();
        }
      });
    });
  })();
  </script>
