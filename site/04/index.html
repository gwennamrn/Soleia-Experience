<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Soleia Expérience — La pause créative qui fait du BIEN</title>
<meta name="description" content="Soleia Expérience — des moments de convivialité créative, dans la bonne humeur. La pause créative qui fait du bien." />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..900;1,9..144,400..600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --rose:#fb6ba6;
    --orange:#f8742f;
    --rose-clair:#f8e6e6;
    --creme:#fff8f3;
    --encre:#3a2a2e;
    --encre-doux:#6c545a;
    --rose-vif:#f4549a;
    --ombre-rose:rgba(251,107,166,.18);

    --serif:'Fraunces',Georgia,'Times New Roman',serif;
    --sans:'Hanken Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;

    --r-pill:999px;
    --ease:cubic-bezier(.22,1,.36,1);
  }

  *{box-sizing:border-box;margin:0;padding:0}

  html{-webkit-text-size-adjust:100%}

  body{
    font-family:var(--sans);
    color:var(--encre);
    background:var(--rose-clair);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    overflow-x:hidden;
  }

  ::selection{background:var(--rose);color:#fff}

  a{color:inherit;text-decoration:none}

  /* ---------- Scène ---------- */
  .scene{
    position:relative;
    min-height:100svh;
    display:flex;
    flex-direction:column;
    isolation:isolate;
    /* fond rose clair lumineux, très aéré, soleil diffus en haut */
    background:
      radial-gradient(120% 80% at 78% -8%, rgba(248,116,47,.16), rgba(248,116,47,0) 46%),
      radial-gradient(95% 70% at 14% 4%, rgba(251,107,166,.16), rgba(251,107,166,0) 50%),
      radial-gradient(140% 120% at 50% 120%, rgba(255,255,255,.7), rgba(255,255,255,0) 60%),
      linear-gradient(178deg,#fef1f0 0%, #f9e7e6 52%, #f6dfe0 100%);
  }

  /* Halo solaire doux derrière le titre */
  .scene::before{
    content:"";
    position:absolute;
    top:-14vmin;right:-6vmin;
    width:54vmin;height:54vmin;
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,233,210,.95), rgba(255,224,196,.4) 42%, rgba(255,224,196,0) 70%);
    filter:blur(2px);
    z-index:0;
    pointer-events:none;
  }

  /* Canvas pétales */
  #petals{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:1;
    pointer-events:none;
  }

  /* Tout le contenu au-dessus du canvas */
  .scene > *{position:relative;z-index:2}

  /* ---------- Nav ---------- */
  .nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:1.5rem;
    padding:clamp(1.1rem,2.4vw,1.9rem) clamp(1.2rem,5vw,4.2rem);
  }

  .brand{
    display:flex;
    flex-direction:column;
    line-height:.86;
  }
  .brand__name{
    font-family:var(--serif);
    font-optical-sizing:auto;
    font-weight:600;
    font-size:clamp(1.7rem,3vw,2.35rem);
    letter-spacing:-.012em;
    color:var(--encre);
  }
  .brand__name b{
    font-weight:600;
    background:linear-gradient(95deg,var(--rose-vif),var(--orange));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .brand__sub{
    font-family:var(--sans);
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:.42em;
    font-size:.5rem;
    color:var(--encre-doux);
    margin-top:.42em;
    padding-left:.18em;
  }

  .nav__links{
    display:flex;
    align-items:center;
    gap:clamp(1rem,2.4vw,2.4rem);
  }
  .nav__links a{
    font-weight:500;
    font-size:.96rem;
    color:var(--encre);
    position:relative;
    padding:.35em 0;
    transition:color .3s var(--ease);
  }
  .nav__links a::after{
    content:"";
    position:absolute;
    left:0;right:0;bottom:.04em;
    height:2px;
    background:linear-gradient(90deg,var(--rose),var(--orange));
    border-radius:2px;
    transform:scaleX(0);
    transform-origin:left;
    transition:transform .4s var(--ease);
  }
  .nav__links a:hover{color:var(--rose-vif)}
  .nav__links a:hover::after,
  .nav__links a:focus-visible::after{transform:scaleX(1)}

  .nav__account{
    display:grid;
    place-items:center;
    width:2.7rem;height:2.7rem;
    border-radius:50%;
    background:#fff;
    border:1.5px solid rgba(251,107,166,.35);
    box-shadow:0 6px 18px var(--ombre-rose);
    color:var(--rose-vif);
    transition:transform .35s var(--ease), box-shadow .35s var(--ease);
    flex:0 0 auto;
  }
  .nav__account:hover{transform:translateY(-2px) rotate(-4deg);box-shadow:0 10px 24px var(--ombre-rose)}
  .nav__account svg{width:1.25rem;height:1.25rem}

  /* ---------- Hero ---------- */
  .hero{
    flex:1;
    display:grid;
    place-items:center;
    text-align:center;
    padding:clamp(1rem,3vh,3rem) clamp(1.2rem,5vw,3rem) clamp(1.2rem,2vh,2rem);
  }
  .hero__inner{
    max-width:min(96vw,1080px);
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:.6em;
    font-weight:600;
    font-size:.78rem;
    letter-spacing:.26em;
    text-transform:uppercase;
    color:var(--encre-doux);
    margin-bottom:clamp(1rem,2.6vh,1.6rem);
  }
  .eyebrow .dot{
    width:.5rem;height:.5rem;border-radius:50%;
    background:radial-gradient(circle at 35% 35%,var(--orange),var(--rose));
    box-shadow:0 0 0 4px rgba(251,107,166,.14);
  }

  .title{
    font-family:var(--serif);
    font-optical-sizing:auto;
    font-weight:430;
    font-size:clamp(3.1rem,11.2vw,9.4rem);
    line-height:.94;
    letter-spacing:-.025em;
    color:var(--encre);
    margin:0;
  }
  .title .l1{display:block}
  .title .l2{display:block}
  .title em{
    font-style:italic;
    font-weight:380;
    color:var(--rose-vif);
  }

  /* mot BIEN très mis en valeur + surlignage marqueur SVG */
  .bien{
    position:relative;
    display:inline-block;
    font-weight:760;
    letter-spacing:-.01em;
    color:var(--encre);
    padding:0 .06em;
  }
  .bien .mark{
    position:absolute;
    left:-6%;right:-6%;
    bottom:.04em;
    width:112%;
    height:.5em;
    z-index:-1;
    overflow:visible;
  }
  .bien .mark path{
    fill:none;
    stroke:url(#mg);
    stroke-width:13;
    stroke-linecap:round;
    stroke-dasharray:var(--len,560);
    stroke-dashoffset:var(--len,560);
    animation:draw 1.1s var(--ease) .55s forwards;
  }
  @keyframes draw{to{stroke-dashoffset:0}}

  .lede{
    font-family:var(--serif);
    font-style:italic;
    font-weight:380;
    font-size:clamp(1.15rem,2.6vw,1.75rem);
    color:var(--encre-doux);
    margin-top:clamp(1.3rem,3vh,2rem);
  }

  /* ---------- Boutons pilule ---------- */
  .actions{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:.7rem .8rem;
    margin-top:clamp(1.5rem,3.4vh,2.3rem);
  }
  .pill{
    font-family:var(--sans);
    font-weight:600;
    font-size:1rem;
    padding:.85em 1.5em;
    border-radius:var(--r-pill);
    border:1.6px solid rgba(58,42,46,.18);
    background:rgba(255,255,255,.6);
    color:var(--encre);
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:.55em;
    transition:transform .3s var(--ease), box-shadow .3s var(--ease), background .3s var(--ease), border-color .3s var(--ease), color .3s var(--ease);
    backdrop-filter:saturate(1.2) blur(2px);
  }
  .pill:hover{
    transform:translateY(-3px);
    border-color:transparent;
    box-shadow:0 12px 26px var(--ombre-rose);
  }
  .pill:focus-visible{outline:3px solid var(--rose);outline-offset:3px}
  .pill .arrow{transition:transform .3s var(--ease)}
  .pill:hover .arrow{transform:translateX(3px)}

  .pill--primary{
    color:#fff;
    border-color:transparent;
    background:linear-gradient(96deg,var(--rose-vif) 8%,var(--orange) 100%);
    box-shadow:0 10px 26px rgba(248,116,47,.32);
    font-size:1.05rem;
    padding:.9em 1.7em;
  }
  .pill--primary:hover{box-shadow:0 16px 34px rgba(248,116,47,.42)}

  /* ---------- Citation ---------- */
  .quote{
    text-align:center;
    max-width:46ch;
    margin:clamp(1.8rem,4vh,2.8rem) auto 0;
    position:relative;
  }
  .quote::before{
    content:"";
    display:block;
    width:2.4rem;height:2px;
    margin:0 auto 1.1rem;
    background:linear-gradient(90deg,var(--rose),var(--orange));
    border-radius:2px;
  }
  .quote p{
    font-family:var(--serif);
    font-style:italic;
    font-weight:400;
    font-size:clamp(1.05rem,2.1vw,1.32rem);
    line-height:1.5;
    color:var(--encre);
  }
  .quote cite{
    display:block;
    margin-top:.7rem;
    font-family:var(--sans);
    font-style:normal;
    font-weight:600;
    letter-spacing:.04em;
    font-size:.92rem;
    color:var(--rose-vif);
  }

  /* ---------- Placeholder photo (blob/polaroid) ---------- */
  .photo-slot{
    position:absolute;
    width:clamp(118px,12vw,176px);
    aspect-ratio:4/5;
    background:
      linear-gradient(150deg, rgba(255,255,255,.92), rgba(255,248,243,.92));
    border:1px solid rgba(251,107,166,.3);
    box-shadow:0 18px 40px rgba(251,107,166,.22);
    padding:.55rem .55rem 1.6rem;
    border-radius:14px;
    display:flex;
    z-index:2;
  }
  .photo-slot .inner{
    flex:1;
    border-radius:8px;
    background:
      repeating-linear-gradient(135deg, rgba(251,107,166,.10) 0 10px, rgba(248,116,47,.08) 10px 20px);
    display:grid;
    place-items:center;
  }
  .photo-slot .inner svg{width:34%;height:34%;opacity:.55;color:var(--rose-vif)}
  .photo-slot .tag{
    position:absolute;
    left:0;right:0;bottom:.5rem;
    text-align:center;
    font-size:.58rem;
    font-weight:600;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--encre-doux);
  }
  .photo-slot--left{
    left:clamp(.6rem,3.2vw,3.4rem);
    top:30%;
    transform:rotate(-7deg);
  }
  .photo-slot--right{
    right:clamp(.6rem,3.2vw,3.4rem);
    bottom:20%;
    transform:rotate(6deg);
  }
  .photo-slot::after{ /* petit ruban washi tape */
    content:"";
    position:absolute;
    top:-.6rem;left:50%;
    width:48%;height:1.3rem;
    transform:translateX(-50%) rotate(-3deg);
    background:linear-gradient(90deg, rgba(248,116,47,.55), rgba(251,107,166,.55));
    border-radius:2px;
    opacity:.85;
  }

  /* ---------- Footer ---------- */
  .footer{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:1.5rem;
    padding:clamp(1.1rem,2.4vh,1.7rem);
  }
  .footer__line{
    width:clamp(2rem,8vw,5rem);height:1px;
    background:linear-gradient(90deg,transparent,rgba(58,42,46,.25),transparent);
  }
  .socials{display:flex;gap:.7rem}
  .socials a{
    display:grid;place-items:center;
    width:2.5rem;height:2.5rem;
    border-radius:50%;
    background:#fff;
    color:var(--rose-vif);
    box-shadow:0 5px 14px var(--ombre-rose);
    transition:transform .3s var(--ease), color .3s var(--ease), background .3s var(--ease);
  }
  .socials a:hover{transform:translateY(-3px) scale(1.05);background:linear-gradient(135deg,var(--rose-vif),var(--orange));color:#fff}
  .socials a:focus-visible{outline:3px solid var(--rose);outline-offset:3px}
  .socials svg{width:1.2rem;height:1.2rem}

  /* ---------- Responsive ---------- */
  @media (max-width:880px){
    .nav__links{display:none}
    .photo-slot--left{top:auto;bottom:3%;left:.4rem;transform:rotate(-8deg) scale(.82)}
    .photo-slot--right{bottom:2%;right:.4rem;transform:rotate(7deg) scale(.82)}
  }
  @media (max-width:560px){
    .photo-slot{display:none}
    .title{font-size:clamp(2.8rem,15.5vw,4.6rem);line-height:.96}
    .lede{margin-top:1.1rem}
    .eyebrow{font-size:.66rem;letter-spacing:.2em}
    .pill,.pill--primary{font-size:.95rem}
  }

  /* Entrée douce du contenu */
  .reveal{opacity:0;transform:translateY(22px);animation:rise .9s var(--ease) forwards}
  .reveal.d1{animation-delay:.05s}
  .reveal.d2{animation-delay:.18s}
  .reveal.d3{animation-delay:.32s}
  .reveal.d4{animation-delay:.46s}
  .reveal.d5{animation-delay:.6s}
  @keyframes rise{to{opacity:1;transform:none}}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important;animation-delay:0s !important;transition-duration:.001ms !important}
    .reveal{opacity:1;transform:none}
    .bien .mark path{stroke-dashoffset:0}
  }
</style>
</head>
<body>
  <main class="scene">
    <canvas id="petals" aria-hidden="true"></canvas>

    <!-- gradient marqueur partagé -->
    <svg width="0" height="0" aria-hidden="true" style="position:absolute">
      <defs>
        <linearGradient id="mg" x1="0" y1="0" x2="1" y2="0">

    </svg>

    <!-- NAVIGATION -->
    <nav class="nav reveal d1" aria-label="Navigation principale">
      <a class="brand" href="#" aria-label="Soleia Expérience, accueil">

        <span class="brand__sub">Expérience</span>
      </a>

      <div class="nav__links">

        <a href="#galerie">Galerie</a>

        <a href="#histoire">À&nbsp;propos&nbsp;/&nbsp;Histoire</a>
      </div>

      <a class="nav__account" href="#compte" aria-label="Mon compte">

          <path d="M4.5 19.5a7.5 7.5 0 0 1 15 0"/>
        </svg>
      </a>
    </nav>

    <!-- placeholders photo (à remplacer plus tard) -->
    <div class="photo-slot photo-slot--left reveal d4" aria-hidden="true">
      <span class="inner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="11" r="2"/><path d="m4 18 5-4 4 3 3-2 4 3"/></svg>
      </span>
      <span class="tag">Photo à venir</span>
    </div>
    <div class="photo-slot photo-slot--right reveal d5" aria-hidden="true">
      <span class="inner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="11" r="2"/><path d="m4 18 5-4 4 3 3-2 4 3"/></svg>
      </span>
      <span class="tag">Photo à venir</span>
    </div>

    <!-- HERO -->
    <section class="hero" aria-labelledby="hero-title">
      <div class="hero__inner">
        <span class="eyebrow reveal d2"><span class="dot" aria-hidden="true"></span>Soleia&nbsp;Expérience</span>

        <h1 class="title reveal d2" id="hero-title">
          <span class="l1">La pause <em>créative</em></span>
          <span class="l2">qui fait du
            <span class="bien">BIEN<svg class="mark" viewBox="0 0 300 30" preserveAspectRatio="none" aria-hidden="true"><path d="M8 19 C 70 9, 150 8, 215 13 S 290 17, 292 14" pathLength="560"/></svg></span>.
          </span>
        </h1>

        <p class="lede reveal d3">Ici tu peux retrouver</p>

        <div class="actions reveal d3">
          <a class="pill pill--primary" href="#ateliers">
            Les prochains ateliers
            <svg class="arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
          </a>
          <a class="pill" href="#boutique">La boutique</a>
          <a class="pill" href="#histoire">Notre histoire</a>
          <a class="pill" href="#faq">F.A.Q</a>

        <figure class="quote reveal d4">

        </figure>
      </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer reveal d5">
      <span class="footer__line" aria-hidden="true"></span>
      <nav class="socials" aria-label="Réseaux sociaux">
        <a href="#" aria-label="Instagram de Soleia">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="3.6"/><circle cx="17.4" cy="6.6" r="1" fill="currentColor" stroke="none"/></svg>
        </a>
        <a href="#" aria-label="Pinterest de Soleia">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2a10 10 0 0 0-3.6 19.3c-.1-.8-.2-2 .04-2.9.2-.8 1.4-5.9 1.4-5.9s-.35-.7-.35-1.7c0-1.6.95-2.8 2.1-2.8 1 0 1.5.75 1.5 1.65 0 1-.65 2.5-1 3.9-.27 1.16.6 2.1 1.74 2.1 2.1 0 3.6-2.7 3.6-5.9 0-2.45-1.65-4.3-4.65-4.3a4.8 4.8 0 0 0-5 4.8c0 1 .35 1.66.85 2.2.13.15.15.22.1.4l-.36 1.3"/></svg>
        </a>
        <a href="#" aria-label="Contact e-mail de Soleia">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="3"/><path d="m4 7 8 6 8-6"/></svg>
        </a>
      </nav>
      <span class="footer__line" aria-hidden="true"></span>
    </footer>
  </main>

  <script>
  (function(){
    var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var canvas = document.getElementById('petals');
    if(!canvas || reduce) return;            // fallback propre : pas de canvas si reduced-motion
    var ctx;
    try { ctx = canvas.getContext('2d'); } catch(e){ return; }
    if(!ctx) return;

    var W = 0, H = 0, dpr = Math.min(window.devicePixelRatio || 1, 2);
    var petals = [];
    var palette = ['#fb6ba6','#f8742f','#f8a8c4','#ffd5a8','#f4549a'];

    function resize(){
      W = canvas.clientWidth = window.innerWidth;
      H = canvas.clientHeight = window.innerHeight;
      canvas.width  = Math.floor(W * dpr);
      canvas.height = Math.floor(H * dpr);
      ctx.setTransform(dpr,0,0,dpr,0,0);
      // densité adaptée à la largeur, légère
      var target = Math.round(Math.min(46, Math.max(16, W / 26)));
      while(petals.length < target) petals.push(makePetal(true));
      petals.length = target;
    }

    function rand(a,b){return a + Math.random()*(b-a);}

    function makePetal(spawnAnywhere){
      return {
        x: rand(0, W),
        y: spawnAnywhere ? rand(-H, H) : rand(-60, -10),
        size: rand(7, 16),
        speed: rand(.35, 1.05),
        sway: rand(.6, 1.6),
        swayPhase: rand(0, Math.PI*2),
        rot: rand(0, Math.PI*2),
        rotSpeed: rand(-.012, .012),
        color: palette[(Math.random()*palette.length)|0],
        alpha: rand(.5, .92),
        kind: Math.random() < .26 ? 'flower' : 'petal'  // quelques marguerites parmi les pétales
      };
    }

    // un pétale : forme de goutte/amande
    function drawPetal(p){
      var s = p.size;
      ctx.beginPath();
      ctx.moveTo(0, -s);
      ctx.bezierCurveTo(s*0.85, -s*0.6, s*0.7, s*0.65, 0, s);
      ctx.bezierCurveTo(-s*0.7, s*0.65, -s*0.85, -s*0.6, 0, -s);
      ctx.fill();
      // nervure subtile
      ctx.globalAlpha = p.alpha * 0.35;
      ctx.beginPath();
      ctx.moveTo(0,-s*0.7); ctx.lineTo(0, s*0.7);
      ctx.lineWidth = Math.max(.6, s*0.06);
      ctx.strokeStyle = 'rgba(255,255,255,.7)';
      ctx.stroke();
    }

    // une petite marguerite : 5 pétales + cœur
    function drawFlower(p){
      var s = p.size * 0.9;
      for(var i=0;i<5;i++){
        ctx.save();
        ctx.rotate((Math.PI*2/5)*i);
        ctx.beginPath();
        ctx.ellipse(0, -s*0.78, s*0.36, s*0.66, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
      }
      ctx.globalAlpha = p.alpha;
      ctx.beginPath();
      ctx.arc(0,0,s*0.34,0,Math.PI*2);
      ctx.fillStyle = '#ffe39c';
      ctx.fill();
    }

    var last = performance.now();
    function frame(now){
      var dt = Math.min(2.4, (now - last) / 16.67);
      last = now;
      ctx.clearRect(0,0,W,H);

      for(var i=0;i<petals.length;i++){
        var p = petals[i];
        p.swayPhase += 0.01 * p.sway * dt;
        p.x += Math.sin(p.swayPhase) * p.sway * dt;
        p.y += p.speed * dt * 1.15;
        p.rot += p.rotSpeed * dt;

        if(p.y - p.size > H + 20){
          var np = makePetal(false);
          np.x = rand(0, W);
          petals[i] = np;
          continue;
        }

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        if(p.kind === 'flower') drawFlower(p);
        else drawPetal(p);
        ctx.restore();
      }
      raf = requestAnimationFrame(frame);
    }

    var raf;
    function start(){ last = performance.now(); raf = requestAnimationFrame(frame); }
    function stop(){ if(raf) cancelAnimationFrame(raf); }

    // pause hors-écran pour économiser la batterie
    document.addEventListener('visibilitychange', function(){
      if(document.hidden) stop(); else start();
    });

    var rt;
    window.addEventListener('resize', function(){
      clearTimeout(rt); rt = setTimeout(resize, 150);
    }, {passive:true});

    resize();
    start();
  })();
  </script>
</body>
