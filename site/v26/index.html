<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Soleia Expérience — La pause créative qui fait du BIEN</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..600&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet" />
<style>
  :root {
    --rose: #f98bb6;
    --rose-deep: #f56c9f;
    --framboise: #f4548b;
    --corail: #fa7e58;
    --orange: #f7995a;
    --orange-deep: #f4823c;
    --peche: #ffb992;
    --creme: #fdf7f1;
    --creme-2: #fef9f4;
    --creme-chaude: #fdeede;
    --ink: #3a2a2e;
    --ink-soft: #71565b;
    --glass: rgba(254, 249, 244, 0.6);
    --glass-strong: rgba(254, 249, 244, 0.78);
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body { margin: 0; padding: 0; height: 100%; }

  body {
    font-family: "Space Grotesk", system-ui, sans-serif;
    color: var(--ink);
    background: var(--creme);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  /* ============ SCÈNE : soleil 3D vivant (ambiant, non déplaçable) ============ */
  .scene {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    background:
      radial-gradient(130% 120% at 50% 38%, var(--creme-2) 0%, var(--creme) 50%, var(--creme-chaude) 100%);
  }

  /* Fallback CSS : grand disque solaire crème/rose/orange (sans JS ni WebGL) */
  .scene__css {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    transition: opacity 1.1s ease;
  }
  .scene__sun {
    width: min(74vmin, 720px);
    height: min(74vmin, 720px);
    border-radius: 50%;
    position: relative;
    background:
      radial-gradient(circle at 42% 38%, #ffd0a8 0%, var(--peche) 22%, var(--corail) 52%, var(--framboise) 82%, var(--rose-deep) 100%);
    box-shadow:
      0 0 70px 10px rgba(250, 126, 88, 0.30),
      0 0 160px 40px rgba(249, 139, 182, 0.26),
      inset -30px -34px 90px rgba(244, 84, 139, 0.28),
      inset 28px 30px 80px rgba(255, 210, 168, 0.45);
    filter: saturate(1.04);
    animation: sun-breathe 11s ease-in-out infinite;
    will-change: transform;
    opacity: 0.92;
  }
  .scene__sun::after {
    content: "";
    position: absolute;
    inset: -14%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(250, 126, 88, 0.28) 38%, rgba(249, 139, 182, 0.16) 60%, transparent 72%);
    filter: blur(8px);
    z-index: -1;
    animation: halo-pulse 7s ease-in-out infinite;
  }
  @keyframes sun-breathe {
    0%, 100% { transform: scale(1) rotate(0deg); }
    50%      { transform: scale(1.045) rotate(6deg); }
  }
  @keyframes halo-pulse {
    0%, 100% { opacity: 0.62; transform: scale(1); }
    50%      { opacity: 0.92; transform: scale(1.06); }
  }

  /* Canvas WebGL au-dessus du fallback une fois prêt */
  #gl {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    opacity: 0;
    transition: opacity 1.3s ease;
  }
  .gl-ready #gl { opacity: 1; }
  .gl-ready .scene__css { opacity: 0; }

  /* Voile crème + grain : texte parfaitement net par-dessus la 3D */
  .scene__veil {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(120% 92% at 50% 4%, transparent 30%, rgba(254, 249, 244, 0.46) 100%),
      radial-gradient(78% 64% at 50% 50%, rgba(254, 249, 244, 0.30), transparent 66%),
      linear-gradient(180deg, rgba(254, 249, 244, 0.34) 0%, transparent 24%, transparent 72%, rgba(253, 247, 241, 0.40) 100%);
    pointer-events: none;
  }
  .scene__grain {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.045;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* ============ SHELL ============ */
  .shell {
    position: relative;
    z-index: 2;
    height: 100svh;
    min-height: 600px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: clamp(0.9rem, 2.2vw, 1.7rem) clamp(1.2rem, 5vw, 4.5rem) clamp(1rem, 2.2vh, 1.6rem);
  }

  /* ============ NAV — 3 colonnes ============ */
  .nav {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: clamp(0.8rem, 2vw, 2rem);
  }
  .nav__col {
    display: flex;
    align-items: center;
    gap: clamp(1rem, 2.2vw, 2.1rem);
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .nav__col--left { justify-self: start; }
  .nav__col--right {
    justify-self: end;
    gap: clamp(1rem, 1.9vw, 1.8rem);
  }
  .nav__col a.nav__link {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 400;
    font-size: clamp(0.86rem, 1vw, 0.94rem);
    letter-spacing: 0.01em;
    color: var(--ink);
    text-decoration: none;
    position: relative;
    padding: 0.35rem 0.1rem;
    transition: color 0.25s ease;
    white-space: nowrap;
  }
  .nav__col a.nav__link::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: 0.05rem;
    height: 1.5px;
    background: linear-gradient(90deg, var(--rose-deep), var(--orange-deep));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .nav__col a.nav__link:hover::after,
  .nav__col a.nav__link:focus-visible::after { transform: scaleX(1); }
  .nav__col a.nav__link:hover { color: var(--orange-deep); }

  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 0.9;
    text-decoration: none;
    color: var(--ink);
    justify-self: center;
  }
  .brand__name {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 500;
    font-size: clamp(1.45rem, 2.4vw, 1.95rem);
    letter-spacing: -0.015em;
    color: var(--ink);
  }
  .brand__sub {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 300;
    font-size: 0.6rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 0.36rem;
    margin-left: 0.22em;
  }

  .nav__socials {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding-left: 0.4rem;
    margin-left: 0.2rem;
    border-left: 1px solid rgba(58, 42, 46, 0.14);
  }
  .icon-btn {
    display: grid;
    place-items: center;
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1.5px solid rgba(58, 42, 46, 0.16);
    background: var(--glass-strong);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--ink);
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.25s ease, color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
  }
  .icon-btn:hover {
    transform: translateY(-2px);
    color: var(--orange-deep);
    border-color: var(--rose-deep);
    box-shadow: 0 8px 20px rgba(249, 139, 182, 0.28);
  }
  .icon-btn svg { width: 18px; height: 18px; }
  .account { color: var(--ink); }
  .account svg { width: 18px; height: 18px; }

  .nav__burger {
    display: none;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1.5px solid rgba(58, 42, 46, 0.16);
    background: var(--glass-strong);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--ink);
    cursor: pointer;
    align-items: center;
    justify-content: center;
  }
  .nav__burger svg { width: 20px; height: 20px; }

  /* ============ HERO ============ */
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
    padding: clamp(0.6rem, 2vh, 1.6rem) 0;
  }

  .title {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 360;
    font-size: clamp(3rem, 10.4vw, 10.6rem);
    line-height: 0.95;
    letter-spacing: -0.025em;
    margin: 0 0 clamp(1.6rem, 4vh, 2.8rem);
    color: var(--ink);
    max-width: 14ch;
    font-variation-settings: "opsz" 144;
  }
  .title .line { display: block; }
  .title em {
    font-style: italic;
    font-weight: 340;
    font-variation-settings: "opsz" 144;
  }

  .bien {
    position: relative;
    display: inline-block;
    font-style: normal;
    font-weight: 600;
    letter-spacing: -0.01em;
    background: linear-gradient(96deg, var(--framboise) 0%, var(--corail) 52%, var(--orange-deep) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    padding-right: 0.06em;
  }
  .bien::after {
    content: "BIEN.";
    position: absolute;
    inset: 0;
    z-index: -1;
    background: linear-gradient(96deg, var(--framboise) 0%, var(--orange-deep) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    filter: blur(18px);
    opacity: 0.6;
    animation: glow 4.5s ease-in-out infinite;
  }
  @keyframes glow {
    0%, 100% { opacity: 0.42; filter: blur(16px); }
    50%      { opacity: 0.72; filter: blur(24px); }
  }

  /* ============ BOUTONS PILL ============ */
  .actions {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: clamp(0.7rem, 1.4vw, 1rem);
  }
  .pill {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: clamp(1.02rem, 1.35vw, 1.16rem);
    letter-spacing: 0.005em;
    padding: clamp(1rem, 1.7vh, 1.25rem) clamp(1.7rem, 2.6vw, 2.4rem);
    border-radius: 999px;
    border: 1.5px solid rgba(58, 42, 46, 0.2);
    background: var(--glass-strong);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: var(--ink);
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 0.28s ease, border-color 0.28s ease, color 0.28s ease;
    white-space: nowrap;
  }
  .pill:hover {
    transform: translateY(-2px);
    border-color: var(--rose-deep);
    color: var(--orange-deep);
    box-shadow: 0 10px 26px rgba(249, 139, 182, 0.24);
  }
  .pill--primary {
    border: none;
    color: var(--creme);
    background: linear-gradient(96deg, var(--framboise) 0%, var(--orange-deep) 100%);
    box-shadow: 0 12px 32px rgba(244, 130, 60, 0.34);
    position: relative;
    overflow: hidden;
  }
  .pill--primary::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(96deg, var(--orange-deep) 0%, var(--framboise) 100%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .pill--primary span { position: relative; z-index: 1; }
  .pill--primary:hover {
    transform: translateY(-2px);
    color: var(--creme);
    box-shadow: 0 16px 40px rgba(244, 130, 60, 0.46);
  }
  .pill--primary:hover::before { opacity: 1; }

  /* ============ CITATION ============ */
  .quote {
    margin: 0;
    max-width: min(92vw, 70ch);
    text-align: left;
    justify-self: start;
  }
  .quote p {
    font-family: "Fraunces", Georgia, serif;
    font-style: italic;
    font-weight: 330;
    font-size: clamp(0.98rem, 1.7vw, 1.32rem);
    line-height: 1.4;
    color: var(--ink);
    margin: 0 0 0.5rem;
    white-space: nowrap;
  }
  .quote cite {
    display: block;
    font-family: "Space Grotesk", sans-serif;
    font-style: normal;
    font-weight: 600;
    font-size: 0.82rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--orange-deep);
  }

  /* ============ FOOTER ============ */
  .foot {
    display: flex;
    align-items: flex-end;
    justify-content: flex-start;
    padding-top: clamp(0.6rem, 1.4vh, 1.1rem);
  }

  /* ============ FOCUS / A11Y ============ */
  a:focus-visible, button:focus-visible {
    outline: 2.5px solid var(--orange-deep);
    outline-offset: 3px;
    border-radius: 999px;
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 900px) {
    .quote p { white-space: normal; }
  }
  @media (max-width: 760px) {
    .nav { grid-template-columns: auto auto; }
    .nav__col--left { display: none; }
    .nav__col--right .nav__link { display: none; }
    .brand { justify-self: start; align-items: flex-start; }
    .nav__burger { display: inline-flex; }
    .title { font-size: clamp(2.8rem, 14vw, 5.2rem); max-width: 11ch; }
    .actions .pill { font-size: 1rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
    }
    #gl { display: none; }
    .scene__css { opacity: 1 !important; }
    .scene__sun { animation: none; }
    .scene__sun::after { animation: none; }
  }
</style>

  <!-- ===================== SOLEIL 3D VIVANT — Three.js (amélioration progressive) ===================== -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>
  <script type="module">
  (async function () {
    var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) return; // fallback CSS calme reste affiché

    var canvas = document.getElementById("gl");
    if (!canvas) return;

    // Test WebGL préalable : si indisponible, on garde le beau fallback CSS.
    try {
      var test = document.createElement("canvas");
      if (!(test.getContext("webgl") || test.getContext("experimental-webgl"))) return;
    } catch (e) { return; }

    var THREE;
    try {
      THREE = await import("three");
    } catch (e) {
      return; // CDN injoignable -> fallback CSS
    }

    var scene = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera(38, 1, 0.1, 100);
    camera.position.set(0, 0, 6.4);

    var renderer;
    try {
      renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
    } catch (e) { return; }
    renderer.setClearColor(0x000000, 0);
    var dpr = Math.min(window.devicePixelRatio || 1, 1.75);
    renderer.setPixelRatio(dpr);

    // ---- Palette Soleia (en linéaire pour le shader) ----
    var PEACH  = new THREE.Color("#ffc79a");
    var CORAL  = new THREE.Color("#fa7e58");
    var ORANGE = new THREE.Color("#f4823c");
    var FRAMB  = new THREE.Color("#f4548b");
    var ROSE   = new THREE.Color("#f98bb6");

    // ===== Bruit simplex 3D (Ashima / Stefan Gustavson) injecté dans les shaders =====
    var SIMPLEX = [
      "vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}",
      "vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}",
      "vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}",
      "vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}",
      "float snoise(vec3 v){",
      "  const vec2 C=vec2(1.0/6.0,1.0/3.0);const vec4 D=vec4(0.0,0.5,1.0,2.0);",
      "  vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);",
      "  vec3 g=step(x0.yzx,x0.xyz);vec3 l=1.0-g;vec3 i1=min(g.xyz,l.zxy);vec3 i2=max(g.xyz,l.zxy);",
      "  vec3 x1=x0-i1+C.xxx;vec3 x2=x0-i2+C.yyy;vec3 x3=x0-D.yyy;",
      "  i=mod289(i);",
      "  vec4 p=permute(permute(permute(i.z+vec4(0.0,i1.z,i2.z,1.0))+i.y+vec4(0.0,i1.y,i2.y,1.0))+i.x+vec4(0.0,i1.x,i2.x,1.0));",
      "  float n_=0.142857142857;vec3 ns=n_*D.wyz-D.xzx;",
      "  vec4 j=p-49.0*floor(p*ns.z*ns.z);",
      "  vec4 x_=floor(j*ns.z);vec4 y_=floor(j-7.0*x_);",
      "  vec4 x=x_*ns.x+ns.yyyy;vec4 y=y_*ns.x+ns.yyyy;vec4 h=1.0-abs(x)-abs(y);",
      "  vec4 b0=vec4(x.xy,y.xy);vec4 b1=vec4(x.zw,y.zw);",
      "  vec4 s0=floor(b0)*2.0+1.0;vec4 s1=floor(b1)*2.0+1.0;vec4 sh=-step(h,vec4(0.0));",
      "  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;",
      "  vec3 p0=vec3(a0.xy,h.x);vec3 p1=vec3(a0.zw,h.y);vec3 p2=vec3(a1.xy,h.z);vec3 p3=vec3(a1.zw,h.w);",
      "  vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));",
      "  p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;",
      "  vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0);m=m*m;",
      "  return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));",
      "}",
      "float fbm(vec3 p){float s=0.0;float a=0.5;for(int i=0;i<4;i++){s+=a*snoise(p);p*=2.02;a*=0.5;}return s;}"
    ].join("\n");

    // ===== CORPS DU SOLEIL : icosaèdre déformé par le bruit =====
    var sunUniforms = {
      uTime:   { value: 0 },
      uPeach:  { value: PEACH },
      uCoral:  { value: CORAL },
      uOrange: { value: ORANGE },
      uFramb:  { value: FRAMB },
      uRose:   { value: ROSE },
      uLight:  { value: new THREE.Vector3(0.55, 0.65, 0.9).normalize() }
    };

    var sunVert = [
      "uniform float uTime;",
      "varying vec3 vNormalW;",
      "varying vec3 vPos;",
      "varying float vDisp;",
      SIMPLEX,
      "void main(){",
      "  vec3 pos = position;",
      "  float t = uTime * 0.25;",
      "  float d = fbm(normalize(pos) * 1.7 + vec3(0.0, t, t*0.5));",
      "  d += 0.5 * snoise(normalize(pos) * 4.2 + vec3(t*1.3, 0.0, 0.0));",
      "  vDisp = d;",
      "  vec3 displaced = pos + normal * d * 0.30;",
      "  vec4 wp = modelMatrix * vec4(displaced, 1.0);",
      "  vPos = wp.xyz;",
      "  vNormalW = normalize(mat3(modelMatrix) * normal);",
      "  gl_Position = projectionMatrix * viewMatrix * wp;",
      "}"
    ].join("\n");

    var sunFrag = [
      "precision highp float;",
      "uniform vec3 uPeach, uCoral, uOrange, uFramb, uRose, uLight;",
      "uniform float uTime;",
      "varying vec3 vNormalW;",
      "varying vec3 vPos;",
      "varying float vDisp;",
      "void main(){",
      "  vec3 N = normalize(vNormalW);",
      "  vec3 V = normalize(cameraPosition - vPos);",
      "  float diff = clamp(dot(N, normalize(uLight)) * 0.5 + 0.5, 0.0, 1.0);",
      "  float fres = pow(1.0 - clamp(dot(N, V), 0.0, 1.0), 2.4);",
      // teinte interne selon le déplacement : creux framboise -> crêtes pêche
      "  float h = clamp(vDisp * 0.5 + 0.5, 0.0, 1.0);",
      "  vec3 col = mix(uFramb, uCoral, smoothstep(0.0, 0.55, h));",
      "  col = mix(col, uOrange, smoothstep(0.45, 0.8, h));",
      "  col = mix(col, uPeach, smoothstep(0.78, 1.0, h));",
      // ombrage doux + cœur lumineux
      "  col *= 0.72 + 0.42 * diff;",
      "  col += uPeach * pow(diff, 3.0) * 0.30;",
      // liseré chaud (fresnel) rose -> orange
      "  vec3 rim = mix(uRose, uOrange, fres);",
      "  col += rim * fres * 0.85;",
      "  gl_FragColor = vec4(col, 1.0);",
      "}"
    ].join("\n");

    var sunGeo = new THREE.IcosahedronGeometry(1.5, 64);
    var sunMat = new THREE.ShaderMaterial({
      uniforms: sunUniforms,
      vertexShader: sunVert,
      fragmentShader: sunFrag
    });
    var sun = new THREE.Mesh(sunGeo, sunMat);
    scene.add(sun);

    // ===== HALO / GLOW (bloom « pauvre » sans post-process) : coquille additive fresnel =====
    var haloUniforms = {
      uTime: { value: 0 },
      uRose: { value: ROSE },
      uOrange: { value: ORANGE }
    };
    var haloVert = [
      "varying vec3 vNormalW;",
      "varying vec3 vPos;",
      "void main(){",
      "  vNormalW = normalize(mat3(modelMatrix) * normal);",
      "  vec4 wp = modelMatrix * vec4(position, 1.0);",
      "  vPos = wp.xyz;",
      "  gl_Position = projectionMatrix * viewMatrix * wp;",
      "}"
    ].join("\n");
    var haloFrag = [
      "precision highp float;",
      "uniform vec3 uRose, uOrange;",
      "uniform float uTime;",
      "varying vec3 vNormalW;",
      "varying vec3 vPos;",
      "void main(){",
      "  vec3 N = normalize(vNormalW);",
      "  vec3 V = normalize(cameraPosition - vPos);",
      "  float fres = pow(1.0 - clamp(dot(N, V), 0.0, 1.0), 3.0);",
      "  float pulse = 0.82 + 0.18 * sin(uTime * 1.1);",
      "  vec3 col = mix(uOrange, uRose, fres);",
      "  float a = fres * pulse;",
      "  gl_FragColor = vec4(col * a, a);",
      "}"
    ].join("\n");
    var haloGeo = new THREE.IcosahedronGeometry(1.5, 24);
    var haloMat = new THREE.ShaderMaterial({
      uniforms: haloUniforms,
      vertexShader: haloVert,
      fragmentShader: haloFrag,
      transparent: true,
      blending: THREE.AdditiveBlending,
      side: THREE.BackSide,
      depthWrite: false
    });
    var halo = new THREE.Mesh(haloGeo, haloMat);
    halo.scale.setScalar(1.9);
    scene.add(halo);

    // ===== Resize + cadrage : soleil légèrement plus grand sur grand écran =====
    function fit() {
      var w = canvas.clientWidth || window.innerWidth;
      var h = canvas.clientHeight || window.innerHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      var portrait = h > w;
      camera.position.z = portrait ? 8.2 : 6.4;
      camera.updateProjectionMatrix();
    }
    window.addEventListener("resize", fit);
    fit();

    // ===== Parallax souris (lissé) =====
    var targetX = 0, targetY = 0, curX = 0, curY = 0;
    window.addEventListener("pointermove", function (e) {
      targetX = (e.clientX / window.innerWidth - 0.5) * 2;
      targetY = (e.clientY / window.innerHeight - 0.5) * 2;
    }, { passive: true });

    // ===== Boucle =====
    var clock = new THREE.Clock();
    var running = true;
    document.addEventListener("visibilitychange", function () {
      running = !document.hidden;
      if (running) { clock.start(); requestAnimationFrame(loop); }
    });

    function loop() {
      if (!running) return;
      var t = clock.getElapsedTime();
      sunUniforms.uTime.value = t;
      haloUniforms.uTime.value = t;

      // rotation lente continue
      sun.rotation.y = t * 0.16;
      sun.rotation.x = Math.sin(t * 0.12) * 0.12;
      halo.rotation.copy(sun.rotation);

      // parallax doux
      curX += (targetX - curX) * 0.05;
      curY += (targetY - curY) * 0.05;
      sun.position.x = curX * 0.45;
      sun.position.y = -curY * 0.32;
      halo.position.copy(sun.position);
      camera.position.x = curX * 0.35;
      camera.position.y = -curY * 0.25;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    document.body.classList.add("gl-ready");
    document.querySelector(".scene").classList.add("gl-ready");
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
