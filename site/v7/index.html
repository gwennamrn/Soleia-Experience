<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Soleia Expérience — La pause créative qui fait du BIEN</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..600&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet" />
<style>
  :root {
    --rose: #fb6ba6;
    --rose-deep: #f23b8e;
    --orange: #f8742f;
    --rose-clair: #fbd9e6;
    --creme: #fdf6f0;
    --creme-rose: #fdeef3;
    --ink: #4a2233;
    --ink-soft: #8a5a6c;
    --glass: rgba(253, 246, 240, 0.6);
    --fine: 0.06em;
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body { margin: 0; padding: 0; }

  body {
    font-family: "Space Grotesk", system-ui, sans-serif;
    color: var(--ink);
    background: var(--creme);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  /* ============ DUOTONE ROSE ↔ CRÈME BACKGROUND ============ */
  .aurora {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    background: var(--creme-rose);
  }

  /* CSS fallback: animated rose/cream mesh (no JS / no WebGL) */
  .aurora__css {
    position: absolute;
    inset: -20%;
    filter: blur(64px) saturate(1.04);
    opacity: 0.95;
    transition: opacity 0.8s ease;
  }
  .aurora__css::before,
  .aurora__css::after {
    content: "";
    position: absolute;
    inset: 0;
    background-repeat: no-repeat;
  }
  .aurora__css::before {
    background:
      radial-gradient(42% 52% at 20% 28%, rgba(251, 107, 166, 0.78), transparent 70%),
      radial-gradient(46% 56% at 80% 40%, rgba(242, 59, 142, 0.5), transparent 72%),
      radial-gradient(52% 62% at 50% 84%, rgba(253, 246, 240, 0.96), transparent 76%);
    animation: drift1 24s ease-in-out infinite alternate;
  }
  .aurora__css::after {
    background:
      radial-gradient(40% 50% at 66% 20%, rgba(251, 107, 166, 0.55), transparent 70%),
      radial-gradient(44% 54% at 16% 72%, rgba(251, 169, 200, 0.6), transparent 72%),
      radial-gradient(56% 56% at 88% 82%, rgba(253, 246, 240, 0.92), transparent 75%);
    animation: drift2 30s ease-in-out infinite alternate;
    mix-blend-mode: screen;
  }
  @keyframes drift1 {
    0%   { transform: translate(0, 0) scale(1) rotate(0deg); }
    100% { transform: translate(4%, -3%) scale(1.12) rotate(7deg); }
  }
  @keyframes drift2 {
    0%   { transform: translate(0, 0) scale(1.05) rotate(0deg); }
    100% { transform: translate(-5%, 4%) scale(1) rotate(-9deg); }
  }

  /* WebGL canvas sits on top of the CSS fallback once it's ready */
  #gl {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 1.2s ease;
  }
  .gl-ready #gl { opacity: 1; }
  .gl-ready .aurora__css { opacity: 0; }

  /* Cream veil (stronger at top) keeps the outlined title crisp + readable */
  .aurora__veil {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(130% 95% at 50% 4%, rgba(253, 246, 240, 0.5) 0%, transparent 46%),
      radial-gradient(82% 70% at 50% 48%, rgba(253, 246, 240, 0.34), transparent 62%);
    pointer-events: none;
  }
  .aurora__grain {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.05;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* ============ SHELL ============ */
  .shell {
    position: relative;
    z-index: 2;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    padding: clamp(1rem, 2.2vw, 1.7rem) clamp(1.2rem, 5vw, 4.5rem) clamp(1rem, 2.4vh, 1.6rem);
  }

  /* ============ NAV (3 columns: left links | centered logo | right links) ============ */
  .nav {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: clamp(0.8rem, 2vw, 2rem);
  }
  .nav__links {
    display: flex;
    align-items: center;
    gap: clamp(1rem, 2.4vw, 2.3rem);
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .nav__links--left { justify-content: flex-end; }
  .nav__links--right { justify-content: flex-start; }
  .nav__links a {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 500;
    font-size: 0.95rem;
    letter-spacing: 0.01em;
    color: var(--ink);
    text-decoration: none;
    position: relative;
    padding: 0.35rem 0.1rem;
    transition: color 0.25s ease;
    white-space: nowrap;
  }
  .nav__links a::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: 0.05rem;
    height: 1.6px;
    background: linear-gradient(90deg, var(--rose-deep), var(--rose));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .nav__links a:hover::after,
  .nav__links a:focus-visible::after { transform: scaleX(1); }
  .nav__links a:hover { color: var(--rose-deep); }

  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 0.9;
    text-decoration: none;
    color: var(--ink);
  }
  .brand__name {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 500;
    font-size: clamp(1.45rem, 2.6vw, 2.05rem);
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .brand__sub {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 300;
    font-size: 0.6rem;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 0.4rem;
    margin-left: 0.42em;
  }

  .nav__right {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 0.7rem;
  }
  .account {
    display: grid;
    place-items: center;
    width: 42px; height: 42px;
    border-radius: 50%;
    border: 1.5px solid rgba(74, 34, 51, 0.18);
    background: var(--glass);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--ink);
    cursor: pointer;
    transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
  }
  .account:hover {
    transform: translateY(-1px);
    border-color: var(--rose);
    box-shadow: 0 6px 18px rgba(251, 107, 166, 0.28);
  }
  .account svg { width: 19px; height: 19px; }

  .nav__burger {
    display: none;
    width: 42px; height: 42px;
    border-radius: 50%;
    border: 1.5px solid rgba(74, 34, 51, 0.18);
    background: var(--glass);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--ink);
    cursor: pointer;
    align-items: center;
    justify-content: center;
  }
  .nav__burger svg { width: 20px; height: 20px; }

  /* ============ HERO ============ */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: clamp(1.2rem, 3vh, 2.6rem) 0 0.6rem;
    position: relative;
  }

  /* ============ OUTLINED TITLE (thick coloured stroke) ============ */
  .title {
    position: relative;
    font-family: "Fraunces", Georgia, serif;
    font-weight: 600;
    font-size: clamp(3.2rem, 11vw, 11rem);
    line-height: 0.92;
    letter-spacing: -0.022em;
    margin: 0;
    max-width: 15ch;
    font-variation-settings: "opsz" 144;
    /* Titre entièrement en CONTOUR propre : remplissage transparent + trait coloré */
    color: transparent;
    -webkit-text-fill-color: transparent;
    -webkit-text-stroke: 3px var(--rose-deep);
    text-stroke: 3px var(--rose-deep);
  }
  .title .line { display: block; position: relative; }
  .title em {
    font-style: italic;
    font-weight: 500;
    font-variation-settings: "opsz" 144;
  }

  /* The visible text: transparent fill + thick rose stroke */
  .title .ink {
    color: transparent;
    -webkit-text-fill-color: transparent;
    -webkit-text-stroke: 3px var(--rose-deep);
    text-stroke: 3px var(--rose-deep);
    position: relative;
    z-index: 2;
  }
  /* (Ancien « fantôme » orange décalé retiré : il créait un effet doublé illisible) */
  .title .line::before { content: none; }
  /* Soft cream halo so the outline reads on the mesh */
  .title .line::after {
    content: attr(data-text);
    position: absolute;
    left: 0; top: 0;
    width: 100%;
    color: var(--creme);
    -webkit-text-fill-color: var(--creme);
    -webkit-text-stroke: 11px var(--creme);
    text-stroke: 11px var(--creme);
    filter: blur(6px);
    opacity: 0.55;
    z-index: 0;
    pointer-events: none;
  }

  /* "BIEN." — same thick-outline treatment, full rose→orange presence */
  .bien {
    display: inline-block;
    font-style: normal;
    font-weight: 700;
    letter-spacing: -0.005em;
    color: transparent;
    -webkit-text-fill-color: transparent;
    -webkit-text-stroke: 3.4px var(--orange);
    text-stroke: 3.4px var(--orange);
    padding-right: 0.05em;
  }
  /* gradient glow pulse behind BIEN */
  .bien-wrap {
    position: relative;
    display: inline-block;
    z-index: 2;
  }
  .bien-wrap::before {
    content: "BIEN.";
    position: absolute;
    left: 0; top: 0;
    font-style: normal;
    font-weight: 700;
    letter-spacing: -0.005em;
    background: linear-gradient(96deg, var(--rose-deep) 0%, #ff7d56 55%, var(--orange) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    filter: blur(20px);
    opacity: 0.6;
    z-index: -1;
    animation: glow 4.5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes glow {
    0%, 100% { opacity: 0.4; filter: blur(16px); }
    50%      { opacity: 0.75; filter: blur(26px); }
  }

  /* ============ PILL BUTTONS (bigger + bold) ============ */
  .actions {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 0.85rem;
    margin-top: clamp(1.6rem, 4vh, 2.8rem);
  }
  .pill {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: clamp(0.98rem, 1.3vw, 1.08rem);
    letter-spacing: 0.005em;
    padding: clamp(1rem, 1.4vh, 1.2rem) clamp(1.7rem, 2.4vw, 2.3rem);
    border-radius: 999px;
    border: 2px solid rgba(74, 34, 51, 0.22);
    background: var(--glass);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: var(--ink);
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 0.28s ease, border-color 0.28s ease, color 0.28s ease;
    white-space: nowrap;
  }
  .pill:hover {
    transform: translateY(-2px);
    border-color: var(--rose);
    color: var(--rose-deep);
    box-shadow: 0 10px 26px rgba(251, 107, 166, 0.24);
  }
  .pill--primary {
    border: none;
    color: var(--creme);
    background: linear-gradient(96deg, var(--rose-deep) 0%, var(--orange) 100%);
    box-shadow: 0 12px 32px rgba(242, 59, 142, 0.34);
    position: relative;
    overflow: hidden;
  }
  .pill--primary::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(96deg, var(--orange) 0%, var(--rose-deep) 100%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .pill--primary span { position: relative; z-index: 1; }
  .pill--primary:hover {
    transform: translateY(-2px);
    color: var(--creme);
    box-shadow: 0 16px 40px rgba(248, 116, 47, 0.44);
  }
  .pill--primary:hover::before { opacity: 1; }

  /* ============ QUOTE (single line, left-aligned, signature below) ============ */
  .quote {
    margin: clamp(1.6rem, 3.8vh, 2.6rem) 0 0;
    max-width: min(92vw, 62ch);
    text-align: left;
    align-self: center;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }
  .quote p {
    font-family: "Fraunces", Georgia, serif;
    font-style: italic;
    font-weight: 340;
    font-size: clamp(1rem, 1.8vw, 1.32rem);
    line-height: 1.35;
    color: var(--ink);
    margin: 0 0 0.55rem;
  }
  .quote cite {
    font-family: "Space Grotesk", sans-serif;
    font-style: normal;
    font-weight: 600;
    font-size: 0.8rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--rose-deep);
  }

  /* ============ SOCIALS (visible row, above the fold) ============ */
  .socials {
    margin: clamp(1.4rem, 3.4vh, 2.4rem) 0 0;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 0.8rem;
  }
  .socials__label {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 600;
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-right: 0.2rem;
  }
  .social {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.6rem 1.05rem 0.6rem 0.85rem;
    border-radius: 999px;
    border: 2px solid rgba(242, 59, 142, 0.28);
    background: var(--glass);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--ink);
    text-decoration: none;
    font-family: "Space Grotesk", sans-serif;
    font-weight: 600;
    font-size: 0.86rem;
    letter-spacing: 0.01em;
    transition: transform 0.25s ease, color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
  }
  .social svg { width: 19px; height: 19px; flex: none; }
  .social:hover {
    transform: translateY(-2px);
    color: var(--creme);
    border-color: transparent;
    background: linear-gradient(96deg, var(--rose-deep) 0%, var(--orange) 100%);
    box-shadow: 0 10px 24px rgba(242, 59, 142, 0.3);
  }

  /* ============ DRAGGABLE DECOR (sun + stars) ============ */
  .drag-layer {
    position: fixed;
    inset: 0;
    z-index: 3;
    pointer-events: none;
  }
  .drag {
    position: absolute;
    pointer-events: auto;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    transition: transform 0.18s cubic-bezier(0.22, 1, 0.36, 1), filter 0.25s ease;
    filter: drop-shadow(0 8px 18px rgba(242, 59, 142, 0.22));
    will-change: left, top;
  }
  .drag:hover { transform: scale(1.06) rotate(-3deg); }
  .drag.is-dragging {
    cursor: grabbing;
    transition: none;
    transform: scale(1.1);
    filter: drop-shadow(0 14px 28px rgba(242, 59, 142, 0.35));
    z-index: 9;
  }
  .drag:focus-visible {
    outline: 2.5px solid var(--rose-deep);
    outline-offset: 4px;
    border-radius: 14px;
  }
  .drag svg { display: block; width: 100%; height: 100%; }
  .drag--sun { width: clamp(64px, 8vw, 104px); height: clamp(64px, 8vw, 104px); }
  .drag--star { width: clamp(30px, 3.6vw, 48px); height: clamp(30px, 3.6vw, 48px); }

  .drag-sun-spin { transform-origin: 50% 50%; animation: spin 26s linear infinite; }
  .drag-star-twinkle { transform-origin: 50% 50%; animation: twinkle 3.6s ease-in-out infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes twinkle {
    0%, 100% { transform: scale(1); opacity: 0.92; }
    50%      { transform: scale(0.84); opacity: 0.65; }
  }

  .drag-hint {
    position: absolute;
    z-index: 4;
    pointer-events: none;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.32rem 0.7rem;
    border-radius: 999px;
    background: rgba(253, 246, 240, 0.78);
    border: 1.5px solid rgba(242, 59, 142, 0.3);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    font-family: "Space Grotesk", sans-serif;
    font-weight: 600;
    font-size: 0.66rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--rose-deep);
    white-space: nowrap;
    transition: opacity 0.5s ease;
  }
  .drag-hint svg { width: 13px; height: 13px; }
  .drag-hint.is-hidden { opacity: 0; }

  /* ============ FOCUS / A11Y ============ */
  a:focus-visible, button:focus-visible {
    outline: 2.5px solid var(--rose-deep);
    outline-offset: 3px;
    border-radius: 999px;
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 860px) {
    .nav__links { display: none; }
    .nav { grid-template-columns: 1fr auto 1fr; }
    .nav__burger { display: inline-flex; }
    .nav__right { order: 3; }
    .nav .brand { order: 2; }
  }
  @media (max-width: 640px) {
    .title { font-size: clamp(3rem, 16vw, 5.6rem); max-width: 12ch; }
    .title .ink, .title .line::before { -webkit-text-stroke-width: 2.2px; text-stroke-width: 2.2px; }
    .bien { -webkit-text-stroke-width: 2.4px; text-stroke-width: 2.4px; }
    .quote p { font-size: 1.02rem; }
    .socials__label { display: none; }
    .drag--sun { width: 58px; height: 58px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
    }
    #gl { display: none; }
    .aurora__css { opacity: 0.95 !important; }
    .drag { cursor: default; }
    .drag-hint { display: none; }
  }
</style>
</head>
<body>
  <!-- ===================== DUOTONE BACKGROUND ===================== -->
  <div class="aurora" aria-hidden="true">
    <div class="aurora__css"></div>
    <canvas id="gl"></canvas>
    <div class="aurora__veil"></div>
    <div class="aurora__grain"></div>
  </div>

  <div class="shell">
    <!-- ===================== NAV (3 columns) ===================== -->
    <nav class="nav" aria-label="Navigation principale">
      <ul class="nav__links nav__links--left">
        <li><a href="#ateliers">Ateliers</a></li>
        <li><a href="#boutique">Boutique</a></li>
      </ul>

      <a class="brand" href="#" aria-label="Soleia Expérience, accueil">
        <span class="brand__name">soleia</span>
        <span class="brand__sub">expérience</span>
      </a>

      <ul class="nav__links nav__links--right">
        <li><a href="#histoire">Histoire</a></li>
        <li><a href="#galerie">Galerie</a></li>
      </ul>

      <div class="nav__right">
        <button class="nav__burger" aria-label="Ouvrir le menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <path d="M4 7h16M4 12h16M4 17h16" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="account" aria-label="Mon compte">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
            <circle cx="12" cy="8" r="3.4"/>
            <path d="M5 20c0-3.6 3.1-6 7-6s7 2.4 7 6" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </nav>

    <!-- ===================== HERO ===================== -->
    <main class="hero">
      <h1 class="title">
        <span class="line" data-text="La pause créative">La pause créative</span>
        <span class="line" data-text="qui fait du BIEN.">qui fait <em class="ink">du</em> <span class="bien-wrap"><span class="bien">BIEN.</span></span></span>
      </h1>

      <div class="actions">
        <a class="pill pill--primary" href="#ateliers"><span>Les prochains ateliers</span></a>
        <a class="pill" href="#boutique">La boutique</a>
        <a class="pill" href="#histoire">Notre histoire</a>
        <a class="pill" href="#faq">F.A.Q</a>
      </div>

      <figure class="quote">
        <p>«&#8239;Parce que prendre du temps pour soi, c’est important &amp; ça fait du bien.&#8239;»</p>
        <cite>— Gwen</cite>
      </figure>

      <div class="socials" aria-label="Réseaux sociaux">
        <span class="socials__label" aria-hidden="true">Suivez Soleia</span>
        <a class="social" href="#" aria-label="Instagram de Soleia">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
            <rect x="3.5" y="3.5" width="17" height="17" rx="5"/>
            <circle cx="12" cy="12" r="4"/>
            <circle cx="17.2" cy="6.8" r="1.1" fill="currentColor" stroke="none"/>
          </svg>
          <span>Instagram</span>
        </a>

  <!-- ===================== WebGL DUOTONE MESH SHADER (progressive enhancement) ===================== -->
  <script>
  (function () {
    var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) return;

    var canvas = document.getElementById("gl");
    if (!canvas) return;

    var gl = canvas.getContext("webgl", { antialias: true, alpha: false, premultipliedAlpha: false })
          || canvas.getContext("experimental-webgl");
    if (!gl) return;

    var vertSrc =
      "attribute vec2 p;" +
      "void main(){ gl_Position = vec4(p, 0.0, 1.0); }";

    // Domain-warped fbm DUOTONE mesh: ROSE <-> CREAM (no dominant orange).
    var fragSrc = [
      "precision highp float;",
      "uniform vec2 u_res;",
      "uniform float u_time;",
      "",
      "vec3 CREAM   = vec3(0.992, 0.965, 0.941);", // #fdf6f0
      "vec3 ROSEPAL = vec3(0.984, 0.851, 0.902);", // soft rose
      "vec3 ROSE    = vec3(0.984, 0.420, 0.651);", // #fb6ba6
      "vec3 ROSEDP  = vec3(0.949, 0.231, 0.557);", // #f23b8e
      "",
      "float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }",
      "float noise(vec2 p){",
      "  vec2 i = floor(p); vec2 f = fract(p);",
      "  vec2 u = f*f*(3.0-2.0*f);",
      "  return mix(mix(hash(i+vec2(0.0,0.0)), hash(i+vec2(1.0,0.0)), u.x),",
      "             mix(hash(i+vec2(0.0,1.0)), hash(i+vec2(1.0,1.0)), u.x), u.y);",
      "}",
      "float fbm(vec2 p){",
      "  float v = 0.0; float a = 0.5;",
      "  for(int i=0;i<5;i++){ v += a*noise(p); p *= 2.0; a *= 0.5; }",
      "  return v;",
      "}",
      "",
      "void main(){",
      "  vec2 uv = gl_FragCoord.xy / u_res.xy;",
      "  vec2 p = uv * 2.4;",
      "  p.x *= u_res.x / u_res.y;",
      "  float t = u_time * 0.04;",
      "  vec2 q = vec2(fbm(p + vec2(0.0, t)), fbm(p + vec2(5.2, -t)));",
      "  vec2 r = vec2(fbm(p + 3.0*q + vec2(1.7, 9.2) + 0.15*t),",
      "                fbm(p + 3.0*q + vec2(8.3, 2.8) - 0.12*t));",
      "  float f = fbm(p + 2.4*r);",
      "  // duotone ramp: cream -> soft rose -> rose -> deep rose",
      "  vec3 col = mix(CREAM, ROSEPAL, smoothstep(0.0, 0.55, f));",
      "  col = mix(col, ROSE, smoothstep(0.42, 0.95, f + 0.22*r.x));",
      "  col = mix(col, ROSEDP, smoothstep(0.7, 1.12, length(r)));",
      "  // lift toward cream near the top so the outlined title stays readable",
      "  col = mix(col, CREAM, smoothstep(0.5, 1.0, 1.0 - uv.y) * 0.5);",
      "  // gentle cream vignette",
      "  float d = distance(uv, vec2(0.5, 0.5));",
      "  col = mix(col, CREAM, smoothstep(0.45, 0.95, d) * 0.32);",
      "  gl_FragColor = vec4(col, 1.0);",
      "}"
    ].join("\n");

    function compile(type, src) {
      var s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
        gl.deleteShader(s);
        return null;
      }
      return s;
    }

    var vs = compile(gl.VERTEX_SHADER, vertSrc);
    var fs = compile(gl.FRAGMENT_SHADER, fragSrc);
    if (!vs || !fs) return;

    var prog = gl.createProgram();
    gl.attachShader(prog, vs);
    gl.attachShader(prog, fs);
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) return;
    gl.useProgram(prog);

    var buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
    var loc = gl.getAttribLocation(prog, "p");
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

    var uRes = gl.getUniformLocation(prog, "u_res");
    var uTime = gl.getUniformLocation(prog, "u_time");

    var dpr = Math.min(window.devicePixelRatio || 1, 1.5);
    function resize() {
      var w = Math.floor(canvas.clientWidth * dpr);
      var h = Math.floor(canvas.clientHeight * dpr);
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w; canvas.height = h;
        gl.viewport(0, 0, w, h);
      }
    }
    window.addEventListener("resize", resize);
    resize();

    document.querySelector(".aurora").classList.add("gl-ready");
    document.body.classList.add("gl-ready");

    var start = performance.now();
    var running = true;
    var elapsed = 0;
    document.addEventListener("visibilitychange", function () {
      running = !document.hidden;
      if (running) { start = performance.now() - elapsed; requestAnimationFrame(loop); }
    });

    function loop(now) {
      if (!running) return;
      resize();
      elapsed = now - start;
      gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.uniform1f(uTime, elapsed * 0.001);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  })();
  </script>

  <!-- ===================== DRAG DECOR (pointer events) ===================== -->
  <script>
  (function () {
    var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) return;

    var items = Array.prototype.slice.call(document.querySelectorAll(".drag"));
    var hint = document.getElementById("dragHint");
    var hintHidden = false;

    function hideHint() {
      if (hintHidden || !hint) return;
      hintHidden = true;
      hint.classList.add("is-hidden");
    }

    // Position the hint just below the sun (its initial spot).
    function placeHint() {
      if (!hint) return;
      var sun = document.getElementById("dragSun");
      if (!sun) return;
      var r = sun.getBoundingClientRect();
      hint.style.left = (r.left + r.width / 2 - hint.offsetWidth / 2) + "px";
      hint.style.top = (r.bottom + 8) + "px";
    }
    requestAnimationFrame(placeHint);
    window.addEventListener("resize", function () { if (!hintHidden) placeHint(); });

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

    items.forEach(function (el) {
      var dragging = false;
      var offX = 0, offY = 0;
      var pid = null;

      function onDown(e) {
        dragging = true;
        pid = e.pointerId;
        el.classList.add("is-dragging");
        var rect = el.getBoundingClientRect();
        offX = e.clientX - rect.left;
        offY = e.clientY - rect.top;
        // switch to absolute px positioning for free movement
        el.style.left = rect.left + "px";
        el.style.top = rect.top + "px";
        try { el.setPointerCapture(pid); } catch (err) {}
        hideHint();
        e.preventDefault();
      }

      function onMove(e) {
        if (!dragging) return;
        var w = el.offsetWidth, h = el.offsetHeight;
        var x = clamp(e.clientX - offX, -w * 0.4, window.innerWidth - w * 0.6);
        var y = clamp(e.clientY - offY, -h * 0.4, window.innerHeight - h * 0.6);
        el.style.left = x + "px";
        el.style.top = y + "px";
      }

      function onUp() {
        if (!dragging) return;
        dragging = false;
        el.classList.remove("is-dragging");
        try { el.releasePointerCapture(pid); } catch (err) {}
      }

      el.addEventListener("pointerdown", onDown);
      el.addEventListener("pointermove", onMove);
      el.addEventListener("pointerup", onUp);
      el.addEventListener("pointercancel", onUp);

      // Keyboard nudge for accessibility (arrow keys move the sticker).
      el.addEventListener("keydown", function (e) {
        var step = e.shiftKey ? 24 : 8;
        var rect = el.getBoundingClientRect();
        var moved = true;
        var nx = rect.left, ny = rect.top;
        switch (e.key) {
          case "ArrowLeft":  nx -= step; break;
          case "ArrowRight": nx += step; break;
          case "ArrowUp":    ny -= step; break;
          case "ArrowDown":  ny += step; break;
          default: moved = false;
        }
        if (moved) {
          e.preventDefault();
          var w = el.offsetWidth, h = el.offsetHeight;
          el.style.left = clamp(nx, 0, window.innerWidth - w) + "px";
          el.style.top = clamp(ny, 0, window.innerHeight - h) + "px";
          hideHint();
        }
      });
    });
  })();
  </script>
