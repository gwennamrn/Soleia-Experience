<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Soleia Expérience — La pause créative qui fait du BIEN</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..600&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Colorway « sunset pop » — plus contrasté que la 08 */
    --framboise: #f0468a;
    --corail: #ff6a3d;
    --ambre: #ffb43d;
    --magenta: #d6357f;
    --rose-clair: #ffe2dd;
    --creme: #fff5ec;
    --ink: #34202a;
    --ink-soft: #6b4a52;
    --glass: rgba(255, 245, 236, 0.58);
    --glass-strong: rgba(255, 245, 236, 0.78);
    --fine: 0.06em;
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body { margin: 0; padding: 0; }

  body {
    font-family: "Space Grotesk", system-ui, sans-serif;
    color: var(--ink);
    background: var(--creme);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  /* ============ AURORA BACKGROUND ============ */
  .aurora {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    background: var(--creme);
  }

  /* CSS fallback: animated conic + radial mesh (works with no JS / no WebGL) */
  .aurora__css {
    position: absolute;
    inset: -20%;
    filter: blur(64px) saturate(1.12);
    opacity: 0.95;
    transition: opacity 0.8s ease;
  }
  .aurora__css::before,
  .aurora__css::after {
    content: "";
    position: absolute;
    inset: 0;
    background-repeat: no-repeat;
  }
  .aurora__css::before {
    background:
      radial-gradient(42% 52% at 18% 26%, rgba(240, 70, 138, 0.92), transparent 70%),
      radial-gradient(46% 56% at 82% 34%, rgba(255, 106, 61, 0.88), transparent 72%),
      radial-gradient(52% 62% at 50% 88%, rgba(255, 180, 61, 0.85), transparent 74%);
    animation: drift1 22s ease-in-out infinite alternate;
  }
  .aurora__css::after {
    background:
      radial-gradient(40% 50% at 70% 18%, rgba(214, 53, 127, 0.7), transparent 70%),
      radial-gradient(44% 54% at 14% 74%, rgba(255, 106, 61, 0.62), transparent 72%),
      radial-gradient(58% 58% at 90% 84%, rgba(255, 180, 61, 0.8), transparent 74%);
    animation: drift2 28s ease-in-out infinite alternate;
    mix-blend-mode: screen;
  }
  @keyframes drift1 {
    0%   { transform: translate(0, 0) scale(1) rotate(0deg); }
    100% { transform: translate(4%, -3%) scale(1.14) rotate(9deg); }
  }
  @keyframes drift2 {
    0%   { transform: translate(0, 0) scale(1.06) rotate(0deg); }
    100% { transform: translate(-5%, 4%) scale(1) rotate(-11deg); }
  }

  /* WebGL canvas sits on top of the CSS fallback once it's ready */
  #gl {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 1.2s ease;
  }
  .gl-ready #gl { opacity: 1; }
  .gl-ready .aurora__css { opacity: 0; }

  /* Cream veil — renforcé en haut pour garder le titre en contour lisible */
  .aurora__veil {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(130% 80% at 50% 4%, rgba(255, 245, 236, 0.62) 0%, transparent 46%),
      radial-gradient(85% 72% at 50% 48%, rgba(255, 245, 236, 0.34), transparent 62%);
    pointer-events: none;
  }
  .aurora__grain {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.055;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* ============ SHELL ============ */
  .shell {
    position: relative;
    z-index: 2;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    padding: clamp(0.9rem, 2vw, 1.7rem) clamp(1.1rem, 4.5vw, 4rem) clamp(1rem, 2.4vh, 1.8rem);
  }

  /* ============ NAV — 3 colonnes, logo centré ============ */
  .nav {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: clamp(0.8rem, 2vw, 2rem);
  }
  .nav__group {
    display: flex;
    align-items: center;
    gap: clamp(1rem, 2.4vw, 2.3rem);
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .nav__group--left { justify-content: flex-start; }
  .nav__group--right { justify-content: flex-end; }
  .nav__group a {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 500;
    font-size: clamp(0.82rem, 1.05vw, 0.95rem);
    letter-spacing: 0.01em;
    color: var(--ink);
    text-decoration: none;
    position: relative;
    padding: 0.35rem 0.1rem;
    transition: color 0.25s ease;
    white-space: nowrap;
  }
  .nav__group a::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: 0.02rem;
    height: 1.6px;
    background: linear-gradient(90deg, var(--framboise), var(--ambre));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .nav__group a:hover::after,
  .nav__group a:focus-visible::after { transform: scaleX(1); }
  .nav__group a:hover { color: var(--corail); }

  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 0.9;
    text-decoration: none;
    color: var(--ink);
    justify-self: center;
  }
  .brand__name {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 500;
    font-size: clamp(1.5rem, 2.7vw, 2.15rem);
    letter-spacing: -0.01em;
    color: var(--ink);
    font-variation-settings: "opsz" 80;
  }
  .brand__sub {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 400;
    font-size: 0.6rem;
    letter-spacing: 0.46em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 0.34rem;
    margin-left: 0.46em;
  }

  .nav__right {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 0.7rem;
  }
  /* keep the right links visually balanced with the account icon on its far right */
  .nav__group--right { gap: clamp(1rem, 2.4vw, 2.3rem); }

  .account {
    display: grid;
    place-items: center;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1.5px solid rgba(52, 32, 42, 0.2);
    background: var(--glass);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--ink);
    cursor: pointer;
    transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    flex: none;
  }
  .account:hover {
    transform: translateY(-1px);
    border-color: var(--framboise);
    box-shadow: 0 6px 18px rgba(240, 70, 138, 0.28);
  }
  .account svg { width: 18px; height: 18px; }

  .nav__burger {
    display: none;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1.5px solid rgba(52, 32, 42, 0.2);
    background: var(--glass);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--ink);
    cursor: pointer;
    align-items: center;
    justify-content: center;
    flex: none;
  }
  .nav__burger svg { width: 20px; height: 20px; }

  /* ============ SOCIAL ROW — visible, dans le hero, en haut ============ */
  .social-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.7rem;
    margin: clamp(0.7rem, 2vh, 1.3rem) 0 0;
    position: relative;
    z-index: 4;
  }
  .social-bar__label {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 600;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-right: 0.2rem;
  }
  .social-bar__label .sun { color: var(--corail); }
  .social {
    display: grid;
    place-items: center;
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 1.6px solid rgba(52, 32, 42, 0.16);
    background: var(--glass-strong);
    backdrop-filter: blur(9px);
    -webkit-backdrop-filter: blur(9px);
    color: var(--ink);
    text-decoration: none;
    box-shadow: 0 6px 16px rgba(240, 70, 138, 0.12);
    transition: transform 0.25s cubic-bezier(0.22,1,0.36,1), color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
  }
  .social:hover {
    transform: translateY(-3px) scale(1.06);
    color: #fff;
    border-color: transparent;
    background: linear-gradient(120deg, var(--framboise), var(--corail));
    box-shadow: 0 12px 26px rgba(255, 106, 61, 0.34);
  }
  .social svg { width: 21px; height: 21px; }

  /* ============ HERO ============ */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: clamp(0.6rem, 2vh, 1.6rem) 0 0.6rem;
    position: relative;
  }

  .stage {
    position: relative;
    z-index: 3;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .title {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 360;
    font-size: clamp(3rem, 9.6vw, 9.6rem);
    line-height: 0.94;
    letter-spacing: -0.025em;
    margin: 0;
    color: var(--ink);
    max-width: 15ch;
    font-variation-settings: "opsz" 144;
    position: relative;
    z-index: 3;
  }
  .title .line { display: block; }
  .title em {
    font-style: italic;
    font-weight: 340;
    font-variation-settings: "opsz" 144;
  }

  /* "créative" — mot en CONTOUR (outline, remplissage transparent) */
  .stroke {
    font-style: italic;
    font-weight: 380;
    color: transparent;
    -webkit-text-fill-color: transparent;
    -webkit-text-stroke: 1.6px var(--ink);
    text-stroke: 1.6px var(--ink);
    paint-order: stroke fill;
  }
  @media (max-width: 760px) {
    .stroke { -webkit-text-stroke-width: 1.2px; }
  }

  /* "BIEN" — gradient text + soft glow (signature conservée) */
  .bien {
    position: relative;
    display: inline-block;
    font-style: normal;
    font-weight: 600;
    letter-spacing: -0.01em;
    background: linear-gradient(96deg, var(--framboise) 0%, var(--corail) 50%, var(--ambre) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    padding-right: 0.06em;
  }
  .bien::after {
    content: "BIEN.";
    position: absolute;
    inset: 0;
    z-index: -1;
    background: linear-gradient(96deg, var(--framboise) 0%, var(--ambre) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    filter: blur(18px);
    opacity: 0.7;
    animation: glow 4.5s ease-in-out infinite;
  }
  @keyframes glow {
    0%, 100% { opacity: 0.5; filter: blur(16px); }
    50%      { opacity: 0.85; filter: blur(24px); }
  }

  /* ============ PILL BUTTONS — plus gros, texte 700 ============ */
  .actions {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 0.85rem;
    margin-top: clamp(1.4rem, 3.4vh, 2.6rem);
    position: relative;
    z-index: 3;
  }
  .pill {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: clamp(1rem, 1.35vw, 1.12rem);
    letter-spacing: 0.005em;
    padding: 1.05rem 2.15rem;
    border-radius: 999px;
    border: 1.8px solid rgba(52, 32, 42, 0.22);
    background: var(--glass-strong);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: var(--ink);
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 0.28s ease, border-color 0.28s ease, color 0.28s ease;
    white-space: nowrap;
  }
  .pill:hover {
    transform: translateY(-2px);
    border-color: var(--framboise);
    color: var(--corail);
    box-shadow: 0 12px 28px rgba(240, 70, 138, 0.22);
  }
  .pill--primary {
    border: none;
    color: var(--creme);
    background: linear-gradient(96deg, var(--framboise) 0%, var(--corail) 55%, var(--ambre) 110%);
    box-shadow: 0 12px 32px rgba(255, 106, 61, 0.36);
    position: relative;
    overflow: hidden;
    padding: 1.05rem 2.4rem;
  }
  .pill--primary::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(96deg, var(--ambre) 0%, var(--framboise) 100%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .pill--primary span { position: relative; z-index: 1; }
  .pill--primary:hover {
    transform: translateY(-2px);
    color: var(--creme);
    box-shadow: 0 16px 40px rgba(255, 106, 61, 0.46);
  }
  .pill--primary:hover::before { opacity: 1; }

  /* ============ QUOTE — une seule ligne, alignée à gauche, signature dessous ============ */
  .quote {
    margin: clamp(1.4rem, 3.4vh, 2.6rem) auto 0;
    max-width: min(92vw, 64ch);
    text-align: left;
    position: relative;
    z-index: 3;
  }
  .quote p {
    font-family: "Fraunces", Georgia, serif;
    font-style: italic;
    font-weight: 330;
    font-size: clamp(0.98rem, 1.7vw, 1.34rem);
    line-height: 1.4;
    color: var(--ink);
    margin: 0 0 0.5rem;
    white-space: nowrap;
  }
  .quote cite {
    display: block;
    font-family: "Space Grotesk", sans-serif;
    font-style: normal;
    font-weight: 600;
    font-size: 0.82rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--corail);
    text-align: left;
  }
  @media (max-width: 720px) {
    .quote p { white-space: normal; font-size: clamp(0.95rem, 4.2vw, 1.1rem); }
  }

  /* ============ DRAG STICKERS ============ */
  .stickers {
    position: absolute;
    inset: 0;
    z-index: 2;        /* sous le texte (z-index 3) — lecture préservée */
    pointer-events: none;
  }
  .sticker {
    position: absolute;
    pointer-events: auto;
    cursor: grab;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    will-change: transform;
    transition: filter 0.25s ease, transform 0.18s cubic-bezier(0.22,1,0.36,1);
    filter: drop-shadow(0 8px 16px rgba(52, 32, 42, 0.16));
    animation: floatWobble var(--dur, 7s) ease-in-out infinite alternate;
    animation-delay: var(--delay, 0s);
  }
  .sticker svg { display: block; width: 100%; height: 100%; }
  .sticker:hover { filter: drop-shadow(0 12px 22px rgba(240, 70, 138, 0.3)); }
  .sticker.is-dragging {
    cursor: grabbing;
    animation: none;
    filter: drop-shadow(0 18px 30px rgba(240, 70, 138, 0.4));
    transform: scale(1.08) rotate(var(--rot, 0deg));
    z-index: 9;
  }
  .sticker:focus-visible {
    outline: 2.5px solid var(--corail);
    outline-offset: 4px;
    border-radius: 12px;
  }
  @keyframes floatWobble {
    0%   { transform: translateY(0) rotate(var(--rot, 0deg)); }
    100% { transform: translateY(-12px) rotate(calc(var(--rot, 0deg) + var(--spin, 4deg))); }
  }

  /* word stickers */
  .sticker--word {
    display: grid;
    place-items: center;
    padding: 0.5rem 1.05rem;
    border-radius: 999px;
    font-family: "Fraunces", Georgia, serif;
    font-style: italic;
    font-weight: 460;
    font-size: clamp(0.95rem, 1.6vw, 1.25rem);
    color: #fff;
    white-space: nowrap;
  }
  .sticker--pause { background: linear-gradient(120deg, var(--framboise), var(--corail)); }
  .sticker--mood {
    background: var(--glass-strong);
    color: var(--ink);
    border: 1.6px dashed rgba(240, 70, 138, 0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .sticker--mood .sun { color: var(--corail); }

  /* drag hint */
  .drag-hint {
    position: absolute;
    z-index: 3;
    left: 50%;
    bottom: clamp(0.4rem, 2vh, 1.3rem);
    transform: translateX(-50%);
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-family: "Space Grotesk", sans-serif;
    font-weight: 500;
    font-size: 0.74rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-soft);
    opacity: 0.85;
    pointer-events: none;
  }
  .drag-hint svg {
    width: 16px; height: 16px;
    animation: handNudge 2.6s ease-in-out infinite;
  }
  @keyframes handNudge {
    0%, 100% { transform: translate(0,0) rotate(-4deg); }
    50%      { transform: translate(4px,-2px) rotate(6deg); }
  }

  /* ============ FOCUS / A11Y ============ */
  a:focus-visible, button:focus-visible {
    outline: 2.5px solid var(--corail);
    outline-offset: 3px;
    border-radius: 999px;
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 860px) {
    .nav__group a { font-size: 0.8rem; }
    .nav__group { gap: 1.05rem; }
  }
  @media (max-width: 760px) {
    .nav { grid-template-columns: auto 1fr auto; }
    .nav__group--left { display: none; }
    .nav__group--right { display: none; }
    .nav__burger { display: inline-flex; }
    .brand { align-items: flex-start; }
    .title { font-size: clamp(2.8rem, 13vw, 5.2rem); max-width: 12ch; }
    .social-bar__label { display: none; }
    .social { width: 42px; height: 42px; }
    /* on petits écrans : moins de stickers pour préserver la lecture */
    .sticker--secondary { display: none; }
  }
  @media (max-width: 420px) {
    .pill { font-size: 0.96rem; padding: 0.92rem 1.5rem; }
    .pill--primary { padding: 0.92rem 1.7rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
    }
    #gl { display: none; }
    .aurora__css { opacity: 0.95 !important; }
    .sticker { animation: none !important; }
    .drag-hint { display: none; }
  }
</style>
</head>
<body>
  <!-- ===================== AURORA BACKGROUND ===================== -->
  <div class="aurora" aria-hidden="true">
    <div class="aurora__css"></div>
    <canvas id="gl"></canvas>
    <div class="aurora__veil"></div>
    <div class="aurora__grain"></div>
  </div>

  <div class="shell">
    <!-- ===================== NAV — 3 colonnes ===================== -->
    <nav class="nav" aria-label="Navigation principale">
      <!-- Gauche -->
      <ul class="nav__group nav__group--left">
        <li><a href="#ateliers">Ateliers</a></li>
        <li><a href="#boutique">Boutique</a></li>
      </ul>

      <!-- Logo centré -->
      <a class="brand" href="#" aria-label="Soleia Expérience, accueil">
        <span class="brand__name">soleia</span>
        <span class="brand__sub">expérience</span>
      </a>

      <!-- Droite -->
      <div class="nav__right">
        <ul class="nav__group nav__group--right">
          <li><a href="#histoire">Histoire</a></li>
          <li><a href="#galerie">Galerie</a></li>
        </ul>
        <button class="account" aria-label="Mon compte">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
            <circle cx="12" cy="8" r="3.4"/>
            <path d="M5 20c0-3.6 3.1-6 7-6s7 2.4 7 6" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="nav__burger" aria-label="Ouvrir le menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <path d="M4 7h16M4 12h16M4 17h16" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </nav>

    <!-- ===================== SOCIAL ROW (dans le hero, visible) ===================== -->
    <div class="social-bar" aria-label="Réseaux sociaux de Soleia">
      <span class="social-bar__label" aria-hidden="true">Suivez le soleil <span class="sun">☀</span></span>
      <a class="social" href="#" aria-label="Instagram de Soleia">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
          <rect x="3.5" y="3.5" width="17" height="17" rx="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.2" cy="6.8" r="1.1" fill="currentColor" stroke="none"/>
        </svg>
      </a>

  <!-- ===================== WebGL AURORA SHADER (progressive enhancement) ===================== -->
  <script>
  (function () {
    var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) return;

    var canvas = document.getElementById("gl");
    if (!canvas) return;

    var gl = canvas.getContext("webgl", { antialias: true, alpha: false, premultipliedAlpha: false })
          || canvas.getContext("experimental-webgl");
    if (!gl) return; // CSS fallback stays visible — graceful degradation.

    var vertSrc =
      "attribute vec2 p;" +
      "void main(){ gl_Position = vec4(p, 0.0, 1.0); }";

    // Domain-warped fbm "aurora / mesh" — colorway « sunset pop » contrasté.
    var fragSrc = [
      "precision highp float;",
      "uniform vec2 u_res;",
      "uniform float u_time;",
      "",
      "vec3 FRAMB  = vec3(0.941, 0.275, 0.541);", // #f0468a framboise
      "vec3 CORAIL = vec3(1.000, 0.416, 0.239);", // #ff6a3d corail
      "vec3 AMBRE  = vec3(1.000, 0.706, 0.239);", // #ffb43d ambre
      "vec3 MAGENT = vec3(0.839, 0.208, 0.498);", // #d6357f magenta
      "vec3 CREAM  = vec3(1.000, 0.961, 0.925);", // #fff5ec creme
      "",
      "float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }",
      "float noise(vec2 p){",
      "  vec2 i = floor(p); vec2 f = fract(p);",
      "  vec2 u = f*f*(3.0-2.0*f);",
      "  return mix(mix(hash(i+vec2(0.0,0.0)), hash(i+vec2(1.0,0.0)), u.x),",
      "             mix(hash(i+vec2(0.0,1.0)), hash(i+vec2(1.0,1.0)), u.x), u.y);",
      "}",
      "float fbm(vec2 p){",
      "  float v = 0.0; float a = 0.5;",
      "  for(int i=0;i<5;i++){ v += a*noise(p); p *= 2.0; a *= 0.5; }",
      "  return v;",
      "}",
      "",
      "void main(){",
      "  vec2 uv = gl_FragCoord.xy / u_res.xy;",
      "  vec2 p = uv;",
      "  p.x *= u_res.x / u_res.y;",
      "  p *= 1.15;",
      "  float t = u_time * 0.05;",
      "  vec2 q = vec2(fbm(p + vec2(0.0, t)), fbm(p + vec2(5.2, -t)));",
      "  vec2 r = vec2(fbm(p + 3.0*q + vec2(1.7, 9.2) + 0.18*t),",
      "                fbm(p + 3.0*q + vec2(8.3, 2.8) - 0.14*t));",
      "  float f = fbm(p + 2.5*r);",
      "  // palette ramp — plus contrastée : creme -> ambre -> corail -> framboise -> magenta",
      "  vec3 col = mix(CREAM, AMBRE, smoothstep(0.0, 0.62, f));",
      "  col = mix(col, CORAIL, smoothstep(0.32, 0.9, f + 0.22*r.x));",
      "  col = mix(col, FRAMB, smoothstep(0.5, 1.04, length(r)));",
      "  col = mix(col, MAGENT, smoothstep(0.72, 1.18, length(r) + 0.2*q.y) * 0.85);",
      "  // saturation lift for the pop look",
      "  float lum = dot(col, vec3(0.299, 0.587, 0.114));",
      "  col = mix(vec3(lum), col, 1.12);",
      "  // lift toward cream near the top so the outline title stays readable",
      "  col = mix(col, CREAM, smoothstep(0.5, 1.0, 1.0 - uv.y) * 0.5);",
      "  // gentle cream vignette",
      "  float d = distance(uv, vec2(0.5, 0.5));",
      "  col = mix(col, CREAM, smoothstep(0.5, 1.0, d) * 0.3);",
      "  gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);",
      "}"
    ].join("\n");

    function compile(type, src) {
      var s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
        gl.deleteShader(s);
        return null;
      }
      return s;
    }

    var vs = compile(gl.VERTEX_SHADER, vertSrc);
    var fs = compile(gl.FRAGMENT_SHADER, fragSrc);
    if (!vs || !fs) return;

    var prog = gl.createProgram();
    gl.attachShader(prog, vs);
    gl.attachShader(prog, fs);
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) return;
    gl.useProgram(prog);

    var buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
    var loc = gl.getAttribLocation(prog, "p");
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

    var uRes = gl.getUniformLocation(prog, "u_res");
    var uTime = gl.getUniformLocation(prog, "u_time");

    var dpr = Math.min(window.devicePixelRatio || 1, 1.5);
    function resize() {
      var w = Math.floor(canvas.clientWidth * dpr);
      var h = Math.floor(canvas.clientHeight * dpr);
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w; canvas.height = h;
        gl.viewport(0, 0, w, h);
      }
    }
    window.addEventListener("resize", resize);
    resize();

    document.querySelector(".aurora").classList.add("gl-ready");
    document.body.classList.add("gl-ready");

    var start = performance.now();
    var running = true;
    var elapsed = 0;
    document.addEventListener("visibilitychange", function () {
      running = !document.hidden;
      if (running) { start = performance.now() - elapsed; requestAnimationFrame(loop); }
    });

    function loop(now) {
      if (!running) return;
      resize();
      elapsed = now - start;
      gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.uniform1f(uTime, elapsed * 0.001);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  })();
  </script>

  <!-- ===================== DRAG STICKERS (progressive enhancement) ===================== -->
  <script>
  (function () {
    var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    var layer = document.getElementById("stickers");
    if (!layer) return;

    var stickers = Array.prototype.slice.call(layer.querySelectorAll(".sticker"));

    // Place each sticker from its data-x / data-y percentage of the layer.
    function placeAll() {
      var rect = layer.getBoundingClientRect();
      stickers.forEach(function (el) {
        if (el.dataset.placed === "1") return;
        var px = parseFloat(el.dataset.x) / 100;
        var py = parseFloat(el.dataset.y) / 100;
        var w = el.offsetWidth, h = el.offsetHeight;
        var x = px * rect.width - w / 2;
        var y = py * rect.height - h / 2;
        // keep within bounds
        x = Math.max(2, Math.min(rect.width - w - 2, x));
        y = Math.max(2, Math.min(rect.height - h - 2, y));
        el.style.left = x + "px";
        el.style.top = y + "px";
      });
    }

    // Re-place on resize only while nothing has been dragged yet.
    var anyDragged = false;
    window.addEventListener("resize", function () { if (!anyDragged) placeAll(); });

    // Wait a tick so layout (and fonts) settle, then place.
    if (document.readyState === "complete") placeAll();
    else window.addEventListener("load", placeAll);
    requestAnimationFrame(placeAll);

    if (reduce) return; // No dragging when reduced motion is requested.

    var active = null, startX = 0, startY = 0, originLeft = 0, originTop = 0;

    function onDown(e) {
      var el = e.currentTarget;
      active = el;
      anyDragged = true;
      el.dataset.placed = "1";
      el.classList.add("is-dragging");
      var rect = el.getBoundingClientRect();
      var parentRect = layer.getBoundingClientRect();
      // lock current position relative to layer before dragging
      originLeft = rect.left - parentRect.left;
      originTop = rect.top - parentRect.top;
      el.style.left = originLeft + "px";
      el.style.top = originTop + "px";
      startX = e.clientX;
      startY = e.clientY;
      if (el.setPointerCapture && e.pointerId !== undefined) {
        try { el.setPointerCapture(e.pointerId); } catch (err) {}
      }
      e.preventDefault();
    }

    function onMove(e) {
      if (!active) return;
      var parentRect = layer.getBoundingClientRect();
      var w = active.offsetWidth, h = active.offsetHeight;
      var nx = originLeft + (e.clientX - startX);
      var ny = originTop + (e.clientY - startY);
      nx = Math.max(-w * 0.25, Math.min(parentRect.width - w * 0.75, nx));
      ny = Math.max(-h * 0.25, Math.min(parentRect.height - h * 0.75, ny));
      active.style.left = nx + "px";
      active.style.top = ny + "px";
    }

    function onUp(e) {
      if (!active) return;
      active.classList.remove("is-dragging");
      if (active.releasePointerCapture && e.pointerId !== undefined) {
        try { active.releasePointerCapture(e.pointerId); } catch (err) {}
      }
      active = null;
    }

    stickers.forEach(function (el) {
      el.addEventListener("pointerdown", onDown);
      // keyboard nudge for accessibility
      el.addEventListener("keydown", function (ev) {
        var step = ev.shiftKey ? 24 : 8;
        var moved = true;
        var left = parseFloat(el.style.left) || 0;
        var top = parseFloat(el.style.top) || 0;
        switch (ev.key) {
          case "ArrowLeft":  left -= step; break;
          case "ArrowRight": left += step; break;
          case "ArrowUp":    top -= step; break;
          case "ArrowDown":  top += step; break;
          default: moved = false;
        }
        if (moved) {
          anyDragged = true;
          el.dataset.placed = "1";
          var parentRect = layer.getBoundingClientRect();
          var w = el.offsetWidth, h = el.offsetHeight;
          left = Math.max(0, Math.min(parentRect.width - w, left));
          top = Math.max(0, Math.min(parentRect.height - h, top));
          el.style.left = left + "px";
          el.style.top = top + "px";
          ev.preventDefault();
        }
      });
    });

    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
    window.addEventListener("pointercancel", onUp);
  })();
  </script>
