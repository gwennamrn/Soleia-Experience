<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Soleia Expérience — La pause créative qui fait du BIEN</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..600&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Palette V1 « Aurora signature » : rose + orange adoucis, beaucoup de crème */
    --rose: #f98bb6;
    --rose-deep: #f56c9f;
    --orange: #f7995a;
    --orange-deep: #f4823c;
    --rose-clair: #fbeaea;
    --creme: #fdf7f1;
    --creme-2: #fef9f4;
    --ink: #3a2a2e;
    --ink-soft: #71565b;
    --glass: rgba(254, 249, 244, 0.6);
    --glass-strong: rgba(254, 249, 244, 0.78);
    --line: rgba(58, 42, 46, 0.16);
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body { margin: 0; padding: 0; height: 100%; }

  body {
    font-family: "Space Grotesk", system-ui, sans-serif;
    color: var(--ink);
    background: var(--creme);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  /* ============ AURORA BACKGROUND (doux + crémeux, ambiant, non déplaçable) ============ */
  .aurora {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    background: var(--creme);
  }

  /* Fallback CSS : mesh radial animé, pastel et aéré (rendu complet sans JS/WebGL) */
  .aurora__css {
    position: absolute;
    inset: -20%;
    filter: blur(72px) saturate(0.96);
    opacity: 0.82;
    transition: opacity 0.8s ease;
  }
  .aurora__css::before,
  .aurora__css::after {
    content: "";
    position: absolute;
    inset: 0;
    background-repeat: no-repeat;
  }
  .aurora__css::before {
    background:
      radial-gradient(42% 50% at 20% 28%, rgba(249, 139, 182, 0.6), transparent 72%),
      radial-gradient(46% 54% at 80% 36%, rgba(247, 153, 90, 0.55), transparent 74%),
      radial-gradient(58% 64% at 50% 86%, rgba(251, 234, 234, 0.92), transparent 76%);
    animation: drift1 24s ease-in-out infinite alternate;
  }
  .aurora__css::after {
    background:
      radial-gradient(38% 46% at 66% 20%, rgba(249, 139, 182, 0.42), transparent 72%),
      radial-gradient(44% 52% at 16% 72%, rgba(247, 153, 90, 0.38), transparent 74%),
      radial-gradient(60% 58% at 88% 82%, rgba(254, 249, 244, 0.92), transparent 76%);
    animation: drift2 30s ease-in-out infinite alternate;
    mix-blend-mode: screen;
  }
  @keyframes drift1 {
    0%   { transform: translate(0, 0) scale(1) rotate(0deg); }
    100% { transform: translate(3.5%, -2.5%) scale(1.1) rotate(7deg); }
  }
  @keyframes drift2 {
    0%   { transform: translate(0, 0) scale(1.05) rotate(0deg); }
    100% { transform: translate(-4.5%, 3.5%) scale(1) rotate(-9deg); }
  }

  /* WebGL canvas par-dessus le fallback une fois prêt */
  #gl {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 1.2s ease;
  }
  .gl-ready #gl { opacity: 1; }
  .gl-ready .aurora__css { opacity: 0; }

  /* Voile crème : respiration + texte net */
  .aurora__veil {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(125% 95% at 50% 4%, transparent 34%, rgba(254, 249, 244, 0.5) 100%),
      radial-gradient(85% 72% at 30% 46%, rgba(254, 249, 244, 0.46), transparent 64%),
      linear-gradient(180deg, rgba(254, 249, 244, 0.28) 0%, transparent 26%, transparent 74%, rgba(253, 247, 241, 0.34) 100%);
    pointer-events: none;
  }
  .aurora__grain {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.045;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* ============ SHELL (sans keyline / sans cadre) ============ */
  .shell {
    position: relative;
    z-index: 2;
    height: 100svh;
    min-height: 600px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: clamp(0.9rem, 2.2vw, 1.7rem) clamp(1.2rem, 5vw, 4.5rem) clamp(1rem, 2.2vh, 1.6rem);
  }

  /* ============ NAV — 3 colonnes : liens gauche | logo centré | liens droite + réseaux ============ */
  .nav {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: clamp(0.8rem, 2vw, 2rem);
  }

  .nav__col {
    display: flex;
    align-items: center;
    gap: clamp(1rem, 2.2vw, 2.1rem);
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .nav__col--left { justify-self: start; }
  .nav__col--right {
    justify-self: end;
    gap: clamp(1rem, 1.9vw, 1.8rem);
  }
  .nav__col a.nav__link {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 400;
    font-size: clamp(0.86rem, 1vw, 0.94rem);
    letter-spacing: 0.01em;
    color: var(--ink);
    text-decoration: none;
    position: relative;
    padding: 0.35rem 0.1rem;
    transition: color 0.25s ease;
    white-space: nowrap;
  }
  .nav__col a.nav__link::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: 0.05rem;
    height: 1.5px;
    background: linear-gradient(90deg, var(--rose-deep), var(--orange-deep));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .nav__col a.nav__link:hover::after,
  .nav__col a.nav__link:focus-visible::after { transform: scaleX(1); }
  .nav__col a.nav__link:hover { color: var(--orange-deep); }

  /* Logotype centré */
  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 0.9;
    text-decoration: none;
    color: var(--ink);
    justify-self: center;
  }
  .brand__name {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 500;
    font-size: clamp(1.45rem, 2.4vw, 1.95rem);
    letter-spacing: -0.015em;
    color: var(--ink);
  }
  .brand__sub {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 300;
    font-size: 0.6rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 0.36rem;
    margin-left: 0.22em;
  }

  /* Réseaux + compte (à droite, au-dessus de la ligne de flottaison) */
  .nav__socials {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding-left: 0.4rem;
    margin-left: 0.2rem;
    border-left: 1px solid rgba(58, 42, 46, 0.14);
  }
  .icon-btn {
    display: grid;
    place-items: center;
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1.5px solid rgba(58, 42, 46, 0.16);
    background: var(--glass-strong);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--ink);
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.25s ease, color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
  }
  .icon-btn:hover {
    transform: translateY(-2px);
    color: var(--orange-deep);
    border-color: var(--rose-deep);
    box-shadow: 0 8px 20px rgba(249, 139, 182, 0.28);
  }
  .icon-btn svg { width: 18px; height: 18px; }
  .account { color: var(--ink); }
  .account svg { width: 18px; height: 18px; }

  .nav__burger {
    display: none;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1.5px solid rgba(58, 42, 46, 0.16);
    background: var(--glass-strong);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--ink);
    cursor: pointer;
    align-items: center;
    justify-content: center;
  }
  .nav__burger svg { width: 20px; height: 20px; }

  /* ============ HERO — éditorial, asymétrique, aligné à gauche ============ */
  .hero {
    position: relative;
    display: grid;
    grid-template-columns: minmax(0, 1fr);
    align-content: center;
    padding: clamp(0.4rem, 1.6vh, 1.4rem) clamp(0.2rem, 1.6vw, 2rem) 0;
  }

  .title {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 360;
    font-size: clamp(3rem, 10vw, 9.6rem);
    line-height: 0.92;
    letter-spacing: -0.026em;
    margin: 0;
    color: var(--ink);
    text-align: left;
    max-width: 15ch;
    font-variation-settings: "opsz" 144;
  }
  .title .line { display: block; }
  .title em {
    font-style: italic;
    font-weight: 340;
    font-variation-settings: "opsz" 144;
  }

  /* Un mot en CONTOUR — « créative » (propre, lisible, sans cadre ni label) */
  .stroke {
    font-style: italic;
    font-weight: 360;
    color: transparent;
    -webkit-text-fill-color: transparent;
    -webkit-text-stroke: 1.4px var(--ink);
    text-stroke: 1.4px var(--ink);
    padding-right: 0.05em;
  }

  /* « BIEN » — texte dégradé + halo doux (signature V1) */
  .bien {
    position: relative;
    display: inline-block;
    font-style: normal;
    font-weight: 600;
    letter-spacing: -0.01em;
    background: linear-gradient(96deg, var(--rose-deep) 0%, #fa7e58 52%, var(--orange-deep) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    padding-right: 0.06em;
  }
  .bien::after {
    content: "BIEN.";
    position: absolute;
    inset: 0;
    z-index: -1;
    background: linear-gradient(96deg, var(--rose-deep) 0%, var(--orange-deep) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    filter: blur(18px);
    opacity: 0.6;
    animation: glow 4.5s ease-in-out infinite;
  }
  @keyframes glow {
    0%, 100% { opacity: 0.42; filter: blur(16px); }
    50%      { opacity: 0.72; filter: blur(24px); }
  }

  /* ============ PILL BUTTONS — gros, texte en gras, alignés à gauche ============ */
  .actions {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: flex-start;
    gap: clamp(0.6rem, 1.2vw, 0.95rem);
    margin-top: clamp(1.5rem, 4.4vh, 2.8rem);
  }
  .pill {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: clamp(1.02rem, 1.35vw, 1.16rem);
    letter-spacing: 0.005em;
    padding: clamp(1rem, 1.7vh, 1.25rem) clamp(1.7rem, 2.6vw, 2.4rem);
    border-radius: 999px;
    border: 1.5px solid rgba(58, 42, 46, 0.2);
    background: var(--glass-strong);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: var(--ink);
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 0.28s ease, border-color 0.28s ease, color 0.28s ease;
    white-space: nowrap;
  }
  .pill:hover {
    transform: translateY(-2px);
    border-color: var(--rose-deep);
    color: var(--orange-deep);
    box-shadow: 0 10px 26px rgba(249, 139, 182, 0.24);
  }
  .pill--primary {
    border: none;
    color: var(--creme);
    background: linear-gradient(96deg, var(--rose-deep) 0%, var(--orange-deep) 100%);
    box-shadow: 0 12px 32px rgba(244, 130, 60, 0.34);
    position: relative;
    overflow: hidden;
  }
  .pill--primary::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(96deg, var(--orange-deep) 0%, var(--rose-deep) 100%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .pill--primary span { position: relative; z-index: 1; }
  .pill--primary:hover {
    transform: translateY(-2px);
    color: var(--creme);
    box-shadow: 0 16px 40px rgba(244, 130, 60, 0.46);
  }
  .pill--primary:hover::before { opacity: 1; }

  /* ============ QUOTE — une ligne, alignée à gauche, signature dessous ============ */
  .quote {
    margin: 0;
    max-width: min(92vw, 70ch);
    text-align: left;
    justify-self: start;
  }
  .quote p {
    font-family: "Fraunces", Georgia, serif;
    font-style: italic;
    font-weight: 330;
    font-size: clamp(0.98rem, 1.7vw, 1.32rem);
    line-height: 1.4;
    color: var(--ink);
    margin: 0 0 0.5rem;
    white-space: nowrap;
  }
  .quote cite {
    display: block;
    font-family: "Space Grotesk", sans-serif;
    font-style: normal;
    font-weight: 600;
    font-size: 0.82rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--orange-deep);
  }

  /* ============ DRAGGABLE STICKERS (jolis, hors zones de lecture) ============ */
  .stickers {
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    overflow: hidden;
  }
  .sticker {
    position: absolute;
    pointer-events: auto;
    cursor: grab;
    filter: drop-shadow(0 6px 14px rgba(244, 130, 60, 0.22));
    transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1);
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    will-change: transform;
    animation: floaty 7s ease-in-out infinite;
  }
  .sticker > svg, .sticker .word { display: block; }
  .sticker:hover { transform: scale(1.08) rotate(-3deg); }
  .sticker:active,
  .sticker.dragging { cursor: grabbing; animation: none; transition: none; }
  .sticker:focus-visible {
    outline: 2.5px solid var(--orange-deep);
    outline-offset: 4px;
    border-radius: 12px;
  }
  .sticker--s2 { animation-delay: -2.4s; }
  .sticker--s3 { animation-delay: -4.1s; }
  .sticker--s4 { animation-delay: -1.2s; }
  @keyframes floaty {
    0%, 100% { translate: 0 0; }
    50%      { translate: 0 -9px; }
  }
  .sticker--spin > svg { animation: spin 26s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Mot-sticker joli */
  .sticker--word .word {
    font-family: "Fraunces", Georgia, serif;
    font-style: italic;
    font-weight: 500;
    font-size: clamp(1.1rem, 1.5vw, 1.4rem);
    letter-spacing: 0.01em;
    color: var(--creme);
    background: linear-gradient(120deg, var(--rose-deep), var(--orange-deep));
    padding: 0.4rem 1rem;
    border-radius: 999px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2);
  }

  /* ============ DRAG HINT — coin bas-droit VIDE, jamais sur le titre ============ */
  .drag-hint {
    position: absolute;
    z-index: 4;
    right: clamp(1.2rem, 4vw, 3.6rem);
    bottom: clamp(2.4rem, 7vh, 4.4rem);
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-family: "Space Grotesk", sans-serif;
    font-weight: 400;
    font-size: 0.7rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
    background: var(--glass);
    border: 1px solid rgba(58, 42, 46, 0.12);
    border-radius: 999px;
    padding: 0.36rem 0.78rem;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    pointer-events: none;
    opacity: 0.8;
  }
  .drag-hint .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, var(--orange), var(--rose-deep));
    animation: hintpulse 2.6s ease-out infinite;
  }
  @keyframes hintpulse {
    0%   { box-shadow: 0 0 0 0 rgba(245, 108, 159, 0.5); }
    70%  { box-shadow: 0 0 0 8px rgba(245, 108, 159, 0); }
    100% { box-shadow: 0 0 0 0 rgba(245, 108, 159, 0); }
  }
  .drag-hint svg { width: 14px; height: 14px; }

  /* ============ FOOTER (citation à gauche) ============ */
  .foot {
    display: flex;
    align-items: flex-end;
    justify-content: flex-start;
    padding-top: clamp(0.6rem, 1.4vh, 1.1rem);
  }

  /* ============ FOCUS / A11Y ============ */
  a:focus-visible, button:focus-visible {
    outline: 2.5px solid var(--orange-deep);
    outline-offset: 3px;
    border-radius: 999px;
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 900px) {
    .quote p { white-space: normal; }
  }
  @media (max-width: 760px) {
    .nav { grid-template-columns: auto auto; }
    .nav__col--left { display: none; }
    .nav__col--right .nav__link { display: none; }
    .brand { justify-self: start; align-items: flex-start; }
    .nav__burger { display: inline-flex; }
    .title { font-size: clamp(2.7rem, 13.5vw, 5rem); max-width: 12ch; }
    .actions .pill { font-size: 1rem; }
    .sticker { display: none; }
    .drag-hint { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
    }
    #gl { display: none; }
    .aurora__css { opacity: 0.82 !important; }
    .sticker { animation: none; cursor: default; pointer-events: none; }
    .drag-hint { display: none; }
  }
</style>
</head>
<body>
  <!-- ===================== AURORA BACKGROUND (ambiant, non déplaçable) ===================== -->
  <div class="aurora" aria-hidden="true">
    <div class="aurora__css"></div>
    <canvas id="gl"></canvas>
    <div class="aurora__veil"></div>
    <div class="aurora__grain"></div>
  </div>

  <div class="shell">
    <!-- ===================== NAV (3 colonnes, logo centré) ===================== -->
    <nav class="nav" aria-label="Navigation principale">
      <!-- Colonne gauche : Ateliers + Boutique -->
      <ul class="nav__col nav__col--left">
        <li><a class="nav__link" href="#ateliers">Ateliers</a></li>
        <li><a class="nav__link" href="#boutique">Boutique</a></li>
      </ul>

      <!-- Logotype centré -->
      <a class="brand" href="#" aria-label="Soleia Expérience, accueil">
        <span class="brand__name">soleia</span>
        <span class="brand__sub">expérience</span>
      </a>

      <!-- Colonne droite : Histoire + Galerie + réseaux + compte -->
      <div class="nav__col nav__col--right">
        <a class="nav__link" href="#histoire">Histoire</a>
        <a class="nav__link" href="#galerie">Galerie</a>

        <div class="nav__socials" role="group" aria-label="Réseaux sociaux">
          <a class="icon-btn" href="#" aria-label="Instagram de Soleia">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
              <rect x="3.5" y="3.5" width="17" height="17" rx="5"/>
              <circle cx="12" cy="12" r="4"/>
              <circle cx="17.2" cy="6.8" r="1.1" fill="currentColor" stroke="none"/>
            </svg>
          </a>
          <a class="icon-btn" href="#" aria-label="Pinterest de Soleia">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 3.5a8.5 8.5 0 0 0-3.1 16.4c-.07-.7-.13-1.78.03-2.55.14-.66.92-4.2.92-4.2s-.24-.47-.24-1.17c0-1.1.64-1.92 1.43-1.92.67 0 1 .5 1 1.1 0 .68-.43 1.69-.65 2.63-.19.78.4 1.42 1.17 1.42 1.4 0 2.48-1.48 2.48-3.62 0-1.9-1.36-3.22-3.3-3.22a3.43 3.43 0 0 0-3.58 3.44c0 .68.26 1.42.59 1.81a.24.24 0 0 1 .05.23l-.22.9c-.04.15-.12.18-.27.11-1-.47-1.63-1.93-1.63-3.1 0-2.53 1.84-4.85 5.3-4.85 2.78 0 4.94 1.98 4.94 4.63 0 2.76-1.74 4.98-4.16 4.98-.81 0-1.57-.42-1.83-.92l-.5 1.9c-.18.7-.67 1.57-1 2.1A8.5 8.5 0 1 0 12 3.5Z" fill="currentColor"/>
            </svg>
          </a>
          <a class="icon-btn" href="#contact" aria-label="Contacter Soleia par e-mail">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
              <rect x="3" y="5" width="18" height="14" rx="3"/>
              <path d="m4 7 8 5.5L20 7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </div>

        <button class="icon-btn account" aria-label="Mon compte">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
            <circle cx="12" cy="8" r="3.4"/>
            <path d="M5 20c0-3.6 3.1-6 7-6s7 2.4 7 6" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="nav__burger" aria-label="Ouvrir le menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <path d="M4 7h16M4 12h16M4 17h16" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </nav>

  <!-- ===================== DRAG STICKERS (souris + tactile + clavier) ===================== -->
  <script>
  (function () {
    var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) return;

    var stickers = document.querySelectorAll("[data-sticker]");
    stickers.forEach(function (el) {
      var dx = 0, dy = 0;          // décalage cumulé appliqué via translate
      var startX = 0, startY = 0;  // position pointeur au début du drag
      var baseX = 0, baseY = 0;    // décalage au début du drag
      var dragging = false;
      var pid = null;
      var floatPaused = false;

      function apply() {
        el.style.transform = "translate(" + dx + "px," + dy + "px)";
      }

      function pointerDown(e) {
        dragging = true;
        el.classList.add("dragging");
        el.setPointerCapture && el.setPointerCapture(e.pointerId);
        pid = e.pointerId;
        startX = e.clientX; startY = e.clientY;
        baseX = dx; baseY = dy;
        el.style.zIndex = 6;
        e.preventDefault();
      }
      function pointerMove(e) {
        if (!dragging || (pid !== null && e.pointerId !== pid)) return;
        dx = baseX + (e.clientX - startX);
        dy = baseY + (e.clientY - startY);
        apply();
      }
      function pointerUp(e) {
        if (!dragging) return;
        dragging = false;
        el.classList.remove("dragging");
        try { el.releasePointerCapture && el.releasePointerCapture(pid); } catch (err) {}
        pid = null;
      }

      el.addEventListener("pointerdown", pointerDown);
      el.addEventListener("pointermove", pointerMove);
      el.addEventListener("pointerup", pointerUp);
      el.addEventListener("pointercancel", pointerUp);

      // Accessibilité : déplacement au clavier (flèches)
      el.addEventListener("keydown", function (e) {
        var step = e.shiftKey ? 24 : 8;
        var moved = true;
        switch (e.key) {
          case "ArrowLeft":  dx -= step; break;
          case "ArrowRight": dx += step; break;
          case "ArrowUp":    dy -= step; break;
          case "ArrowDown":  dy += step; break;
          default: moved = false;
        }
        if (moved) {
          if (!floatPaused) { el.style.animation = "none"; floatPaused = true; }
          apply();
          e.preventDefault();
        }
      });
    });
  })();
  </script>

  <!-- ===================== WebGL AURORA SHADER (amélioration progressive) ===================== -->
  <script>
  (function () {
    // Respecte reduced motion : garde le fallback CSS calme, pas de shader.
    var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) return;

    var canvas = document.getElementById("gl");
    if (!canvas) return;

    var gl = canvas.getContext("webgl", { antialias: true, alpha: false, premultipliedAlpha: false })
          || canvas.getContext("experimental-webgl");
    if (!gl) return; // fallback CSS reste visible — dégradation gracieuse.

    var vertSrc =
      "attribute vec2 p;" +
      "void main(){ gl_Position = vec4(p, 0.0, 1.0); }";

    // Domain-warped fbm « aurora » : rose/orange adoucis, beaucoup de crème.
    var fragSrc = [
      "precision highp float;",
      "uniform vec2 u_res;",
      "uniform float u_time;",
      "",
      "vec3 ROSE   = vec3(0.976, 0.545, 0.714);",
      "vec3 ORANGE = vec3(0.969, 0.600, 0.353);",
      "vec3 CREAM  = vec3(0.992, 0.969, 0.945);",
      "vec3 ROSEL  = vec3(0.984, 0.918, 0.918);",
      "",
      "float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }",
      "float noise(vec2 p){",
      "  vec2 i = floor(p); vec2 f = fract(p);",
      "  vec2 u = f*f*(3.0-2.0*f);",
      "  return mix(mix(hash(i+vec2(0.0,0.0)), hash(i+vec2(1.0,0.0)), u.x),",
      "             mix(hash(i+vec2(0.0,1.0)), hash(i+vec2(1.0,1.0)), u.x), u.y);",
      "}",
      "float fbm(vec2 p){",
      "  float v = 0.0; float a = 0.5;",
      "  for(int i=0;i<5;i++){ v += a*noise(p); p *= 2.0; a *= 0.5; }",
      "  return v;",
      "}",
      "",
      "void main(){",
      "  vec2 uv = gl_FragCoord.xy / u_res.xy;",
      "  vec2 p = uv;",
      "  p.x *= u_res.x / u_res.y;",
      "  float t = u_time * 0.04;",
      "  vec2 q = vec2(fbm(p + vec2(0.0, t)), fbm(p + vec2(5.2, -t)));",
      "  vec2 r = vec2(fbm(p + 3.0*q + vec2(1.7, 9.2) + 0.15*t),",
      "                fbm(p + 3.0*q + vec2(8.3, 2.8) - 0.12*t));",
      "  float f = fbm(p + 2.4*r);",
      "  vec3 col = mix(CREAM, ROSEL, smoothstep(0.0, 0.62, f));",
      "  col = mix(col, ROSE, smoothstep(0.42, 0.98, f + 0.22*r.x) * 0.82);",
      "  col = mix(col, ORANGE, smoothstep(0.6, 1.08, length(r)) * 0.78);",
      "  col = mix(col, CREAM, 0.16);",
      "  // remonte vers la crème en haut-gauche pour la lisibilité du titre éditorial",
      "  float topLeft = smoothstep(0.4, 1.0, uv.y) * smoothstep(0.78, 0.0, uv.x);",
      "  col = mix(col, CREAM, topLeft * 0.42);",
      "  col = mix(col, CREAM, smoothstep(0.5, 1.0, 1.0 - uv.y) * 0.42);",
      "  float d = distance(uv, vec2(0.42, 0.52));",
      "  col = mix(col, CREAM, smoothstep(0.42, 0.95, d) * 0.38);",
      "  gl_FragColor = vec4(col, 1.0);",
      "}"
    ].join("\n");

    function compile(type, src) {
      var s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
        gl.deleteShader(s);
        return null;
      }
      return s;
    }

    var vs = compile(gl.VERTEX_SHADER, vertSrc);
    var fs = compile(gl.FRAGMENT_SHADER, fragSrc);
    if (!vs || !fs) return; // fallback reste

    var prog = gl.createProgram();
    gl.attachShader(prog, vs);
    gl.attachShader(prog, fs);
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) return;
    gl.useProgram(prog);

    var buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
    var loc = gl.getAttribLocation(prog, "p");
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

    var uRes = gl.getUniformLocation(prog, "u_res");
    var uTime = gl.getUniformLocation(prog, "u_time");

    var dpr = Math.min(window.devicePixelRatio || 1, 1.5);
    function resize() {
      var w = Math.floor(canvas.clientWidth * dpr);
      var h = Math.floor(canvas.clientHeight * dpr);
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w; canvas.height = h;
        gl.viewport(0, 0, w, h);
      }
    }
    window.addEventListener("resize", resize);
    resize();

    document.querySelector(".aurora").classList.add("gl-ready");
    document.body.classList.add("gl-ready");

    var start = performance.now();
    var running = true;
    var elapsed = 0;
    document.addEventListener("visibilitychange", function () {
      running = !document.hidden;
      if (running) { start = performance.now() - elapsed; requestAnimationFrame(loop); }
    });

    function loop(now) {
      if (!running) return;
      resize();
      elapsed = now - start;
      gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.uniform1f(uTime, elapsed * 0.001);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  })();
  </script>
