<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Soleia Expérience — La pause créative qui fait du BIEN</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..600&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Colorway « rose poudré + crème » — plus doux que la 08 */
    --rose: #e98fa6;          /* rose poudré */
    --rose-deep: #d96f92;     /* rose un peu plus saturé pour accents */
    --blush: #f6cdd2;         /* blush riso */
    --peche: #f4b59a;         /* pêche tendre, remplace l'orange vif */
    --rose-pale: #f7e3e4;
    --creme: #fdf4ee;
    --creme-deep: #fbeadf;
    --ink: #4a2f38;
    --ink-soft: #8a6671;
    --glass: rgba(253, 244, 238, 0.5);
    --fine: 0.06em;
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body { margin: 0; padding: 0; }

  body {
    font-family: "Space Grotesk", system-ui, sans-serif;
    color: var(--ink);
    background: var(--creme);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  /* ============ FOND RISO / GRAIN ============ */
  .aurora {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    background: var(--creme);
  }

  /* Fallback CSS : mesh animé rose poudré + crème (sans JS / sans WebGL) */
  .aurora__css {
    position: absolute;
    inset: -20%;
    filter: blur(64px) saturate(1.02);
    opacity: 0.95;
    transition: opacity 0.8s ease;
  }
  .aurora__css::before,
  .aurora__css::after {
    content: "";
    position: absolute;
    inset: 0;
    background-repeat: no-repeat;
  }
  .aurora__css::before {
    background:
      radial-gradient(42% 52% at 24% 28%, rgba(233, 143, 166, 0.78), transparent 70%),
      radial-gradient(46% 56% at 80% 40%, rgba(244, 181, 154, 0.7), transparent 72%),
      radial-gradient(52% 60% at 50% 84%, rgba(246, 205, 210, 0.9), transparent 76%);
    animation: drift1 24s ease-in-out infinite alternate;
  }
  .aurora__css::after {
    background:
      radial-gradient(40% 48% at 66% 20%, rgba(233, 143, 166, 0.55), transparent 70%),
      radial-gradient(44% 52% at 16% 72%, rgba(244, 181, 154, 0.5), transparent 72%),
      radial-gradient(56% 56% at 90% 82%, rgba(253, 244, 238, 0.9), transparent 74%);
    animation: drift2 30s ease-in-out infinite alternate;
    mix-blend-mode: screen;
  }
  @keyframes drift1 {
    0%   { transform: translate(0, 0) scale(1) rotate(0deg); }
    100% { transform: translate(4%, -3%) scale(1.12) rotate(7deg); }
  }
  @keyframes drift2 {
    0%   { transform: translate(0, 0) scale(1.05) rotate(0deg); }
    100% { transform: translate(-5%, 4%) scale(1) rotate(-9deg); }
  }

  /* Canvas WebGL au-dessus du fallback */
  #gl {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 1.2s ease;
  }
  .gl-ready #gl { opacity: 1; }
  .gl-ready .aurora__css { opacity: 0; }

  /* Voile crème pour garder le texte net */
  .aurora__veil {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(120% 92% at 50% 6%, transparent 38%, rgba(253, 244, 238, 0.42) 100%),
      radial-gradient(84% 72% at 50% 50%, rgba(253, 244, 238, 0.3), transparent 62%);
    pointer-events: none;
  }

  /* GRAIN RENFORCÉ — effet riso (plus marqué que la 08) */
  .aurora__grain {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.14;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.82' numOctaves='3' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  /* Deuxième couche riso : points fins + halftone subtil */
  .aurora__riso {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.5;
    mix-blend-mode: soft-light;
    background-image:
      radial-gradient(rgba(217, 111, 146, 0.5) 0.7px, transparent 0.8px),
      radial-gradient(rgba(244, 181, 154, 0.45) 0.7px, transparent 0.8px);
    background-size: 5px 5px, 7px 7px;
    background-position: 0 0, 2px 3px;
  }

  /* ============ SHELL ============ */
  .shell {
    position: relative;
    z-index: 2;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    padding: clamp(1rem, 2.2vw, 1.7rem) clamp(1.2rem, 5vw, 4.5rem) clamp(1rem, 2.2vh, 1.6rem);
  }

  /* ============ NAV — 3 colonnes ============ */
  .nav {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: clamp(0.8rem, 2vw, 2rem);
  }
  .nav__group {
    display: flex;
    align-items: center;
    list-style: none;
    margin: 0;
    padding: 0;
    gap: clamp(1rem, 2.2vw, 2.2rem);
  }
  .nav__group--left { justify-content: flex-end; }
  .nav__group--right { justify-content: flex-start; }

  /* Liens de menu EN CONTOUR / lettres évidées (direction V3) */
  .nav__group a {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 600;
    font-size: clamp(0.86rem, 1.25vw, 1rem);
    letter-spacing: 0.02em;
    text-transform: lowercase;
    text-decoration: none;
    position: relative;
    padding: 0.3rem 0.1rem;
    /* contour : remplissage transparent + stroke encre */
    color: transparent;
    -webkit-text-fill-color: transparent;
    -webkit-text-stroke: 1px var(--ink);
    transition: -webkit-text-fill-color 0.3s ease, color 0.3s ease, -webkit-text-stroke-color 0.3s ease;
  }
  .nav__group a::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -0.02rem;
    height: 2px;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--rose), var(--peche));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1);
  }
  /* au survol : le contour se remplit (rose poudré) — meilleur contraste */
  .nav__group a:hover,
  .nav__group a:focus-visible {
    color: var(--rose-deep);
    -webkit-text-fill-color: var(--rose-deep);
    -webkit-text-stroke-color: var(--rose-deep);
  }
  .nav__group a:hover::after,
  .nav__group a:focus-visible::after { transform: scaleX(1); }

  /* Logo centré */
  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 0.9;
    text-decoration: none;
    color: var(--ink);
    padding: 0 0.4rem;
  }
  .brand__name {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 500;
    font-size: clamp(1.55rem, 2.7vw, 2.2rem);
    letter-spacing: -0.01em;
    color: var(--ink);
    font-variation-settings: "opsz" 60;
  }
  .brand__sub {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 300;
    font-size: 0.6rem;
    letter-spacing: 0.46em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 0.34rem;
    margin-left: 0.46em;
  }

  /* Icône compte, tout à droite (discrète) */
  .nav__account {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    grid-column: 3;
    margin-left: clamp(0.8rem, 2vw, 2rem);
  }
  /* on place le groupe droit ET l'icône dans la 3e colonne via un wrap */
  .nav__right {
    grid-column: 3;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: clamp(1rem, 2.2vw, 2.2rem);
  }
  /* Bloc compte/burger mobile : masqué sur desktop (sinon doublon sous le logo) */
  .nav__mobile-right { display: none; }
  .account {
    display: grid;
    place-items: center;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1.5px solid rgba(74, 47, 56, 0.2);
    background: var(--glass);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--ink);
    cursor: pointer;
    flex: 0 0 auto;
    margin-left: auto;
    transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
  }
  .account:hover {
    transform: translateY(-1px);
    border-color: var(--rose);
    box-shadow: 0 6px 18px rgba(233, 143, 166, 0.28);
  }
  .account svg { width: 18px; height: 18px; }

  .nav__burger {
    display: none;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1.5px solid rgba(74, 47, 56, 0.2);
    background: var(--glass);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--ink);
    cursor: pointer;
    align-items: center;
    justify-content: center;
  }
  .nav__burger svg { width: 20px; height: 20px; }

  /* ============ HERO ============ */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: clamp(1rem, 3vh, 2.4rem) 0 0.5rem;
    position: relative;
  }

  /* TITRE PLEIN (direction V3 : contour pour le menu, titre rempli) */
  .title {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 380;
    font-size: clamp(3.2rem, 10.4vw, 10.5rem);
    line-height: 0.94;
    letter-spacing: -0.025em;
    margin: 0;
    color: var(--ink);
    max-width: 14ch;
    font-variation-settings: "opsz" 144;
  }
  .title .line { display: block; }
  .title em {
    font-style: italic;
    font-weight: 360;
    font-variation-settings: "opsz" 144;
  }

  /* « BIEN » — dégradé rose poudré -> pêche + halo doux */
  .bien {
    position: relative;
    display: inline-block;
    font-style: normal;
    font-weight: 620;
    letter-spacing: -0.01em;
    background: linear-gradient(96deg, var(--rose-deep) 0%, var(--rose) 48%, var(--peche) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    padding-right: 0.06em;
  }
  .bien::after {
    content: "BIEN.";
    position: absolute;
    inset: 0;
    z-index: -1;
    background: linear-gradient(96deg, var(--rose) 0%, var(--peche) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    filter: blur(18px);
    opacity: 0.6;
    animation: glow 4.5s ease-in-out infinite;
  }
  @keyframes glow {
    0%, 100% { opacity: 0.4; filter: blur(16px); }
    50%      { opacity: 0.72; filter: blur(24px); }
  }

  /* ============ BOUTONS — nettement plus gros, texte gras ============ */
  .actions {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 0.85rem;
    margin-top: clamp(1.8rem, 4.2vh, 3rem);
  }
  .pill {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: clamp(1.02rem, 1.35vw, 1.18rem);
    letter-spacing: 0.005em;
    padding: 1.1rem 2.3rem;
    border-radius: 999px;
    border: 1.6px solid rgba(74, 47, 56, 0.22);
    background: var(--glass);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: var(--ink);
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 0.28s ease, border-color 0.28s ease, color 0.28s ease;
    white-space: nowrap;
  }
  .pill:hover {
    transform: translateY(-2px);
    border-color: var(--rose);
    color: var(--rose-deep);
    box-shadow: 0 10px 26px rgba(233, 143, 166, 0.24);
  }
  .pill--primary {
    border: none;
    color: var(--creme);
    background: linear-gradient(96deg, var(--rose-deep) 0%, var(--peche) 100%);
    box-shadow: 0 12px 32px rgba(217, 111, 146, 0.34);
    position: relative;
    overflow: hidden;
  }
  .pill--primary::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(96deg, var(--peche) 0%, var(--rose-deep) 100%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .pill--primary span { position: relative; z-index: 1; }
  .pill--primary:hover {
    transform: translateY(-2px);
    color: var(--creme);
    box-shadow: 0 16px 40px rgba(217, 111, 146, 0.44);
  }
  .pill--primary:hover::before { opacity: 1; }

  /* ============ RÉSEAUX SOCIAUX — rangée visible sous les boutons ============ */
  .social-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.7rem;
    margin-top: clamp(1.4rem, 3.4vh, 2.2rem);
  }
  .social-row__label {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 600;
    font-size: 0.7rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-right: 0.35rem;
  }
  .social {
    display: grid;
    place-items: center;
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 1.6px solid rgba(74, 47, 56, 0.2);
    background: var(--glass);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--ink);
    text-decoration: none;
    transition: transform 0.25s ease, color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
  }
  .social:hover {
    transform: translateY(-3px) scale(1.04);
    color: var(--creme);
    border-color: transparent;
    background: linear-gradient(96deg, var(--rose-deep), var(--peche));
    box-shadow: 0 10px 24px rgba(217, 111, 146, 0.32);
  }
  .social svg { width: 20px; height: 20px; }

  /* ============ CITATION — une ligne, signature dessous, alignée à gauche ============ */
  .quote {
    align-self: flex-start;
    margin: clamp(1.6rem, 3.6vh, 2.6rem) 0 0;
    max-width: 60ch;
    text-align: left;
  }
  .quote p {
    font-family: "Fraunces", Georgia, serif;
    font-style: italic;
    font-weight: 340;
    font-size: clamp(0.98rem, 1.7vw, 1.26rem);
    line-height: 1.35;
    color: var(--ink);
    margin: 0 0 0.5rem;
    white-space: nowrap;
  }
  .quote cite {
    display: block;
    font-family: "Space Grotesk", sans-serif;
    font-style: normal;
    font-weight: 600;
    font-size: 0.8rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--rose-deep);
    text-align: left;
  }

  /* ============ STICKERS DÉPLAÇABLES ============ */
  .stickers {
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none; /* le conteneur laisse passer, les stickers réactivent */
    overflow: hidden;
  }
  .sticker {
    position: absolute;
    pointer-events: auto;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    will-change: transform;
    transition: filter 0.25s ease, transform 0.18s ease;
    filter: drop-shadow(0 8px 16px rgba(217, 111, 146, 0.22));
  }
  .sticker:active { cursor: grabbing; transition: none; }
  .sticker:hover { filter: drop-shadow(0 12px 22px rgba(217, 111, 146, 0.32)); }
  .sticker:focus-visible {
    outline: 2.5px solid var(--rose-deep);
    outline-offset: 5px;
    border-radius: 14px;
  }
  .sticker.is-dragging { transition: none; z-index: 50; }
  .sticker--daisy svg { width: clamp(56px, 7vw, 86px); height: auto; display: block; }

  /* mots-stickers */
  .sticker--word {
    font-family: "Fraunces", Georgia, serif;
    font-style: italic;
    font-weight: 500;
    font-size: clamp(1rem, 1.8vw, 1.4rem);
    color: var(--ink);
    padding: 0.5rem 1.1rem;
    border-radius: 999px;
    background: rgba(253, 244, 238, 0.78);
    border: 1.5px solid rgba(217, 111, 146, 0.4);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    white-space: nowrap;
  }
  .sticker--word.is-rose {
    color: var(--rose-deep);
    border-color: rgba(217, 111, 146, 0.6);
  }

  /* indice « déplace-moi » */
  .drag-hint {
    position: absolute;
    z-index: 4;
    left: clamp(1.2rem, 5vw, 4.5rem);
    bottom: clamp(1rem, 2.4vh, 1.8rem);
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    font-family: "Space Grotesk", sans-serif;
    font-weight: 500;
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    color: var(--ink-soft);
    opacity: 0.85;
    pointer-events: none;
  }
  .drag-hint svg { width: 15px; height: 15px; }

  /* ============ FOCUS / A11Y ============ */
  a:focus-visible, button:focus-visible {
    outline: 2.5px solid var(--rose-deep);
    outline-offset: 3px;
    border-radius: 999px;
  }
  .nav__group a:focus-visible { border-radius: 4px; outline-offset: 4px; }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 860px) {
    .quote p { white-space: normal; }
  }
  @media (max-width: 760px) {
    .nav { grid-template-columns: auto 1fr auto; }
    .nav__group--left, .nav__right { display: none; }
    .brand { align-items: flex-start; }
    .nav__burger { display: inline-flex; grid-column: 3; margin-left: auto; }
    .nav__mobile-right { display: flex; align-items: center; gap: 0.6rem; grid-column: 3; justify-content: flex-end; }
    .title { font-size: clamp(2.9rem, 14vw, 5.2rem); max-width: 12ch; }
    .quote { max-width: 36ch; }
    .pill { padding: 0.95rem 1.8rem; font-size: 1.02rem; }
    .sticker--word { font-size: 1rem; }
    .drag-hint { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
    }
    #gl { display: none; }
    .aurora__css { opacity: 0.95 !important; }
    .sticker { cursor: default; }
    .drag-hint { display: none; }
  }
</style>
</head>
<body>
  <!-- ===================== FOND RISO / GRAIN ===================== -->
  <div class="aurora" aria-hidden="true">
    <div class="aurora__css"></div>
    <canvas id="gl"></canvas>
    <div class="aurora__veil"></div>
    <div class="aurora__riso"></div>
    <div class="aurora__grain"></div>
  </div>

  <div class="shell">
    <!-- ===================== NAV — 3 colonnes, menu en contour ===================== -->
    <nav class="nav" aria-label="Navigation principale">
      <ul class="nav__group nav__group--left">
        <li><a href="#ateliers">Ateliers</a></li>
        <li><a href="#boutique">Boutique</a></li>
      </ul>

      <a class="brand" href="#" aria-label="Soleia Expérience, accueil">
        <span class="brand__name">soleia</span>
        <span class="brand__sub">expérience</span>
      </a>

      <div class="nav__right">
        <ul class="nav__group nav__group--right">
          <li><a href="#histoire">Histoire</a></li>
          <li><a href="#galerie">Galerie</a></li>
        </ul>
        <button class="account" aria-label="Mon compte">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
            <circle cx="12" cy="8" r="3.4"/>
            <path d="M5 20c0-3.6 3.1-6 7-6s7 2.4 7 6" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="nav__mobile-right">
        <button class="account" aria-label="Mon compte">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
            <circle cx="12" cy="8" r="3.4"/>
            <path d="M5 20c0-3.6 3.1-6 7-6s7 2.4 7 6" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="nav__burger" aria-label="Ouvrir le menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <path d="M4 7h16M4 12h16M4 17h16" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </nav>

    <!-- ===================== HERO ===================== -->
    <main class="hero">
      <h1 class="title">
        <span class="line">La pause créative</span>
        <span class="line">qui fait <em>du</em> <span class="bien">BIEN.</span></span>
      </h1>

      <div class="actions">
        <a class="pill pill--primary" href="#ateliers"><span>Les prochains ateliers</span></a>
        <a class="pill" href="#boutique">La boutique</a>
        <a class="pill" href="#histoire">Notre histoire</a>
        <a class="pill" href="#faq">F.A.Q</a>
      </div>

      <div class="social-row">
        <span class="social-row__label">suivez Soleia</span>
        <a class="social" href="#" aria-label="Instagram de Soleia">

  <!-- ===================== FOND RISO — SHADER (amélioration progressive) ===================== -->
  <script>
  (function () {
    var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) return;

    var canvas = document.getElementById("gl");
    if (!canvas) return;

    var gl = canvas.getContext("webgl", { antialias: true, alpha: false, premultipliedAlpha: false })
          || canvas.getContext("experimental-webgl");
    if (!gl) return;

    var vertSrc =
      "attribute vec2 p;" +
      "void main(){ gl_Position = vec4(p, 0.0, 1.0); }";

    // Fond « riso » : warp fbm en rose poudré + crème, grain/dithering ajouté.
    var fragSrc = [
      "precision highp float;",
      "uniform vec2 u_res;",
      "uniform float u_time;",
      "",
      "vec3 ROSE   = vec3(0.914, 0.561, 0.651);", // #e98fa6 rose poudré
      "vec3 ROSED  = vec3(0.851, 0.435, 0.573);", // #d96f92
      "vec3 PECHE  = vec3(0.957, 0.710, 0.604);", // #f4b59a peche
      "vec3 CREAM  = vec3(0.992, 0.957, 0.933);", // #fdf4ee
      "vec3 BLUSH  = vec3(0.965, 0.804, 0.824);", // #f6cdd2
      "",
      "float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }",
      "float noise(vec2 p){",
      "  vec2 i = floor(p); vec2 f = fract(p);",
      "  vec2 u = f*f*(3.0-2.0*f);",
      "  return mix(mix(hash(i+vec2(0.0,0.0)), hash(i+vec2(1.0,0.0)), u.x),",
      "             mix(hash(i+vec2(0.0,1.0)), hash(i+vec2(1.0,1.0)), u.x), u.y);",
      "}",
      "float fbm(vec2 p){",
      "  float v = 0.0; float a = 0.5;",
      "  for(int i=0;i<5;i++){ v += a*noise(p); p *= 2.0; a *= 0.5; }",
      "  return v;",
      "}",
      "",
      "void main(){",
      "  vec2 uv = gl_FragCoord.xy / u_res.xy;",
      "  vec2 p = uv;",
      "  p.x *= u_res.x / u_res.y;",
      "  float t = u_time * 0.04;",
      "  vec2 q = vec2(fbm(p + vec2(0.0, t)), fbm(p + vec2(5.2, -t)));",
      "  vec2 r = vec2(fbm(p + 3.0*q + vec2(1.7, 9.2) + 0.15*t),",
      "                fbm(p + 3.0*q + vec2(8.3, 2.8) - 0.12*t));",
      "  float f = fbm(p + 2.4*r);",
      "  // palette douce rose poudré + crème",
      "  vec3 col = mix(CREAM, BLUSH, smoothstep(0.0, 0.62, f));",
      "  col = mix(col, ROSE, smoothstep(0.34, 0.92, f + 0.25*r.x));",
      "  col = mix(col, PECHE, smoothstep(0.5, 1.02, length(r)) * 0.85);",
      "  col = mix(col, ROSED, smoothstep(0.8, 1.12, f + 0.2*r.y) * 0.35);",
      "  // remonter vers la crème en haut pour la lisibilité du titre",
      "  col = mix(col, CREAM, smoothstep(0.55, 1.0, 1.0 - uv.y) * 0.5);",
      "  // léger vignettage crème",
      "  float d = distance(uv, vec2(0.5, 0.52));",
      "  col = mix(col, CREAM, smoothstep(0.42, 0.95, d) * 0.32);",
      "  // GRAIN / dithering riso",
      "  float g = hash(gl_FragCoord.xy + fract(u_time) * 13.0);",
      "  col += (g - 0.5) * 0.045;",
      "  gl_FragColor = vec4(col, 1.0);",
      "}"
    ].join("\n");

    function compile(type, src) {
      var s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) { gl.deleteShader(s); return null; }
      return s;
    }

    var vs = compile(gl.VERTEX_SHADER, vertSrc);
    var fs = compile(gl.FRAGMENT_SHADER, fragSrc);
    if (!vs || !fs) return;

    var prog = gl.createProgram();
    gl.attachShader(prog, vs);
    gl.attachShader(prog, fs);
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) return;
    gl.useProgram(prog);

    var buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
    var loc = gl.getAttribLocation(prog, "p");
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

    var uRes = gl.getUniformLocation(prog, "u_res");
    var uTime = gl.getUniformLocation(prog, "u_time");

    var dpr = Math.min(window.devicePixelRatio || 1, 1.5);
    function resize() {
      var w = Math.floor(canvas.clientWidth * dpr);
      var h = Math.floor(canvas.clientHeight * dpr);
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w; canvas.height = h;
        gl.viewport(0, 0, w, h);
      }
    }
    window.addEventListener("resize", resize);
    resize();

    document.querySelector(".aurora").classList.add("gl-ready");
    document.body.classList.add("gl-ready");

    var start = performance.now();
    var running = true;
    var elapsed = 0;
    document.addEventListener("visibilitychange", function () {
      running = !document.hidden;
      if (running) { start = performance.now() - elapsed; requestAnimationFrame(loop); }
    });

    function loop(now) {
      if (!running) return;
      resize();
      elapsed = now - start;
      gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.uniform1f(uTime, elapsed * 0.001);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  })();
  </script>

  <!-- ===================== STICKERS — DRAG (souris / tactile / clavier) ===================== -->
  <script>
  (function () {
    var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    var stickers = Array.prototype.slice.call(document.querySelectorAll(".sticker"));
    if (!stickers.length) return;

    var layer = document.getElementById("stickers");

    // Placement initial en pourcentage (data-x / data-y) -> px, on conserve la rotation inline.
    function baseRotation(el) {
      var s = el.getAttribute("style") || "";
      var m = s.match(/rotate\(([-0-9.]+)deg\)/);
      return m ? parseFloat(m[1]) : 0;
    }

    stickers.forEach(function (el) {
      el.__rot = baseRotation(el);
      var rect = layer.getBoundingClientRect();
      var w = el.offsetWidth, h = el.offsetHeight;
      var px = (parseFloat(el.dataset.x) / 100) * rect.width;
      var py = (parseFloat(el.dataset.y) / 100) * rect.height;
      // recentrage approximatif autour du point
      el.__x = Math.max(8, Math.min(rect.width - w - 8, px - w / 2));
      el.__y = Math.max(8, Math.min(rect.height - h - 8, py - h / 2));
      place(el);
    });

    function place(el) {
      el.style.left = el.__x + "px";
      el.style.top = el.__y + "px";
      el.style.transform = "rotate(" + el.__rot + "deg)";
    }

    if (reduce) return; // superbe sans interaction : on s'arrête là, pas de drag.

    var active = null, startX = 0, startY = 0, originX = 0, originY = 0;

    function onDown(e) {
      var el = e.currentTarget;
      active = el;
      el.classList.add("is-dragging");
      el.setAttribute("aria-grabbed", "true");
      var pt = point(e);
      startX = pt.x; startY = pt.y;
      originX = el.__x; originY = el.__y;
      if (el.setPointerCapture && e.pointerId != null) {
        try { el.setPointerCapture(e.pointerId); } catch (err) {}
      }
      e.preventDefault();
    }

    function onMove(e) {
      if (!active) return;
      var pt = point(e);
      var rect = layer.getBoundingClientRect();
      var w = active.offsetWidth, h = active.offsetHeight;
      active.__x = clamp(originX + (pt.x - startX), 0, rect.width - w);
      active.__y = clamp(originY + (pt.y - startY), 0, rect.height - h);
      place(active);
    }

    function onUp() {
      if (!active) return;
      active.classList.remove("is-dragging");
      active.setAttribute("aria-grabbed", "false");
      active = null;
    }

    function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
    function point(e) {
      if (e.touches && e.touches[0]) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      return { x: e.clientX, y: e.clientY };
    }

    var supportsPointer = "PointerEvent" in window;
    stickers.forEach(function (el) {
      if (supportsPointer) {
        el.addEventListener("pointerdown", onDown);
      } else {
        el.addEventListener("mousedown", onDown);
        el.addEventListener("touchstart", onDown, { passive: false });
      }
      // déplacement clavier (accessibilité)
      el.addEventListener("keydown", function (e) {
        var step = e.shiftKey ? 24 : 8;
        var rect = layer.getBoundingClientRect();
        var w = el.offsetWidth, h = el.offsetHeight;
        var moved = true;
        if (e.key === "ArrowLeft") el.__x = clamp(el.__x - step, 0, rect.width - w);
        else if (e.key === "ArrowRight") el.__x = clamp(el.__x + step, 0, rect.width - w);
        else if (e.key === "ArrowUp") el.__y = clamp(el.__y - step, 0, rect.height - h);
        else if (e.key === "ArrowDown") el.__y = clamp(el.__y + step, 0, rect.height - h);
        else moved = false;
        if (moved) { e.preventDefault(); place(el); }
      });
    });

    if (supportsPointer) {
      window.addEventListener("pointermove", onMove);
      window.addEventListener("pointerup", onUp);
      window.addEventListener("pointercancel", onUp);
    } else {
      window.addEventListener("mousemove", onMove);
      window.addEventListener("mouseup", onUp);
      window.addEventListener("touchmove", onMove, { passive: false });
      window.addEventListener("touchend", onUp);
    }

    // Repositionnement relatif au redimensionnement (clamp dans la nouvelle zone).
    var rt;
    window.addEventListener("resize", function () {
      clearTimeout(rt);
      rt = setTimeout(function () {
        var rect = layer.getBoundingClientRect();
        stickers.forEach(function (el) {
          var w = el.offsetWidth, h = el.offsetHeight;
          el.__x = clamp(el.__x, 0, rect.width - w);
          el.__y = clamp(el.__y, 0, rect.height - h);
          place(el);
        });
      }, 120);
    });
  })();
  </script>
