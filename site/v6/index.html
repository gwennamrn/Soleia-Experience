<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Soleia Expérience — La pause créative qui fait du BIEN</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..600&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet" />
<style>
  :root {
    --rose: #f6a8c3;
    --rose-deep: #ef7fa8;
    --orange: #f6a663;
    --orange-deep: #ef8b3c;
    --creme: #fffaf4;
    --creme-2: #fdf3ea;
    --ivory: #fffdfa;
    --ink: #463133;
    --ink-soft: #8a7176;
    --glass: rgba(255, 253, 250, 0.62);
    --line: rgba(70, 49, 51, 0.14);
    --fine: 0.06em;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    font-family: "Space Grotesk", system-ui, sans-serif;
    color: var(--ink);
    background: var(--creme);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  /* ============ AURORA BACKGROUND — CRÈME LUMIÈRE ============ */
  .aurora {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    background: var(--ivory);
  }

  /* CSS fallback: very light cream mesh with the faintest rose/orange veils */
  .aurora__css {
    position: absolute;
    inset: -22%;
    filter: blur(70px) saturate(1.02);
    opacity: 0.95;
    transition: opacity 0.8s ease;
  }
  .aurora__css::before,
  .aurora__css::after {
    content: "";
    position: absolute;
    inset: 0;
    background-repeat: no-repeat;
  }
  .aurora__css::before {
    background:
      radial-gradient(46% 56% at 20% 26%, rgba(246, 168, 195, 0.34), transparent 72%),
      radial-gradient(50% 58% at 82% 32%, rgba(246, 166, 99, 0.30), transparent 74%),
      radial-gradient(64% 70% at 50% 88%, rgba(255, 253, 250, 0.98), transparent 78%);
    animation: drift1 30s ease-in-out infinite alternate;
  }
  .aurora__css::after {
    background:
      radial-gradient(42% 50% at 66% 20%, rgba(246, 168, 195, 0.22), transparent 72%),
      radial-gradient(46% 54% at 16% 74%, rgba(246, 166, 99, 0.20), transparent 74%),
      radial-gradient(60% 60% at 90% 84%, rgba(255, 250, 244, 0.96), transparent 76%);
    animation: drift2 38s ease-in-out infinite alternate;
    mix-blend-mode: normal;
  }
  @keyframes drift1 {
    0%   { transform: translate(0, 0) scale(1) rotate(0deg); }
    100% { transform: translate(3%, -2.4%) scale(1.1) rotate(6deg); }
  }
  @keyframes drift2 {
    0%   { transform: translate(0, 0) scale(1.04) rotate(0deg); }
    100% { transform: translate(-4%, 3%) scale(1) rotate(-8deg); }
  }

  /* WebGL canvas sits on top of the CSS fallback once it's ready */
  #gl {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 1.2s ease;
  }
  .gl-ready #gl { opacity: 1; }
  .gl-ready .aurora__css { opacity: 0; }

  /* Cream veil + fine grain keep everything airy & premium and text crisp */
  .aurora__veil {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(130% 92% at 50% 4%, rgba(255, 253, 250, 0.55) 0%, transparent 46%),
      radial-gradient(90% 78% at 50% 52%, rgba(255, 253, 250, 0.40), transparent 64%),
      linear-gradient(180deg, rgba(255, 253, 250, 0.30) 0%, transparent 26%, transparent 74%, rgba(255, 250, 244, 0.34) 100%);
    pointer-events: none;
  }
  .aurora__grain {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.035;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* ============ SHELL ============ */
  .shell {
    position: relative;
    z-index: 2;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    padding: clamp(1rem, 2.2vw, 1.7rem) clamp(1.2rem, 5vw, 4.5rem) clamp(0.8rem, 2vh, 1.4rem);
  }

  /* ============ NAV — 3 colonnes ============ */
  .nav {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: clamp(0.8rem, 2vw, 2rem);
  }
  .nav__group {
    display: flex;
    align-items: center;
    gap: clamp(1rem, 2.2vw, 2.2rem);
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .nav__group--left { justify-content: flex-end; }
  .nav__group--right { justify-content: flex-start; }

  .nav__group a {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 400;
    font-size: 0.94rem;
    letter-spacing: 0.01em;
    color: var(--ink);
    text-decoration: none;
    position: relative;
    padding: 0.35rem 0.1rem;
    transition: color 0.25s ease;
    white-space: nowrap;
  }
  .nav__group a::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: 0.02rem;
    height: 1.5px;
    background: linear-gradient(90deg, var(--rose-deep), var(--orange-deep));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .nav__group a:hover::after,
  .nav__group a:focus-visible::after { transform: scaleX(1); }
  .nav__group a:hover { color: var(--orange-deep); }

  /* Logotype centré — outline subtil au survol (clin d'œil « contour ») */
  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 0.9;
    text-decoration: none;
    color: var(--ink);
    transition: transform 0.3s ease;
  }
  .brand:hover { transform: translateY(-1px); }
  .brand__name {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 420;
    font-size: clamp(1.55rem, 2.7vw, 2.1rem);
    letter-spacing: -0.01em;
    color: var(--ink);
    font-variation-settings: "opsz" 60;
    transition: color 0.3s ease, -webkit-text-stroke 0.3s ease;
  }
  .brand:hover .brand__name,
  .brand:focus-visible .brand__name {
    color: transparent;
    -webkit-text-stroke: 1px var(--ink);
  }
  .brand__sub {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 300;
    font-size: 0.6rem;
    letter-spacing: 0.46em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 0.4rem;
    margin-left: 0.46em;
  }

  .nav__end {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 0.7rem;
  }
  .account {
    display: grid;
    place-items: center;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1.5px solid var(--line);
    background: var(--glass);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--ink);
    cursor: pointer;
    transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
  }
  .account:hover {
    transform: translateY(-1px);
    border-color: var(--rose-deep);
    box-shadow: 0 6px 18px rgba(239, 127, 168, 0.22);
  }
  .account svg { width: 18px; height: 18px; }

  .nav__burger {
    display: none;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1.5px solid var(--line);
    background: var(--glass);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--ink);
    cursor: pointer;
    align-items: center;
    justify-content: center;
  }
  .nav__burger svg { width: 20px; height: 20px; }

  /* ============ SOCIAL ROW — visible, libellée, en haut à droite ============ */
  .social-row {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 0.6rem;
    margin-top: clamp(0.8rem, 2vh, 1.3rem);
    flex-wrap: wrap;
  }
  .social-row__label {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 400;
    font-size: 0.66rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-right: 0.2rem;
  }
  .social {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.46rem 0.9rem 0.46rem 0.7rem;
    border-radius: 999px;
    border: 1.5px solid var(--line);
    background: var(--glass);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--ink);
    text-decoration: none;
    font-family: "Space Grotesk", sans-serif;
    font-weight: 500;
    font-size: 0.82rem;
    letter-spacing: 0.01em;
    transition: transform 0.25s ease, color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
  }
  .social svg { width: 16px; height: 16px; flex: none; }
  .social:hover {
    transform: translateY(-2px);
    color: var(--orange-deep);
    border-color: var(--rose-deep);
    box-shadow: 0 8px 20px rgba(239, 127, 168, 0.2);
  }

  /* ============ HERO ============ */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: clamp(1rem, 3vh, 2.6rem) 0 0.6rem;
    position: relative;
  }

  .title {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 350;
    font-size: clamp(3.2rem, 10.4vw, 10.6rem);
    line-height: 0.94;
    letter-spacing: -0.025em;
    margin: 0;
    color: var(--ink);
    max-width: 14ch;
    font-variation-settings: "opsz" 144;
    text-shadow: 0 1px 30px rgba(255, 253, 250, 0.7);
  }
  .title .line { display: block; }
  .title em {
    font-style: italic;
    font-weight: 340;
    font-variation-settings: "opsz" 144;
  }

  /* "BIEN" — dégradé doux + halo léger */
  .bien {
    position: relative;
    display: inline-block;
    font-style: normal;
    font-weight: 560;
    letter-spacing: -0.01em;
    background: linear-gradient(96deg, var(--rose-deep) 0%, #f59060 54%, var(--orange-deep) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    padding-right: 0.06em;
  }
  .bien::after {
    content: "BIEN.";
    position: absolute;
    inset: 0;
    z-index: -1;
    background: linear-gradient(96deg, var(--rose-deep) 0%, var(--orange-deep) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    filter: blur(20px);
    opacity: 0.4;
    animation: glow 5.5s ease-in-out infinite;
  }
  @keyframes glow {
    0%, 100% { opacity: 0.26; filter: blur(18px); }
    50%      { opacity: 0.5;  filter: blur(26px); }
  }

  /* ============ PILL BUTTONS — plus gros, texte gras 700 ============ */
  .actions {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 0.85rem;
    margin-top: clamp(1.6rem, 4vh, 2.8rem);
  }
  .pill {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: clamp(1rem, 1.25vw, 1.12rem);
    letter-spacing: 0.005em;
    padding: 1.05rem 2.1rem;
    border-radius: 999px;
    border: 1.5px solid rgba(70, 49, 51, 0.22);
    background: var(--glass);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: var(--ink);
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 0.28s ease, border-color 0.28s ease, color 0.28s ease;
    white-space: nowrap;
  }
  .pill:hover {
    transform: translateY(-2px);
    border-color: var(--rose-deep);
    color: var(--orange-deep);
    box-shadow: 0 10px 26px rgba(239, 127, 168, 0.18);
  }
  .pill--primary {
    border: none;
    color: #fff;
    background: linear-gradient(96deg, var(--rose-deep) 0%, var(--orange-deep) 100%);
    box-shadow: 0 12px 32px rgba(239, 139, 60, 0.3);
    position: relative;
    overflow: hidden;
  }
  .pill--primary::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(96deg, var(--orange-deep) 0%, var(--rose-deep) 100%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .pill--primary span { position: relative; z-index: 1; }
  .pill--primary:hover {
    transform: translateY(-2px);
    color: #fff;
    box-shadow: 0 16px 40px rgba(239, 139, 60, 0.4);
  }
  .pill--primary:hover::before { opacity: 1; }

  /* ============ QUOTE — une ligne, alignée à gauche, signature dessous ============ */
  .quote {
    margin: clamp(1.8rem, 4.5vh, 3rem) 0 0;
    max-width: min(62ch, 92vw);
    text-align: left;
    align-self: center;
    width: 100%;
  }
  .quote__inner {
    max-width: 62ch;
    margin: 0 auto;
  }
  .quote p {
    font-family: "Fraunces", Georgia, serif;
    font-style: italic;
    font-weight: 330;
    font-size: clamp(1rem, 1.7vw, 1.28rem);
    line-height: 1.4;
    color: var(--ink);
    margin: 0 0 0.55rem;
    white-space: nowrap;
  }
  .quote cite {
    display: block;
    font-family: "Space Grotesk", sans-serif;
    font-style: normal;
    font-weight: 600;
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--orange-deep);
    text-align: left;
  }

  /* ============ DECOR — objets déplaçables ============ */
  .decor {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
  }
  .drag {
    position: absolute;
    pointer-events: auto;
    cursor: grab;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    will-change: transform;
    filter: drop-shadow(0 8px 18px rgba(239, 127, 168, 0.18));
    transition: filter 0.25s ease;
  }
  .drag:active { cursor: grabbing; }
  .drag:hover { filter: drop-shadow(0 10px 22px rgba(239, 139, 60, 0.26)); }
  .drag.is-held { transition: none; filter: drop-shadow(0 16px 30px rgba(239, 127, 168, 0.3)); }
  .drag svg { display: block; width: 100%; height: 100%; }
  .drag:focus-visible {
    outline: 2.5px solid var(--orange-deep);
    outline-offset: 5px;
    border-radius: 14px;
  }

  /* sticker mot */
  .drag--sticker {
    display: inline-flex;
    align-items: center;
    padding: 0.5rem 1rem;
    border-radius: 999px;
    background: var(--glass);
    border: 1.5px solid var(--line);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    font-family: "Fraunces", Georgia, serif;
    font-style: italic;
    font-weight: 380;
    font-size: clamp(0.85rem, 1.3vw, 1.05rem);
    color: var(--ink);
    white-space: nowrap;
  }

  .drift { animation: floaty 7s ease-in-out infinite; }
  .drift--b { animation-duration: 9s; animation-delay: -2s; }
  .drift--c { animation-duration: 8s; animation-delay: -4s; }
  @keyframes floaty {
    0%, 100% { translate: 0 0; }
    50%      { translate: 0 -10px; }
  }

  /* indice "déplace-moi" */
  .hint {
    position: absolute;
    z-index: 3;
    left: 50%;
    bottom: clamp(0.4rem, 1.4vh, 1rem);
    transform: translateX(-50%);
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    font-family: "Space Grotesk", sans-serif;
    font-weight: 400;
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    opacity: 0.72;
    pointer-events: none;
  }
  .hint svg { width: 15px; height: 15px; }

  /* ============ FOCUS / A11Y ============ */
  a:focus-visible, button:focus-visible {
    outline: 2.5px solid var(--orange-deep);
    outline-offset: 3px;
    border-radius: 999px;
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 860px) {
    .nav__group { display: none; }
    .nav { grid-template-columns: auto 1fr auto; }
    .brand { align-items: flex-start; }
    .nav__burger { display: inline-flex; }
    .social-row { justify-content: center; }
  }
  @media (max-width: 760px) {
    .title { font-size: clamp(2.9rem, 14vw, 5.4rem); max-width: 11ch; }
    .quote p { white-space: normal; }
    .quote { text-align: left; }
    .drag--sticker, .drag-star-b { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
    }
    #gl { display: none; }
    .aurora__css { opacity: 0.95 !important; }
    .drag { cursor: default; pointer-events: none; }
    .hint { display: none; }
  }
</style>
</head>
<body>
  <!-- ===================== AURORA BACKGROUND — CRÈME LUMIÈRE ===================== -->
  <div class="aurora" aria-hidden="true">
    <div class="aurora__css"></div>
    <canvas id="gl"></canvas>
    <div class="aurora__veil"></div>
    <div class="aurora__grain"></div>
  </div>

  <div class="shell">
    <!-- ===================== NAV — 3 colonnes ===================== -->
    <nav class="nav" aria-label="Navigation principale">
      <ul class="nav__group nav__group--left">
        <li><a href="#ateliers">Ateliers</a></li>
        <li><a href="#boutique">Boutique</a></li>
      </ul>

      <a class="brand" href="#" aria-label="Soleia Expérience, accueil">
        <span class="brand__name">soleia</span>
        <span class="brand__sub">expérience</span>
      </a>

      <ul class="nav__group nav__group--right">
        <li><a href="#histoire">Histoire</a></li>
        <li><a href="#galerie">Galerie</a></li>
        <li class="nav__end" aria-hidden="false">
          <button class="account" aria-label="Mon compte">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
              <circle cx="12" cy="8" r="3.4"/>
              <path d="M5 20c0-3.6 3.1-6 7-6s7 2.4 7 6" stroke-linecap="round"/>
            </svg>
          </button>
        </li>
      </ul>

      <button class="nav__burger" aria-label="Ouvrir le menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path d="M4 7h16M4 12h16M4 17h16" stroke-linecap="round"/>
        </svg>
      </button>
    </nav>

    <!-- ===================== SOCIAL ROW — visible, libellée ===================== -->
    <div class="social-row" aria-label="Réseaux sociaux">
      <span class="social-row__label">Suivez Soleia</span>
      <a class="social" href="#" aria-label="Instagram de Soleia">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
          <rect x="3.5" y="3.5" width="17" height="17" rx="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.2" cy="6.8" r="1.1" fill="currentColor" stroke="none"/>
        </svg>
        <span>Instagram</span>
      </a>
      <a class="social" href="#" aria-label="Pinterest de Soleia">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
          <path d="M12 3.5a8.5 8.5 0 0 0-3.1 16.4c-.07-.7-.13-1.78.03-2.55.14-.66.92-4.2.92-4.2s-.24-.47-.24-1.17c0-1.1.64-1.92 1.43-1.92.67 0 1 .5 1 1.1 0 .68-.43 1.69-.65 2.63-.19.78.4 1.42 1.17 1.42 1.4 0 2.48-1.48 2.48-3.62 0-1.9-1.36-3.22-3.3-3.22a3.43 3.43 0 0 0-3.58 3.44c0 .68.26 1.42.59 1.81a.24.24 0 0 1 .05.23l-.22.9c-.04.15-.12.18-.27.11-1-.47-1.63-1.93-1.63-3.1 0-2.53 1.84-4.85 5.3-4.85 2.78 0 4.94 1.98 4.94 4.63 0 2.76-1.74 4.98-4.16 4.98-.81 0-1.57-.42-1.83-.92l-.5 1.9c-.18.7-.67 1.57-1 2.1A8.5 8.5 0 1 0 12 3.5Z" stroke-width="0.5" fill="currentColor"/>
        </svg>
        <span>Pinterest</span>
      </a>
      <a class="social" href="#" aria-label="Contacter Soleia par e-mail">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
          <rect x="3" y="5" width="18" height="14" rx="3"/>
          <path d="m4 7 8 5.5L20 7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Contact</span>
      </a>
    </div>

    <!-- ===================== HERO ===================== -->
    <main class="hero">
      <!-- objets décoratifs déplaçables -->
      <div class="decor" id="decor">
        <span class="drag drift" data-drag style="left: 7%; top: 16%; width: 64px; height: 64px;" tabindex="0" role="img" aria-label="Marguerite décorative à déplacer">

  <!-- ===================== WebGL AURORA SHADER — colorway crème lumière ===================== -->
  <script>
  (function () {
    var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) return;

    var canvas = document.getElementById("gl");
    if (!canvas) return;

    var gl = canvas.getContext("webgl", { antialias: true, alpha: false, premultipliedAlpha: false })
          || canvas.getContext("experimental-webgl");
    if (!gl) return; // CSS fallback stays — graceful degradation.

    var vertSrc =
      "attribute vec2 p;" +
      "void main(){ gl_Position = vec4(p, 0.0, 1.0); }";

    // Cream-dominant domain-warped fbm. Lots of ivory, the faintest rose/orange veils.
    var fragSrc = [
      "precision highp float;",
      "uniform vec2 u_res;",
      "uniform float u_time;",
      "",
      "vec3 ROSE   = vec3(0.965, 0.659, 0.765);", // #f6a8c3 soft rose
      "vec3 ORANGE = vec3(0.965, 0.651, 0.388);", // #f6a663 soft apricot
      "vec3 CREAM  = vec3(1.000, 0.992, 0.980);", // #fffdfa near-white
      "vec3 IVORY  = vec3(0.996, 0.953, 0.918);", // #fef3ea warm ivory
      "",
      "float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }",
      "float noise(vec2 p){",
      "  vec2 i = floor(p); vec2 f = fract(p);",
      "  vec2 u = f*f*(3.0-2.0*f);",
      "  return mix(mix(hash(i+vec2(0.0,0.0)), hash(i+vec2(1.0,0.0)), u.x),",
      "             mix(hash(i+vec2(0.0,1.0)), hash(i+vec2(1.0,1.0)), u.x), u.y);",
      "}",
      "float fbm(vec2 p){",
      "  float v = 0.0; float a = 0.5;",
      "  for(int i=0;i<5;i++){ v += a*noise(p); p *= 2.0; a *= 0.5; }",
      "  return v;",
      "}",
      "",
      "void main(){",
      "  vec2 uv = gl_FragCoord.xy / u_res.xy;",
      "  vec2 p = uv * 1.6;",
      "  p.x *= u_res.x / u_res.y;",
      "  float t = u_time * 0.032;", // slower = calmer, premium
      "  vec2 q = vec2(fbm(p + vec2(0.0, t)), fbm(p + vec2(5.2, -t)));",
      "  vec2 r = vec2(fbm(p + 2.6*q + vec2(1.7, 9.2) + 0.12*t),",
      "                fbm(p + 2.6*q + vec2(8.3, 2.8) - 0.10*t));",
      "  float f = fbm(p + 2.0*r);",
      "  // Start from a bright cream/ivory base ...",
      "  vec3 col = mix(CREAM, IVORY, smoothstep(0.2, 0.85, f));",
      "  // ... and let only the faintest rose / orange veils pass through.",
      "  col = mix(col, ROSE,   smoothstep(0.55, 1.05, f + 0.22*r.x) * 0.30);",
      "  col = mix(col, ORANGE, smoothstep(0.62, 1.12, length(r))    * 0.26);",
      "  // Lift toward pure cream near the top so the serif title stays crisp.",
      "  col = mix(col, CREAM, smoothstep(0.4, 1.0, 1.0 - uv.y) * 0.55);",
      "  // Gentle cream vignette for that airy, aerated feel.",
      "  float d = distance(uv, vec2(0.5, 0.5));",
      "  col = mix(col, CREAM, smoothstep(0.35, 1.0, d) * 0.45);",
      "  gl_FragColor = vec4(col, 1.0);",
      "}"
    ].join("\n");

    function compile(type, src) {
      var s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) { gl.deleteShader(s); return null; }
      return s;
    }

    var vs = compile(gl.VERTEX_SHADER, vertSrc);
    var fs = compile(gl.FRAGMENT_SHADER, fragSrc);
    if (!vs || !fs) return;

    var prog = gl.createProgram();
    gl.attachShader(prog, vs);
    gl.attachShader(prog, fs);
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) return;
    gl.useProgram(prog);

    var buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
    var loc = gl.getAttribLocation(prog, "p");
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

    var uRes = gl.getUniformLocation(prog, "u_res");
    var uTime = gl.getUniformLocation(prog, "u_time");

    var dpr = Math.min(window.devicePixelRatio || 1, 1.5);
    function resize() {
      var w = Math.floor(canvas.clientWidth * dpr);
      var h = Math.floor(canvas.clientHeight * dpr);
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w; canvas.height = h;
        gl.viewport(0, 0, w, h);
      }
    }
    window.addEventListener("resize", resize);
    resize();

    document.querySelector(".aurora").classList.add("gl-ready");
    document.body.classList.add("gl-ready");

    var start = performance.now();
    var running = true;
    var elapsed = 0;
    document.addEventListener("visibilitychange", function () {
      running = !document.hidden;
      if (running) { start = performance.now() - elapsed; requestAnimationFrame(loop); }
    });

    function loop(now) {
      if (!running) return;
      resize();
      elapsed = now - start;
      gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.uniform1f(uTime, elapsed * 0.001);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  })();
  </script>

  <!-- ===================== DRAG — objets déplaçables (souris + tactile + clavier) ===================== -->
  <script>
  (function () {
    var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) return;

    var items = Array.prototype.slice.call(document.querySelectorAll("[data-drag]"));
    var decor = document.getElementById("decor");
    if (!items.length || !decor) return;

    items.forEach(function (el) {
      // Freeze the element's current anchored position into explicit left/top
      // so we can drive it purely with transform afterwards.
      var placed = false;
      var dx = 0, dy = 0, sx = 0, sy = 0, ox = 0, oy = 0, active = false;

      function freeze() {
        if (placed) return;
        var r = el.getBoundingClientRect();
        var p = decor.getBoundingClientRect();
        el.style.left = (r.left - p.left) + "px";
        el.style.top = (r.top - p.top) + "px";
        el.style.right = "auto";
        el.style.bottom = "auto";
        el.classList.remove("drift");
        placed = true;
      }

      function onDown(e) {
        freeze();
        active = true;
        el.classList.add("is-held");
        el.setPointerCapture && e.pointerId != null && el.setPointerCapture(e.pointerId);
        sx = e.clientX; sy = e.clientY;
        // bring to front
        el.style.zIndex = String(++window.__dragZ || (window.__dragZ = 10));
        e.preventDefault();
      }
      function onMove(e) {
        if (!active) return;
        ox = dx + (e.clientX - sx);
        oy = dy + (e.clientY - sy);
        el.style.transform = "translate(" + ox + "px," + oy + "px)";
      }
      function onUp(e) {
        if (!active) return;
        active = false;
        dx = ox; dy = oy;
        el.classList.remove("is-held");
        el.releasePointerCapture && e.pointerId != null && el.releasePointerCapture(e.pointerId);
      }

      el.addEventListener("pointerdown", onDown);
      el.addEventListener("pointermove", onMove);
      el.addEventListener("pointerup", onUp);
      el.addEventListener("pointercancel", onUp);

      // Keyboard nudge for accessibility
      el.addEventListener("keydown", function (e) {
        var step = e.shiftKey ? 24 : 8;
        var used = true;
        freeze();
        if (e.key === "ArrowLeft") dx -= step;
        else if (e.key === "ArrowRight") dx += step;
        else if (e.key === "ArrowUp") dy -= step;
        else if (e.key === "ArrowDown") dy += step;
        else used = false;
        if (used) {
          ox = dx; oy = dy;
          el.style.transform = "translate(" + dx + "px," + dy + "px)";
          e.preventDefault();
        }
      });
    });
  })();
  </script>
