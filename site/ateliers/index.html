<title>Nos ateliers &amp; nos souvenirs · Soleia Expérience</title>
<meta name="description" content="Deux petits trains de lumière aux wagons-vitrines : en haut, nos prochains ateliers Soleia roulent en plein jour vers la droite ; en bas, nos souvenirs s’en vont sous la nuit dorée vers la gauche, vitrines illuminées de l’intérieur. Le nom de chaque atelier est posé sur un joli ruban festonné, et la locomotive éclaire la brume de son phare. Cliquez un wagon pour ouvrir une fiche ou un diaporama plein écran." />

  /* ===== TRANSITIONS DE PAGE DOUCES (cross-document natif, repli gracieux) ===== */
  @view-transition { navigation: auto; }
  @media (prefers-reduced-motion: reduce) {
    @view-transition { navigation: none; }
  }
  :root{
    --rose:#fb6ba6;
    --orange:#f8742f;
    --rose-clair:#f8e6e6;
    --ink:#3a2a2e;
    --creme:#fffaf6;
    --or:#f4b63e;
    --rose-doux:#fba6c6;
    --ink-soft:rgba(58,42,46,.62);
    --glass:rgba(255,250,246,.72);
    --glass-strong:rgba(255,250,246,.92);
    /* doré chaud pour le monde de nuit (jamais de bleu/violet) */
    --dusk:#c9883f;
  }

  *,*::before,*::after{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; height:100%; }
  body{
    font-family:"Space Grotesk",system-ui,sans-serif;
    color:var(--ink);
    background:var(--creme);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    overflow:hidden;
  }

  /* ================= SCÈNE PLEIN ÉCRAN ================= */
  .stage{ position:fixed; inset:0; overflow:hidden; }
  #scene{
    position:absolute; inset:0; width:100%; height:100%; display:block;
    touch-action:pan-y;
  }

  /* ================= BARRE DU HAUT (menu standard du site) ================= */
  /* Conteneur fixe : le menu reste tout en haut, AU-DESSUS de la scène plein écran.
     z-index — scène = auto ; fiches/diaporama plein écran = 60 ; menu = 50,
     donc le menu est visible et cliquable au-dessus du train, mais passe bien
     SOUS les fiches/diaporama quand ils s'ouvrent. */
  header.bar{
    position:fixed; top:0; left:0; right:0; z-index:50;
    padding: clamp(0.9rem, 2.2vw, 1.7rem) clamp(1.4rem, 5vw, 4.8rem);
    padding-top:max(0.9rem, env(safe-area-inset-top));
    pointer-events:none;
  }
  header.bar > *{ pointer-events:auto; }

  /* ============ NAV — 3 colonnes (repris de la page d'accueil) ============ */
  .nav {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: clamp(0.8rem, 2vw, 2rem);
  }
  .nav__col {
    display: flex;
    align-items: center;
    gap: clamp(1.1rem, 2.4vw, 2.3rem);
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .nav__col--left { justify-self: start; }
  .nav__col--right {
    justify-self: end;
    gap: clamp(1.1rem, 2.2vw, 2rem);
  }
  .nav__col a.nav__link {
    font-family: "Bricolage Grotesque", "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: clamp(1.08rem, 1.3vw, 1.2rem);
    letter-spacing: 0.012em;
    color: var(--ink);
    text-decoration: none;
    position: relative;
    padding: 0.35rem 0.1rem;
    transition: color 0.25s ease;
    white-space: nowrap;
  }
  .nav__col a.nav__link::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: 0.05rem;
    height: 2px;
    background: linear-gradient(90deg, var(--rose), var(--orange));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .nav__col a.nav__link:hover::after,
  .nav__col a.nav__link:focus-visible::after { transform: scaleX(1); }
  .nav__col a.nav__link:hover { color: var(--orange); }
  /* page active : « Ateliers » mis en avant en permanence */
  .nav__col a.nav__link.is-active { color: var(--orange); }
  .nav__col a.nav__link.is-active::after { transform: scaleX(1); }

  /* ===== LOGO OFFICIEL centré ===== */
  .brand {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: clamp(0.5rem, 1.3vw, 1.1rem);
    text-decoration: none;
    justify-self: center;
    line-height: 1;
  }
  .brand__word--left { justify-self: end; }
  .brand__word--right { justify-self: start; }
  .brand img {
    height: clamp(40px, 5.4vh, 60px);
    width: auto;
    display: block;
  }
  .brand__word {
    font-family: "League Spartan", sans-serif;
    font-weight: 700;
    font-size: clamp(0.82rem, 1.25vw, 1.1rem);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink);
    line-height: 1;
    white-space: nowrap;
  }
  .brand__fallback {
    display: none;
    height: clamp(40px, 5.4vh, 60px);
    width: auto;
  }
  .brand.is-fallback img { display: none; }
  .brand.is-fallback .brand__fallback { display: block; }

  .nav__burger {
    display: none;
    width: 42px; height: 42px;
    border-radius: 50%;
    border: 1.5px solid rgba(58, 42, 46, 0.16);
    background: var(--glass-strong);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--ink);
    cursor: pointer;
    align-items: center;
    justify-content: center;
  }
  .nav__burger svg { width: 20px; height: 20px; }

  /* ===== TIROIR MOBILE (menu déroulant déclenché par le burger) ===== */
  .nav__drawer{
    position:fixed; inset:0; z-index:55;
    display:flex; flex-direction:column;
    padding:clamp(1rem,4vw,1.6rem) clamp(1.4rem,6vw,2.2rem) calc(env(safe-area-inset-bottom,0px) + clamp(1.4rem,5vw,2rem));
    background:rgba(255,250,246,.74);
    backdrop-filter:blur(26px) saturate(1.2); -webkit-backdrop-filter:blur(26px) saturate(1.2);
    transform:translateY(-8px); opacity:0;
    transition:transform .38s cubic-bezier(.22,1,.36,1), opacity .3s ease, visibility .3s;
    pointer-events:none; visibility:hidden;
  }
  .nav__drawer.is-open{ transform:none; opacity:1; pointer-events:auto; visibility:visible; }
  .nav__drawer ul{ list-style:none; margin:0; padding:0; flex:1;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:clamp(1rem,4.2vh,1.9rem); }
  .nav__drawer a{
    font-family:"Bricolage Grotesque","Space Grotesk",sans-serif; font-weight:700;
    font-size:clamp(1.7rem,8vw,2.5rem); color:var(--ink); text-decoration:none; padding:.1em .25em;
  }
  .nav__drawer a:hover{ color:var(--orange); }
  .nav__drawer a.is-active{
    background:linear-gradient(90deg,var(--rose),var(--orange));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .nav__drawer__close{
    position:absolute; top:max(1rem,env(safe-area-inset-top)); right:clamp(1.4rem,6vw,2.2rem);
    width:46px; height:46px; border-radius:50%;
    border:1.5px solid rgba(58,42,46,.16); background:var(--glass-strong);
    color:var(--ink); font-size:1.6rem; line-height:1; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }

  /* ===== RESPONSIVE NAV (repris de la page d'accueil) ===== */
  @media (max-width: 760px) {
    .nav { grid-template-columns: 1fr auto 1fr; }
    .nav__col--left { display: none; }
    .nav__col--right .nav__link { display: none; }
    .brand { grid-column: 2; justify-self: center; }
    .nav__col--right { grid-column: 3; justify-self: end; }
    .nav__burger { display: inline-flex; }
  }

  /* curseur « main » sur les wagons (interactifs) */
  .wagon{ cursor:pointer; }
  .wagon:focus{ outline:none; }
  .wagon:focus-visible .wfocus{ opacity:1; }
  .wfocus{ opacity:0; transition:opacity .2s ease; pointer-events:none; }

  /* ===================================================================== */
  /* ============ FICHE ATELIER « FOUFOU » : ÉCLOSION PLEIN ÉCRAN ========= */
  /* ===================================================================== */
  .bloom{
    position:fixed; inset:0; z-index:60; display:none;
    overflow:hidden; color:var(--ink);
  }
  .bloom.open{ display:block; }
  .bloom__bg{
    position:absolute; inset:0; opacity:0;
    background:
      radial-gradient(130% 120% at 18% 16%, rgba(255,247,230,.96), transparent 55%),
      radial-gradient(120% 130% at 88% 90%, rgba(248,116,47,.34), transparent 58%),
      linear-gradient(135deg,#fffaf6, #ffe9dd 55%, #ffd9e6);
  }
  .bloom__hero{
    position:absolute; inset:0; opacity:0; transform:scale(1.12);
    clip-path:inset(0 round 0);
  }
  .bloom__hero img{ width:100%; height:100%; object-fit:cover; display:block; }
  .bloom__heroShade{
    position:absolute; inset:0;
    background:linear-gradient(90deg, rgba(40,24,28,.78) 0%, rgba(40,24,28,.52) 34%, rgba(40,24,28,.10) 58%, rgba(40,24,28,0) 72%),
               linear-gradient(0deg, rgba(40,24,28,.55), transparent 40%);
  }
  .bloom__petals{ position:absolute; inset:0; pointer-events:none; z-index:1; }
  .bloom__strip{
    position:absolute; left:0; right:0; bottom:0; z-index:3;
    display:flex; gap:12px; padding:0 clamp(18px,4vw,54px) clamp(18px,3vh,30px);
    align-items:flex-end; pointer-events:none;
  }
  .bloom__thumb{
    flex:1 1 0; min-width:0; max-width:150px; aspect-ratio:4 / 3;
    padding:0; border:0;
    border-radius:18px; overflow:hidden; opacity:0; transform:translateY(28px) scale(.92);
    box-shadow:0 18px 40px rgba(58,42,46,.30), 0 0 0 3px rgba(255,250,246,.85) inset;
    pointer-events:auto; cursor:pointer; background:var(--rose-clair);
    transition:transform .4s cubic-bezier(.2,.8,.2,1), box-shadow .4s ease;
  }
  .bloom__thumb img{ width:100%; height:100%; object-fit:cover; object-position:center; display:block; }
  .bloom__thumb:hover{ transform:translateY(-8px) scale(1.04); box-shadow:0 26px 54px rgba(248,116,47,.40), 0 0 0 3px #fff inset; }
  .bloom__thumb.is-active{ box-shadow:0 18px 40px rgba(58,42,46,.30), 0 0 0 4px var(--orange) inset; }
  @media (max-width:760px){
    .bloom__strip{ overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .bloom__thumb{ flex:0 0 30vw; max-width:none; aspect-ratio:4 / 3; }
  }

  .bloom__panel{
    position:absolute; left:clamp(20px,5vw,72px); top:50%; transform:translateY(-50%);
    z-index:4; width:min(560px,86vw); opacity:0; pointer-events:auto;
  }
  .bloom__plate{
    position:absolute; inset:-26px -30px; z-index:-1; border-radius:30px;
    background:radial-gradient(120% 120% at 8% 20%, rgba(40,24,28,.42), rgba(40,24,28,.16) 60%, transparent);
    -webkit-backdrop-filter:blur(2px); backdrop-filter:blur(2px);
  }
  .bloom__title{
    font-family:"Fraunces",serif; font-weight:500; line-height:1.02; margin:0 0 16px;
    font-size:clamp(2rem,5.6vw,3.6rem); letter-spacing:-.015em; color:#fffaf6;
    text-shadow:0 4px 24px rgba(40,24,28,.65), 0 1px 2px rgba(40,24,28,.55);
  }
  .bloom__title em{ font-style:italic; font-weight:700;
    background:linear-gradient(95deg,#ffd9c2,#ffb27e);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    filter:drop-shadow(0 2px 6px rgba(40,24,28,.5)); }
  .bloom__lead{
    font-size:clamp(.96rem,1.7vw,1.12rem); line-height:1.6; color:#fff; margin:0 0 20px;
    max-width:46ch; text-shadow:0 2px 14px rgba(40,24,28,.65);
  }
  .bloom__lead strong{ color:#ffd9c2; }
  .bloom__meta{ display:flex; flex-wrap:wrap; gap:9px; margin:0 0 26px; }
  .bloom__chip{
    font-family:"Bricolage Grotesque",sans-serif; font-weight:600; font-size:.84rem;
    background:rgba(255,250,246,.94); color:var(--ink); padding:8px 15px; border-radius:999px;
    display:inline-flex; align-items:center; gap:7px; box-shadow:0 8px 20px rgba(58,42,46,.22);
  }
  .bloom__actions{ display:flex; flex-wrap:wrap; gap:13px; align-items:center; }
  .btn{
    font-family:"Bricolage Grotesque",sans-serif; font-weight:700; font-size:1rem;
    text-decoration:none; border:none; cursor:pointer; padding:15px 28px; border-radius:999px;
    display:inline-flex; align-items:center; gap:9px; transition:transform .22s, box-shadow .22s;
  }
  .btn--primary{ color:#fff; background:linear-gradient(95deg,var(--rose),var(--orange));
    box-shadow:0 16px 34px rgba(248,116,47,.42); }
  .btn--primary:hover{ transform:translateY(-2px); box-shadow:0 22px 46px rgba(248,116,47,.52); }
  .btn--ghost{ color:var(--ink); background:rgba(255,250,246,.94); box-shadow:0 10px 24px rgba(58,42,46,.16); }
  .btn--ghost:hover{ transform:translateY(-2px); box-shadow:0 16px 32px rgba(251,107,166,.30); }

  .closeBtn{
    position:absolute; top:max(16px,env(safe-area-inset-top)); right:18px; z-index:8;
    width:48px; height:48px; border-radius:999px; border:none; cursor:pointer;
    background:rgba(255,250,246,.95); color:var(--ink); font-size:1.4rem; line-height:1;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 10px 24px rgba(58,42,46,.28); transition:transform .25s, background .25s;
  }
  .closeBtn:hover{ transform:rotate(90deg) scale(1.06); background:var(--rose); color:#fff; }

  @media (max-width:760px){
    .bloom__panel{ left:0; right:0; top:auto; bottom:calc(clamp(74px,12vh,128px) + 40px);
      transform:none; width:auto; padding:0 22px; }
    .bloom__plate{ inset:-18px -24px; }
    .bloom__heroShade{ background:linear-gradient(0deg, rgba(40,24,28,.82), rgba(40,24,28,.30) 52%, transparent); }
    .bloom__title{ font-size:clamp(1.8rem,8vw,2.6rem); }
    .bloom__actions .btn{ flex:1 1 auto; justify-content:center; }
  }

  /* ===================================================================== */
  /* ============ DIAPORAMA SOUVENIRS : UNE PHOTO PLEIN ÉCRAN ============ */
  /* ===================================================================== */
  /* CORRECTION 3 : interface en PILE VERTICALE bien aérée — titre EN HAUT,
     photo AU MILIEU, compteur + légende EN BAS, flèches sur les CÔTÉS,
     fermer en haut à droite. Aucun chevauchement (chaque rangée a sa place). */
  .dia{ position:fixed; inset:0; z-index:60; display:none; overflow:hidden; }
  .dia.open{
    display:flex; flex-direction:column;
    padding:max(16px,env(safe-area-inset-top)) 0 max(16px,env(safe-area-inset-bottom));
  }
  /* fond = COPIE FLOUTÉE & ASSOMBRIE de la photo (derrière tout : ce n'est PAS
     l'effet interdit du point 1, qui ne concerne que ce qui est SUR la photo) */
  .dia__blur{
    position:absolute; inset:-8%; width:116%; height:116%; z-index:0;
    background-position:center; background-size:cover; background-repeat:no-repeat;
    filter:blur(40px) brightness(.55); transform:scale(1.06);
    opacity:0; transition:opacity .6s ease;
  }
  /* voile chaud par-dessus le flou (jamais de bleu) */
  .dia__veil{
    position:absolute; inset:0; z-index:0; opacity:0;
    background:
      radial-gradient(120% 120% at 50% 18%, rgba(58,30,18,.28), transparent 60%),
      linear-gradient(0deg, rgba(34,16,12,.72), rgba(34,16,12,.30) 46%, rgba(34,16,12,.52));
  }
  /* --- RANGÉE HAUT : titre de l'édition, sur sa propre ligne, AU-DESSUS de l'image --- */
  .dia__head{
    position:relative; z-index:5; flex:0 0 auto;
    text-align:center; padding:clamp(8px,2vh,22px) clamp(76px,12vw,120px) clamp(6px,1.4vh,14px);
    pointer-events:none; opacity:0;
  }
  .dia__kicker{
    font-family:"Bricolage Grotesque",sans-serif; font-weight:700; letter-spacing:.16em;
    text-transform:uppercase; font-size:.74rem; color:#ffe2bf; margin:0 0 6px;
    text-shadow:0 2px 12px rgba(34,16,12,.6);
  }
  .dia__title{

<script>
(function(){
  "use strict";
  /* repli si /logo.svg indisponible : on bascule sur l'emblème soleil inline */
  var brand = document.querySelector(".brand");
  if (brand){
    var img = brand.querySelector("img");
    if (img){
      var fail = function(){ brand.classList.add("is-fallback"); };
      if (img.complete && img.naturalWidth === 0) fail();
      img.addEventListener("error", fail);
    }
  }

  /* tiroir mobile ouvert/fermé par le burger */
  var burger = document.querySelector(".nav__burger");
  var drawer = document.getElementById("navDrawer");
  if (burger && drawer){
    var closeBtn = drawer.querySelector(".nav__drawer__close");
    var open = function(){
      drawer.hidden = false;
      requestAnimationFrame(function(){ drawer.classList.add("is-open"); });
      burger.setAttribute("aria-expanded","true");
    };
    var close = function(){
      drawer.classList.remove("is-open");
      burger.setAttribute("aria-expanded","false");
      window.setTimeout(function(){ if(!drawer.classList.contains("is-open")) drawer.hidden = true; }, 320);
      burger.focus();
    };
    burger.addEventListener("click", open);
    if (closeBtn) closeBtn.addEventListener("click", close);
    /* un lien cliqué = on referme le tiroir */
    drawer.querySelectorAll("a").forEach(function(a){ a.addEventListener("click", close); });
    /* Échap referme le tiroir */
    document.addEventListener("keydown", function(e){
      if (e.key === "Escape" && drawer.classList.contains("is-open")) close();
    });
  }
})();
</script>

    }
    function railSlope(x){
      var d = 2;
      return Math.atan2(railY(x+d) - railY(x-d), 2*d) * 180 / Math.PI;

    return {y:railY, slope:railSlope};

  var SKY_FLIERS = buildSkyLife();

  function stepSkyLife(t){
    for(var i=0;i<SKY_FLIERS.length;i++){
      var f=SKY_FLIERS[i];
      f.x += f.vx;
      if(f.vx>0 && f.x>1680){ f.x=-60; }
      if(f.vx<0 && f.x<-60){ f.x=1680; }
      var yy = f.baseY + Math.sin(t*f.sp + f.ph)*f.amp;
      if(f.isCircle){
        f.g.setAttribute("cx", f.x.toFixed(1));
        f.g.setAttribute("cy", yy.toFixed(1));
        f.g.setAttribute("opacity", (0.30 + 0.6*Math.abs(Math.sin(t*f.sp*1.6 + f.ph))).toFixed(2));
        continue;
      }
      var rot = "";
      if(f.spin){ rot = " rotate("+((t*30*f.sp + f.ph*20)%360).toFixed(1)+")"; }
      var sc = f.sc || 1;
      f.g.setAttribute("transform","translate("+f.x.toFixed(1)+" "+yy.toFixed(1)+") scale("+sc+")"+rot);
      if(f.type==="butterfly"){
        var flap = 0.35 + 0.65*Math.abs(Math.sin(t*7 + f.ph));
        if(f.g.__wL) f.g.__wL.setAttribute("transform","scale("+flap.toFixed(2)+" 1)");
        if(f.g.__wR) f.g.__wR.setAttribute("transform","scale("+flap.toFixed(2)+" 1)");
      } else if(f.type==="bird"){
        var fy2 = Math.sin(t*9 + f.ph)*4;
        if(f.g.__wing) f.g.__wing.setAttribute("d","M-16 "+(0-fy2)+" Q -8 "+(-10-fy2)+" 0 0 Q 8 "+(-10-fy2)+" 16 "+(0-fy2));
      } else if(f.type==="minisun"){
        if(f.g.__rays) f.g.__rays.setAttribute("transform","rotate("+((t*18+f.ph*30)%360).toFixed(1)+")");
      }
    }
    for(var s=0;s<STARS.length;s++){
      var st=STARS[s];
      var o = st.base * (0.45 + 0.55*Math.abs(Math.sin(t*st.sp + st.ph)));
      st.g.setAttribute("opacity", o.toFixed(2));
    }
  }

  // ============================================================
  //  ROUES « ÉPURÉES » (style repris de r9-vitrine-epuree)
  //  Roue à RAYONS sobres et raffinés : pneu/bandage sombre, JANTE
  //  dorée (laiton), RAYONS fins depuis un MOYEU central à boulons.
  //  Le <g> des rayons (+ moyeu) tourne avec la roue.
  //  opts conservés : {hub, spokeCol, rimCol, tireOut, spokes}
  // ============================================================
  function rimCol2(c){ return (c==="#5a3c18"||c==="#3a1c12"||c==="#3a1c10"||c==="#5a3c18") ? "#7a5a26" : "#7a3a22"; }
  function makeWheels(g, xs, r, y, opts){
    opts = opts || {};
    var spk  = opts.spokeCol || "#f4b63e";    // rayons & jante dorés (laiton)
    var tyre = opts.rimCol || "#5e2f1c";      // pneu/bandage extérieur sombre
    var tyreIn = rimCol2(tyre);               // liseré intérieur du pneu
    var spokes=[];
    xs.forEach(function(wx){
      // pneu extérieur (bandage sombre) + liseré intérieur
      g.appendChild(el("circle",{cx:wx,cy:y,r:r+3.5,fill:tyre}));
      g.appendChild(el("circle",{cx:wx,cy:y,r:r+1.2,fill:"none",stroke:tyreIn,"stroke-width":2}));
      // JANTE dorée (anneau de roulement en laiton)
      g.appendChild(el("circle",{cx:wx,cy:y,r:r,fill:"none",stroke:"url(#brassA)","stroke-width":r*0.18}));
      // disque intérieur sombre (entre jante et moyeu) pour faire ressortir les rayons
      g.appendChild(el("circle",{cx:wx,cy:y,r:r*0.82,fill:tyre,opacity:".55"}));
      // groupe TOURNANT : rayons fins + moyeu (visible quand la roue roule)
      var sp = el("g",{});
      var nbSpokes = (r >= 22) ? 8 : 6;       // grandes roues = plus de rayons
      for(var i=0;i<nbSpokes;i++){
        sp.appendChild(el("line",{x1:0,y1:0,x2:0,y2:-r*0.82,stroke:spk,"stroke-width":r*0.085,
          "stroke-linecap":"round",transform:"rotate("+(i*(360/nbSpokes))+")"}));
      }
      // moyeu central : disque doré + boulons + éclat
      sp.appendChild(el("circle",{r:r*0.34,fill:"url(#brassA)",stroke:tyre,"stroke-width":1.4}));
      for(var b=0;b<6;b++){
        var ba=b*60*Math.PI/180;
        sp.appendChild(el("circle",{cx:Math.cos(ba)*r*0.2,cy:Math.sin(ba)*r*0.2,r:r*0.05,fill:tyre,opacity:".8"}));
      }
      sp.appendChild(el("circle",{cx:-r*0.08,cy:-r*0.08,r:r*0.1,fill:"#fff6e2",opacity:".85"}));
      sp.setAttribute("transform","translate("+wx+" "+y+")");
      sp.dataset.wheel="1";
      g.appendChild(sp);
      spokes.push(sp);
    });
    return spokes;
  }

  // ============================================================
  //  FAISCEAU DE PHARE + BRUME (récupéré de r7-loco-brume)
  //  Renvoie un <g> : grand halo rond + cône de lumière + nuées de
  //  brume floues qui se dissipent devant le phare (animées par stepBeams).
  //  Le phare pointe vers l'AVANT (côté +x) ; la loco de nuit est
  //  miroir, donc son faisceau partira naturellement vers la gauche.
  // ============================================================
  function buildBeam(beamGrad, glowGrad, mistTint){
    var g = el("g",{"class":"beamFx","pointer-events":"none"});
    // grand halo rond chaud autour du phare
    g.appendChild(el("circle",{cx:130,cy:-21,r:48,fill:"url("+glowGrad+")","class":"beamHaloOuter"}));
    g.appendChild(el("circle",{cx:130,cy:-21,r:26,fill:"url("+glowGrad+")","class":"beamHalo"}));
    // CORRECTION 4 : UN SEUL faisceau, propre, qui part du phare (y≈-21)
    // et s'étire vers l'avant en un cône net (plus de second lobe en haut).
    var beam = el("path",{d:"M142 -21 L334 -50 L340 16 L142 -8 Z",fill:"url("+beamGrad+")",
      opacity:.85,"class":"beamCone"});
    g.appendChild(beam);
    g.__beam = beam;
    // BRUME / VAPEUR : volutes floues devant la loco, dans le faisceau
    var mist = el("g",{filter:"url(#mistBlur)","class":"beamMist"});
    var puffs=[];
    for(var i=0;i<5;i++){
      var mx = 190 + i*38 + Math.random()*20;
      var my = -42 + Math.random()*46;
      var c = el("ellipse",{cx:mx,cy:my,rx:24+Math.random()*16,ry:14+Math.random()*8,
        fill:mistTint,opacity:(0.10+Math.random()*0.12).toFixed(2)});
      mist.appendChild(c);
      puffs.push({el:c, bx:mx, by:my, ph:Math.random()*6.28, sp:0.4+Math.random()*0.5,
        amp:6+Math.random()*8});
    }
    g.appendChild(mist);
    g.__mistPuffs = puffs;
    return g;
  }

    body.appendChild(el("path",{d:"M126 26 L150 26 M130 20 L146 20",stroke:"#3a1c10","stroke-width":2.4}));
    g.appendChild(body);

    // LANTERNE dorée suspendue à l'avant de la cabine
    var lant = el("g",{transform:"translate(-30 -96)"});
    lant.appendChild(el("circle",{cx:0,cy:6,r:18,fill:"url(#lanternGlow)","class":"lanternHalo"}));
    lant.appendChild(el("path",{d:"M-7 -2 q7 -10 14 0",fill:"none",stroke:"#8a5a1e","stroke-width":2,"stroke-linecap":"round"}));
    lant.appendChild(el("path",{d:"M-9 -2 L9 -2 L6 -6 L-6 -6 Z",fill:"#8a5a1e"}));
    lant.appendChild(el("rect",{x:-8,y:-2,width:16,height:18,rx:3,fill:"url(#windowFill)",stroke:"#8a5a1e","stroke-width":1.4}));
    lant.appendChild(el("ellipse",{cx:0,cy:8,rx:2.6,ry:5,fill:"#fff7df"}));
    lant.appendChild(el("path",{d:"M-8 16 L8 16 L5 20 L-5 20 Z",fill:"#8a5a1e"}));
    g.appendChild(lant);

    // grandes roues motrices à rayons (dorées) + bielle
    g.__wheels = makeWheels(g, [-98,-44], 27, 30, {hub:"#f8742f", spokeCol:"#f6cf8c", rimCol:"#5a3c18", tireOut:"#2a1408", spokes:8});
    g.__wheels = g.__wheels.concat(makeWheels(g, [96], 15, 38, {hub:"#fb6ba6", spokeCol:"#f6cf8c", rimCol:"#5a3c18", tireOut:"#2a1408", spokes:7}));
    var rod = el("g",{});
    var bar = el("rect",{x:-98,y:30-9,width:54,height:6,rx:3,fill:"#e7b964",stroke:"#3a1c10","stroke-width":1.4});
    rod.appendChild(bar);
    rod.appendChild(el("circle",{cx:-98,cy:30,r:4,fill:"#3a1c10"}));
    rod.appendChild(el("circle",{cx:-44,cy:30,r:4,fill:"#3a1c10"}));
    g.appendChild(rod);
    g.__coupling = {rod:rod, bar:bar, cr:9};

    g.__smoke = {x:113, y:-100, grad:"url(#smokeMem)"};
    g.__half = 158;
    g.__mirror = true;
    g.__lit = true;
    return g;
  }

  // ============================================================
  //  PHOTO ENCADRÉE (object-fit cover) pour la VITRE du wagon
  // ============================================================
  function framedPhoto(parent, x, y, w, h, src, alt, warm){
    var id = "photoClip"+(clipSeq++);
    var fr = el("g",{transform:"translate("+x+" "+y+")"});
    var clip = el("clipPath",{id:id});
    clip.appendChild(el("rect",{x:0,y:0,width:w,height:h,rx:6}));
    fr.appendChild(clip);
    var imgAttrs = {x:0,y:0,width:w,height:h,"clip-path":"url(#"+id+")","preserveAspectRatio":"xMidYMid slice"};
    if(warm) imgAttrs.filter = "url(#warmMem)";
    var img = el("image",imgAttrs);
    img.setAttributeNS("http://www.w3.org/1999/xlink","href",src);
    img.setAttribute("href",src);
    if(alt) img.setAttribute("aria-label", alt);
    fr.appendChild(img);
    parent.appendChild(fr);
    return fr;
  }

  // ============================================================
  //  ★★★ TWIST : LE WAGON-VITRINE (devanture de boutique/galerie) ★★★
  //  - store rayé (auvent) festonné en haut, rose/orange le jour,
  //    doré la nuit ;
  //  - grande vitre présentant la photo comme en devanture (cover),
  //    liseré doré ;
  //  - petit panneau-nom suspendu ;
  //  - NUIT : vitrine illuminée de l'intérieur (lueur dorée + lanterne).
  //  Largeur généreuse, photo bien lisible.
  // ============================================================
  function buildVitrine(opts){
    // opts: {photo, alt, sign, dateShort, bodyGrad, awnA, awnB, night, warm}
    var W = 286, H = 162;
    var night = !!opts.night;
    var g = el("g",{});

    // ombre portée au sol
    g.appendChild(el("ellipse",{cx:0,cy:34,rx:W*0.52,ry:18,
      fill:night?"#100608":"#6a2f1a",opacity:night?".46":".26",filter:"url(#softer)"}));

    var body = el("g",{filter:night?"url(#dropWagonNight)":"url(#dropWagon)"});

    // ---- soubassement / châssis ----
    body.appendChild(el("rect",{x:-W/2,y:8,width:W,height:18,rx:6,fill:night?"#5a3618":"#8a3f23"}));
    body.appendChild(el("rect",{x:-W/2-14,y:6,width:16,height:7,rx:3,fill:night?"#3a1c10":"#6a2f1a"}));

    // ---- corps de la boutique (boiserie crème le jour / bois sombre la nuit) ----
    body.appendChild(el("rect",{x:-W/2,y:-H,width:W,height:H+12,rx:14,
      fill:night?"url(#shopWoodNight)":"url(#shopWood)"}));
    // plinthe colorée (rappel marque)
    body.appendChild(el("rect",{x:-W/2,y:-2,width:W,height:9,fill:opts.bodyGrad}));
    body.appendChild(el("rect",{x:-W/2,y:-2,width:W,height:9,fill:"url(#brassA)",opacity:".35"}));

    // ---- montants latéraux (pilastres) + liseré doré du cadre vitrine ----
    var INX = 22, GLT = -H+44, GLB = -8;       // zone vitre
    var glW = W-2*INX, glH = (GLB-GLT);
    body.appendChild(el("rect",{x:-W/2+8,y:GLT-6,width:14,height:glH+18,rx:5,
      fill:night?"#6a4222":"#f3dcc0"}));
    body.appendChild(el("rect",{x:W/2-22,y:GLT-6,width:14,height:glH+18,rx:5,
      fill:night?"#6a4222":"#f3dcc0"}));

    // ---- LA GRANDE VITRE : cadre + photo (cover) + liseré doré ----
    var vit = el("g",{});
    // fond de vitre (sombre pour la nuit, donne du contraste à la lueur)
    vit.appendChild(el("rect",{x:-glW/2,y:GLT,width:glW,height:glH,rx:7,
      fill:night?"#3a2414":"#fff7ec"}));
    // CORRECTION 1 (nuit) : la lueur chaude est posée DERRIÈRE la photo,
    // jamais par-dessus -> la photo souvenir s'affiche TELLE QUELLE.
    if(night){
      vit.appendChild(el("rect",{x:-glW/2,y:GLT,width:glW,height:glH,rx:7,
        fill:"url(#vitrineGlow)","class":"vitrineLight"}));
    }
    // photo en devanture (cover, remplit la vitre)
    framedPhoto(vit, -glW/2, GLT, glW, glH, opts.photo, opts.alt, opts.warm);
    // reflet doux de la vitre (sheen diagonal) — UNIQUEMENT le jour.
    // CORRECTION 1 (nuit) : AUCUN reflet de verre posé sur la photo souvenir.
    if(!night){
      vit.appendChild(el("rect",{x:-glW/2,y:GLT,width:glW,height:glH,rx:7,
        fill:"url(#glassSheen)",opacity:.55}));
    }
    // meneau central (fine barre verticale qui fait « vitrine de boutique »)
    vit.appendChild(el("rect",{x:-2,y:GLT,width:4,height:glH,
      fill:night?"#7a4e28":"#f3dcc0",opacity:.9}));
    // cadre/liseré DORÉ tout autour de la vitre
    vit.appendChild(el("rect",{x:-glW/2,y:GLT,width:glW,height:glH,rx:7,
      fill:"none",stroke:"url(#brassA)","stroke-width":5}));
    vit.appendChild(el("rect",{x:-glW/2,y:GLT,width:glW,height:glH,rx:7,
      fill:"none",stroke:night?"#8a5a1e":"#d98f28","stroke-width":1.6,opacity:.8}));
    body.appendChild(vit);

    // ---- STORE / AUVENT festonné rayé au-dessus de la vitre ----
    var awn = el("g",{});
    var aW = W-6, aTop = -H+6, aH = 30;
    var ax0 = -aW/2;
    // corniche du store
    awn.appendChild(el("rect",{x:ax0-4,y:aTop-8,width:aW+8,height:12,rx:5,
      fill:night?"#6a4222":"#f3dcc0"}));
    // rayures du store (alternance A/B), inclinées comme un vrai auvent
    var stripes = 9, sw = aW/stripes;
    for(var i=0;i<stripes;i++){
      var sx = ax0 + i*sw;
      awn.appendChild(el("path",{
        d:"M"+sx+" "+aTop+" L"+(sx+sw)+" "+aTop+" L"+(sx+sw)+" "+(aTop+aH)+
          " L"+(sx+sw/2)+" "+(aTop+aH+12)+" L"+sx+" "+(aTop+aH)+" Z",
        fill:(i%2===0)?opts.awnA:opts.awnB}));
    }
    // feston : petits triangles/arcs sous le store (bord ondulé)
    var festoon="";
    for(var f2=0; f2<=stripes; f2++){
      var fx = ax0 + f2*sw;
      festoon += (f2?"":"M"+ax0+" "+(aTop+aH))+" Q "+(fx-sw/2)+" "+(aTop+aH+14)+" "+fx+" "+(aTop+aH)+" ";
    }
    awn.appendChild(el("path",{d:festoon,fill:"none",stroke:"url(#brassA)","stroke-width":2.4,opacity:.85}));
    // fine ligne dorée en haut du store
    awn.appendChild(el("rect",{x:ax0-4,y:aTop-8,width:aW+8,height:3,rx:1.5,fill:"url(#brassA)",opacity:.9}));
    body.appendChild(awn);

    // ---- CORRECTION C : RUBAN-NOM festonné, RATTACHÉ EN BAS du wagon ----
    //  Posé à cheval sur le BAS de la vitre/image (plus rien ne flotte au-dessus).
    var ribbon = makeNameRibbon(opts.sign, opts.dateShort, night, glW, opts.awnA, opts.awnB);
    ribbon.setAttribute("transform","translate(0 "+(GLB)+")");   // GLB = bas de la vitre
    body.appendChild(ribbon);

    // ---- NUIT : lanterne dorée au coin du store ----
    if(night){
      var lant = makeLantern(-W/2+30, aTop-2, 0.86);
      body.appendChild(lant);
      g.__lantern = lant;
    } else {
      // jour : deux petites jardinières fleuries en pied de vitrine (charme boutique)
      [-W/2+34, W/2-34].forEach(function(bx){
        body.appendChild(el("rect",{x:bx-16,y:-14,width:32,height:14,rx:4,fill:"#e0613b"}));
        [["#fb6ba6",-9],["#f4b63e",0],["#f8742f",9]].forEach(function(fl){
          body.appendChild(el("circle",{cx:bx+fl[1],cy:-18,r:4.4,fill:fl[0]}));
          body.appendChild(el("circle",{cx:bx+fl[1],cy:-18,r:1.6,fill:"#fff6e2"}));
        });
      });
    }

    g.appendChild(body);
    // roues de wagon à rayons, plus petites, alignées (correction B)
    g.__wheels = makeWheels(g, [-W*0.32, W*0.32], 18, 26, night
      ? {hub:"#f8742f", spokeCol:"#f6cf8c", rimCol:"#5a3c18", tireOut:"#2a1408", spokes:7}
      : {hub:opts.hubCol||"#fb6ba6", spokeCol:"#f4b63e", rimCol:"#7a3a22", spokes:7});
    g.__vitrine = vit;
    return g;
  }

  // ============================================================
  //  RUBAN-NOM festonné (correction C) — assorti au store rayé.
  //  Bandeau posé À CHEVAL sur le BAS du wagon (origine y = bas de la vitre) :
  //  - corps du ruban rayé comme l'auvent, liseré doré ;
  //  - extrémités en queue d'aronde (chevrons) ;
  //  - bord BAS festonné (petites arches) qui dépasse du wagon ;
  //  - texte centré (nom · date), lisible, au féminin.
  // ============================================================
  function makeNameRibbon(name, dateShort, night, glW, awnA, awnB){
    var g = el("g",{});
    var txt = name + (dateShort ? "  ·  "+dateShort : "");
    // largeur : assez pour le texte, jamais plus large que la vitre
    var rw = Math.min(glW+8, Math.max(150, txt.length*8.6 + 40));
    var rh = 32;
    var halfTop = 6;        // dépasse un peu au-dessus du bas de la vitre
    var top = -halfTop, bot = top + rh;     // origine = bas de la vitre (y=0)
    var rx = -rw/2, rxr = rw/2;
    var tail = 16;          // longueur des chevrons d'extrémité

    // léger flou d'ombre sous le ruban (rattache visuellement au wagon)
    g.appendChild(el("ellipse",{cx:0,cy:bot-2,rx:rw*0.5,ry:7,
      fill:night?"#100608":"#6a2f1a",opacity:night?".4":".22",filter:"url(#soft)"}));

    // queues d'aronde (chevrons) aux deux bouts, légèrement plus sombres
    var endCol = night ? "#8a5a24" : "#c2456f";
    g.appendChild(el("path",{d:"M"+rx+" "+top+" L"+(rx-tail)+" "+(top+rh/2)+" L"+rx+" "+bot+" Z",fill:endCol}));
    g.appendChild(el("path",{d:"M"+rxr+" "+top+" L"+(rxr+tail)+" "+(top+rh/2)+" L"+rxr+" "+bot+" Z",fill:endCol}));

    // corps du ruban : RAYURES assorties au store (clip rectangulaire)
    var id = "ribbonClip"+(clipSeq++);
    var clip = el("clipPath",{id:id});
    clip.appendChild(el("rect",{x:rx,y:top,width:rw,height:rh,rx:8}));
    g.appendChild(clip);
    var stripesG = el("g",{"clip-path":"url(#"+id+")"});
    var nS = Math.max(6, Math.round(rw/26)), sw = rw/nS;
    for(var i=0;i<nS;i++){
      stripesG.appendChild(el("rect",{x:rx+i*sw,y:top,width:sw+0.6,height:rh,
        fill:(i%2===0)?awnA:awnB}));
    }
    // léger voile crème par-dessus pour que le texte reste lisible sur les rayures
    stripesG.appendChild(el("rect",{x:rx,y:top,width:rw,height:rh,
      fill:night?"rgba(30,16,10,.34)":"rgba(255,250,246,.42)"}));
    g.appendChild(stripesG);

    // liseré doré du bandeau
    g.appendChild(el("rect",{x:rx,y:top,width:rw,height:rh,rx:8,
      fill:"none",stroke:"url(#brassA)","stroke-width":3}));
    g.appendChild(el("rect",{x:rx+2.4,y:top+2.4,width:rw-4.8,height:rh-4.8,rx:6,
      fill:"none",stroke:night?"#8a5a1e":"#fff6e2","stroke-width":1.1,opacity:.7}));

    // BORD BAS festonné (petites arches) — dépasse juste sous le bandeau
    var scallop = "";
    var nSc = Math.max(5, Math.round(rw/22)), scw = rw/nSc;
    for(var s=0;s<nSc;s++){
      var sx0 = rx + s*scw;
      scallop += "M"+sx0+" "+bot+" Q "+(sx0+scw/2)+" "+(bot+9)+" "+(sx0+scw)+" "+bot+" ";
    }
    g.appendChild(el("path",{d:scallop,fill:"none",stroke:"url(#brassA)","stroke-width":2.2,opacity:.9}));

    // TEXTE du nom (· date), au féminin, lisible
    var t = el("text",{x:0,y:top+rh/2+0.5,"text-anchor":"middle","dominant-baseline":"middle",
      "font-family":"Bricolage Grotesque, sans-serif","font-weight":700,"font-size":14.5,
      fill:night?"#fff3d8":"#7a3320"});
    t.textContent = txt;
    g.appendChild(t);
    return g;
  }

  // petite LANTERNE dorée suspendue (vitrines de nuit)
  function makeLantern(x, y, scale){
    scale = scale || 1;
    var g = el("g",{"class":"lantern", transform:"translate("+x+" "+y+")"});
    var halo = el("circle",{cx:0,cy:0,r:34*scale,fill:"url(#lanternGlow)","class":"lanternHalo"});
    g.appendChild(halo);
    var body = el("g",{transform:"scale("+scale+")"});
    body.appendChild(el("path",{d:"M-8 -16 q8 -12 16 0",fill:"none",stroke:"#9a5d28","stroke-width":2.4,"stroke-linecap":"round"}));
    body.appendChild(el("rect",{x:-2,y:-20,width:4,height:6,rx:1,fill:"#9a5d28"}));
    body.appendChild(el("path",{d:"M-11 -14 L11 -14 L7 -19 L-7 -19 Z",fill:"#9a5d28"}));
    body.appendChild(el("rect",{x:-9,y:-14,width:18,height:22,rx:4,fill:"url(#windowFill)",stroke:"#9a5d28","stroke-width":1.6}));
    body.appendChild(el("ellipse",{cx:0,cy:-2,rx:3,ry:6,fill:"#fff7df"}));
    body.appendChild(el("path",{d:"M-9 8 L9 8 L6 12 L-6 12 Z",fill:"#9a5d28"}));
    g.appendChild(body);
    g.__halo = halo;
    return g;
  }

  // ---------- 4 vitrines de JOUR (ateliers) — palette variée mais cohérente ----------
  //  hubCol = couleur du moyeu de roue (rose/orange) — petit détail qui varie d'un wagon à l'autre.
  var DAY_SKINS = [
    {bodyGrad:"#fb6ba6", awnA:"url(#awnRose)",   awnB:"url(#awnOrange)", hubCol:"#fb6ba6"},
    {bodyGrad:"#f8742f", awnA:"url(#awnOrange)", awnB:"url(#awnRose)",   hubCol:"#f8742f"},
    {bodyGrad:"#f4b63e", awnA:"url(#awnRose)",   awnB:"url(#awnOrange)", hubCol:"#fb6ba6"},
    {bodyGrad:"#fb7a72", awnA:"url(#awnOrange)", awnB:"url(#awnRose)",   hubCol:"#f8742f"}
  ];
  function buildAtelierVitrine(at, i){
    var sk = DAY_SKINS[i%DAY_SKINS.length];
    return buildVitrine({
      photo:at.photo, alt:at.title, sign:at.sign, dateShort:at.date_short,
      bodyGrad:sk.bodyGrad, awnA:sk.awnA, awnB:sk.awnB, hubCol:sk.hubCol, night:false, warm:false
    });
  }
  // ---------- 3 vitrines de NUIT (souvenirs) — illuminées ----------
  // CORRECTION D : photos des souvenirs en COULEURS NATURELLES (warm:false → aucun filtre CSS posé sur l'image).
  function buildSouvenirVitrine(sv){
    return buildVitrine({
      photo:sv.cover, alt:sv.title+" — souvenirs", sign:sv.editionName, dateShort:"",
      bodyGrad:"#b07a32", awnA:"url(#awnNightA)", awnB:"url(#awnNightB)", night:true, warm:false
    });
  }

  // ============================================================
  //  USINE À TRAIN — autonome (glisser-qui-reste + clic)
  // ============================================================
  function createTrain(opts){
    var convoy = document.getElementById(opts.convoyId);
    var rail = opts.rail;
    var DIR = opts.dir;
    var data = opts.data;

    var vehicles = [];
    var order = [];
    var GAP = 26;
    opts.order.forEach(function(o){ order.push(o); });

    var totalWidth = 0;
    order.forEach(function(o){ totalWidth += o.half*2 + GAP; });
    var cx = 0;
    order.forEach(function(o){ cx += o.half; o.cx = cx; cx += o.half + GAP; });

    order.forEach(function(o){
      if(o.kind==="wagon"){
        o.g.classList.add("wagon");
        o.g.setAttribute("tabindex","0");
        o.g.setAttribute("role","button");
        var d = data[o.a];
        var aria = d.kind==="souvenir"
          ? (d.title + " — souvenirs. Cliquer pour ouvrir le diaporama des photos.")
          : (d.title + " — " + d.date + ". Cliquer pour voir la fiche et réserver.");
        o.g.setAttribute("aria-label", aria);
        var hit = el("rect",{x:-o.half-10,y:-220,width:o.half*2+20,height:262,
          fill:"transparent","pointer-events":"all"});
        hit.dataset.hit="1";
        o.g.appendChild(hit);
        var foc = el("rect",{x:-o.half-6,y:-216,width:o.half*2+12,height:254,rx:18,
          fill:"none",stroke:(opts.labelTone==="past"?"#f4b63e":"#e84e8c"),"stroke-width":4,
          "stroke-dasharray":"10 8","class":"wfocus"});
        o.g.appendChild(foc);
      }
      convoy.appendChild(o.g);
      vehicles.push({g:o.g, kind:o.kind, dataIndex:o.a, half:o.half, offset:0});
    });

    var locoIndex = (DIR>0) ? (order.length-1) : 0;
    var locoLocalCX = order[locoIndex].cx;
    var WHEEL_R = 20;
    var rollDist = 0;

    function placeConvoy(headX, bobPhase){
      vehicles.forEach(function(v, i){
        var o = order[i];
        var x;
        if(DIR>0){ x = headX - (locoLocalCX - o.cx); }
        else{ x = headX + (o.cx - locoLocalCX); }
        var y = rail.y(x);
        var slope = rail.slope(x);
        var bob = prefersReduced ? 0 : Math.sin(bobPhase + i*0.7) * 2.0;
        var lift = v.liftProxy ? v.liftProxy.v : 0;
        var mir = v.g.__mirror ? " scale(-1 1)" : "";
        v.g.setAttribute("transform",
          "translate("+x.toFixed(2)+" "+(y - 26 + bob - lift).toFixed(2)+") rotate("+slope.toFixed(2)+")"+mir);
        v.__x = x; v.__y = y - 26 + bob - lift;
        if(v.__groundGlow){
          v.__groundGlow.setAttribute("cx", x.toFixed(1));
          v.__groundGlow.setAttribute("cy", (rail.y(x)+18).toFixed(1));
        }
      });
      var deg = (rollDist / WHEEL_R) * 180 / Math.PI * (DIR>0?1:-1);
      vehicles.forEach(function(v){
        if(v.g.__wheels) v.g.__wheels.forEach(function(sp){
          var base = sp.getAttribute("transform").replace(/ rotate\([^)]*\)/,"");
          sp.setAttribute("transform", base + " rotate("+deg.toFixed(1)+")");
        });
        // bielle d'accouplement de la loco : suit la rotation des roues
        if(v.g.__coupling){
          var cpl = v.g.__coupling;
          var ang = deg*Math.PI/180;
          var dx = Math.cos(ang)*cpl.cr, dy = Math.sin(ang)*cpl.cr;
          cpl.bar.setAttribute("transform","translate("+dx.toFixed(1)+" "+dy.toFixed(1)+")");
          cpl.rod.childNodes[1].setAttribute("transform","translate("+dx.toFixed(1)+" "+dy.toFixed(1)+")");
          cpl.rod.childNodes[2].setAttribute("transform","translate("+dx.toFixed(1)+" "+dy.toFixed(1)+")");
        }
      });
      positionLabels();
    }

    // lueurs chaudes projetées au sol (train de nuit uniquement)
    if(opts.labelTone==="past"){
      vehicles.forEach(function(v){
        var glow = el("ellipse",{rx:v.half*0.9,ry:24,fill:"url(#groundGlow)",opacity:.55});
        groundGlows.appendChild(glow);
        v.__groundGlow = glow;
      });
    }

    // ----- ÉTIQUETTES HTML -----
    vehicles.forEach(function(v){
      if(v.kind!=="wagon") return;
      var d = data[v.dataIndex];
      var isPast = d.kind==="souvenir";
      var dom = document.createElement("div");
      dom.className="wlabel";
      dom.style.cssText="position:absolute;left:0;top:0;transform:translate(-50%,-100%);"+
        "pointer-events:none;opacity:0;transition:opacity .25s ease, transform .3s cubic-bezier(.2,.8,.2,1);"+
        "transform-origin:bottom center;will-change:transform,opacity;z-index:20;";
      var badgeGrad = isPast
        ? "linear-gradient(95deg,#e1a14c,#c9883f)"
        : "linear-gradient(95deg,var(--rose),var(--orange))";
      var badgeTxt = isPast ? "Voir le diaporama" : "Cliquez pour réserver";
      var cardBg = isPast ? "rgba(48,30,34,.82)" : "var(--glass-strong)";
      var cardBorder = isPast ? "rgba(244,182,62,.34)" : "rgba(58,42,46,.10)";
      var titleCol = isPast ? "var(--creme)" : "var(--ink)";
      var subCol = isPast ? "rgba(255,250,246,.78)" : "var(--ink-soft)";
      dom.innerHTML =
        '<div style="background:'+cardBg+';border:1px solid '+cardBorder+';'+
        'border-radius:16px;padding:10px 14px;min-width:170px;max-width:240px;text-align:center;'+
        'box-shadow:0 16px 34px rgba(122,58,40,.28);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);">'+
          '<div style="font-family:Fraunces,serif;font-weight:500;font-size:1.04rem;line-height:1.15;color:'+titleCol+';">'+d.title+'</div>'+
          '<div style="font-family:Space Grotesk,sans-serif;font-size:.78rem;color:'+subCol+';margin:3px 0 8px;">'+(isPast?d.eyebrow:d.date)+'</div>'+
          '<span class="wbadge" style="display:inline-flex;align-items:center;gap:6px;font-family:Bricolage Grotesque,sans-serif;'+
          'font-weight:700;font-size:.74rem;color:#fff;background:'+badgeGrad+';'+
          'padding:5px 12px;border-radius:999px;">'+
            '<span style="width:7px;height:7px;border-radius:999px;background:#fff;display:inline-block;"></span>'+badgeTxt+'</span>'+
        '</div>'+
        '<div style="width:14px;height:14px;background:'+cardBg+';transform:translateX(-50%) rotate(45deg);'+
        'margin:-7px auto 0;border-right:1px solid '+cardBorder+';border-bottom:1px solid '+cardBorder+';"></div>';
      labelsEl.appendChild(dom);
      v.__label=dom;
      var badge = dom.querySelector(".wbadge");
      if(hasGSAP && !prefersReduced){
        gsap.to(badge,{scale:1.05, duration:1, repeat:-1, yoyo:true, ease:"sine.inOut"});
      }
    });

    function positionLabels(){
      vehicles.forEach(function(v){
        if(!v.__label) return;
        if(v.__label.style.opacity==="0" && !v.__hover) return;
        var topY = v.__y - 182;
        var pt = svgToScreen(v.__x, topY);
        v.__label.style.left = pt.x+"px";
        v.__label.style.top  = pt.y+"px";
      });
    }

    function setHover(v, on){
      v.__hover = on;
      if(!v.liftProxy) v.liftProxy = {v:0};
      if(hasGSAP && !prefersReduced){
        gsap.to(v.liftProxy, {v: on?22:0, duration:.45, ease:"power3.out"});
        var sh = v.g.querySelector("ellipse");
        if(sh) gsap.to(sh, {attr:{rx: on? (v.half*0.62):(v.half*0.52), opacity:on?.38:.26}, duration:.45, ease:"power3.out"});
      } else {
        v.liftProxy.v = on?18:0;
      }
      if(v.__label){
        v.__label.style.opacity = on ? "1" : "0";
        v.__label.style.transform = on ? "translate(-50%,-108%)" : "translate(-50%,-100%)";
        if(on) positionLabels();
      }
    }
    vehicles.forEach(function(v){
      if(v.kind!=="wagon") return;
      v.g.addEventListener("mouseenter", function(){ setHover(v,true); });
      v.g.addEventListener("mouseleave", function(){ setHover(v,false); });
      v.g.addEventListener("focus", function(){ setHover(v,true); });
      v.g.addEventListener("blur", function(){ setHover(v,false); });
      v.g.addEventListener("keydown", function(e){
        if(e.key==="Enter"||e.key===" "){ e.preventDefault(); openFor(data[v.dataIndex]); }
      });
    });

    var REST_HEAD = opts.restHead;
    var ENTER_OFFSET = -DIR * (totalWidth + 360);
    var state = { head: REST_HEAD, bob: 0 };

    var minHead, maxHead;
    var BREATHE = 130;
    if(DIR>0){
      minHead = REST_HEAD - totalWidth - 80;
      maxHead = REST_HEAD + BREATHE + 60;
    }else{
      minHead = REST_HEAD - BREATHE - 60;
      maxHead = REST_HEAD + totalWidth + 80;
    }
    function clamp(v){ return Math.max(minHead, Math.min(maxHead, v)); }

    var ambient = { dir: DIR, center: REST_HEAD, amp: BREATHE };
    var ambientFrozen = false;
    var ambientPausedByUser = false;
    var resumeTO = null;

    function ambientStep(){
      if(ambientFrozen || ambientPausedByUser || prefersReduced || GLOBAL_PAUSE) return;
      var rawTarget = ambient.center + ambient.dir*ambient.amp;
      var target = Math.max(minHead+4, Math.min(maxHead-4, rawTarget));
      var next = state.head + (target - state.head)*0.012;
      if(Math.abs(target - next) < 4){ ambient.dir *= -1; }
      state.head = clamp(next);
    }
    function pauseAmbient(frozen){ ambientFrozen = !!frozen; if(frozen) ambient.center = state.head; }
    function recenterAmbient(){ ambient.center = state.head; }
    function scheduleResume(){
      if(resumeTO) clearTimeout(resumeTO);
      if(ambientPausedByUser || prefersReduced) return;
      resumeTO = setTimeout(function(){ recenterAmbient(); ambientFrozen=false; }, 4000);
    }

    function render(){ rollDist = state.head*DIR; placeConvoy(state.head, state.bob); }

    var locoVeh = vehicles[locoIndex];
    var smokeInfo = locoVeh.g.__smoke;

    function buildSmoke(){
      var puffs=[];
      for(var i=0;i<8;i++){
        var c = el("circle",{r:8,fill:smokeInfo.grad,opacity:0});
        convoy.appendChild(c);
        puffs.push({el:c, t:i/8});
      }
      return puffs;
    }

    var DRAG_THRESHOLD = 6, TAP_TIME = 350;
    var pointer = { id:null, active:false, moved:false, startX:0, startY:0, lastX:0, startT:0, wagonV:null, captured:false };

    function wagonFromTarget(t){
      if(!t || !t.closest) return null;
      var g = t.closest(".wagon");
      if(!g) return null;
      for(var i=0;i<vehicles.length;i++){ if(vehicles[i].g===g) return vehicles[i]; }
      return null;
    }

    function onPointerDown(e){
      if(modalOpen) return;
      if(e.button!==undefined && e.button!==0 && e.pointerType==="mouse") return;
      var wv = wagonFromTarget(e.target);
      if(!wv){
        var midY = window.innerHeight/2;
        var inMyZone = (opts.labelTone==="past") ? (e.clientY > midY) : (e.clientY <= midY);
        if(!inMyZone) return;
      }
      pointer.id = e.pointerId; pointer.active = true; pointer.moved = false;
      pointer.startX = pointer.lastX = e.clientX; pointer.startY = e.clientY;
      pointer.startT = (performance&&performance.now)?performance.now():Date.now();
      pointer.wagonV = wv;
      onManualInteract();
      try{ scene.setPointerCapture(e.pointerId); pointer.captured=true; }catch(err){}
    }
    function onPointerMove(e){
      if(!pointer.active || e.pointerId!==pointer.id) return;
      var totalDx = e.clientX - pointer.startX, totalDy = e.clientY - pointer.startY;
      if(!pointer.moved && Math.hypot(totalDx, totalDy) > DRAG_THRESHOLD) pointer.moved = true;
      if(pointer.moved){
        var dx = e.clientX - pointer.lastX; pointer.lastX = e.clientX;
        state.head = clamp(state.head + dx*1.15);
        if(!hasGSAP || prefersReduced || lowPower) render();
      }
    }
    function onPointerEnd(e){
      if(!pointer.active || (e && e.pointerId!==pointer.id)) return;
      var dt = ((performance&&performance.now)?performance.now():Date.now()) - pointer.startT;
      var wasTap = !pointer.moved && dt <= TAP_TIME;
      pointer.active = false;
      if(pointer.captured){ try{ scene.releasePointerCapture(pointer.id); }catch(err){} pointer.captured=false; }
      if(wasTap && pointer.wagonV){
        openFor(data[pointer.wagonV.dataIndex]);
      } else {
        recenterAmbient(); scheduleResume();
      }
      pointer.wagonV = null;
    }
    function onPointerCancel(e){
      if(!pointer.active) return;
      pointer.active=false;
      if(pointer.captured){ try{ scene.releasePointerCapture(pointer.id); }catch(err){} pointer.captured=false; }
      recenterAmbient(); scheduleResume(); pointer.wagonV=null;
    }

    function onManualInteract(){ pauseAmbient(true); scheduleResume(); }

    function nudge(dir){
      onManualInteract();
      state.head = clamp(state.head + dir*80);
      if(!hasGSAP || prefersReduced) render();
    }

    return {
      state:state, render:render, ambientStep:ambientStep,
      onPointerDown:onPointerDown, onPointerMove:onPointerMove,
      onPointerEnd:onPointerEnd, onPointerCancel:onPointerCancel,
      nudge:nudge, vehicles:vehicles, locoVeh:locoVeh, buildSmoke:buildSmoke,
      pauseAmbient:pauseAmbient, recenterAmbient:recenterAmbient, scheduleResume:scheduleResume,
      setUserPaused:function(p){
        ambientPausedByUser=p;
        if(!p){ recenterAmbient(); ambientFrozen=false; if(resumeTO) clearTimeout(resumeTO); }
      },
      isPointerActive:function(){ return pointer.active; },
      enterFrom:function(){
        state.head = REST_HEAD + ENTER_OFFSET;
        ambientFrozen = true;
        if(hasGSAP && !prefersReduced){
          gsap.to(state, { head: REST_HEAD, duration: 2.4, ease:"power3.out",
            onComplete:function(){ ambient.center=REST_HEAD; ambient.dir=DIR; ambientFrozen=false; } });
        }else{
          state.head = REST_HEAD; ambient.center=REST_HEAD; ambientFrozen=false;
        }
      },
      restAt:function(){ state.head = REST_HEAD; ambient.center=REST_HEAD; ambientFrozen=false; }
    };
  }

  var svgPoint = scene.createSVGPoint();
  function svgToScreen(x,y){
    svgPoint.x=x; svgPoint.y=y;
    var ctm = scene.getScreenCTM();
    if(!ctm) return {x:0,y:0};
    var p = svgPoint.matrixTransform(ctm);
    return {x:p.x, y:p.y};
  }

  // ============================================================
  //  ROUTAGE : atelier -> FICHE ; souvenir -> DIAPORAMA plein écran
  // ============================================================
  var modalOpen = false;
  var lastFocus = null;
  function openFor(d){
    if(d.kind==="souvenir") openDia(d);
    else openBloom(d);
  }

  // ------------------------------------------------------------
  //  FICHE ATELIER (éclosion plein écran, inchangée)
  // ------------------------------------------------------------
  var bloom = document.getElementById("bloom");
  var bloomBg = document.getElementById("bloomBg");
  var bloomHero = document.getElementById("bloomHero");
  var bloomHeroImg = document.getElementById("bloomHeroImg");
  var bloomPetals = document.getElementById("bloomPetals");
  var bloomPanel = document.getElementById("bloomPanel");
  var bloomStrip = document.getElementById("bloomStrip");

  function buildBloomPetals(){
    bloomPetals.innerHTML="";
    var cols=["#fb6ba6","#f8742f","#f4b63e","#fba6c6","#ffb27e","#ffd76a"];
    var nodes=[];
    for(var i=0;i<22;i++){
      var x=420+Math.random()*560, y=Math.random()*700;
      var col=cols[i%cols.length];
      var g=el("g",{transform:"translate("+x+" "+y+") scale(0)",opacity:"0"});
      var isSun = Math.random()>0.7;
      if(isSun){
        var rays=el("g",{});
        for(var r=0;r<8;r++) rays.appendChild(el("line",{x1:0,y1:-12,x2:0,y2:-20,stroke:col,"stroke-width":3,"stroke-linecap":"round",transform:"rotate("+(r*45)+")"}));
        g.appendChild(rays);
        g.appendChild(el("circle",{r:10,fill:col}));
      } else {
        for(var k=0;k<5;k++){
          var a=k*72;
          g.appendChild(el("ellipse",{cx:0,cy:-12,rx:7,ry:13,fill:col,opacity:.92,transform:"rotate("+a+")"}));
        }
        g.appendChild(el("circle",{r:5,fill:"#fff6e2"}));
      }
      bloomPetals.appendChild(g);
      nodes.push({g:g, x:x, y:y, sc:0.5+Math.random()*0.9, rot:Math.random()*360});
    }
    return nodes;
  }

  function openBloom(d){
    modalOpen=true; lastFocus=document.activeElement;
    var tEl=document.getElementById("bloomTitle");
    if(d.titleEm && d.title.indexOf(d.titleEm)>-1) tEl.innerHTML=d.title.replace(d.titleEm,"<em>"+d.titleEm+"</em>");
    else tEl.textContent=d.title;
    document.getElementById("bloomLead").innerHTML=d.lead;
    var meta=document.getElementById("bloomMeta"); meta.innerHTML="";
    d.meta.forEach(function(m){ var c=document.createElement("span"); c.className="bloom__chip"; c.textContent=m; meta.appendChild(c); });
    var act=document.getElementById("bloomActions"); act.innerHTML="";
    var a=document.createElement("a"); a.className="btn btn--primary"; a.href=d.cta.href;
    a.innerHTML="🎟️ "+d.cta.label; act.appendChild(a);
    var bb=document.createElement("button"); bb.className="btn btn--ghost"; bb.type="button";
    bb.textContent="Fermer"; bb.addEventListener("click",closeBloom); act.appendChild(bb);

    bloomHeroImg.src = d.gallery[0]; bloomHeroImg.alt = d.title+" — photo principale";
    bloomStrip.innerHTML="";
    d.gallery.forEach(function(src,i){
      var th=document.createElement("button"); th.type="button"; th.className="bloom__thumb"+(i===0?" is-active":"");
      th.setAttribute("aria-label",d.title+" — photo "+(i+1));
      var im=document.createElement("img"); im.src=src; im.alt=""; im.loading="lazy"; th.appendChild(im);
      th.addEventListener("click",function(){
        bloomHeroImg.src=src;
        bloomStrip.querySelectorAll(".bloom__thumb").forEach(function(n){ n.classList.remove("is-active"); });
        th.classList.add("is-active");
        if(hasGSAP) gsap.fromTo(bloomHero,{opacity:.4,scale:1.06},{opacity:1,scale:1,duration:.6,ease:"power3.out"});
      });
      bloomStrip.appendChild(th);
    });

    var petals = buildBloomPetals();
    bloom.classList.add("open");
    document.getElementById("bloomClose").focus();

    if(hasGSAP && !prefersReduced){
      gsap.set(bloomHero,{opacity:0,scale:1.12});
      gsap.set(bloomPanel,{opacity:0,x:-30});
      gsap.set(bloomBg,{opacity:0});
      var tl=gsap.timeline();
      tl.to(bloomBg,{opacity:1,duration:.35,ease:"power2.out"},0)
        .to(bloomHero,{opacity:1,scale:1,duration:.9,ease:"power3.out"},0.05)
        .to(bloomPanel,{opacity:1,x:0,duration:.7,ease:"back.out(1.3)"},0.25);
      petals.forEach(function(p,i){
        gsap.fromTo(p.g,{attr:{transform:"translate("+p.x+" "+p.y+") scale(0) rotate(0)"}},
          {duration:.7,delay:0.1+i*0.012,ease:"back.out(1.7)",
           attr:{transform:"translate("+p.x+" "+p.y+") scale("+p.sc+") rotate("+p.rot+")"}});
        gsap.to(p.g,{opacity:.95,duration:.4,delay:0.1+i*0.012,ease:"power1.out"});
        gsap.to(p.g,{duration:3+Math.random()*2,delay:1+Math.random(),repeat:-1,yoyo:true,ease:"sine.inOut",
          y:"+="+(8+Math.random()*14),x:"+="+((Math.random()*20-10))});
      });
      gsap.to(bloomStrip.querySelectorAll(".bloom__thumb"),
        {opacity:1,y:0,scale:1,duration:.5,stagger:0.07,ease:"back.out(1.4)",delay:0.35});
    } else {
      bloomBg.style.opacity=1; bloomHero.style.opacity=1; bloomHero.style.transform="none";
      bloomPanel.style.opacity=1;
      petals.forEach(function(p){ p.g.setAttribute("opacity",".9"); p.g.setAttribute("transform","translate("+p.x+" "+p.y+") scale("+p.sc+") rotate("+p.rot+")"); });
      bloomStrip.querySelectorAll(".bloom__thumb").forEach(function(n){ n.style.opacity=1; n.style.transform="none"; });
    }
    freezeAll(true);
  }
  function closeBloom(){
    modalOpen=false;
    if(hasGSAP && !prefersReduced){
      gsap.to(bloom,{opacity:0,duration:.32,ease:"power2.in",onComplete:function(){
        bloom.classList.remove("open"); bloom.style.opacity="";
      }});
    } else { bloom.classList.remove("open"); }
    freezeAll(false);
    if(lastFocus && lastFocus.focus) lastFocus.focus();
  }
  document.getElementById("bloomClose").addEventListener("click", closeBloom);
  bloomBg.addEventListener("click", closeBloom);

  // ------------------------------------------------------------
  //  DIAPORAMA SOUVENIR — UNE photo plein écran (nette + flou derrière)
  // ------------------------------------------------------------
  var dia = document.getElementById("dia");
  var diaBlur = document.getElementById("diaBlur");
  var diaVeil = document.getElementById("diaVeil");
  var diaHead = document.getElementById("diaHead");
  var diaFoot = document.getElementById("diaFoot");
  var diaFrame = document.getElementById("diaFrame");
  var diaPhoto = document.getElementById("diaPhoto");
  var diaCaption = document.getElementById("diaCaption");
  var diaNum = document.getElementById("diaNum");
  var diaDots = document.getElementById("diaDots");
  var diaProgress = document.getElementById("diaProgress");
  var diaPlayBtn = document.getElementById("diaPlay");
  var diaPlayIcon = document.getElementById("diaPlayIcon");
  var diaPlayLbl = document.getElementById("diaPlayLbl");

  var diaState = null, diaOpen = false, diaRaf = null;

  function titleHTMLfor(d){
    if(d.titleEm && d.title.indexOf(d.titleEm)>-1) return d.title.replace(d.titleEm,"<em>"+d.titleEm+"</em>");
    return d.title;
  }

  function openDia(d){
    modalOpen=true; diaOpen=true; lastFocus=document.activeElement;
    var imgs = [d.cover].concat(d.gallery);
    document.getElementById("diaKicker").textContent = d.eyebrow;
    document.getElementById("diaTitle").innerHTML = titleHTMLfor(d);

    // points (un par photo)
    diaDots.innerHTML="";
    imgs.forEach(function(src,i){
      var b=document.createElement("button"); b.type="button"; b.className="dia__dot"+(i===0?" is-active":"");
      b.setAttribute("aria-label","Aller à la photo "+(i+1));
      b.addEventListener("click",function(){ diaUserAction(); diaGo(i); });
      diaDots.appendChild(b);
    });

    diaState = { d:d, imgs:imgs, idx:0, n:imgs.length, playing:!prefersReduced,
                 DURATION:4600, since:0 };

    setDiaSlide(0, true);
    setDiaPlaying(!prefersReduced);

    dia.classList.add("open");
    diaClose.focus();

    if(hasGSAP && !prefersReduced){
      gsap.set([diaVeil,diaBlur],{opacity:0});
      gsap.set(diaHead,{opacity:0,y:-12});
      gsap.set(diaFoot,{opacity:0,y:12});
      gsap.set(diaFrame,{opacity:0,scale:.96});
      var tl=gsap.timeline();
      tl.to(diaVeil,{opacity:1,duration:.4,ease:"power2.out"},0)
        .to(diaBlur,{opacity:1,duration:.6,ease:"power2.out"},0)
        .to(diaHead,{opacity:1,y:0,duration:.5,ease:"power2.out"},.12)
        .to(diaFrame,{opacity:1,scale:1,duration:.6,ease:"power3.out"},.18)
        .to(diaFoot,{opacity:1,y:0,duration:.5,ease:"power2.out"},.24);
    } else {
      diaVeil.style.opacity=1; diaBlur.style.opacity=1;
      diaHead.style.opacity=1; diaFrame.style.opacity=1; diaFoot.style.opacity=1;
    }

    // boucle de défilement auto (douce, via rAF — désactivée si reduced-motion)
    var last = (performance&&performance.now)?performance.now():Date.now();
    function tick(now){
      if(!diaOpen || !diaState){ return; }
      var dt = now - last; last = now;
      if(diaState.playing && !prefersReduced){
        diaState.since += dt;
        var p = Math.min(1, diaState.since/diaState.DURATION);
        diaProgress.style.transform = "scaleX(" + p.toFixed(4) + ")";  /* fluide (GPU) au lieu d'animer la largeur */
        if(diaState.since >= diaState.DURATION){ diaState.since=0; diaGo(diaState.idx+1); }
      } else {
        diaProgress.style.transform = "scaleX(0)";
      }
      diaRaf = requestAnimationFrame(tick);
    }
    if(diaRaf) cancelAnimationFrame(diaRaf);
    diaRaf = requestAnimationFrame(tick);

    freezeAll(true);
  }

  function setDiaSlide(i, instant){
    var st=diaState; if(!st) return;
    st.idx = (i + st.n) % st.n;
    var src = st.imgs[st.idx];
    diaPhoto.src = src;
    diaPhoto.alt = st.d.title+" — photo "+(st.idx+1)+" sur "+st.n;
    diaBlur.style.backgroundImage = "url('"+src+"')";
    // précharge la photo suivante et la précédente -> changement instantané, pas de blanc
    if(st.n>1){
      var nx=new Image(); nx.src=st.imgs[(st.idx+1)%st.n];
      var pv=new Image(); pv.src=st.imgs[(st.idx-1+st.n)%st.n];
    }
    // compteur sur sa ligne ; légende (titre de l'édition) sur la sienne -> aucune redite
    diaCaption.textContent = st.d.title;
    diaNum.textContent = (st.idx+1)+" / "+st.n;
    var dots = diaDots.querySelectorAll(".dia__dot");
    dots.forEach(function(dt,k){ dt.classList.toggle("is-active", k===st.idx); });
    st.since = 0;
  }

  function diaGo(i){
    var st=diaState; if(!st) return;
    var to = (i + st.n) % st.n;
    if(to===st.idx){ return; }
    var dir = (to>st.idx) ? 1 : -1;
    if(st.idx===st.n-1 && to===0) dir=1;
    else if(st.idx===0 && to===st.n-1) dir=-1;
    if(hasGSAP && !prefersReduced){
      gsap.killTweensOf(diaFrame);
      gsap.to(diaFrame,{opacity:0,x:-dir*36,duration:.26,ease:"power2.in",onComplete:function(){
        setDiaSlide(to,true);
        gsap.fromTo(diaFrame,{opacity:0,x:dir*36,scale:.98},{opacity:1,x:0,scale:1,duration:.5,ease:"power3.out"});
      }});
      gsap.fromTo(diaBlur,{opacity:.35},{opacity:1,duration:.7,ease:"power2.out"});
    } else {
      setDiaSlide(to,true);
    }
  }

  function setDiaPlaying(on){
    if(!diaState) return;
    if(prefersReduced) on=false;
    diaState.playing=on; diaState.since=0;
    diaPlayBtn.setAttribute("aria-label", on?"Mettre en pause le défilement automatique":"Reprendre le défilement automatique");
    diaPlayLbl.textContent = on?"Pause":"Lecture";
    diaPlayIcon.innerHTML = on
      ? '<rect x="6" y="5" width="4" height="14" rx="1.4"/><rect x="14" y="5" width="4" height="14" rx="1.4"/>'
      : '<path d="M7 5 L19 12 L7 19 Z"/>';
    if(!on) diaProgress.style.transform="scaleX(0)";
  }
  function diaUserAction(){ if(diaState && diaState.playing) setDiaPlaying(false); }

  function closeDia(){
    modalOpen=false; diaOpen=false;
    if(diaRaf){ cancelAnimationFrame(diaRaf); diaRaf=null; }
    if(hasGSAP && !prefersReduced){
      gsap.to(dia,{opacity:0,duration:.32,ease:"power2.in",onComplete:function(){
        dia.classList.remove("open"); dia.style.opacity=""; diaState=null;
      }});
    } else { dia.classList.remove("open"); diaState=null; }
    freezeAll(false);
    if(lastFocus && lastFocus.focus) lastFocus.focus();
  }

  var diaClose = document.getElementById("diaClose");
  diaClose.addEventListener("click", closeDia);
  document.getElementById("diaPrev").addEventListener("click", function(){ diaUserAction(); diaGo(diaState.idx-1); });
  document.getElementById("diaNext").addEventListener("click", function(){ diaUserAction(); diaGo(diaState.idx+1); });
  diaPlayBtn.addEventListener("click", function(){ setDiaPlaying(!diaState.playing); });
  // clic sur le fond (flou/voile) ferme le diaporama — SAUF si on vient de faire glisser
  var diaSwiped = false;
  function veilClose(){ if(diaSwiped){ diaSwiped = false; return; } closeDia(); }
  diaBlur.addEventListener("click", veilClose);
  diaVeil.addEventListener("click", veilClose);

  // glisser le doigt gauche/droite pour changer de photo (téléphone)
  (function(){
    var sx=0, sy=0, tracking=false;
    dia.addEventListener("pointerdown", function(e){ sx=e.clientX; sy=e.clientY; tracking=true; }, {passive:true});
    dia.addEventListener("pointerup", function(e){
      if(!tracking || !diaState){ return; }
      tracking=false;
      var dx=e.clientX-sx, dy=e.clientY-sy;
      if(Math.abs(dx)>45 && Math.abs(dx) > Math.abs(dy)*1.3){
        diaSwiped = true;
        diaUserAction(); diaGo(diaState.idx + (dx<0 ? 1 : -1));
        setTimeout(function(){ diaSwiped = false; }, 400);
      }
    }, {passive:true});
  })();

  // ------------------------------------------------------------
  //  CLAVIER GLOBAL pour les modales (fiche + diaporama)
  // ------------------------------------------------------------
  document.addEventListener("keydown", function(e){
    if(diaOpen){
      if(e.key==="Escape"){ e.preventDefault(); closeDia(); return; }
      if(e.key==="ArrowRight"){ e.preventDefault(); diaUserAction(); diaGo(diaState.idx+1); return; }
      if(e.key==="ArrowLeft"){ e.preventDefault(); diaUserAction(); diaGo(diaState.idx-1); return; }
      if(e.key==="Tab"){
        var fd = Array.prototype.slice.call(dia.querySelectorAll('button:not([disabled])'))
          .filter(function(n){ return n.offsetParent!==null; });
        if(!fd.length) return;
        var firstD=fd[0], lastD=fd[fd.length-1];
        if(e.shiftKey && document.activeElement===firstD){ e.preventDefault(); lastD.focus(); }
        else if(!e.shiftKey && document.activeElement===lastD){ e.preventDefault(); firstD.focus(); }
        else if(!dia.contains(document.activeElement)){ e.preventDefault(); firstD.focus(); }
      }
      return;
    }
    if(!modalOpen) return;
    if(e.key==="Escape"){
      e.preventDefault();
      if(bloom.classList.contains("open")) closeBloom();
      return;
    }
    if(e.key==="Tab"){
      var card = bloom;
      var f = Array.prototype.slice.call(card.querySelectorAll('a[href],button:not([disabled]),[tabindex]:not([tabindex="-1"])'))
        .filter(function(n){ return n.offsetParent!==null; });
      if(!f.length) return;
      var first=f[0], last=f[f.length-1];
      if(e.shiftKey && document.activeElement===first){ e.preventDefault(); last.focus(); }
      else if(!e.shiftKey && document.activeElement===last){ e.preventDefault(); first.focus(); }
      else if(!card.contains(document.activeElement)){ e.preventDefault(); first.focus(); }
    }
  });

  // ============================================================
  //  CRÉATION DES DEUX TRAINS
  // ============================================================
  // -- HAUT (JOUR) : ateliers à venir, loco mène à DROITE (DIR=+1) --
  var topLoco  = buildLoco();
  var topMiroir= buildAtelierVitrine(ATELIERS[0],0);
  var topTote  = buildAtelierVitrine(ATELIERS[1],1);
  var topEvent = buildAtelierVitrine(ATELIERS[2],2);
  var topBoite = buildAtelierVitrine(ATELIERS[3],3);
  // ORDRE CHRONOLOGIQUE de GAUCHE à DROITE (récupéré de r7-ordre-chronologique) :
  // miroir 19 juil. (gauche) → tote 25 juil. → éventail 9 août → boîte 23 août (droite, près de la loco)
  var trainTop = createTrain({
    convoyId:"convoyTop", rail:RAIL_TOP, data:ATELIERS, dir:1, suffix:"top",
    labelTone:"future", restHead:1300,
    order:[
      {g:topMiroir, kind:"wagon", a:0, half:147},
      {g:topTote,   kind:"wagon", a:1, half:147},
      {g:topEvent,  kind:"wagon", a:2, half:147},
      {g:topBoite,  kind:"wagon", a:3, half:147},
      {g:topLoco,   kind:"loco",  a:-1, half:158}
    ]
  });

  // -- BAS (NUIT) : souvenirs, loco mène à GAUCHE (DIR=-1) --
  var botLoco = buildLocoMem();
  var botEd1  = buildSouvenirVitrine(SOUVENIRS[2]); // n°01 -> proche loco gauche
  var botEd2  = buildSouvenirVitrine(SOUVENIRS[1]); // n°02
  var botEd3  = buildSouvenirVitrine(SOUVENIRS[0]); // n°03 -> à droite, près du présent
  var trainBot = createTrain({
    convoyId:"convoyBot", rail:RAIL_BOT, data:SOUVENIRS, dir:-1, suffix:"bot",
    labelTone:"past", restHead:300,
    order:[
      {g:botLoco, kind:"loco",  a:-1, half:158},
      {g:botEd1,  kind:"wagon", a:2,  half:147},
      {g:botEd2,  kind:"wagon", a:1,  half:147},
      {g:botEd3,  kind:"wagon", a:0,  half:147}
    ]
  });

  var trains = [trainTop, trainBot];

  // ============================================================
  //  GEL GLOBAL (modale ouverte)
  // ============================================================
  var GLOBAL_PAUSE = false;
  function freezeAll(frozen){
    trains.forEach(function(tr){ tr.pauseAmbient(frozen); if(!frozen){ tr.recenterAmbient(); tr.scheduleResume(); } });
  }

  // ============================================================
  //  ROUTAGE DES POINTEURS
  // ============================================================
  scene.addEventListener("pointerdown", function(e){ trainTop.onPointerDown(e); trainBot.onPointerDown(e); });
  scene.addEventListener("pointermove", function(e){ trainTop.onPointerMove(e); trainBot.onPointerMove(e); });
  scene.addEventListener("pointerup", function(e){ trainTop.onPointerEnd(e); trainBot.onPointerEnd(e); });
  scene.addEventListener("pointercancel", function(e){ trainTop.onPointerCancel(e); trainBot.onPointerCancel(e); });

  // ---- clavier flèches (déplace les trains hors modale) ----
  document.addEventListener("keydown", function(e){
    if(modalOpen) return;
    if(e.key!=="ArrowRight" && e.key!=="ArrowLeft") return;
    e.preventDefault();
    var dir = e.key==="ArrowRight" ? 1 : -1;
    var ae = document.activeElement;
    var target = trainTop;
    if(ae && ae.closest){
      if(document.getElementById("convoyBot").contains(ae)) target = trainBot;
      else if(document.getElementById("convoyTop").contains(ae)) target = trainTop;
      else if(e.shiftKey) target = trainBot;
    } else if(e.shiftKey){ target = trainBot; }
    target.nudge(dir);
  });

  // ---- molette ----
  scene.addEventListener("wheel", function(e){
    if(modalOpen) return;
    var d = Math.abs(e.deltaY)>Math.abs(e.deltaX)? e.deltaY : e.deltaX;
    if(Math.abs(d)<1) return;
    e.preventDefault();
    var target = (e.clientY > window.innerHeight/2) ? trainBot : trainTop;
    target.nudge(d>0 ? 1 : -1);
  }, {passive:false});

  // ============================================================
  //  RESIZE
  // ============================================================
  window.addEventListener("resize", function(){ trains.forEach(function(tr){ tr.render(); }); });

  // ============================================================
  //  BRUME & LUMIÈRE — animation des faisceaux/brume des locos
  //  (récupéré de r7-loco-brume : les volutes se dissipent dans le phare)
  // ============================================================
  function stepBeams(t){
    trains.forEach(function(tr){
      var lg = tr.locoVeh && tr.locoVeh.g.__beam;
      if(!lg || !lg.__mistPuffs) return;
      lg.__mistPuffs.forEach(function(p){
        var dx = Math.sin(t*p.sp + p.ph)*p.amp;
        var dy = Math.cos(t*p.sp*0.8 + p.ph)*p.amp*0.5;
        p.el.setAttribute("cx",(p.bx+dx).toFixed(1));
        p.el.setAttribute("cy",(p.by+dy).toFixed(1));
      });
    });
  }

  // ============================================================
  //  DÉMARRAGE
  // ============================================================
  var clock = 0;
  function start(){
    document.body.classList.remove("nojs");

    // Téléphone : on adoucit les flous/ombres coûteux (re-dessinés à chaque image quand les trains roulent).
    if(lowPower){
      var lighten = function(id, attrs){
        var f = document.getElementById(id); if(!f) return;
        var prim = f.firstElementChild; if(!prim) return;
        for(var k in attrs){ prim.setAttribute(k, attrs[k]); }
      };
      lighten("soft",{stdDeviation:4});
      lighten("softer",{stdDeviation:5});
      lighten("mistBlur",{stdDeviation:6});
      lighten("blurFar",{stdDeviation:4});
      lighten("dropWagon",{stdDeviation:5, dy:6});
      lighten("dropWagonNight",{stdDeviation:5, dy:6});
    }

    // TÉLÉPHONE / appareil modeste OU mouvement réduit : aucune animation continue ni entrée
    // animée (l'entrée saccadait sur téléphone). Les trains se posent directement en place, et
    // restent FAISABLES À FAIRE GLISSER au doigt — le rendu se fait alors à chaque mouvement
    // (voir onPointerMove / nudge). Le roulement permanent + décorations animées : ordinateur.
    if(prefersReduced || !hasGSAP || lowPower){
      trains.forEach(function(tr){ tr.restAt(); tr.render(); });
      stepSkyLife(0);
      stepBeams(0);
      return;
    }

    gsap.ticker.add(function(){
      clock += 0.016;
      trainTop.ambientStep(); trainBot.ambientStep();
      stepSkyLife(clock);
      stepBeams(clock);
      trainTop.render(); trainBot.render();
    });

    gsap.to(trainTop.state, { bob: Math.PI*2, duration: 4.2, repeat:-1, ease:"none",
      modifiers:{ bob:function(v){ return parseFloat(v); } } });
    gsap.to(trainBot.state, { bob: Math.PI*2, duration: 4.8, repeat:-1, ease:"none",
      modifiers:{ bob:function(v){ return parseFloat(v); } } });

    trainTop.enterFrom();
    gsap.delayedCall(0.25, function(){ trainBot.enterFrom(); });

    gsap.to("#sunCore", { attr:{r:110}, duration:3.2, repeat:-1, yoyo:true, ease:"sine.inOut", transformOrigin:"center" });
    gsap.to("#moonWrap circle:first-child", { attr:{r:210}, opacity:.9, duration:4.2, repeat:-1, yoyo:true, ease:"sine.inOut" });

    if(!lowPower){
    gsap.utils.toArray("#sparks circle").forEach(function(s,i){
      gsap.to(s,{ attr:{ cy: parseFloat(s.dataset.baseY)-26 }, opacity:0.1, duration:2+Math.random()*2,
        repeat:-1, yoyo:true, delay:i*0.15, ease:"sine.inOut" });
    });

    gsap.utils.toArray(".seamDot").forEach(function(s,i){
      gsap.to(s,{ opacity:0.2, attr:{r:1.2}, duration:1.4+Math.random(), repeat:-1, yoyo:true,
        delay:i*0.05, ease:"sine.inOut" });
    });

    // vitrines illuminées qui respirent (train de nuit) : lanternes, halos, lumière intérieure
    gsap.utils.toArray(".lanternHalo").forEach(function(h,i){
      gsap.to(h,{ opacity:0.55, attr:{r:"+=6"}, duration:1.6+Math.random()*0.8, repeat:-1, yoyo:true,
        delay:i*0.2, ease:"sine.inOut" });
    });
    gsap.utils.toArray(".winHalo").forEach(function(h,i){
      gsap.to(h,{ opacity:0.7, duration:2+Math.random(), repeat:-1, yoyo:true, delay:i*0.25, ease:"sine.inOut" });
    });
    gsap.utils.toArray(".vitrineLight").forEach(function(h,i){
      gsap.to(h,{ opacity:0.7, duration:2.4+Math.random()*0.8, repeat:-1, yoyo:true, delay:i*0.3, ease:"sine.inOut" });
    });
    gsap.utils.toArray(".locoLampGlow").forEach(function(h){
      gsap.to(h,{ opacity:0.75, duration:2.4, repeat:-1, yoyo:true, ease:"sine.inOut" });
    });

    // PHARES qui palpitent doucement (halos) + FAISCEAUX qui ondulent dans la brume
    gsap.utils.toArray(".beamHalo, .beamHaloOuter").forEach(function(h,i){
      gsap.to(h,{ opacity:"+=0.18", duration:2+Math.random(), repeat:-1, yoyo:true,
        ease:"sine.inOut", delay:i*0.2 });
    });
    gsap.utils.toArray(".beamCone").forEach(function(b,i){
      gsap.to(b,{ opacity:"-=0.22", duration:2.6+Math.random()*1.2, repeat:-1, yoyo:true,
        ease:"sine.inOut", delay:i*0.3 });
    });

    if(window.__nearFlowers){
      window.__nearFlowers.forEach(function(f,i){
        gsap.to(f,{ rotation:3, transformOrigin:"bottom center", duration:2.4+Math.random(),
          repeat:-1, yoyo:true, ease:"sine.inOut", delay:i*0.2 });
      });
    }

    scheduleShootingStar();

    // ---- FUMÉE des DEUX locos ----
    trains.forEach(function(tr){
      var puffs = tr.buildSmoke();
      var loco = tr.locoVeh;
      var smk = loco.g.__smoke;
      puffs.forEach(function(p){
        function cyclePuff(){
          var lx = loco.__x || 0, ly = loco.__y || 0;
          var sx = lx + (loco.g.__mirror ? -smk.x : smk.x);
          var sy = ly + smk.y;
          gsap.set(p.el,{ attr:{cx:sx, cy:sy, r:5}, opacity:0 });
          var drift = (loco.g.__mirror?-1:1)*(18+Math.random()*40);
          gsap.timeline({onComplete:cyclePuff})
            .to(p.el,{opacity:.85, attr:{r:12}, duration:.5}, 0)
            .to(p.el,{ attr:{ cy:"-=140", cx:"+="+drift, r:38 },
              opacity:0, duration:2.8+Math.random()*1.0, ease:"power1.out" }, 0);
        }
        gsap.delayedCall(p.t*1.8, cyclePuff);
      });
    });
    } /* fin if(!lowPower) : décorations animées (étincelles, halos, fumée…) en pause sur téléphone */
  }

  // ============================================================
  //  GO (repli gracieux)
  // ============================================================
  try{
    start();
    trainTop.render(); trainBot.render();
  }catch(err){
    try{ trains.forEach(function(tr){ tr.restAt(); tr.render(); }); }catch(e2){}
    if(console && console.warn) console.warn("Le Mur de Souvenirs — wagons-vitrines : repli gracieux.", err);
  }

})();
</script>
</body>
</html>
