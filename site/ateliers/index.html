<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ateliers — Soleia Expérience</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..600&family=Space+Grotesk:wght@300..700&family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=League+Spartan:wght@400..800&display=swap" rel="stylesheet" />
<style>
  :root {
    /* ===== PALETTE EXACTE SOLEIA ===== */
    --rose: #fb6ba6;          /* rose marque */
    --orange: #f8742f;        /* orange marque */
    --rose-clair: #f8e6e6;    /* rose clair marque */
    --ink: #3a2a2e;           /* texte sombre chaleureux */
    --creme: #fffaf6;         /* crème / blanc cassé */
    --or: #f4b63e;            /* jaune doré chaud — UNIQUEMENT cœurs de fleurs / soleils */
    --rose-doux: #fba6c6;     /* rose plus doux (déco) */
    /* dérivés neutres pour voiles/verre (transparences de la crème) */
    --ink-soft: rgba(58, 42, 46, 0.62);
    --glass: rgba(255, 250, 246, 0.62);
    --glass-strong: rgba(255, 250, 246, 0.82);
    --fine: 0.06em;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: "Space Grotesk", system-ui, sans-serif;
    color: var(--ink);
    background: var(--creme);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
    min-height: 100vh;
    min-height: 100svh;
  }

  /* ============ FOND : gradient vivant réactif (FIXE — la page défile par-dessus, fond CONTINU) ============ */
  .living {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    background:
      radial-gradient(130% 120% at 50% 0%, var(--creme) 0%, #fff2ea 56%, #ffe3d2 100%);
  }

  /* Fallback CSS animé (sans JS / sans WebGL) : aurora + blobs doux, plus chaud */
  .living__css {
    position: absolute;
    inset: -20%;
    background:
      radial-gradient(44% 52% at 30% 38%, rgba(251, 107, 166, 0.58), transparent 70%),
      radial-gradient(50% 56% at 72% 34%, rgba(248, 116, 47, 0.62), transparent 72%),
      radial-gradient(52% 56% at 54% 76%, rgba(248, 116, 47, 0.40), transparent 74%),
      conic-gradient(from 200deg at 50% 50%, rgba(251,107,166,0.28), rgba(248,116,47,0.34), rgba(248,116,47,0.30), rgba(251,107,166,0.26), rgba(251,107,166,0.28));
    filter: blur(48px) saturate(1.08);
    opacity: 0.94;
    transition: opacity 1s ease;
    animation: auroraDrift 30s ease-in-out infinite alternate;
  }
  @keyframes auroraDrift {
    0%   { transform: translate3d(-2%, -1%, 0) rotate(0deg) scale(1.04); }
    50%  { transform: translate3d(3%, 2%, 0) rotate(8deg) scale(1.12); }
    100% { transform: translate3d(-1%, 3%, 0) rotate(-6deg) scale(1.06); }
  }

  /* Canvas WebGL au-dessus du fallback une fois prêt */
  #gl {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 1.3s ease;
  }
  .gl-ready #gl { opacity: 1; }
  .gl-ready .living__css { opacity: 0; }

  /* Voile crème + grain fin — ATTÉNUÉ pour laisser ressortir plus de couleur (page solaire) */
  .living__veil {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(125% 96% at 50% 3%, transparent 40%, rgba(255, 250, 246, 0.34) 100%),
      radial-gradient(82% 70% at 50% 48%, rgba(255, 250, 246, 0.20), transparent 66%),
      linear-gradient(180deg, rgba(255, 250, 246, 0.18) 0%, transparent 28%, transparent 74%, rgba(255, 250, 246, 0.24) 100%);
    pointer-events: none;
  }
  .living__grain {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.045;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* ============ SHELL ============ */
  .shell {
    position: relative;
    z-index: 4;
    padding: clamp(0.9rem, 2.2vw, 1.7rem) clamp(1.4rem, 5vw, 4.8rem) 0 clamp(1.4rem, 5vw, 4.8rem);
  }

  /* ============ NAV — 3 colonnes, haut désencombré (identique à l'accueil) ============ */
  .nav {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: clamp(0.8rem, 2vw, 2rem);
  }
  .nav__col {
    display: flex;
    align-items: center;
    gap: clamp(1.1rem, 2.4vw, 2.3rem);
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .nav__col--left { justify-self: start; }
  .nav__col--right {
    justify-self: end;
    gap: clamp(1.1rem, 2.2vw, 2rem);
  }
  .nav__col a.nav__link {
    font-family: "Bricolage Grotesque", "Space Grotesk", sans-serif;  /* menu = même police que l'accueil */
    font-weight: 700;                 /* MENU EN GRAS */
    font-size: clamp(1.08rem, 1.3vw, 1.2rem);
    letter-spacing: 0.012em;
    color: var(--ink);
    text-decoration: none;
    position: relative;
    padding: 0.35rem 0.1rem;
    transition: color 0.25s ease;
    white-space: nowrap;
  }
  .nav__col a.nav__link::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: 0.05rem;
    height: 2px;
    background: linear-gradient(90deg, var(--rose), var(--orange));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .nav__col a.nav__link:hover::after,
  .nav__col a.nav__link:focus-visible::after { transform: scaleX(1); }
  .nav__col a.nav__link:hover { color: var(--orange); }
  /* lien actif : souligné dégradé visible en permanence */
  .nav__col a.nav__link.is-active { color: var(--orange); }
  .nav__col a.nav__link.is-active::after { transform: scaleX(1); }

  /* ===== LOGO OFFICIEL centré ===== */
  .brand {
    display: grid;
    grid-template-columns: 1fr auto 1fr;  /* emblème au centre EXACT, un mot de chaque côté */
    align-items: center;
    gap: clamp(0.5rem, 1.3vw, 1.1rem);
    text-decoration: none;
    justify-self: center;
    line-height: 1;
  }
  .brand__word--left { justify-self: end; }    /* SOLEIA collé à l’emblème */
  .brand__word--right { justify-self: start; } /* EXPÉRIENCE collé à l’emblème */
  .brand img {
    height: clamp(40px, 5.4vh, 60px);
    width: auto;
    display: block;
  }
  /* « Soleia » (gauche) et « Expérience » (droite) — même famille que « BIEN » */
  .brand__word {
    font-family: "League Spartan", sans-serif;  /* « SOLEIA EXPÉRIENCE » en majuscules */
    font-weight: 700;
    font-size: clamp(0.82rem, 1.25vw, 1.1rem);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink);
    line-height: 1;
    white-space: nowrap;
  }
  /* repli si /logo.svg indisponible : emblème soleil bi-ton inline */
  .brand__fallback {
    display: none;
    height: clamp(40px, 5.4vh, 60px);
    width: auto;
  }
  .brand.is-fallback img { display: none; }
  .brand.is-fallback .brand__fallback { display: block; }

  /* icône compte discrète à l'extrême droite (tolérée) */
  .icon-btn {
    display: grid;
    place-items: center;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1.5px solid rgba(58, 42, 46, 0.16);
    background: var(--glass-strong);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--ink);
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.25s ease, color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
  }
  .icon-btn:hover {
    transform: translateY(-2px);
    color: var(--orange);
    border-color: var(--rose);
    box-shadow: 0 8px 20px rgba(251, 107, 166, 0.28);
  }
  .icon-btn svg { width: 18px; height: 18px; }
  .account svg { width: 18px; height: 18px; }

  .nav__burger {
    display: none;
    width: 42px; height: 42px;
    border-radius: 50%;
    border: 1.5px solid rgba(58, 42, 46, 0.16);
    background: var(--glass-strong);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--ink);
    cursor: pointer;
    align-items: center;
    justify-content: center;
  }
  .nav__burger svg { width: 20px; height: 20px; }

  /* menu mobile déroulant (repli simple, sans dépendance) */
  .mobile-menu {
    display: none;
    position: relative;
    z-index: 4;
    margin: 0.6rem clamp(1.4rem, 5vw, 4.8rem) 0;
    padding: 0.6rem;
    border-radius: 22px;
    background: var(--glass-strong);
    border: 1px solid rgba(251, 107, 166, 0.18);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 14px 36px rgba(248, 116, 47, 0.14);
  }
  .mobile-menu.is-open { display: block; }
  .mobile-menu a {
    display: block;
    font-family: "Bricolage Grotesque", "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: 1.12rem;
    color: var(--ink);
    text-decoration: none;
    padding: 0.7rem 0.9rem;
    border-radius: 14px;
  }
  .mobile-menu a.is-active { color: var(--orange); }
  .mobile-menu a:hover { background: rgba(248, 230, 230, 0.6); color: var(--orange); }

  /* ============ RAIL RÉSEAUX SOCIAUX — bord DROIT, centré vertical ============ */
  .social-rail {
    position: fixed;
    z-index: 6;
    right: clamp(0.5rem, 1.3vw, 1.05rem);
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(0.7rem, 1.4vh, 1rem);
  }
  .social-rail__label {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: 0.66rem;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    color: var(--ink);
    writing-mode: vertical-rl;
    text-orientation: mixed;
    margin-bottom: 0.25rem;
    opacity: 0.78;
  }
  .social-rail__line {
    width: 1.5px;
    height: clamp(22px, 3vh, 34px);
    background: linear-gradient(180deg, var(--rose), var(--orange));
    border-radius: 2px;
    opacity: 0.8;
  }
  .social-rail .icon-btn {
    width: 42px; height: 42px;
    background: var(--glass-strong);
  }

  /* ============================================================
     CONTENU « EN COURS » — petit hero centré, plein écran, très aéré
     ============================================================ */
  .page {
    position: relative;
    z-index: 2;
    min-height: calc(100vh - 96px);
    min-height: calc(100svh - 96px);
    display: grid;
    place-items: center;
    padding: clamp(2rem, 7vh, 5rem) clamp(1.4rem, 6vw, 4rem) clamp(3rem, 9vh, 6rem);
  }

  .hero {
    text-align: center;
    max-width: 760px;
    margin: 0 auto;
  }

  /* petit badge / sur-titre « EN COURS » */
  .hero__badge {
    display: inline-flex;
    align-items: center;
    gap: 0.55em;
    font-family: "League Spartan", sans-serif;
    font-weight: 800;
    font-size: clamp(0.82rem, 1.3vw, 0.98rem);
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--orange);
    padding: 0.5rem 1.1rem;
    border-radius: 999px;
    background: rgba(248, 230, 230, 0.5);
    border: 1px solid rgba(251, 107, 166, 0.22);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    box-shadow: 0 8px 22px rgba(248, 116, 47, 0.12);
    margin-bottom: clamp(1.5rem, 4vh, 2.4rem);
  }
  .hero__badge .dot {
    width: 0.5em; height: 0.5em;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--rose), var(--orange));
    box-shadow: 0 0 0 0 rgba(248, 116, 47, 0.45);
    animation: badgePulse 2.4s ease-in-out infinite;
  }
  @keyframes badgePulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(248, 116, 47, 0.40); }
    50%      { box-shadow: 0 0 0 6px rgba(248, 116, 47, 0); }
  }

  /* GRAND TITRE chaleureux en Fraunces */
  .hero__title {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 440;
    font-size: clamp(2.5rem, 7vw, 5rem);
    line-height: 1.04;
    letter-spacing: -0.025em;
    color: var(--ink);
    margin: 0;
    font-variation-settings: "opsz" 144;
  }
  /* « bientôt » mis en valeur en dégradé rose → orange (comme le mot « BIEN ») */
  .hero__title .grad {
    background: linear-gradient(96deg, var(--rose) 0%, var(--orange) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
  }

  .hero__rule {
    display: block;
    width: clamp(56px, 8vw, 96px);
    height: 4px;
    margin: clamp(1.4rem, 3.4vh, 2.2rem) auto clamp(1.5rem, 3.4vh, 2.2rem);
    border-radius: 999px;
    background: linear-gradient(90deg, var(--rose), var(--orange));
    opacity: 0.9;
  }

  /* courte phrase placeholder douce et atténuée */
  .hero__sub {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 400;
    font-size: clamp(1.08rem, 1.7vw, 1.32rem);
    line-height: 1.7;
    color: var(--ink-soft);
    margin: 0 auto clamp(2.2rem, 5vh, 3.2rem);
    max-width: 46ch;
  }

  /* bouton « Retour à l'accueil » — style pilule */
  .hero__back {
    display: inline-flex;
    align-items: center;
    gap: 0.55em;
    font-family: "Bricolage Grotesque", "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: clamp(1rem, 1.4vw, 1.12rem);
    color: var(--creme);
    text-decoration: none;
    padding: 0.85rem 1.7rem;
    border-radius: 999px;
    background: linear-gradient(96deg, var(--rose) 0%, var(--orange) 100%);
    box-shadow: 0 14px 32px rgba(248, 116, 47, 0.28), 0 4px 12px rgba(251, 107, 166, 0.2);
    transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.28s ease;
  }
  .hero__back .arrow { transition: transform 0.28s ease; }
  .hero__back:hover {
    transform: translateY(-3px);
    box-shadow: 0 22px 44px rgba(248, 116, 47, 0.34), 0 8px 18px rgba(251, 107, 166, 0.24);
  }
  .hero__back:hover .arrow { transform: translateX(-3px); }

  /* ============ APPARITION (avec repli : tout visible si pas de JS) ============ */
  .reveal { opacity: 0; transform: translateY(22px); transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.22, 1, 0.36, 1); }
  .reveal.is-in { opacity: 1; transform: none; }
  .reveal--d1 { transition-delay: 0.08s; }
  .reveal--d2 { transition-delay: 0.16s; }
  .reveal--d3 { transition-delay: 0.24s; }
  .reveal--d4 { transition-delay: 0.32s; }

  /* ============================================================
     ✿ CALQUE DÉCOR — fleurs rétro + soleils dessinés-main, léger ✿
     ============================================================ */
  .deco-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;     /* le calque laisse tout passer */
    z-index: 3;               /* au-dessus du fond, sous la barre (z-index:4) et le rail (z-index:6) */
    overflow: hidden;
  }
  .deco-item {
    position: absolute;
    pointer-events: auto;     /* on peut l'attraper… */
    touch-action: none;       /* …au doigt aussi, sans scroller la page */
    user-select: none;
    -webkit-user-select: none;
    cursor: grab;
    will-change: transform;
    width: 74px; height: 74px;
    filter: drop-shadow(0 6px 14px rgba(248, 116, 47, 0.12));
    transform: translate(var(--dx, 0px), var(--dy, 0px)) rotate(var(--rot, 0deg)) scale(var(--s, 1));
  }
  .deco-item.is-grabbing { cursor: grabbing; z-index: 99; filter: drop-shadow(0 10px 22px rgba(248, 116, 47, 0.22)); }
  .deco-item svg { display: block; width: 100%; height: 100%; overflow: visible; pointer-events: none; }

  @keyframes decoFloat {
    0%   { transform: translate(var(--dx,0px), var(--dy,0px)) rotate(var(--rot,0deg)) scale(var(--s,1)); }
    50%  { transform: translate(var(--dx,0px), calc(var(--dy,0px) - 8px)) rotate(calc(var(--rot,0deg) + 2.5deg)) scale(var(--s,1)); }
    100% { transform: translate(var(--dx,0px), var(--dy,0px)) rotate(var(--rot,0deg)) scale(var(--s,1)); }
  }
  .deco-item.is-float { animation: decoFloat var(--dur, 8s) ease-in-out infinite; animation-delay: var(--delay, 0s); }
  .deco-item.is-grabbing, .deco-item.is-moved { animation: none; }

  /* ============ FOCUS / A11Y ============ */
  a:focus-visible, button:focus-visible {
    outline: 2.5px solid var(--orange);
    outline-offset: 3px;
    border-radius: 12px;
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 760px) {
    .shell { padding-right: clamp(1.2rem, 5vw, 4.5rem); }
    .nav { grid-template-columns: auto auto; }
    .nav__col--left { display: none; }
    .nav__col--right .nav__link { display: none; }
    .brand { justify-self: start; }
    .nav__burger { display: inline-flex; }

    .hero__title { font-size: clamp(2.1rem, 9vw, 3.4rem); }

    /* sur mobile, le rail est replié horizontalement en bas pour rester visible */
    .social-rail {
      flex-direction: row;
      right: 50%;
      top: auto;
      bottom: 0.5rem;
      transform: translateX(50%);
      background: var(--glass-strong);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 0.35rem 0.6rem;
      border-radius: 999px;
    }
    .social-rail__label { writing-mode: horizontal-tb; margin-bottom: 0; margin-right: 0.2rem; }
    .social-rail__line { width: clamp(18px, 6vw, 26px); height: 1.5px; background: linear-gradient(90deg, var(--rose), var(--orange)); }

    .page { padding-bottom: clamp(5rem, 14vw, 7rem); }

    .deco-item { width: 58px; height: 58px; filter: drop-shadow(0 4px 9px rgba(248, 116, 47, 0.12)); }
    .deco-item.hide-mobile { display: none; }
  }

  @media (max-width: 480px) {
    .deco-item { width: 50px; height: 50px; }
    .deco-item.hide-small { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
    }
    html { scroll-behavior: auto; }
    #gl { display: none; }
    .living__css { opacity: 0.94 !important; animation: none !important; }
    .reveal { opacity: 1 !important; transform: none !important; }
    .deco-item.is-float { animation: none !important; }
  }
</style>
</head>
<body>
  <!-- ===================== FOND : GRADIENT VIVANT RÉACTIF (FIXE) ===================== -->
  <div class="living" aria-hidden="true">
    <div class="living__css"></div>
    <canvas id="gl"></canvas>
    <div class="living__veil"></div>
    <div class="living__grain"></div>
  </div>

  <!-- ===================== DÉCORS RÉUTILISABLES (définis une fois, réutilisés via <use>) ===================== -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false">
    <defs>
      <!-- ✺ SOLEIL DESSINÉ-MAIN : disque plein orangé + rayons ONDULÉS organiques -->
      <g id="soleiaSunDoodle">
        <circle cx="50" cy="50" r="20" fill="#f8742f"/>
        <circle cx="50" cy="50" r="20" fill="#f4b63e" opacity="0.18"/>
        <g fill="none" stroke="#f8742f" stroke-width="4.4" stroke-linecap="round">
          <path d="M50 28 q3 -6 -0.6 -13"/>
          <path d="M58.6 29.4 q5 -4 5.4 -10.4"/>
          <path d="M66.3 33.5 q6.4 -3.4 12.8 -5.2"/>
          <path d="M70.9 40.2 q6.6 -1.4 13.6 -1.4"/>
          <path d="M72.4 50 q7.4 0.6 13.6 -1.4"/>
          <path d="M70.9 59.8 q7 1.6 12.4 6.2"/>
          <path d="M66.3 66.5 q6.2 3.2 10.6 8.8"/>
          <path d="M58.6 70.6 q4.8 5 5 12.2"/>
          <path d="M50 72 q-2.8 6.4 0.6 13.4"/>
          <path d="M41.4 70.6 q-5 4.6 -5.4 11.4"/>
          <path d="M33.7 66.5 q-6.2 3.2 -12.4 4.4"/>
          <path d="M29.1 59.8 q-6.8 1.6 -13.4 0.4"/>
          <path d="M27.6 50 q-7.6 -0.6 -14.4 1.2"/>
          <path d="M29.1 40.2 q-6.8 -1.6 -11.8 -6.6"/>
          <path d="M33.7 33.5 q-6 -3.4 -9.4 -9"/>
          <path d="M41.4 29.4 q-4.6 -4.6 -4.2 -11.2"/>
        </g>
      </g>

      <!-- ✿ FLEUR RÉTRO/GROOVY : 5 pétales larges, cœur jaune doré -->
      <g id="soleiaFlowerRetro">
        <g fill="currentColor">
          <path d="M50 12

  <!-- ===================== APPARITION (repli sûr : tout visible si indisponible) ===================== -->
  <script>
  (function () {
    var els = document.querySelectorAll(".reveal");
    var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce || !("IntersectionObserver" in window)) {
      els.forEach(function (el) { el.classList.add("is-in"); });
      return;
    }
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (e.isIntersecting) { e.target.classList.add("is-in"); io.unobserve(e.target); }
      });
    }, { rootMargin: "0px 0px -8% 0px", threshold: 0.12 });
    els.forEach(function (el) { io.observe(el); });
    setTimeout(function () { els.forEach(function (el) { el.classList.add("is-in"); }); }, 2600);
  })();
  </script>

  <!-- ===================== DÉCORS DÉPLAÇABLES À LA SOURIS / AU DOIGT ===================== -->
  <script>
  (function () {
    var items = Array.prototype.slice.call(document.querySelectorAll(".deco-item"));
    if (!items.length) return;
    var startX = 0, startY = 0, baseDx = 0, baseDy = 0, movedThisDrag = false, current = null;

    function numVar(el, name) {
      var n = parseFloat(el.style.getPropertyValue(name));
      return isNaN(n) ? 0 : n;
    }
    function onDown(e) {
      var el = e.currentTarget;
      current = el; movedThisDrag = false;
      baseDx = numVar(el, "--dx"); baseDy = numVar(el, "--dy");
      startX = e.clientX; startY = e.clientY;
      el.classList.add("is-grabbing"); el.classList.add("is-moved");
      try { el.setPointerCapture(e.pointerId); } catch (err) {}
    }
    function onMove(e) {
      var el = e.currentTarget;
      if (current !== el) return;
      var dx = baseDx + (e.clientX - startX);
      var dy = baseDy + (e.clientY - startY);
      if (Math.abs(e.clientX - startX) > 2 || Math.abs(e.clientY - startY) > 2) movedThisDrag = true;
      el.style.setProperty("--dx", dx + "px");
      el.style.setProperty("--dy", dy + "px");
    }
    function onUp(e) {
      var el = e.currentTarget;
      if (current !== el) return;
      el.classList.remove("is-grabbing");
      try { el.releasePointerCapture(e.pointerId); } catch (err) {}
      current = null;
    }
    items.forEach(function (el) {
      el.addEventListener("pointerdown", onDown);
      el.addEventListener("pointermove", onMove);
      el.addEventListener("pointerup", onUp);
      el.addEventListener("pointercancel", onUp);
      el.addEventListener("dragstart", function (ev) { ev.preventDefault(); });
    });
  })();
  </script>

  <!-- ===================== WebGL — GRADIENT VIVANT QUI SE COURBE VERS LE CURSEUR (identique à l'accueil) ===================== -->
  <script>
  (function () {
    var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) return;

    var canvas = document.getElementById("gl");
    if (!canvas) return;

    var gl = canvas.getContext("webgl", { antialias: true, alpha: false, premultipliedAlpha: false })
          || canvas.getContext("experimental-webgl");
    if (!gl) return;

    var vertSrc =
      "attribute vec2 p;" +
      "void main(){ gl_Position = vec4(p, 0.0, 1.0); }";

    var fragSrc = [
      "precision highp float;",
      "uniform vec2  u_res;",
      "uniform float u_time;",
      "uniform vec2  u_mouse;",
      "uniform float u_pull;",
      "",
      "vec3 ROSE   = vec3(0.984, 0.420, 0.651);",
      "vec3 ORANGE = vec3(0.973, 0.455, 0.184);",
      "vec3 PEACH  = vec3(0.992, 0.659, 0.392);",
      "vec3 ROSEL  = vec3(0.973, 0.902, 0.902);",
      "vec3 CREAM  = vec3(1.000, 0.980, 0.965);",
      "",
      "float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123); }",
      "float noise(vec2 p){",
      "  vec2 i = floor(p); vec2 f = fract(p);",
      "  vec2 u = f*f*(3.0-2.0*f);",
      "  float a = hash(i);",
      "  float b = hash(i + vec2(1.0, 0.0));",
      "  float c = hash(i + vec2(0.0, 1.0));",
      "  float d = hash(i + vec2(1.0, 1.0));",
      "  return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);",
      "}",
      "float fbm(vec2 p){",
      "  float v = 0.0; float a = 0.55;",
      "  mat2 m = mat2(1.6, 1.2, -1.2, 1.6);",
      "  for(int i=0;i<5;i++){ v += a*noise(p); p = m*p; a *= 0.5; }",
      "  return v;",
      "}",
      "",
      "void main(){",
      "  vec2 uv = gl_FragCoord.xy / u_res.xy;",
      "  float asp = u_res.x / u_res.y;",
      "  vec2 p = vec2((uv.x - 0.5) * asp, uv.y - 0.5);",
      "  vec2 m = vec2((u_mouse.x - 0.5) * asp, u_mouse.y - 0.5);",
      "  float t = u_time * 0.06;",
      "",
      "  vec2 toM = m - p;",
      "  float dM = length(toM);",
      "  float lens = (0.16 + 0.20 * u_pull) / (dM * dM + 0.10);",
      "  vec2 curved = p + toM * lens * 0.45;",
      "",
      "  vec2 q = vec2(fbm(curved*1.5 + vec2(0.0, t)), fbm(curved*1.5 + vec2(5.2, -t*0.8)));",
      "  vec2 r = vec2(fbm(curved*1.5 + 3.2*q + vec2(1.7, 9.2) + t*0.5),",
      "                fbm(curved*1.5 + 3.2*q + vec2(8.3, 2.8) - t*0.4));",
      "  float n = fbm(curved*1.6 + 2.4*r + t*0.3);",
      "",
      "  vec3 col = mix(CREAM, ROSEL, 0.35);",
      "  col = mix(col, PEACH,  smoothstep(0.22, 0.92, n) * 0.95);",
      "  col = mix(col, ROSE,   smoothstep(0.38, 0.86, r.x) * 0.78);",
      "  col = mix(col, ORANGE, smoothstep(0.34, 0.98, q.y) * 0.78);",
      "  col = mix(col, ORANGE, smoothstep(0.50, 1.05, r.y) * 0.62);",
      "  col = mix(col, ROSE,   smoothstep(0.62, 1.12, n * r.x) * 0.42);",
      "",
      "  float sheen = 0.5 + 0.5 * sin((q.x + r.y) * 6.2832 + u_time * 0.25);",
      "  col += sheen * 0.045 * vec3(1.0, 0.9, 0.82);",
      "",
      "  float glowR = 0.58;",
      "  float warm = exp(-dM*dM / (glowR*glowR)) * (0.20 + 0.46 * u_pull);",
      "  vec3 warmCol = mix(PEACH, ORANGE, 0.58);",
      "  col += warm * warmCol * 0.6;",
      "  col += exp(-dM*dM / 0.02) * (0.10 + 0.26 * u_pull) * vec3(1.0, 0.82, 0.64);",
      "",
      "  col = mix(col, CREAM, smoothstep(0.55, 1.0, uv.y) * 0.34);",
      "  col = mix(col, CREAM, 0.06);",
      "  float vig = distance(uv, vec2(0.5, 0.5));",
      "  col = mix(col, CREAM, smoothstep(0.55, 1.10, vig) * 0.22);",
      "  col = clamp(col, 0.0, 1.0);",
      "",
      "  gl_FragColor = vec4(col, 1.0);",
      "}"
    ].join("\n");

    function compile(type, src) {
      var s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) { gl.deleteShader(s); return null; }
      return s;
    }

    var vs = compile(gl.VERTEX_SHADER, vertSrc);
    var fs = compile(gl.FRAGMENT_SHADER, fragSrc);
    if (!vs || !fs) return;

    var prog = gl.createProgram();
    gl.attachShader(prog, vs);
    gl.attachShader(prog, fs);
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) return;
    gl.useProgram(prog);

    var buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
    var loc = gl.getAttribLocation(prog, "p");
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

    var uRes   = gl.getUniformLocation(prog, "u_res");
    var uTime  = gl.getUniformLocation(prog, "u_time");
    var uMouse = gl.getUniformLocation(prog, "u_mouse");
    var uPull  = gl.getUniformLocation(prog, "u_pull");

    var dpr = Math.min(window.devicePixelRatio || 1, 1.5);
    function resize() {
      var w = Math.floor(canvas.clientWidth * dpr);
      var h = Math.floor(canvas.clientHeight * dpr);
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w; canvas.height = h;
        gl.viewport(0, 0, w, h);
      }
    }
    window.addEventListener("resize", resize);
    resize();

    var mx = 0.5, my = 0.5;
    var smx = 0.5, smy = 0.5;
    var pull = 0.0, pullTarget = 0.0;
    var idleAngle = Math.random() * 6.28;

    function setFromEvent(cx, cy) {
      var rect = canvas.getBoundingClientRect();
      mx = (cx - rect.left) / rect.width;
      my = 1.0 - (cy - rect.top) / rect.height;
      pullTarget = 1.0;
    }
    window.addEventListener("pointermove", function (e) {
      setFromEvent(e.clientX, e.clientY);
    }, { passive: true });
    window.addEventListener("pointerdown", function (e) {
      setFromEvent(e.clientX, e.clientY);
      pullTarget = 1.0;
    }, { passive: true });
    window.addEventListener("pointerleave", function () { pullTarget = 0.0; });
    document.addEventListener("mouseleave", function () { pullTarget = 0.0; });

    document.querySelector(".living").classList.add("gl-ready");
    document.body.classList.add("gl-ready");

    var start = performance.now();
    var running = true;
    var elapsed = 0;
    document.addEventListener("visibilitychange", function () {
      running = !document.hidden;
      if (running) { start = performance.now() - elapsed; requestAnimationFrame(loop); }
    });

    function loop(now) {
      if (!running) return;
      resize();
      elapsed = now - start;
      var ts = elapsed * 0.001;

      pull += (pullTarget - pull) * 0.05;
      if (pullTarget < 0.5) {
        idleAngle += 0.0035;
        var rx = 0.5 + Math.cos(idleAngle) * 0.18;
        var ry = 0.5 + Math.sin(idleAngle * 0.8) * 0.14;
        mx += (rx - mx) * 0.02;
        my += (ry - my) * 0.02;
      }
      smx += (mx - smx) * 0.06;
      smy += (my - smy) * 0.06;

      gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.uniform1f(uTime, ts);
      gl.uniform2f(uMouse, smx, smy);
      gl.uniform1f(uPull, pull);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  })();
  </script>
